COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Добро пожаловать в Joomla</h1><p>В Joomla 6.1 представлены улучшения, которые позволяют создавать сайты проще, гибче и безопаснее.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Плагин для предотвращения спама снова доступен</h2><p>Плагин не требует регистрации или использования API, обеспечивает конфиденциальность и доступность, позволяет предотвращать спам путем автоматического решения математической задачи браузером пользователя.</p><p>Включите плагин <strong>CAPTCHA - Proof of Work</strong> и выберите в качестве плагина по умолчанию в общих настройках сайта.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Плагин CAPTCHA - Proof of Work для предотвращения спама\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Графический редактор рабочего процесса\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Графический редактор рабочего процесса</h2><p>Управление рабочим процессом создания и публикации материалов стало проще с помощью нового графического редактора.</p><p>Включите параметр <strong>Процессы</strong> в настройках компонента <strong>Материалы</strong> и воспользуйтесь кнопкой <strong>Графический редактор</strong> при создании или редактировании материала.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Новые типы полей: аудио, видео и документы</h2><p>При создании полей для элементов контента теперь доступны другие типы медиафайлов, а не только изображения. Медиафайлы отображаются как элементы HTML5: &lt;audio&gt;, &lt;video&gt;, или ссылки на документы (PDF, электронные таблицы).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"Новые типы полей: аудио, видео и документы\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Более функциональные модули с поддержкой истории версий и многоязычных связей</h2><p>В Joomla давно доступна история версий для материалов. Теперь эта же возможность реализована и для модулей.<br>Если сайт является многоязычным, теперь вы можете связывать модули на разных языках так же, как и материалы.</p><h2>Другие улучшения и исправления</h2><ul class=\"mb-3\"><li>В редакторе TinyMCE реализована поддержка аббревиатур <strong>&lt;abbr&gt;</strong>, семантическая корректность и улучшена доступность.</li><li>Улучшен пользовательский интерфейс на странице <strong>Переопределение констант</strong>: доступно быстрое создание или редактирование отсутствующих переопределений для других используемых языков.</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Что нового в Joomla 6.1"
