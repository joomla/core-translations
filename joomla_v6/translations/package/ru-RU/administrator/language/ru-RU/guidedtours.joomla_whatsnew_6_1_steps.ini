COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_STEP_0_DESCRIPTION="<h3>Релиз Joomla 6.1</h3><p><a title=\"Кликните для просмотра информации о релизе\" href=\"https://6.joomla.org\" target=\"_blank\" rel=\"noopener noreferrer\">Информация о релизе на 6.joomla.org</a></p><hr><h3>Помощь</h3><p>На странице <strong>Помощь</strong> доступны ссылки на страницы справки, документации, форумы поддержки, новостные ресурсы, ресурсы для разработчиков, локализации, страницы сообществ и магазин Joomla.</p>"
