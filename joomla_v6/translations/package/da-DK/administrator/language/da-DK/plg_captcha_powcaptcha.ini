PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Bevis på arbejde"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Dette CAPTCHA plugin præsenterer et matematisk opgave til brugerens browser, som browseren kan løse automatisk. Det er ikke ment til at bevise at brugeren er et menneske, men til at bevise at brugeren er villig til at investere den nødvendige tid for at løse opgaven. Aktuelt baseret på Altcha (altcha.org) biblioteket."

