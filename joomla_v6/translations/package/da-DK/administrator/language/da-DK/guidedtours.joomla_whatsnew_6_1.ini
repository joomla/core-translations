COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Velkommen til Joomla 6.1!</h1><p>Joomla 6.1 introducerer nøgleforbedringer som gør det lettere, sikrere og mere fleksibelt at bygge websteder. Denne tur giver dig det vigtige som et overblik.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Spam beskyttelse er tilbage med Bevis-på-arbejde CAPTCHA</h2><p>Ingen konto eller API er krævet, privatlivs-venlig og tilgængelig. Denne captcha løser i stilhed matematiske opgaver i baggrunden, usynligt for den besøgende.</p><p>For at aktivere, gå til <em>Udvidelser</em> -&gt; <em>Plugin's</em>, søg efter <strong>captcha</strong>, aktiver og sæt som standard under Global konfiguration.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Indholds pipeline som et overblik med den visuelle arbejdsgangs editor</h2><p>Styr dine indholdsarbejdsgang lettere med det nye interaktive arbejdsgangs diagram som giver dig mulighed for at se hele publiceringsprocessen.</p><p>Aktiver arbejdsgange under <em>Artikler</em> -&gt; <em>Arbejdsgange</em> og se efter Graf knappen.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Tre nye brugerdefinerede mediefelt indstillinger: Lyd, Video &amp; Dokumenter</h2><p>Når du opretter brugerdefinerede felter til dit indhold, så kan du nu lade indholdesforfatterne inkludere aklle typer medier, ikke kun billeder.</p><p>Medierne gengives som HTML5 &lt;audio&gt;, &lt;video&gt;, eller dokumentlinks (PDF, regneark...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Smartere moduler med versionering og multisprogs associationer</h2><p>Joomla har længe haft versionering på artikler. Denne samme mulighed er nu udviddet til at omfatte moduler.<br>Hvis du kører et multisprogs websted, kan du nu associere modulinstanser på tværs af forskellige sprog, på samme måde som du kan associere artikler på tværs af sprog.</p><h2>Andre forbedringer der er værd at nævne</h2><ul class=\"mb-3\"><li>Forkortelses <strong>&lt;abbr&gt;</strong> understøttelse i TinyMCE rich tekst editor, semantisk korrekt og forbedret tilgængelighed (se efter den nye forkortelsesknap i TinyMCE værktøjslinjen når du redigerer indhold).</li><li>Sprogoverskrivningsstatus &amp; hurtig-opret manglende overskrivninger UX forbedringer (status indikator, rediger overskrivninger lettere).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Hvad er nyt i Joomla 6.1!"

