COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Benvenuti su Joomla 6.1!</h1><p>Joomla 6.1 introduce miglioramenti fondamentali che rendono la creazione di siti più semplice, sicura e flessibile. Questa panoramica ti offre una rapida carrellata delle funzionalità principali.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">La protezione antispam è TORNATA con il CAPTCHA Computazionale</h2><p>Non richiede alcun account né API, rispetta la privacy ed è accessibile: questo captcha risolve in modo invisibile dei problemi matematici in background, senza che i visitatori se ne accorgano.</p><p>Per abilitarlo, vai su <em>Sistema</em> -&gt; <em>Plugin</em>, cerca <strong>captcha</strong>, abilitalo e impostalo come predefinito in Configurazione globale.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Gli stati del captcha, in corso di verifica e verificato\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Rappresentazione grafica del flusso di lavoro basico\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Panoramica delle transizioni e delle fasi dei contenuti con l'editor visivo del flusso di lavoro</h2><p>Gestisci il flusso di lavoro dei tuoi contenuti in modo più semplice grazie al nuovo diagramma interattivo che ti permette di visualizzare l'intero processo di pubblicazione.</p><p>Abilita il flusso di lavoro in <em>Opzioni Articolo</em> -&gt; <em>Integrazione</em> -&gt; <em>Flusso di Lavoro</em> e cerca il pulsante del grafico.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Tre nuove opzioni per i campi personalizzati dei media: audio, video &amp; Documenti</h2><p>Quando crei campi personalizzati per i tuoi contenuti, ora puoi consentire agli autori di inserire qualsiasi tipo di file multimediale, non solo immagini.</p><p>I media vengono visualizzati in formato HTML5 &lt;audio&gt;, &lt;video&gt;, o link ai documenti (PDF, fogli di calcolo...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"Le tre opzioni del campo media: audio, video e documento\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Moduli più intelligenti con gestione delle versioni e associazioni multilingue</h2><p>Joomla offre da tempo la cronologia delle versioni per gli articoli. Questa stessa funzionalità è ora estesa ai moduli.<br>Se gestisci un sito web multilingue, ora puoi associare le istanze dei moduli tra le diverse lingue, proprio come puoi associare gli articoli tra le diverse lingue.</p><h2>Altri miglioramenti degni di nota</h2><ul class=\"mb-3\"><li>L'abbreviazione <strong>&lt;abbr&gt;</strong> è ora supportata nell'editor di testo TinyMCE, è semanticamente corretta e migliora l'accessibilità (cerca il nuovo pulsante “Abbreviazione” nella barra degli strumenti di TinyMCE durante la modifica dei contenuti).</li><li>Stato della sostituzione della lingua &amp; creazione rapida delle sostituzioni mancanti; miglioramenti dell'esperienza utente (indicatore di stato, modifica semplice delle sostituzioni).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Cosa c'è di nuovo in Joomla 6.1!"

