PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Computazionale"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Questo plugin CAPTCHA propone al browser dell'utente un problema matematico che il browser è in grado di risolvere automaticamente. Il suo scopo non è dimostrare che l'utente sia umano, ma che sia disposto a dedicare il tempo necessario per risolvere l'esercizio. Attualmente si basa sulla libreria Altcha (altcha.org)."

