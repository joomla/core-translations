COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Vítejte v Joomle 6.1!</h1><p>Joomla 6.1 představuje klíčová vylepšení, která usnadňují, zabezpečují a zvyšují flexibilitu tvorby webů. Tato prohlídka vám poskytne základní informace na první pohled.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Ochrana proti spamu je ZPĚT s Proof-of-Work CAPTCHA</h2><p>Tato captcha, která nevyžaduje žádný účet ani API, je šetrná k soukromí a přístupná, tiše řeší matematické hádanky na pozadí, neviditelná pro návštěvníky.</p><p>Chcete-li ji povolit, přejděte do <em>Rozšíření</em> -> <em>Pluginy</em>, vyhledejte <strong>captcha</strong>, povolte je a nastavte jako výchozí v globální konfiguraci.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Captcha probíhá ověřování a ověřena\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Grafické znázornění základního pracovního postupu\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Přehled obsahu pomocí vizuálního editoru pracovních postupů</h2><p>Snazší správu pracovního postupu s obsahem získáte díky novému interaktivnímu diagramu pracovních postupů, který vám umožní vidět celý proces publikování.</p><p>Povolte pracovní postupy ve <em>Správci článků</em> -> <em>Pracovní postupy</em> a hledejte tlačítko grafu.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Tři nové možnosti vlastních polí pro média: Zvuk, Video a Dokumenty</h2><p>Při vytváření vlastních polí pro váš obsah nyní můžete tvůrcům obsahu umožnit zahrnout jakýkoli typ média, nejen obrázky.</p><p>Média se vykreslují jako HTML5 <audio>, <video> nebo odkazy na dokumenty (PDF, tabulky...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"Tři možnosti mediálního pole: audio, video a dokument\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Chytřejší moduly s verzováním a vícejazyčnými asociacemi</h2><p>Joomla má již dlouhou historii verzí článků. Stejná funkce je nyní rozšířena i na moduly.<br>Pokud provozujete vícejazyčný web, můžete nyní asociovat instance modulů v různých jazycích, stejným způsobem jako můžete asociovat články v různých jazycích.</p><h2>Další vylepšení, která stojí za zmínku</h2><ul class=\"mb-3\"><li>Podpora zkratek v editoru formátovaného textu TinyMCE, sémanticky správná a zlepšující přístupnost (při úpravě obsahu hledejte nové tlačítko Zkratka v panelu nástrojů TinyMCE).</li><li>Vylepšení UX (indikátor stavu, snadná úprava přepsání).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Co je nového v Joomla 6.1!"

