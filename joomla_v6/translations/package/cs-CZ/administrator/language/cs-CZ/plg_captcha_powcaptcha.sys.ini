PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Proof of Work"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Tento plugin CAPTCHA zobrazuje matematický úkol v prohlížeči uživatele, který může prohlížeč automaticky vyřešit. Není určen k dokazování, že se jedná o člověka, ale k dokazování, že je uživatel ochoten investovat potřebný čas do vyřešení úkolu. V současné době je založen na knihovně Altcha (altcha.org)."

