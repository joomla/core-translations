COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Bienvenido a Joomla 6.1!</h1><p>Joomla 6.1 introduce mejoras clave que hacen que la creación de sitios web sea más fácil, segura y flexible. Este recorrido te ofrece lo esencial de un vistazo.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">VUELVE la protección contra el spam con el CAPTCHA basado en prueba de trabajo (PoW)</h2><p>No requiere cuenta ni API, respeta la privacidad y es accesible; este CAPTCHA resuelve silenciosamente acertijos matemáticos en segundo plano, de forma invisible para los visitantes.</p><p>Para activarlo, vaya a <em>Extensiones</em> -&gt; <em>Plugins</em>, busque <strong>captcha</strong>, actívelo y configúrelo como predeterminado en la Configuración global.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Visión general del flujo de contenido con el editor visual de flujos de trabajo</h2><p>Gestione su flujo de trabajo de contenido más fácilmente con el nuevo diagrama interactivo de flujos de trabajo que le permite ver todo el proceso de publicación.</p><p>Active los flujos de trabajo en <em>Contenido</em> -&gt; <em>Artículos</em> -&gt; <em>Opciones</em> -&gt; <em>Integración</em> -&gt; <em>Flujos de trabajo</em> y, una vez activado, busque el botón de gráficos en el componente Flujos de trabajo.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Tres nuevas opciones de campos personalizados para medios: audio, vídeo y documentos</h2><p>Al crear campos personalizados para su contenido, ahora puede permitir que los creadores de contenido incluyan cualquier tipo de medio, no sólo imágenes.</p><p>Los medios se renderizan como etiquetas HTML5 &lt;audio&gt; o &lt;video&gt;, o como enlaces a documentos (PDF, hojas de cálculo...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Módulos más inteligentes con control de versiones y asociaciones multilingües</h2><p>Joomla cuenta desde hace tiempo con un historial de versiones para los artículos. Esta misma capacidad se ha ampliado ahora a los módulos.<br>Si gestiona un sitio web multilingüe, ahora puede asociar instancias de módulos entre diferentes idiomas, del mismo modo que puede asociar artículos entre idiomas.</p><h2>Otras mejoras dignas de mención</h2><ul class=\"mb-3\"><li>Compatibilidad con abreviaturas <strong>&lt;abbr&gt;</strong> en el editor de texto enriquecido TinyMCE, semánticamente correcto y que mejora la accesibilidad (busque el nuevo botón abreviatura en la barra de herramientas de TinyMCE cuando edite contenido).</li><li>Estado de las modificaciones de idioma y mejoras en la experiencia de usuario para la creación rápida de modificaciones que faltan (indicador de estado, edición sencilla de las modificaciones).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="¡Novedades en Joomla 6.1!"

