PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Prueba de trabajo"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Este plugin CAPTCHA presenta una tarea matemática al navegador del usuario que el propio navegador puede resolver automáticamente. No se supone que deba demostrar que el usuario es humano, sino demostrar que el usuario está dispuesto a invertir el tiempo necesario para resolver la tarea. Actualmente basado en la biblioteca Altcha (altcha.org)."

