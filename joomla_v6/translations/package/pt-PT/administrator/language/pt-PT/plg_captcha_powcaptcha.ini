PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Prova de trabalho"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Este plugin CAPTCHA apresenta um desafio matemático para o navegador do utilizador que o navegador consegue resolver automaticamente. Não se destina a provar que o utilizador é humano mas para provar que o utilizador está disposto a investir o tempo necessário para resolver a tarefa. Atualmente é baseado na biblioteca Altcha (altcha.org)."

