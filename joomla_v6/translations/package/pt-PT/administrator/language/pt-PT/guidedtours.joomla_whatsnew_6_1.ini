COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Bem-vindo ao Joomla 6.1!</h1><p>O Joomla 6.1 apresenta melhorias importantes que tornam a criação de sítios Web mais fácil, segura e flexível. Esta visita guiada oferece uma visão geral das características essenciais.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">A proteção contra spam está de VOLTA com o CAPTCHA de Prova-de-trabalho!</h2><p>Sem necessidade de conta ou API, respeitando a privacidade e sendo acessível, este captcha resolve silenciosamente quebra-cabeças matemáticos em segundo plano, invisível para os visitantes.</p><p>Para ativar, aceda a <em>Extensões</em> -&gt; <em>Plugins</em>, procure por <strong>captcha</strong>, ative e defina por padrão na Configuração global.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"O captcha indica que está a verificar e como verificado\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Representação gráfica do fluxo de trabalho básico\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Visão geral do fluxo de conteúdos com o editor visual de fluxos de trabalho</h2><p>Faça a gestão do seu fluxo de trabalho de conteúdos mais facilmente com o novo diagrama de fluxo de trabalho interativo que lhe permite visualizar todo o processo de publicação.</p><p>Ative os fluxos de trabalho no <em>Gestor de artigos</em> -&gt; <em>Fluxos de trabalho</em> e procure pelo botão de gráfico.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Três novas opções de campos personalizados de media: áudio, vídeo e documentos</h2><p>Ao criar campos personalizados para o seu conteúdo, pode agora permitir que os criadores de conteúdos incluam qualquer tipo de media, e não apenas imagens.</p><p>Os media são renderizados como HTML5 &lt;audio&gt;, &lt;video&gt; ou ligações de documentos (PDF, folhas de cálculo...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"As três opções de campo de media: áudio, vídeo e documento\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Módulos mais inteligentes com controlo de versão e associações multilingues</h2><p>O Joomla já possui, há algum tempo, um histórico de versões para artigos. Esta mesma funcionalidade foi agora estendida aos módulos. <br>Se gere um ssítio multilingue, pode agora associar instâncias de módulos em diferentes idiomas, da mesma forma que associa artigos em diferentes idiomas.</p><h2>Outras melhorias que vale a pena mencionar</h2><ul class=\"mb-3\"><li>Suporte a abreviaturas <strong>&lt;abbr&gt;</strong> no editor de texto enriquecido TinyMCE, semanticamente correto e melhorando a acessibilidade (procure o novo botão Abreviatura na barra de ferramentas do TinyMCE ao editar conteúdos).</li><li>Melhorias na experiência do utilizador para o estado de sobreposições de idiomas e criação rápida de sobreposições em falta (indicador de estado, edição fácil de sobreposições).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Novidades no Joomla 6.1!"

