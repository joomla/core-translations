COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_DESCRIPTION="<div class=\"row align-items-center pt-3\"><div class=\"col-12\"><h2 class=\"mb-3\">Mais atualizações</h2><p>Os artigos em destaque partilham agora a vista do Gestor de Artigos.</p></div></div><div class=\"row align-items-center pt-4\"><div class=\"col-12\"><h3>Se perdeu</h3><p>O Joomla! 6 suporta atualizações automáticas com o The Update Framework (TUF) para maior segurança e desempenho.<br>Encontre as definições de atualização automática na secção de configuração do <em>Joomla! Update</em>.</p></div></div><div class=\"row align-items-center pt-4\"><div class=\"col-12\"><h3>Outras melhorias e correções</h3><ul class=\"mb-3\"><li>
Email de notificação após a aprovação do registo do administrador.<a href=\"https://github.com/joomla/joomla-cms/pull/45802\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45802</a></li><li>Adicionadas classes personalizadas à lista pendente de classes na caixa de diálogo de imagem no TinyMCE.<a href=\"https://github.com/joomla/joomla-cms/pull/45676\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45676</a></li><li>Adicionada a possibilidade de remover uma etiqueta em lote<a href=\"https://github.com/joomla/joomla-cms/pull/40613\" target=\"_blank\" rel=\"noopener noreferrer\">PR#40613</a></li><li>E muitas, muitas melhorias internas...</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_TITLE="Outras funcionalidades"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_1_DESCRIPTION="<h3>Joomla 6.0 - Notas de lançamento</h3><p><a title=\"Notas de lançamento\" href=\"https://6.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Consulte as notas de lançamento sobre esta versão em 6.joomla.org</a></p><hr><h3>Ajuda e informação</h3><p>Encontrará aqui diversos recursos úteis, bem como ligações adicionais para outros recursos, documentação, suporte e informações sobre como se envolver com o Joomla.</p>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_1_TITLE="Mais informações e ajuda"

