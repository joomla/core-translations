PLG_CAPTCHA_POWCAPTCHA_AUTOSOLVE_ONSUBMIT="Wenn das Formular abgeschickt wird"
PLG_CAPTCHA_POWCAPTCHA_DIFFICULTY_DESC="Je komplexer das Captcha ist, desto mehr Rechenzeit wird für die Lösung benötigt."
