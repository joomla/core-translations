PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Proof of Work"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Dieses Captcha-Plugin stellt dem Browser des Benutzers eine mathematische Aufgabe, die der Browser automatisch lösen kann. Es soll nicht beweisen, dass der Benutzer ein Mensch ist, sondern dass er bereit ist, die erforderliche Zeit in die Lösung der Aufgabe zu investieren. Derzeit basiert es auf der Altcha-Bibliothek (altcha.org)."

