COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class='fw-medium'>Willkommen bei Joomla 6.1!</h1><p>Joomla 6.1 bietet wichtige Verbesserungen, die die Erstellung von Websites einfacher, sicherer und flexibler machen. Diese Tour gibt einen Überblick über die wichtigsten Neuerungen, die es in diesem Bereich gibt.</p><div class='row align-items-center mb-4 pt-4 border-top border-1'><div class='col-md-6 col-lg-7'><h2 class='mb-3'>Der Spam-Schutz ist zurück – mit Proof-of-Work-CAPTCHA</h2><p>Kein Konto und keine API erforderlich, datenschutzfreundlich und barrierefrei – dieses Captcha löst mathematische Rätsel still und leise im Hintergrund, für Besucher unsichtbar.</p><p>Um es zu aktivieren, geh zu <em>Erweiterungen</em> &rarr; <em>Plugins</em>, suche nach <strong>captcha</strong>, aktiviere es und lege es in der globalen Konfiguration als Standard fest.</p></div><div class='col-md-6 col-lg-5 text-center text-md-start mb-3'><img class='img-fluid' src='../media/com_guidedtours/images/6_1/captcha.jpg' alt='Das Captcha zeigt „Wird überprüft“ und „Überprüft“ an' width='600' height='250'></div></div><div class='row align-items-center border-top border-1 pt-4'><div class='col-md-6 col-lg-5 text-center text-md-start mb-3'><img class='img-fluid' src='../media/com_guidedtours/images/6_1/workflows.jpg' alt='Grafische Darstellung des grundlegenden Arbeitsablaufs' width='600' height='350'></div><div class='col-md-6 col-lg-7 mb-3'><h2 class='mb-3'>Die Workflow-Pipeline auf einen Blick mit dem visuellen Workflow-Editor</h2><p>Mit dem neuen interaktiven Workflow-Diagramm kannst du den Workflow von Inhalten einfacher verwalten und erhältst einen Überblick über den gesamten Publikationsprozess.</p><p>Aktiviere die Workflows in den Beitrags-Optionen. Klicke dann unter Workflows auf die Schaltfläche mit dem Diagramm.</p></div></div><div class='row align-items-center border-top border-1 pt-4'><div class='col-md-6 col-lg-7 mb-3'><h2 class='mb-3'>Drei neue Optionen für benutzerdefinierte Felder: Audio, Video und Dokumente</h2><p>Wenn du benutzerdefinierte Felder für deine Inhalte erstellst, kannst du Autoren künftig erlauben, neben Bildern auch andere Medien einzufügen.</p><p>Die Medien werden als HTML5-Elemente &lt;audio&gt; und &lt;video&gt; oder als Dokument-Links (PDF, Tabellenkalkulationen...) dargestellt.</p></div><div class='col-md-6 col-lg-5 text-center text-md-start mb-3'><img class='img-fluid' src='../media/com_guidedtours/images/6_1/media.jpg' alt='Die drei Medienfeldoptionen Audio, Video und Dokument' width='600' height='350'></div></div><div class='row align-items-center border-top border-1 pt-4'><div class='col-12 mb-3'><h2 class='mb-3'>Intelligentere Module mit Versionsverwaltung und mehrsprachigen Verknüpfungen</h2><p>Joomla verfügt schon seit Langem über eine Versionshistorie für Beiträge. Diese Funktion wurde nun auf Module ausgeweitet. Wenn du eine mehrsprachige Website betreibst, kannst du nun Modulinstanzen sprachübergreifend zuordnen, genauso wie du Beiträge sprachübergreifend zuordnen kannst.</p><h2>Weitere erwähnenswerte Verbesserungen</h2><ul class='mb-3'><li>Unterstützung für Abkürzungen <strong>&lt;abbr&gt;</strong> im TinyMCE-Rich-Text-Editor – semantisch korrekt und verbessert die Barrierefreiheit (Achte beim Bearbeiten von Inhalten auf die neue Schaltfläche „Abkürzung“ in der TinyMCE-Symbolleiste).</li><li>Status der Sprachüberschreibung &amp; Verbesserungen der Benutzeroberfläche beim schnellen Erstellen fehlender Sprachen-Overrides (Statusanzeige, einfaches Bearbeiten von Overrides).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Was ist neu in Joomla 6.1!"
