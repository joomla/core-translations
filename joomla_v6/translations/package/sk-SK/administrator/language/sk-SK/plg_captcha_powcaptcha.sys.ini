PLG_CAPTCHA_POWCAPTCHA="CAPTCHA – Dôkaz o vykonanej práci"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Tento zásuvný modul CAPTCHA zadáva prehliadaču používateľa matematickú úlohu, ktorú prehliadač dokáže vyriešiť automaticky. Jeho účelom nie je dokázať, že používateľ je človek, ale preukázať, že je ochotný venovať potrebný čas na vyriešenie úlohy. V súčasnosti je založený na knižnici Altcha (altcha.org)."

