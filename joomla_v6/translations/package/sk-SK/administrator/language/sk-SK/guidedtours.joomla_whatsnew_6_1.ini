COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Vitajte v Joomle 6.1!</h1><p>Joomla 6.1 prináša kľúčové vylepšenia, vďaka ktorým je tvorba webových stránok jednoduchšia, bezpečnejšia a flexibilnejšia. Táto prehliadka vám poskytne prehľad o základných funkciách.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Ochrana proti spamu je SPÄŤ s CAPTCHA typu Proof-of-Work</h2><p>Nevyžaduje si účet ani API, je šetrná k súkromiu a prístupná. Táto CAPTCHA ticho rieši matematické hádanky na pozadí, je neviditeľná pre návštevníkov.</p><p>Na aktiváciu prejdite do <em>Rozšírenia</em> -&gt; <em>Zásuvné moduly</em>, vyhľadajte <strong>captcha</strong>, aktivujte a nastavte ako predvolené v Globálnej konfigurácii.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Prehľad o procese tvorby obsahu pomocou vizuálneho editora pracovných postupov</h2><p>Spravujte svoj pracovný postup obsahu jednoduchšie s novým interaktívnym diagramom pracovného postupu, ktorý vám umožňuje vidieť celý proces publikovania. </p><p>Povoľte pracovné postupy v <em>Správcovi článkov</em> –&gt; <em>Pracovné postupy</em> a vyhľadajte tlačidlo grafu.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Tri nové možnosti vlastných polí pre médiá: Audio, Video a Dokumenty</h2><p>Pri vytváraní vlastných polí pre váš obsah môžete teraz tvorcom obsahu umožniť zahrnúť akýkoľvek typ médií, nielen obrázky.</p><p>Mediálne súbory sa zobrazujú ako HTML5 &lt;audio&gt;, &lt;video&gt; alebo odkazy na dokumenty (PDF, tabuľky...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Inteligentnejšie moduly s verzionovaním a viacjazyčnými prepojeniami</h2><p>Joomla už dlho ponúka históriu verzií pre články. Táto funkcia je teraz rozšírená aj na moduly. <br>Ak prevádzkujete viacjazyčnú webovú stránku, teraz môžete priradiť inštancie modulov v rôznych jazykoch, rovnako ako môžete priradiť články v rôznych jazykoch. </p><h2>Ďalšie vylepšenia, ktoré stojí za zmienku</h2><ul class=\"mb-3\"><li>Podpora skratiek <strong>&lt;abbr&gt;</strong> v editore formátovaného textu TinyMCE, sémanticky správna a zlepšujúca prístupnosť (pri editácii obsahu hľadajte nové tlačidlo Skratka na paneli nástrojov TinyMCE). </li><li>Stav prepisovania jazyka a vylepšenia používateľského prostredia pri rýchlom vytváraní chýbajúcich prepisov (indikátor stavu, jednoduchá úprava prepisov).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Čo je nové v Joomla 6.1!"

