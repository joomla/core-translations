COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_DESCRIPTION="<div class=\"row align-items-center pt-3\"><div class=\"col-12\"><h2 class=\"mb-3\">更多更新</h2><p>精選文章現在與 文章管理器共用。</p></div></div><div class=\"row align-items-center pt-4\"><div class=\"col-12\"><h3>如果您錯過</h3><p>Joomla! 6 現在由 The Update Framework (TUF) 支援自動更新<br> 在Joomla更新選項中找到自動更新的選項。</p></div></div><div class=\"row align-items-center pt-4\"><div class=\"col-12\"><h3>其他改進與修正</h3><ul class=\"mb-3\"><li>管理員註冊批准的 通知電子郵件 <a href=\"https://github.com/joomla/joomla-cms/pull/45802\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45802</a></li><li>在 TinyMCE 的圖片框中，為類別下拉選單新增自訂類別。 <a href=\"https://github.com/joomla/joomla-cms/pull/45676\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45676</a></li><li>增加批次移除標籤 <a href=\"https://github.com/joomla/joomla-cms/pull/40613\" target=\"_blank\" rel=\"noopener noreferrer\">PR#40613</a></li><li>以及很多很多改進！</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_TITLE="其他功能"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_1_DESCRIPTION="<h3>Joomla 6.0 完整版本更新說明</h3>
<p><a title=\"完整版本更新說明\" href=\"https://6.joomla.org/announcements.html\" target=\"_blank\" rel=\"noopener noreferrer\">在 6.joomla.org 上查看完整的版本更新說明</a></p>
<hr>
<h3>協助與資訊</h3>
<p>這裡彙整了許多可協助你的資源，並提供更多資源、文件、支援服務以及如何參與 Joomla 的相關連結。</p>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_1_TITLE="更多資訊"

