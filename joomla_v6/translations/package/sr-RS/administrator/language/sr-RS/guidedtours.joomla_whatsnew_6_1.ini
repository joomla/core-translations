COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Добродошли у Joomla 6.1!</h1><p>Joomla 6.1 доноси кључна унапређења која олакшавају израду сајта, повећавају безбедност и пружају већу флексибилност. Овај обилазак вам даје основне информације на први поглед.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Заштита од нежељеног садржаја се враћа уз Proof-of-Work CAPTCHA</h2><p>Без налога и API-ја, уз поштовање приватности и доступност, ова captcha тихо решава математичке задатке у позадини, невидљиво за посетиоце.</p><p>Да бисте је омогућили, идите на <em>Extensions</em> -&gt; <em>Plugins</em>, пронађите <strong>captcha</strong>, омогућите је и поставите као подразумевану у Global Configuration.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Преглед тока садржаја помоћу визуелног уређивача тока рада</h2><p>Лакше управљајте током садржаја уз нови интерактивни дијаграм који вам омогућава да видите цео процес објављивања.</p><p>Омогућите Workflows у <em>Article Manager</em> -&gt; <em>Workflows</em> и потражите дугме за графикон.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Три нове опције прилагођених поља за медије: аудио, видео и документи</h2><p>При креирању прилагођених поља сада можете омогућити унос различитих типова медија, не само слика.</p><p>Медији се приказују као HTML5 &lt;audio&gt;, &lt;video&gt; или као линкови ка документима (PDF, табеле...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Паметнији модули са верзионисањем и вишејезичким повезивањем</h2><p>Joomla већ дуго има историју верзија за чланке. Ова могућност је сада проширена и на модуле.<br>Ако имате вишејезични сајт, сада можете повезати инстанце модула између различитих језика, као што повезујете чланке.</p><h2>Остала унапређења вредна пажње</h2><ul class=\"mb-3\"><li>Подршка за скраћенице <strong>&lt;abbr&gt;</strong> у TinyMCE уређивачу текста, семантички исправно и побољшава приступачност.</li><li>Побољшања у управљању језичким override-има и брзом креирању недостајућих override-а (индикатор статуса, једноставно уређивање).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Шта је ново у Joomla 6.1!"

