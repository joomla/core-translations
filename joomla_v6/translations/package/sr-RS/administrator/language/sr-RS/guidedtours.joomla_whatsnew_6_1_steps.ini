COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_STEP_0_DESCRIPTION="<h3>Joomla 6.1 Белешке о издању</h3><p><a title=\"Full release notes\" href=\"https://www.joomla.org/announcements.html\" target=\"_blank\" rel=\"noopener noreferrer\">Погледајте комплетне белешке о издању на joomla.org</a></p><hr><h3>Помоћ и информације</h3><p>Овде можете пронаћи бројне ресурсе који ће вам помоћи, као и додатне линкове ка другим ресурсима, документацији, подршци и начинима да се укључите у Joomla.</p>"
