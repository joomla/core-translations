PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - доказ рада"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Овај CAPTCHA додатак приказује математички задатак у прегледачу корисника који прегледач може аутоматски да реши. Његова сврха није да докаже да је корисник човек, већ да покаже да је корисник спреман да уложи потребно време за решавање задатка. Тренутно је заснован на Altcha (altcha.org) библиотеци."

