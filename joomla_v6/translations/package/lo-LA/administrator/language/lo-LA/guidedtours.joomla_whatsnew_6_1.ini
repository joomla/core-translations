COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">ຍິນດີຕ້ອນຮັບເຂົ້າສູ່ Joomla 6.1!</h1><p>Joomla 6.1 ແນະນຳການປັບປຸງທີ່ສຳຄັນເຊິ່ງເຮັດໃຫ້ການສ້າງເວັບໄຊງ່າຍຂຶ້ນ, ປອດໄພຂຶ້ນ ແລະ ມີຄວາມຢືດຢຸ່ນຫຼາຍຂຶ້ນ. ການແນະນຳນີ້ຈະຊ່ວຍໃຫ້ທ່ານເຫັນພາບລວມຂອງສິ່ງທີ່ສຳຄັນຕ່າງໆ.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">ລະບົບປ້ອງກັນສະແປມກັບມາແລ້ວດ້ວຍ Proof-of-Work CAPTCHA</h2><p>ບໍ່ຈຳເປັນຕ້ອງມີບັນຊີ ຫຼື API, ເປັນມິດກັບຄວາມເປັນສ່ວນຕົວ ແລະ ເຂົ້າເຖິງໄດ້ງ່າຍ, captcha ນີ້ຈະແກ້ໄຂໂຈດຄະນິດສາດຢູ່ເບື້ອງຫຼັງໂດຍທີ່ຜູ້ເຂົ້າຊົມບໍ່ຮູ້ສຶກຕົວ.</p><p>ເພື່ອເປີດໃຊ້ງານ, ໃຫ້ໄປທີ່ <em>ສ່ວນເສີມ (Extensions)</em> -&gt; <em>ປັກອິນ (Plugins)</em>, ຄົ້ນຫາ <strong>captcha</strong>, ເປີດໃຊ້ງານ ແລະ ຕັ້ງເປັນຄ່າເລີ່ມຕົ້ນໃນ ການຕັ້ງຄ່າທົ່ວໄປ (Global Configuration).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Captcha ສະແດງສະຖານະກຳລັງກວດສອບ ແລະ ກວດສອບແລ້ວ\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"ການສະແດງພາບຂອງຂັ້ນຕອນວຽກພື້ນຖານ\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">ເຫັນພາບລວມຂອງຂັ້ນຕອນການຈັດການເນື້ອຫາດ້ວຍຕົວແກ້ໄຂຂັ້ນຕອນວຽກແບບພາບ</h2><p>ຈັດການຂັ້ນຕອນວຽກຂອງເນື້ອຫາໄດ້ງ່າຍຂຶ້ນດ້ວຍແຜນວາດຂັ້ນຕອນວຽກແບບໂຕ້ຕອບໃໝ່ ທີ່ຊ່ວຍໃຫ້ທ່ານເຫັນຂະບວນການເຜີຍແຜ່ທັງໝົດ.</p><p>ເປີດໃຊ້ງານຂັ້ນຕອນວຽກ (Workflows) ໃນ <em>ຕົວຈັດການບົດຄວາມ (Article Manager)</em> -&gt; <em>ຂັ້ນຕອນວຽກ (Workflows)</em> ແລະ ຊອກຫາປຸ່ມຮູບກຣາບ.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">ສາມຕົວເລືອກຊ່ອງຂໍ້ມູນກຳນົດເອງໃໝ່ສຳລັບສື່: ສຽງ, ວິດີໂອ ແລະ ເອກະສານ</h2><p>ເມື່ອສ້າງຊ່ອງຂໍ້ມູນກຳນົດເອງ (Custom Fields) ສຳລັບເນື້ອຫາຂອງທ່ານ, ຕອນນີ້ທ່ານສາມາດອະນຸຍາດໃຫ້ຜູ້ສ້າງເນື້ອຫາໃສ່ສື່ປະເພດໃດກໍໄດ້, ບໍ່ແມ່ນພຽງແຕ່ຮູບພາບ.</p><p>ສື່ຕ່າງໆຈະຖືກສະແດງເປັນ HTML5 &lt;audio&gt;, &lt;video&gt;, ຫຼື ລິ້ງເອກະສານ (PDF, ສະເປຣດຊີດ...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"ສາມຕົວເລືອກຊ່ອງຂໍ້ມູນສື່: ສຽງ, ວິດີໂອ ແລະ ເອກະສານ\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">ໂມດູນທີ່ສະຫຼາດຂຶ້ນດ້ວຍລະບົບຈັດການເວີຊັນ ແລະ ການເຊື່ອມໂຍງຫຼາຍພາສາ</h2><p>Joomla ມີປະຫວັດເວີຊັນສຳລັບບົດຄວາມມາແຕ່ດົນແລ້ວ. ຄວາມສາມາດດັ່ງກ່າວນີ້ໄດ້ຖືກຂະຫຍາຍມາໃຊ້ກັບໂມດູນແລ້ວ.<br>ຫາກທ່ານເຮັດເວັບໄຊຫຼາຍພາສາ, ຕອນນີ້ທ່ານສາມາດເຊື່ອມໂຍງໂມດູນຂ້າມພາສາຕ່າງໆ ໄດ້ຄືກັນກັບການເຊື່ອມໂຍງບົດຄວາມ.</p><h2>ການປັບປຸງອື່ນໆ ທີ່ໜ້າສົນໃຈ</h2><ul class=\"mb-3\"><li>ຮອງຮັບຕົວອັກສອນຫຍໍ້ <strong>&lt;abbr&gt;</strong> ໃນຕົວແກ້ໄຂເນື້ອຫາ TinyMCE, ຖືກຕ້ອງຕາມຫຼັກການ ແລະ ຊ່ວຍໃຫ້ການເຂົ້າເຖິງດີຂຶ້ນ (ຊອກຫາປຸ່ມຕົວອັກສອນຫຍໍ້ໃໝ່ໃນແຖບເຄື່ອງມື TinyMCE ເມື່ອແກ້ໄຂເນື້ອຫາ).</li><li>ປັບປຸງ UX ຂອງສະຖານະການຂຽນທັບພາສາ ແລະ ການສ້າງອັນທີ່ຂາດຫາຍໄປຢ່າງວ່ອງໄວ (ຕົວບົ່ງຊີ້ສະຖານະ, ແກ້ໄຂການຂຽນທັບໄດ້ງ່າຍ).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="ມີຫຍັງໃໝ່ໃນ Joomla 6.1!"

