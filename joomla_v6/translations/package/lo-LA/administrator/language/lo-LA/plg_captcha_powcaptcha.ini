PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - ຫຼັກຖານການເຮັດວຽກ"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="ປລັກອິນ CAPTCHA ນີ້ສະແດງໂຈດຄະນິດສາດໃຫ້ກັບບຣາວເຊີຂອງຜູ້ໃຊ້ ທີ່ບຣາວເຊີສາມາດແກ້ໄຂໄດ້ໂດຍອັດຕະໂນມັດ. ມັນບໍ່ໄດ້ມີຈຸດປະສົງເພື່ອພິສູດວ່າຜູ້ໃຊ້ເປັນມະນຸດ, ແຕ່ເພື່ອພິສູດວ່າຜູ້ໃຊ້ຍິນດີທີ່ຈະໃຊ້ເວລາທີ່ຈຳເປັນໃນການແກ້ໄຂໂຈດ. ປັດຈຸບັນແມ່ນອີງໃສ່ໄລບຣາຣີ Altcha (altcha.org)."

