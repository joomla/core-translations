PLG_SAMPLEDATA_BLOG_SAMPLEDATA_MODULES_MODULE_8_CONTENT="<h1 class=\"display-4 text-thin\">Velkommen til Joomla på Cassiopeia!</h1><p class=\"lead\"><strong>Du har valgt et av de beste publiseringsystemene i verden.</strong></p><p class=\"lead\">Cassiopeia er en nettstedsmal for Joomla.</p><p><a class=\"btn btn-primary btn-lg\" href=\"%s\">Typografi »</a></p>"
