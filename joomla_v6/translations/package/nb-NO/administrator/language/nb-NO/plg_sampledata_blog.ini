PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_INTROTEXT="<p>Dette er et eksempel på et blogg innlegg.</p><p>Hvis du logger inn på nettstedet (Administrator innloggingslenken nederst på denne siden) vil du få muligheten til å redigere den og alle andre artikler. Du vil også få muligheten til å opprette nye artikler og gjøre andre endringer på nettstedet.</p><p>Etterhvert som du legger til og endrer artikler vil du se hvordan nettstedet endres og hvordan du kan tilpasse det på forskjellige måter.</p><p>Bare gå igang, du kan ikke ødelegge noe.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_TITLE="Velkommen til bloggen din"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_FIELD_0="Uurnip greens yarrow ricebean endive cauliflower sea lettuce kohlrabi amaranth water spinach avocado daikon napa cabbage asparagus winter purslane kale."
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_FULLTEXT="<p>På hele siden vil du se både introduksjonsteksten og resten av artikkelen. Du kan endre innstillingene for å skjule introduksjonen hvis du vil.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_INTROTEXT="<p>Hjemmesiden din er satt opp til å vise de fire nyeste artiklene fra bloggkategorien i en kolonne. Deretter er det lenker til de to neste eldre artiklene. Du kan endre antallene ved å redigere innstillingene for innholdsalternativer i bloggfanen i nettstedsadministratoren. Det er en lenke til nettstedsadministratoren din hvis du er pålogget.</p><p>Hvis du vil ha blogginnlegget ditt delt i to deler, en introduksjon og deretter en egen side i full lengde, bruker du Les mer-elementet for å sette inn et skille.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_TITLE="Om deres nettsted"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_FULLTEXTIMAGE_ALT="Krabben Nebula"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_INTROTEXT="<p>Nettstedet ditt har noen vanlig brukte moduler som allerede er forhåndskonfigurert. Disse omfatter:</p><ul><li>Bilde (type: Egendefinert), som inneholder bildet under menyen. Dette er en egendefinert modul som du kan redigere for å endre bildet.</li><li>Populære emneord (type: Emneord - Populære), som vil vises dersom du merker dine artikler. Angi et emneord i emneordfeltet når du redigerer.</li><li>Eldre innlegg (type: Artikler), som viser artikler gruppert i kategorier.</li><li>Syndikering (type: Syndikat), som gir leserne dine mulighet til å lese dine innlegg i en nyhetsleser.</li><li>Innloggingsskjema (type: Login), som gir brukerne tilgang til begrensede områder på nettstedet.</li></ul><p>Hver av disse modulene har mange alternativer som du kan eksperimentere med i modulbehandleren i nettstedsadministratoren. Når du er logget inn kan du også velge redigeringsikonet oppe i høyre hjørne, som vil ta deg til en redigeringsskjerm for den modulen. Husk alltid å lagre og lukke moduler du redigerer.</p><p>Joomla! inkluderer også mange andre moduler du kan innlemme på nettstedet ditt. Etter hvert som du utvikler nettstedet ditt vil du kanskje legge til flere moduler som du finner på <a href=\"https://extensions.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Joomla Extensions Directory.</a></p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_TITLE="Deres moduler"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_5_INTROTEXT="<p>Designmaler angir utseendet på nettstedet ditt.</p><p>Denne bloggen er installert med Cassiopeia-malen.</p><p>Du kan endre alternativene ved å velge lenken Arbeid på din side, Malinnstillinger i menyen som er synlig når du logger inn.</p><p>Du kan for eksempel endre bakgrunnsfargen, farge for utheving, tittel, beskrivelse og skrifttypen for tittelen som brukes på nettstedet.</p><p>Flere valg er tilgjengelige i nettstedsadministratoren. Du kan også installere en ny mal ved hjelp av utvidelsesbehandleren.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_5_TITLE="Deres designmal"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_FULLTEXT="<p>Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua. At vero eos et accusam et justo duo dolores et ea rebum. Stet clita kasd gubergren, no sea takimata sanctus est</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_INTROTEXT="<p><strong>Millioner av nettsider benytter Joomla!</strong></p><p>Lær mer om vakker bloggpresentasjon.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_TITLE="Millioner"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_FULLTEXT="<p>Uurnip greens yarrow ricebean rutabaga endive cauliflower sea lettuce kohlrabi amaranth water spinach avocado daikon napa cabbage asparagus winter purslane kale. Celery potato scallion desert raisin horseradish spinach carrot soko. Lotus root water spinach fennel kombu maize bamboo shoot green bean swiss chard seakale pumpkin onion chickpea gram corn pea. Brussels sprout coriander water chestnut gourd swiss chard wakame kohlrabi beetroot carrot watercress. Corn amaranth salsify bunya nuts nori azuki bean chickweed potato bell pepper artichoke.</p> "
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_INTROTEXT="<p><strong>Vi elsker Joomla til månen og tilbake!</strong></p><p>Takk til alle frivillige som har bidratt!</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_TITLE="Kjærlighet"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_FULLTEXT="<p>Cupcake ipsum dolor. Sit amet cotton candy ice cream sesame snaps cake marshmallow powder. Ice cream chocolate cake marshmallow halvah bonbon. Dragée carrot cake danish candy muffin brownie. Candy sugar plum ice cream chupa chups macaroon tiramisu soufflé oat cake. Topping cheesecake lollipop gummi bears icing sweet roll donut liquorice. Pie jelly-o candy donut oat cake cotton candy.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_INTROTEXT="<p><strong>Vi er stolte av å presentere versjon 6 av Joomla!</strong></p><p>Lær mer om arbeidsflytene i Joomla.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_TITLE="Joomla"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_9_FIELD_0="Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua."
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_9_INTROTEXT="<p>Arbeidsflyter styrer trinnene artiklene må gjennom før de blir publisert.</p><p>Komponenten for å administrere arbeidsflyter er ikke aktivert som standard.</p><p>For å se arbeidsflyten som er inkludert i eksempeldataene, må du først aktivere denne funksjonaliteten.</p><ol><li>Gå til administrasjonsområdet</li><li>Under fanen 'Innhold' > 'Artikler' > 'Alternativer' > 'Integrasjon' setter du 'Aktiver arbeidsflyt' til 'Ja'</li><li>Lagre endringene</li></ol><p>Når du nå åpner 'Innhold' igjen, vil du se avsnittet 'Arbeidsflyter'.</p><p>Når du redigerer en artikkel, vil du også se de nye overgangene for artikler knyttet til arbeidsflyter.</p>"
