PLG_SAMPLEDATA_BLOG_OVERVIEW_DESC="Eksempeldata som vil sette opp en bloggside med artikler, emneord, egendefinerte felter og en arbeidsflyt.<br>Dersom nettstedet er flerspråklig vil dataene bli lagt til for det aktive administrasjonsspråket."
PLG_SAMPLEDATA_BLOG_OVERVIEW_TITLE="Eksempeldata for blogg"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_0_INTROTEXT="<p>Dette forteller deg litt om denne bloggen og personen som skriver den.</p><p>Når du er innlogget kan du redigere denne siden ved å trykke på redigeringsikonet.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_0_TITLE="Om"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_1_INTROTEXT="<p>Her er noen grunnleggende tips for å jobbe med nettstedet ditt.</p><ul><li>Joomla! har en 'nettstedsdel' (front end) som du ser på nå, og en 'administrasjonsdel' (back end) hvor du gjør det mer avanserte arbeidet med å bygge nettstedet, som å sette opp menyene og bestemme hvilke moduler som skal vises. Du må logge inn i administrasjonsdelen separat med det samme brukernavnet og passordet du brukte for å logge inn på denne delen av nettstedet.</li><li>Noe av det første du sannsynligvis vil gjøre, er å endre nettstedets tittel og slagord og legge til en logo. For å gjøre dette velger du lenken Innstillinger for designmal i menyen, som er synlig når du logger inn. For å endre nettstedsbeskrivelsen, nettlesertittelen, standard e-post og andre elementer, velg Nettstedsinnstillinger. Mer avanserte konfigurasjonsvalg er tilgjengelige i administrasjonsdelen.</li><li>For å endre utseendet på nettstedet fullstendig vil du sannsynligvis installere en ny designmal. Gå til System, velg Installer - Utvidelser fra listen, så åpnes installasjonsprogrammet for utvidelser. Det finnes mange gratis og kommersielle designmaler for Joomla.</li><li>Som du allerede har sett, kan du styre hvem som kan se ulike deler av nettstedet ditt. Når du jobber med moduler og artikler, vil tilgangsnivået Registrert bety at bare innloggede brukere kan se dem.</li><li>Når du oppretter en ny artikkel eller annet innhold, kan du også lagre den som Publisert eller Upublisert. Hvis den er upublisert, vil ikke besøkende på nettstedet kunne se den, men det vil du.</li><li>Du kan lære mye mer om å jobbe med Joomla på <a href=\"https://guide.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Joomlas dokumentasjonsside</a> og få hjelp fra andre brukere i <a href=\"https://forum.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Joomla-forumene</a>. I administrasjonsdelen finnes det hjelpeknapper på hver side som gir detaljert informasjon om funksjonene på den siden.</li></ul>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_1_TITLE="Arbeid med nettstedet"
