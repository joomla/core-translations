COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Velkommen til Joomla 6.1!</h1><p>Joomla 6.1 introduserer viktige forbedringer som gjør nettstedsbygging enklere, tryggere og mer fleksibel. Denne omvisningen gir deg det viktigste i korte trekk.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Spambeskyttelsen er TILBAKE med Proof-of-Work-CAPTCHA</h2><p>Ingen konto eller API kreves. Personvernvennlig og tilgjengelig løser denne captchaen matteoppgaver stille i bakgrunnen, usynlig for besøkende.</p><p>For å aktivere, gå til <em>Utvidelser</em> -&gt; <em>Programtillegg</em>, søk etter <strong>captcha</strong>, aktiver og sett som standard i Global konfigurasjon.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Captchaen viser verifiserer og verifisert\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Grafisk fremstilling av den grunnleggende arbeidsflyten\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Innholdsflyten i et øyekast med den visuelle arbeidsflytredigeringen</h2><p>Administrer innholdsarbeidsflyten din enklere med det nye interaktive arbeidsflytdiagrammet som lar deg se hele publiseringsprosessen.</p><p>Aktiver arbeidsflyter i <em>Artikkelbehandling</em> -&gt; <em>Arbeidsflyter</em> og se etter grafknappen.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Tre nye mediealternativer for egendefinerte felt: Lyd, video &amp; dokumenter</h2><p>Når du oppretter egendefinerte felt for innholdet ditt, kan du nå la innholdsskapere inkludere alle typer media, ikke bare bilder.</p><p>Mediene gjengis som HTML5 &lt;audio&gt;, &lt;video&gt; eller dokumentlenker (PDF, regneark ...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"De tre mediefeltalternativene lyd, video og dokument\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Smartere moduler med versjonering og flerspråklige tilknytninger</h2><p>Joomla har lenge hatt versjonshistorikk for artikler. Den samme muligheten er nå utvidet til moduler.<br>Hvis du driver et flerspråklig nettsted, kan du nå knytte modulforekomster sammen på tvers av ulike språk, på samme måte som du kan knytte artikler sammen på tvers av språk.</p><h2>Andre forbedringer verdt å merke seg</h2><ul class=\"mb-3\"><li>Støtte for forkortelser <strong>&lt;abbr&gt;</strong> i tekstredigeringsprogrammet TinyMCE, semantisk korrekt og med bedre tilgjengelighet (se etter den nye forkortelsesknappen i TinyMCE-verktøylinjen når du redigerer innhold).</li><li>Forbedret brukeropplevelse for status på språkoverstyringer &amp; hurtigoppretting av manglende overstyringer (statusindikator, enkel redigering av overstyringer).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Hva er nytt i Joomla 6.1!"

