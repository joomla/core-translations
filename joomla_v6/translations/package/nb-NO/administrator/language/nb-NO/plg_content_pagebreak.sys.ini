PLG_CONTENT_PAGEBREAK="Innhold - Sideskift"
PLG_CONTENT_PAGEBREAK_XML_DESCRIPTION="<p>Tillater oppretting av en artikkel med flere sider, eventuelt med innholdsfortegnelse.</p><p>Sett inn sideskift ved hjelp av sideskiftknappen som normalt finnes på verktøylinjen i WYSIWYG-redigeringsprogrammet. Plasseringen av sideskiftet i en artikkel vises i redigeringsprogrammet som en enkel horisontal linje.</p><p>Teksten som vises avhenger av valgte alternativer, og kan enten være tittelen, alternativ tekst (hvis angitt) eller sidenummer.</p><p>HTML-bruken er:<br>&lt;hr class=&quot;system-pagebreak&quot; /&gt;<br>&lt;hr class=&quot;system-pagebreak&quot; title=&quot;Sidetittelen&quot; /&gt; eller <br>&lt;hr class=&quot;system-pagebreak&quot; alt=&quot;Første side&quot; /&gt; eller <br>&lt;hr class=&quot;system-pagebreak&quot; title=&quot;Sidetittelen&quot; alt=&quot;Første side&quot; /&gt; eller <br>&lt;hr class=&quot;system-pagebreak&quot; alt=&quot;Første side&quot; title=&quot;Sidetittelen&quot; /&gt;</p>"

