PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Proof of Work"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Dette CAPTCHA-programtillegget presenterer en matteoppgave for brukerens nettleser, som nettleseren kan løse automatisk. Det skal ikke bevise at brukeren er et menneske, men at brukeren er villig til å bruke den nødvendige tiden på å løse oppgaven. For øyeblikket basert på Altcha-biblioteket (altcha.org)."

