PLG_LDAP_FIELD_SEARCHSTRING_DESC="En spørrestreng som brukes til å søke etter en gitt bruker. Nøkkelordet [search] blir dynamisk erstattet av innloggingen brukeren oppgir. Et eksempel på en streng er: uid=[search]. Flere strenger kan brukes, adskilt av semikolon. Brukes etter innledende binding for alle metoder."
PLG_LDAP_FIELD_SEARCHSTRING_LABEL="Søkestreng"
PLG_LDAP_FIELD_UID_DESC="LDAP-attributt som inneholder brukerens innloggings-id. For 'Active Directory' er dette 'sAMAccountName'."
PLG_LDAP_FIELD_UID_LABEL="Map: Brukerid"
PLG_LDAP_FIELD_USERNAME_DESC="Tilkoblingsbrukernavnet og tilkoblingspassordet definerer tilkoblingsparametrene for DN-oppslagsfasen. To valg er tilgjengelige: anonymt DN-oppslag (la begge feltene stå tomme) og administrativ tilkobling (tilkoblingsbrukernavnet er brukernavnet til en administrativ konto, for eksempel Administrator). Brukes bare i metoden binding og søk."
PLG_LDAP_FIELD_USERNAME_LABEL="Brukernavn"
PLG_LDAP_FIELD_USERSDN_DESC="Nøkkelordet [username] blir dynamisk erstattet av innloggingen brukeren oppgir. Et eksempel på en streng er: uid=[username], dc=my-domain, dc=com. Flere strenger kan brukes, adskilt av semikolon. Brukes bare for metoden direkte binding som bruker."
PLG_LDAP_FIELD_USERSDN_LABEL="DN for bruker"
PLG_LDAP_FIELD_V3_DESC="Standard er LDAP2, men de siste versjonene av OpenLdap krever at klientene bruker LDAPV3."
