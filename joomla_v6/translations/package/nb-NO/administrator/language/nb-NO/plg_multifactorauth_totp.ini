PLG_MULTIFACTORAUTH_TOTP="Flerfaktorautentisering - Verifiseringskode"
PLG_MULTIFACTORAUTH_TOTP_CAPTIVE_PROMPT="Åpne autentiseringsappen eller passordbehandleren din, kopier den sekssifrede koden for dette nettstedet inn i tekstboksen nedenfor, og klikk deretter på Valider-knappen. Hvis koden allerede er fylt ut automatisk for deg, klikker du bare på Valider-knappen."
PLG_MULTIFACTORAUTH_TOTP_ERR_VALIDATIONFAILED="Du har ikke skrevet inn en gyldig verifiseringskode. Kontroller oppsettet av autentiseringsappen din, og sørg for at tid og tidssone på enheten er stilt inn riktig."
PLG_MULTIFACTORAUTH_TOTP_LBL_LABEL="Angi den sekssifrede verifiseringskoden"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_INSTRUCTIONS="Sett opp verifiseringskoden din (også kjent som en \"autentiseringskode\") ved hjelp av informasjonen nedenfor. Du kan bruke en autentiseringsapp (f.eks. Google Authenticator, Authy, LastPass Authenticator osv.), din foretrukne passordbehandler (1Password, BitWarden, Keeper, KeePassXC, Strongbox osv.) eller, i noen tilfeller, nettleseren din."
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_PLACEHOLDER="Sekssifret kode"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_HEADING="Oppsett for autentiseringsapp"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_KEY="Angi denne nøkkelen"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK="Trykk på denne lenken"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK_NOTE="<small>Fungerer bare i støttede nettlesere, f.eks. Safari.</small>"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK_TEXT="<a href=\"%s\">Sett opp din verifiseringskode</a>"
