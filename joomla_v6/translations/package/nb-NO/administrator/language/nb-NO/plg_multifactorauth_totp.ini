PLG_MULTIFACTORAUTH_TOTP_METHOD_TITLE="Verifiseringskode"
PLG_MULTIFACTORAUTH_TOTP_SHORTINFO="Bruk 6-sifrede koder generert av en app hvert 30. sekund."
PLG_MULTIFACTORAUTH_TOTP_XML_DESCRIPTION="Flerfaktorautentisering for nettstedets brukere ved hjelp av sekssifrede verifiseringskoder generert av en autentiseringsapp (Google Authenticator, Authy, LastPass Autentiserer osv.), en passordbehandler (1Password, BitWarden, Keeper, KeePassXC, Strongbox osv.), eller i noen tilfeller deres nettleser."

