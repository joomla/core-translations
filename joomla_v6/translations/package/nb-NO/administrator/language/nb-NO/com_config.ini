JLIB_RULES_SETTING_NOTES_COM_CONFIG="Hvis du endrer innstillingen, gjelder det for denne og alle undergrupper, komponenter og innhold. Merk at:<br><em><strong>Arvet</strong></em> betyr at rettighetene fra den overordnede gruppen vil bli brukt.<br><em><strong>Avvist</strong></em> betyr at uansett hva den overordnede gruppens innstilling er, kan ikke gruppen som redigeres utføre denne handlingen.<br><em><strong>Tillatt</strong></em> betyr at gruppen som redigeres vil kunne utføre denne handlingen (men hvis dette er i konflikt med den overordnede gruppen, vil det ikke ha noen virkning; en konflikt vil bli indikert med <em><strong>Ikke tillatt (Låst)</strong></em> under Beregnede innstillinger).<br><em><strong>Ikke satt</strong></em> brukes bare for gruppen Offentlig i globalt oppsett. Gruppen Offentlig er overordnet alle andre grupper. Hvis en rettighet ikke er angitt, behandles den som avvist, men kan endres for undergrupper, komponenter, kategorier og elementer." ; Alternate language strings for the rules form field

