PLG_MULTIFACTORAUTH_WEBAUTHN="Flerfaktorautentisering - Passnøkler"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_LOGIN_REQUEST="Ugyldig autentiseringsforespørsel."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_PK="Registreringen av tilgangsnøkkelen mislyktes. Tilgangsnøkkelsvaret som er mottatt fra nettleseren, stemmer ikke overens med den offentlige nøkkelen som er utstedt av serveren. Dette betyr at noen prøvde å hacke deg, eller at noe ikke virker som det skal."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_USER="Av sikkerhetsgrunner har du ikke lov til å registrere tilgangsnøkler på vegne av en annen bruker."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_NO_ATTESTED_DATA="Noe gikk galt, men ingen ytterligere informasjon om feilen er tilgjengelig for øyeblikket. Prøv å registrere tilgangsnøkkelen din på nytt."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_NO_PK="Serveren har ikke utstedt en offentlig nøkkel for registrering av tilgangsnøkler, men har likevel mottatt en forespørsel om registrering av tilgangsnøkkel fra nettleseren. Dette betyr at noen prøvde å hacke deg, eller at noe ikke virker som det skal."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTAVAILABLE_BODY="Nettleseren din støtter ikke standarden for tilgangsnøkler. Ikke alle nettlesere er kompatible med tilgangsnøkler på alle enheter ennå."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTAVAILABLE_HEAD="Nettleseren din mangler støtte for tilgangsnøkler"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTHTTPS_BODY="Besøk nettstedet over HTTPS for å aktivere flerfaktorautentisering med passnøkler."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTHTTPS_HEAD="Tilgangsnøkler er bare tilgjengelig på HTTPS"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NO_STORED_CREDENTIAL="Du har ikke satt opp en tilgangsnøkkel ennå, eller tilgangsnøkkelen du prøver å bruke, er ikke kvalifisert."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_CONFIGURED="Du har allerede satt opp tilgangsnøkkelen din. Vær oppmerksom på at du bare kan endre tittelen på den fra denne siden."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_DISPLAYEDAS="Tilgangsnøkkel"
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_INSTRUCTIONS="Bruk &ldquo;%s&rdquo;-knappen på denne siden for å starte prosessen for nettautentisering (Web Authentication). Følg deretter instruksjonene fra nettleseren din for å fullføre nettautentiseringen med din foretrukne tilgangsnøkkel."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_REGISTERKEY="Registrer din tilgangsnøkkel"
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_SHORTINFO="Bruk nettleserens tilgangsnøkler med en hvilken som helst maskinvare- eller programvaresikkerhetsnøkkel."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_VALIDATEKEY="Godkjenn med tilgangsnøkkel"
PLG_MULTIFACTORAUTH_WEBAUTHN_XML_DESCRIPTION="Bruk nettleserens tilgangsnøkler som en metode for flerfaktorautentisering. Alle moderne nettlesere støtter det. De fleste nettlesere tilbyr enhetsspesifikk autentisering beskyttet av et passord og/eller biometri (fingeravtrykkssensor, ansiktsskanning, &hellip;)."

