COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_DESCRIPTION="<div class=\"row align-items-center pt-3\"><div class=\"col-12\"><h2 class=\"mb-3\">Flere oppdateringer</h2><p>Utvalgte artikler vises nå i visningen for administrasjon av artikler.</p></div></div><div class=\"row align-items-center pt-4\"><div class=\"col-12\"><h3>Hvis du gikk glipp av det</h3><p>Joomla! 6 støtter automatiske oppdateringer med The Update Framework (TUF) for bedre sikkerhet og ytelse.<br>Du finner innstillinger for automatisk oppdatering i konfigurasjonsdelen for <em>Joomla! Oppdatering</em>.</p></div></div><div class=\"row align-items-center pt-4\"><div class=\"col-12\"><h3>Andre forbedringer og feilrettinger</h3><ul class=\"mb-3\"><li>Varsel på e-post ved godkjenning av registrering fra administrator <a href=\"https://github.com/joomla/joomla-cms/pull/45802\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45802</a></li><li>Legg til egendefinerte klasser i nedtrekkslisten for klasser i bildedialogen i TinyMCE <a href=\"https://github.com/joomla/joomla-cms/pull/45676\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45676</a></li><li>Mulighet for å fjerne et emneord fra flere elementer om gangen <a href=\"https://github.com/joomla/joomla-cms/pull/40613\" target=\"_blank\" rel=\"noopener noreferrer\">PR#40613</a></li><li>Og mange, mange forbedringer under panseret...</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_TITLE="Andre funksjoner"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_1_DESCRIPTION="<h3>Utgivelsesinformasjon for Joomla! 6.0</h3><p><a title=\"Utgivelsesinformasjon\" href=\"https://6.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Se utgivelsesinformasjon på 6.joomla.org</a></p><hr><h3>Hjelp og Informasjon</h3><p>Du finner mange ressurser til hjelp for deg her, sammen med lenker til flere ressurser, dokumentasjon, støtte &ndash; og hvordan du kan bli involvert i Joomla.</p>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_1_TITLE="Mer informasjon og hjelp"

