PLG_MULTIFACTORAUTH_YUBIKEY="Flerfaktorautentisering - YubiKey"
PLG_MULTIFACTORAUTH_YUBIKEY_CAPTIVE_PROMPT="Trykk i tekstboksen nedenfor. Sett deretter YubiKey-en inn i USB-porten på enheten din, og berør den gylne skiven eller platen (avhengig av modell) slik at den lager en YubiKey-kode. Hvis du bruker en NFC-kompatibel telefon eller et nettbrett med en NFC-aktivert YubiKey, må du i stedet holde YubiKey-en mot NFC-leserområdet på telefonen eller nettbrettet."
PLG_MULTIFACTORAUTH_YUBIKEY_CODE_LABEL="YubiKey-kode"
PLG_MULTIFACTORAUTH_YUBIKEY_ERR_VALIDATIONFAILED="Du har ikke skrevet inn en gyldig YubiKey hemmelig kode eller YubiCloud serveren er ikke tilgjengelig for øyeblikket."
PLG_MULTIFACTORAUTH_YUBIKEY_LBL_AFTERSETUP_INSTRUCTIONS="Du har allerede satt opp din YubiKey (den som genererer koder som starter med <code>%s</code>). Du kan bare endre tittelen fra denne siden."
PLG_MULTIFACTORAUTH_YUBIKEY_LBL_SETUP_INSTRUCTIONS="Oppgi en kode generert av din <a href=\"https://www.yubico.com\" target=\"_blank\" rel=\"noopener noreferrer\">YubiKey</a> nedenfor, og klikk eller trykk deretter på Bekreft-knappen. De første tolv tegnene, som er den unike identifikasjonskoden for din YubiKey, blir lagret."
PLG_MULTIFACTORAUTH_YUBIKEY_LBL_SETUP_LABEL="YubiKey-identifikasjon"
PLG_MULTIFACTORAUTH_YUBIKEY_LBL_SETUP_PLACEHOLDER="Skriv inn en YubiKey-kode"
PLG_MULTIFACTORAUTH_YUBIKEY_METHOD_TITLE="YubiKey"
PLG_MULTIFACTORAUTH_YUBIKEY_SHORTINFO="Bruk sikre YubiKey-maskinvarenøkler."
PLG_MULTIFACTORAUTH_YUBIKEY_XML_DESCRIPTION="Lar brukere på nettstedet ditt bruke flerfaktorautentisering ved hjelp av en sikker YubiKey-maskinvarenøkkel. Brukerne trenger sin egen YubiKey, tilgjengelig fra <a href=\"https://www.yubico.com\" target=\"_blank\" rel=\"noopener noreferrer\">www.yubico.com</a>. For å bruke flerfaktorautentisering må brukerne redigere brukerprofilen sin og aktivere flerfaktorautentisering."

