COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_MENUS_TITLE="Menyen"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_MENUS_DESCRIPTION="<p>Menyen gir tilgang til administrasjonssidene. Hver seksjon har en samling sider for å administrere den aktuelle delen av Joomla, for eksempel Innhold, Menyer og Brukere.</p><p>Vindusikonene lenker til egne kontrollpanel for disse seksjonene. Systemmenyen leder selv til et kontrollpanel.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_QUICKACCESS_TITLE="Kontrollpanelene"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_QUICKACCESS_DESCRIPTION="<p>Kontrollpanelene gir rask tilgang til ofte brukte sider via ikonene sine.</p><p>Hvert kontrollpanel er en administratormodul som kan tilpasses via innstillingsikonet <span class=\"icon-cogs\" aria-hidden=\"true\"></span>.<br>Dette gjør at du kan sette opp kontrollpanelene på nettstedet slik at de passer for deg.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_NOTIFICATIONS_TITLE="Varslingspanelet"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_NOTIFICATIONS_DESCRIPTION="<p>Varslingspanelet viser når oppdateringer er tilgjengelige for Joomla og andre utvidelser. Utestående personvernforespørsler vises også her.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_TOPBAR_TITLE="Den øverste linjen"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_TOPBAR_DESCRIPTION="<p>Den øverste linjen viser tittelen på den viste siden, slik at du alltid vet hvor du er. De andre elementene i den øverste linjen er valgfrie moduler.</p><p>Vanligvis finner du gjeldende Joomla-versjon og tilgang til flere omvisninger her.</p><p>De siste elementene er vanligvis en lenke til nettstedsdelen og brukermenyen, hvor du kan administrere kontoen din og logge ut.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_FINALWORDS_TITLE="Hjelp og informasjon"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_FINALWORDS_DESCRIPTION="<p>Her finner du mange ressurser som kan hjelpe deg, sammen med ytterligere lenker til flere ressurser, dokumentasjon, støtte og hvordan du kan bli involvert i Joomla.</p>"

