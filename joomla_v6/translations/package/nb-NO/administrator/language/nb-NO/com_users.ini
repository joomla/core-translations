COM_USERS_POSTINSTALL_MULTIFACTORAUTH_ACTION="Aktiver de nye programtilleggene for flerfaktorautentisering"
COM_USERS_POSTINSTALL_MULTIFACTORAUTH_BODY="<p>Joomla! kommer med en kraftig forbedret opplevelse av <a href=\"https://en.wikipedia.org/wiki/Multi-factor_authentication\" target=\"_blank\" rel=\"noopener noreferrer\">flerfaktorautentisering</a> som hjelper deg med å sikre innloggingene til brukerne dine.</p><p>I motsetning til funksjonen for tofaktorautentisering i tidligere versjoner av Joomla, må brukere <em>ikke lenger angi en sikkerhetskode sammen med brukernavn og passord</em>. Flerfaktorautentiseringen skjer i et eget trinn etter innlogging på nettstedet. Før brukerne har fullført valideringen av flerfaktorautentisering, kan de ikke navigere til andre sider eller bruke nettstedet. Dette gjør flerfaktorautentisering motstandsdyktig mot <a href=\"https://en.wikipedia.org/wiki/Phishing\" target=\"_blank\" rel=\"noopener noreferrer\">phishing</a>. Den tillater også interaktive valideringsmetoder som tilgangsnøkler (inkludert integrasjon med Windows Hello, Apple TouchID / FaceID og biometrisk skjermlås på Android), eller sending av sekssifrede autentiseringskoder via e-post. Begge disse interaktive og praktiske metodene er nå tilgjengelige som programtillegg som følger med Joomla! selv.</p>"
