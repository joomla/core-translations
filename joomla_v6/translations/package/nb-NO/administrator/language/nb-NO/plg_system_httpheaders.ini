PLG_SYSTEM_HTTPHEADERS_ADDITIONAL_HEADER_VALUE="HTTP-hodeverdi" ; Do not translate 'HTTP Header'
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP' target='_blank' rel='noopener noreferrer'>Retningslinjer for innholdssikkerhet (Content Security Policy - CSP)</a>" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_CLIENT="Annonsør"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_FRAME_ANCESTORS_SELF_ENABLED="frame-ancestors 'self'" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_FRAME_ANCESTORS_SELF_ENABLED_DESC="Aktiver CSP-beskyttelsen mot klikkekapring (frame-ancestors), og tillat kun opprinnelsen 'self'. Bruk skjemaet nedenfor for å tillate andre opprinnelser enn 'self'."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_NONCE_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTML/Global_attributes/nonce' target='_blank' rel='noopener noreferrer'>Nonce</a>" ; Please only change the URL
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_NONCE_ENABLED_DESC="Aktiver hvitlisting av bestemte inline-skript ved å bruke en kryptografisk nonce (tall brukt én gang) for alle skript og stiler som bruker Joomla API. Angivelse av en nonce gjør at en moderne nettleser ignorerer 'unsafe-inline', som fortsatt bør settes for eldre nettlesere uten nonce-støtte."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_REPORT_ONLY_DESC="Bruk overskriften 'Content-Security-Policy-Report-Only' i stedet for 'Content-Security-Policy'." ; Do not translate 'Content-Security-Policy' & 'Content-Security-Policy-Report-Only'
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_REPORT_ONLY="Report-Only" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STRICT_DYNAMIC_ENABLED="strict-dynamic" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STRICT_DYNAMIC_ENABLED_DESC="Kildeuttrykket strict-dynamic spesifiserer at tilliten som eksplisitt gis til et skript i markeringen, ved at det følges av en nonce eller en hash, skal videreføres til alle skriptene som lastes av dette rotskriptet. Samtidig ignoreres eventuelle tillatelses- eller kildeuttrykk som 'self' eller 'unsafe-inline'." ; Do not translate 'strict-dynamic', 'self' and 'unsafe-inline'
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_SCRIPT_HASHES_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/script-src' target='_blank' rel='noopener noreferrer'>Skript-hashes</a>" ; Please only change the URL
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_SCRIPT_HASHES_ENABLED_DESC="Aktiver den valgfrie hash-baserte hvitlistingen av inline-skript ved å bruke en kryptografisk hash for alle skript som bruker Joomla API. Angivelse av hasher gjør at en moderne nettleser ignorerer 'unsafe-inline', som fortsatt bør settes for eldre nettlesere uten hash-støtte."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STYLE_HASHES_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/style-src' target='_blank' rel='noopener noreferrer'>Stil-hasher</a>" ; Please only change the URL
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STYLE_HASHES_ENABLED_DESC="Aktiver den valgfrie hash-baserte hvitlistingen av inline-stiler ved å bruke en kryptografisk hash for alle stiler som bruker Joomla API. Angivelse av hasher gjør at en moderne nettleser ignorerer 'unsafe-inline', som fortsatt bør settes for eldre nettlesere uten hash-støtte."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_VALUES="Legg til direktiv"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_VALUES_DIRECTIVE="Policy-direktiv"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_VALUES_VALUE="Verdi"
PLG_SYSTEM_HTTPHEADERS_COOP="Cross-Origin-Opener-Policy" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_HEADER_CLIENT="Annonsør"
PLG_SYSTEM_HTTPHEADERS_HEADER_CLIENT_BOTH="Begge"
PLG_SYSTEM_HTTPHEADERS_HSTS="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security' target='_blank' rel='noopener noreferrer'>HTTP Strict Transport Security (HSTS)</a>" ; Please only change the URL
PLG_SYSTEM_HTTPHEADERS_HSTS_MAXAGE="max-age" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_HSTS_MAXAGE_DESC="Dette valget angir tiden for 'max-age', angitt i sekunder. Standardverdien er 31536000, som tilsvarer ett år" ; Please do not translate 'max-age'
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD="<a href='https://hstspreload.org' target='_blank' rel='noopener noreferrer'>Forhåndslast</a>" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_DESC="Denne instillingen aktiverer valgfri inkludering i såkalte forhåndslastingslister for nettlesere."
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_NOTE="Viktig"
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_NOTE_DESC="HSTS betyr at domenet ditt ikke lenger kan kalles opp uten HTTPS. Når det er lagt til i forhåndslastingslisten, er det ikke lett å omgjøre. Domener kan fjernes, men det tar flere måneder før brukerne får endringen med en nettleseroppdatering.<br><strong>Dette alternativet er svært viktig for å forhindre 'man-in-the-middle'-angrep, så det bør uansett aktiveres, men bare hvis du er sikker på at HTTPS støttes for domenet og alle underdomener på lang sikt! Verdien for 'max-age' må settes til 63072000 (2 år) for registrering.</strong>" ; Please do not translate 'max-age'
PLG_SYSTEM_HTTPHEADERS_HSTS_SUBDOMAINS="Også for underdomener"
PLG_SYSTEM_HTTPHEADERS_HSTS_SUBDOMAINS_DESC="HSTS bør også aktiveres <strong>for underdomener</strong>. Vanligvis tas underdomenet 'www' med når SSL-sertifikatet opprettes. Hvis flere underdomener brukes, må du sørge for at disse også har et gyldig SSL-sertifikat."
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_ACTION="Aktiver standard sikkerhetshoder"
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_BODY="<p>Joomla! kommer med et innebygd sett med verktøy som hjelper deg med å håndtere HTTP-sikkerhetshoder. Disse hodene hjelper for eksempel nettleseren din med å beskytte nettstedet ditt mot <a href='https://en.wikipedia.org/wiki/Cross-site_scripting' target='_blank' rel='noopener noreferrer'>XSS</a>- og <a href='https://en.wikipedia.org/wiki/Clickjacking' target='_blank' rel='noopener noreferrer'>Clickjacking</a>-angrep.</p><p>Du finner flere detaljer i <a href='https://guide.joomla.org/user-manual/security/security-http-headers' target='_blank' rel='noopener noreferrer'>veiledningen for håndtering av HTTP-hoder i Joomla!-dokumentasjonen.</a></p>"
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_TITLE="HTTP-sikkerhetshoder"
