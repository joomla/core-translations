COM_JOOMLAUPDATE_ERRORMODAL_BODY_FORBIDDEN="<p>Joomla kan ikke kommunisere med filen <code>administrator/components/com_joomlaupdate/extract.php</code> som utfører oppdateringen. Dette skjer vanligvis av en av følgende grunner:</p><ul><li>En serverkonfigurasjonsfil i nettstedets rotkatalog, som <code>.htaccess</code> eller <code>web.config</code>, forhindrer tilgang til denne filen.</li><li>Serverkonfigurasjonen din forhindrer tilgang til denne filen.</li><li>Eierskapet til og rettighetene for denne filen tillater ikke at serveren din får tilgang til den.</li><li>Nettstedet ditt ligger bak en lastbalanserer eller CDN, men konfigurasjonen gir ikke tilgang til denne filen, eller blokkerer sending av kommandoer til den.</li><li>Selv om filen kan åpnes, blokkeres sending av kommandoer til den av serverens beskyttelse, som mod_security2.</li></ul><p>Kontakt netthotellet ditt hvis du ikke er sikker.</p>"
COM_JOOMLAUPDATE_ERRORMODAL_BODY_INVALIDLOGIN="<p>Joomla-oppdateringen kan ikke kommunisere riktig med <code>administrator/components/com_joomlaupdate/extract.php</code> som utfører oppdateringen. Dette skjer vanligvis av en av følgende grunner:</p><ul><li>Filen <code>administrator/components/com_joomlaupdate/update.php</code>, som inneholder instruksjonene for å ta i bruk oppdateringen, kunne ikke opprettes, for eksempel på grunn av rettighetsproblemer.</li><li>Filen nevnt ovenfor kan ikke leses av skriptet <code>extract.php</code> på grunn av rettighetsproblemer.</li><li>Nettleseren, nettverksutstyret eller serveren din ødelegger passordet vi av sikkerhetsgrunner sender med hver forespørsel til <code>extract.php</code></li></ul><p>Prøv en annen nettleser, uten installerte nettleserutvidelser, helst på en annen datamaskin koblet til Internett via en annen leverandør. Hvis feilen vedvarer bør du kontakte leverandøren av netthotellet.</p>"
COM_JOOMLAUPDATE_ERRORMODAL_BODY_SERVERERROR="<p>Joomla-oppdateringen fikk en serverfeil da oppdateringen ble tatt i bruk på nettstedet ditt.</p><p>Nettstedet ditt er kanskje ikke fullstendig oppgradert til den nye Joomla-versjonen.</p>"
