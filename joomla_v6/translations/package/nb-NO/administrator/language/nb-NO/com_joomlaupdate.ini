COM_JOOMLAUPDATE_UPDATE_FAILED_MAIL_BODY="Denne e-posten ER IKKE sendt av Joomla!-prosjektet. Den er automatisk sendt fra ditt eget nettsted,\n{SITENAME} - {URL} \n\n================================================================================\nOPPDATERINGSINFORMASJON\n================================================================================\nNettstedet ditt kunne ikke oppdateres fra {OLDVERSION} til {NEWVERSION}.\nSjekk loggfilen '/administrator/logs/joomla_update.php' for mer informasjon.\nDenne e-posten er sendt til deg fra ditt eget nettsted.\nJoomla!-prosjektet vil aldri kontakte deg direkte.\n================================================================================\nHVORFOR MOTTAR JEG DENNE E-POSTEN?\n================================================================================\nDenne e-posten har blitt sendt automatisk av Joomla!, programvaren som driver nettstedet ditt.\nDu har aktivert automatiske oppdateringer på nettstedet ditt og forsøk på å installere en slik oppdatering utløser denne meldingen.\nHvis du ikke forstår hva Joomla! er og hva du trenger å gjøre, ikke kontakt Joomla!-prosjektet.\nDe sender deg IKKE denne e-posten og de kan ikke hjelpe deg. Kontakt i stedet personen som laget eller administrerer nettstedet ditt.\n================================================================================\nHVEM SENDTE MEG DENNE E-POSTEN?\n================================================================================\nDenne e-posten er sendt til deg fra ditt eget nettsted, {SITENAME}"
