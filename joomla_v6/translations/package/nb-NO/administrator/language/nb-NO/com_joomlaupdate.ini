COM_JOOMLAUPDATE_CONFIG_AUTOMATED_UPDATES_DESC="Automatiske oppdateringer er bare tilgjengelig for nettsteder som er offentlig tilgjengelige på Internett. Hvis nettstedet ditt ligger bak en brannmur eller ikke er offentlig tilgjengelig, for eksempel i et lokalt testmiljø, må du oppdatere manuelt.<br><br><strong>Merk:</strong> ved å aktivere automatiske oppdateringer registreres nettstedet ditt hos den aktuelle tjenesten som leveres av Joomla!-prosjektet.<br>Registreringen gir Joomla-prosjektet tilgang til informasjon om nettstedet og servermiljøet, nærmere bestemt nettstedets URL, PHP-versjon, databasetype og -versjon, CMS-versjon samt serverens OS-type og -versjon.<br>Denne informasjonen brukes kun til å forbedre tjenesten."
