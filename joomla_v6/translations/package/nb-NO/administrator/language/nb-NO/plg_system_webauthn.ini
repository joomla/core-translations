PLG_SYSTEM_WEBAUTHN="System - Innlogging med tilgangsnøkkel (passordløs)"
PLG_SYSTEM_WEBAUTHN_CANNOT_ADD_FOR_A_USER="Du kan ikke legge til eller fjerne tilgangsnøkler på vegne av brukere. Brukere må logge inn og sette opp egne enheter."
PLG_SYSTEM_WEBAUTHN_DESCRIPTION="Aktiverer passordfri autentisering ved hjelp av tilgangsnøkler. Merk at fanen for tilgangsnøkler i brukerprofilredigeringen og innloggingsknappene for tilgangsnøkler bare vises hvis brukeren besøker nettstedet over HTTPS. Registrering av tilgangsnøkler, og bruk av dem for å logge inn på nettstedet, fungerer bare når nettstedet bruker et gyldig sertifikat signert av en sertifikatutsteder som brukerens nettleser stoler på."
PLG_SYSTEM_WEBAUTHN_ERR_AJAX_INVALIDACTION="Ugyldig ajax-handling"
PLG_SYSTEM_WEBAUTHN_ERR_CANNOT_FIND_USERNAME="Kan ikke finne brukernavnfeltet i innloggingsmodulen. Beklager, passordfri autentisering vil ikke fungere på dette nettstedet med mindre du bruker en annen innloggingsmodul."
PLG_SYSTEM_WEBAUTHN_ERR_CANT_STORE_FOR_GUEST="Kan ikke lagre påloggingsinformasjon til gjestebruker!"
PLG_SYSTEM_WEBAUTHN_ERR_CORRUPT_STORED_CREDENTIAL="Den lagrede påloggingsinformasjonen for brukerkontoen din er skadet. Logg inn med en annen metode, og fjern og legg til tilgangsnøkkelen din på nytt."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_LOGIN_REQUEST="Ugyldig passordfri innloggingsforespørsel. Noe virker ikke slik det skal, eller så er dette et forsøk på å hacke nettstedet."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_PK="Registreringen av tilgangsnøkkelen mislyktes. Tilgangsnøkkelen som er mottatt fra nettleseren stemmer ikke overens med den offentlige nøkkelen som er utstedt av serveren. Dette betyr at noen prøvde å hacke deg eller noe ikke virker slik det skal."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_USER="Av sikkerhetsgrunner har du ikke lov til å registrere tilgangsnøkler på vegne av en annen bruker."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_NO_ATTESTED_DATA="Noe gikk galt, men ingen ytterligere informasjon om feilen er tilgjengelig for øyeblikket. Prøv å registrere tilgangsnøkkelen din på nytt."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_NO_PK="Serveren har ikke utstedt en offentlig nøkkel for registrering av tilgangsnøkkel, men har likevel mottatt en forespørsel om tilgangsnøkkelregistrering fra nettleseren. Dette betyr at noen prøvde å hacke deg, eller at noe ikke virker slik det skal."
PLG_SYSTEM_WEBAUTHN_ERR_CREDENTIAL_ID_ALREADY_IN_USE="Kan ikke lagre innloggingsinformasjon. Disse opplysningene er allerede i bruk av en annen bruker."
PLG_SYSTEM_WEBAUTHN_ERR_EMPTY_USERNAME="Du må fylle inn ditt brukernavn (men IKKE ditt passord) før du velger innlogging med passnøkkel."
PLG_SYSTEM_WEBAUTHN_ERR_INVALID_USERNAME="Det angitte brukernavnet samsvarer ikke med en brukerkonto som har aktivert passordløs innlogging på dette nettstedet."
PLG_SYSTEM_WEBAUTHN_ERR_LABEL_NOT_SAVED="Kunne ikke lagre den nye etiketten"
PLG_SYSTEM_WEBAUTHN_ERR_NOT_DELETED="Kunne ikke fjerne tilgangsnøkkelen"
PLG_SYSTEM_WEBAUTHN_ERR_NOUSER="Fant ingen brukerkonto"
PLG_SYSTEM_WEBAUTHN_ERR_NO_BROWSER_SUPPORT="Beklager, nettleseren din støtter ikke tilgangsnøkkelstandarden for passordløse innlogginger, eller nettstedet ditt bruker ikke HTTPS med et gyldig sertifikat signert av en sertifikatutsteder nettleseren din stoler på. Du må logge inn på dette nettstedet med brukernavn og passord."
PLG_SYSTEM_WEBAUTHN_ERR_NO_STORED_CREDENTIAL="Kan ikke finne de lagrede opplysningene for din tilgangsnøkkel."
PLG_SYSTEM_WEBAUTHN_ERR_USER_REMOVED="Brukeren for denne tilgangsnøkkelen ser ikke ut til å finnes lenger på dette nettstedet."
PLG_SYSTEM_WEBAUTHN_ERR_XHR_INITCREATE="Kan ikke hente registreringsinformasjonen for tilgangsnøkler fra nettstedet ditt."
PLG_SYSTEM_WEBAUTHN_FIELD_ATTESTATION_SUPPORT_DESC="Tillat kun at tilgangsnøkler med verifiserbare kryptografiske signaturer brukes for innlogging med tilgangsnøkkel. Sterkt anbefalt for miljøer med høye sikkerhetskrav. Krever at systemets midlertidige katalog er skrivbar for PHP, samt OpenSSL-utvidelsen. Kan føre til at noen rimeligere, ikke-sertifiserte tilgangsnøkler ikke fungerer i det hele tatt. Deaktivering forhindrer også at Joomla kan identifisere merke og modell for tilgangsnøkkelen du bruker (ikke noe ikon vil vises ved siden av tilgangsnøkkelens navn)."
PLG_SYSTEM_WEBAUTHN_FIELD_ATTESTATION_SUPPORT_LABEL="Støtte for attestasjon"
PLG_SYSTEM_WEBAUTHN_FIELD_DESC="Lar deg administrere metoder for passordløs innlogging med tilgangsnøkler. Du trenger en støttet nettleser og tilgangsnøkkel (f.eks. Google Chrome eller Firefox med en FIDO2-sertifisert sikkerhetsnøkkel).<br><br><strong>MacOS/iOS/watchOS:</strong> Touch/Face ID.<br><strong>Windows:</strong> Hello (fingeravtrykk / ansiktsgjenkjenning / PIN).<br><strong>Android:</strong> Biometrisk skjermlås.<br><br>Du finner flere detaljer i <a href=\"https://guide.joomla.org/user-manual/users/users-webauthn-passwordless-login\" target=\"_blank\" rel=\"noopener noreferrer\">dokumentasjonen for passordløs innlogging med tilgangsnøkkel</a>."
