PLG_USER_TOKEN="Bruker - Joomla API-token"
PLG_USER_TOKEN_ALLOWEDUSERGROUPS_DESC="Hvilke Joomla-brukergrupper som har tillatelse til å bruke Joomla-tokener til å autentisere seg mot Joomla API-applikasjonen. Kontrollerer også hvilke brukergrupper som ser administrasjonsgrensesnittet for Joomla-tokener i brukerprofilen sin. Standard: Joomlas innebygde superbrukergruppe (brukergruppe-ID 8)."
PLG_USER_TOKEN_ALLOWEDUSERGROUPS_LABEL="Tillatte brukergrupper"
PLG_USER_TOKEN_XML_DESCRIPTION="Tillater administrasjon av sikkerhetstokener som brukes ved autentisering til Joomla API-applikasjonen (ekstern tilgang til nettstedet ditt). Disse tokenene er strengt personlige. Du kan se ditt eget token, men du kan bare deaktivere eller tilbakestille andre brukeres tokener."

