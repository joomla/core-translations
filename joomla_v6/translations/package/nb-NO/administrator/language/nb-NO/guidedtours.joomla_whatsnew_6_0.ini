COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_DESCRIPTION="<h1 class=\"fw-medium\">Velkommen til Joomla 6!</h1><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-6 text-center text-md-start mb-3\"><img class=\"img-fluid shadow\" src=\"media/com_guidedtours/images/6_0/cassiopeiacolors.jpg\" alt=\"Display the child template style customiser\" width=\"640\" height=\"380\"></div><div class=\"col-md-6 col-lg-6 mb-3\"><h2 class=\"mb-3\">Cassiopeia Utvidet</h2><p>Utforsk underliggende maler med en ny stil som viser avanserte tilpasningsfunksjoner som skrift- og fargeendringer.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-12 mb-3\"><h2 class=\"mb-3\">Utvidet versjonering</h2><p>Joomlas versjoneringssystem har blitt forbedret til å inkludere egendefinerte felt, emneord og kategorier, slik at alle innholdsendringer kan spores, sammenlignes og gjenopprettes.</p></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_TITLE="Hva er nytt i Joomla 6"

