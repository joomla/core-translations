PLG_CAPTCHA_POWCAPTCHA="کپچا - اثبات کار CAPTCHA - Proof of Work"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="این پلاگین کپچا یک مسئله ریاضی را به مرورگر کاربر ارائه می‌دهد که مرورگر می‌تواند به طور خودکار آن را حل کند. قرار نیست ثابت کند که کاربر انسان است، بلکه قرار است ثابت کند که کاربر مایل است زمان لازم را برای حل مسئله صرف کند. در حال حاضر بر اساس کتابخانه Altcha (altcha.org) است."

