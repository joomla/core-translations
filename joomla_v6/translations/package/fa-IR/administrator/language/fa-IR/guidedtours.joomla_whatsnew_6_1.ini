COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">به جوملا 6.1 خوش آمدید!</h1><p>جوملا 6.1 بهبودهای کلیدی را معرفی می‌کند که ساخت سایت را آسان‌تر، ایمن‌تر و انعطاف‌پذیرتر می‌سازد. این تور نکات ضروری را در یک نگاه به شما ارائه می‌دهد.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">محافظت در برابر هرزنامه با کپچای CAPTCHA مبتنی بر اثبات کار Proof-of-Work بازگشته است</h2><p>بدون نیاز به حساب کاربری یا API، محرمانه و دسترس‌پذیر، این کپچا پازل‌های ریاضی را به‌صورت خودکار در پس‌زمینه حل می‌کند و برای بازدیدکنندگان کاملا نامرئی است.</p><p>برای فعال‌سازی، به مسیر <em>افزونه‌ها</em> -&gt; <em>پلاگین‌ها</em> بروید، عبارت <strong>captcha</strong> را جستجو کنید، آن را فعال و در پیکربندی سراسری به‌عنوان پیش‌فرض تنظیم نمایید.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">خط تولید محتوا در یک نگاه با ویرایشگر بصری گردش کار</h2><p>گردش کار محتوای خود را با چارت تعاملی جدید مدیریت کنید تا بتوانید کل فرآیند انتشار را به‌راحتی مشاهده نمایید.</p><p>گردش‌های کار را در بخش <em>مدیریت مقالات</em> -&gt; <em>گردش‌های کار</em> فعال کنید و روی دکمه چارت کلیک کنید.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">سه گزینه جدید برای فیلدهای سفارشی رسانه: صوت، ویدیو و اسناد</h2><p>هنگام ایجاد فیلدهای سفارشی برای محتوای خود، اکنون می‌توانید به نویسندگان اجازه دهید هر نوع رسانه‌ای، نه فقط تصاویر، را درج کنند.</p><p>این رسانه‌ها به‌صورت HTML5 &lt;audio&gt;، &lt;video&gt; یا پیوندهای اسناد (PDF، صفحات گسترده و...) نمایش داده می‌شوند.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">ماژول‌های هوشمندتر با قابلیت نسخه‌بندی و پیوندهای چندزبانه</h2><p>جوملا مدت‌هاست که تاریخچه نسخه‌بندی را برای مقالات دارد. این قابلیت اکنون به ماژول‌ها نیز اضافه شده است.<br>اگر وب‌سایت چندزبانه دارید، اکنون می‌توانید نمونه‌های ماژول را در زبان‌های مختلف به یکدیگر پیوند دهید، دقیقا همان‌طور که می‌توانید مقالات را به هم مرتبط کنید.</p><h2>سایر بهبودهای قابل توجه</h2><ul class=\"mb-3\"><li>پشتیبانی از تگ مخفف <strong>&lt;abbr&gt;</strong> در ویرایشگر متن غنی TinyMCE؛ این قابلیت از نظر معنایی صحیح بوده و دسترسی‌پذیری را بهبود می‌بخشد (هنگام ویرایش محتوا، دکمه جدید مخفف را در نوار ابزار TinyMCE مشاهده خواهید کرد).</li><li>بهبود تجربه کاربری در وضعیت آورراید زبان و ایجاد سریع موارد آورراید نشده (نمایشگر وضعیت، ویرایش آسان‌تر آوررایدها).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="ویژگی‌های جدید در جوملا 6.1!"

