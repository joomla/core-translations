COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">კეთილი იყოს თქვენი მობრძანება Joomla 6.1!</h1><p>Joomla 6.1 შემოაქვს ძირითადი გაუმჯობესებები, რომლებიც აადვილებს, უსაფრთხოს და მოქნილს ხდის საიტის მშენებლობას. ეს ტურში თქვენ გაიგებთ ყველაფერ ყველაზე მნიშვნელოვანს.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">სპამისგან დაცვა დაბრუნდა Proof-of-Work CAPTCHA-ით</h2><p>არ არის საჭირო ანგარიში ან API, კონფიდენციალურობისთვის მოსახერხებელი და ხელმისაწვდომი, ეს captcha ჩუმად ხსნის მათემატიკურ თავსატეხებს ფონურ რეჟიმში, უხილავია ვიზიტორებისთვის.</p><p>ჩასართავად გადადით <em>გაფართოებები</em> -&gt; <em>პლაგინები</em>, მოძებნეთ <strong>captcha</strong>, ჩართეთ და დააყენეთ როგორც ავტომატური გლობალურ კონფიგურაციაში.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"captcha მითითებულია გადამოწმებისა და დამოწმების შესახებ\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"ძირითადი სამუშაო პროცესის გრაფიკული წარმოდგენა\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">კონტენტის Pipeline ერთი შეხედვით სამუშაო პროცესის ვიზუალური რედაქტორით</h2><p>მართეთ თქვენი კონტენტის სამუშაო პროცესი უფრო მარტივად ახალი ინტერაქტიული სამუშაო პროცესის დიაგრამით, რომელიც საშუალებას გაძლევთ ნახოთ პუბლიკაციის მთელი პროცესი.</p><p>სამუშაო პროცესების ჩართვა <em>სტატიის მენეჯერი</em> -&gt; <em>სამუშაო პროცესები</em> და მოძებნეთ გრაფიკის ღილაკი.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">სამი ახალი მედიის მომხმარებლის ველის ვარიანტი: Audio, Video &amp; Documents</h2><p>თქვენი კონტენტისთვის მომხმარებლის ველების შექმნით, ახლა შეგიძლიათ კონტენტის შემქმნელებს საშუალება მისცეთ, შეიცავდეს ნებისმიერი ტიპის მედიას, არა მხოლოდ სურათები.</p><p>მედია გამოისახება როგორც HTML5 &lt;audio&gt;, &lt;video&gt;, ან document ბმულები (PDF, spreadsheets...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"მედიის ველის სამი ვარიანტი audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">უფრო ჭკვიანი მოდულები ვერსიების და მრავალენოვანი ასოციაციების მართვისთვის</h2><p>Joomla დიდი ხანია აქვს სტატიების ვერსიების ისტორია. იგივე შესაძლებლობა ახლა ვრცელდება მოდულებზეც.<br>თუ თქვენ მართავთ მრავალენოვან ვებსაიტს, ახლა შეგიძლიათ დააკავშიროთ მოდულის ეგზემპლიარები სხვადასხვა ენაზე, ისევე, როგორც თქვენ შეგიძლიათ დააკავშიროთ სტატიები სხვადასხვა ენებზე.</p><h2>სხვა გაუმჯობესებები, რომლებიც უნდა აღინიშნოს</h2><ul class=\"mb-3\"><li>Abbreviation <strong>&lt;abbr&gt;</strong> მხარდაჭერა TinyMCE ტექსტურ რედაქტორში, სემანტიკურად სწორი და ხელმისაწვდომობის გაუმჯობესება (მოძებნეთ ახალი 'აბრევიატურა' ღილაკი TinyMCE ინსტრუმენტთა პანელში კონტენტის რედაქტირებისას).</li><li>ენის ჩანაცვლების სტატუსი და გამორჩენილი ჩანაცვლებების სწრაფი შექმნა UX გაუმჯობესებები (სტატუსის ინდიკატორი, ჩანაცვლებების ადვილად რედაქტირება).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="რა არის ახალი Joomla 6.1!"

