PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - სამუშაოს მტკიცებულება"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="ეს CAPTCHA პლაგინი წარმოუდგენს მომხმარებლის ბრაუზერს მათემატიკურ ამოცანას, რომელიც ბრაუზერს შეუძლია ავტომატურად ამოხსნას. მან არ უნდა დაამტკიცოს, რომ მომხმარებელი ადამიანია, მაგრამ დაამტკიცოს, რომ მომხმარებელი მზად არის ჩადოს საჭირო დრო ამოცანის ამოსახსნელად. ამჟამად დაფუძნებულია Altcha (altcha.org) ბიბლიოთეკაზე."

