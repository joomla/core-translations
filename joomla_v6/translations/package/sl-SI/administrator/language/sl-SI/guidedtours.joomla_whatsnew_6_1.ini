COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Dobrodošli v Joomli 6.1!</h1><p>Joomla 6.1 uvaja ključne izboljšave, zaradi katerih je gradnja spletnih strani lažja, varnejša in bolj prilagodljiva. Ta ogled vam na hitro predstavi bistvo..</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Zaščita pred neželeno pošto je NAZAJ z Proof-of-Work CAPTCHA</h2><p>Ta captcha ne zahteva računa ali API-ja, je prijazna do zasebnosti in dostopna, tiho rešuje matematične uganke v ozadju, nevidna za obiskovalce.</p><p>Če želite omogočiti, pojdite na <em>Razširitve</em> -&gt; <em>Vtičniki</em>, iščite <strong>captcha</strong>, omogočite in nastavite kot privzeto v Globalni konfiguraciji.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Pregled cevovoda vsebine z urejevalnikom vizualnega poteka dela</h2><p>Z novim interaktivnim diagramom poteka dela, ki vam omogoča ogled celotnega procesa objavljanja, lažje upravljajte svoj potek dela z vsebino..</p><p>Omogočite poteke dela v <em>Upravitelj prispevkov /em> -&gt; <em>Poteki dela</em> in poiščite gumb za graf.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Tri nove možnosti po meri za medijska polja: zvok, video in dokumenti</h2><p>Pri ustvarjanju polj po meri za vašo vsebino lahko zdaj ustvarjalcem vsebine omogočite vključitev katere koli vrste medijev, ne le slik.</p><p>Mediji se upodabljajo kot HTML5 &lt;audio&gt;, &lt;video&gt;, ali povezave do dokumentov (PDF, preglednice...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Pametnejši moduli z različicami in večjezičnimi povezavami</h2><p>Joomla ima že dolgo zgodovino različic za prispevke. Ta ista zmogljivost je zdaj razširjena tudi na module..<br>Če imate večjezično spletno stran, lahko zdaj povežete primerke modulov v različnih jezikih, na enak način kot lahko povežete članke v različnih jezikih.</p><h2>Druge izboljšave, vredne omembe</h2><ul class=\"mb-3\"><li>Okrajšava<strong>&lt;abbr&gt;</strong> podpora v urejevalniku obogatenega besedila TinyMCE, semantično pravilna in izboljšana dostopnost (pri urejanju vsebine poiščite nov gumb za okrajšave v orodni vrstici TinyMCE).</li><li>Stanje preglasitve jezika &amp; Izboljšave uporabniške izkušnje za hitro ustvarjanje manjkajočih prepisov (indikator stanja, enostavno urejanje prepisov).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Kaj je novega v Joomla 6.1!"

