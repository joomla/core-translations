PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Munkavégzés-alapú ellenőrzés"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Ez a CAPTCHA bővítmény egy matematikai feladatot jelenít meg a felhasználó böngészőjének, amelyet a böngésző automatikusan meg tud oldani. Nem azt hivatott bizonyítani, hogy a felhasználó ember, hanem azt, hogy hajlandó befektetni a szükséges időt a feladat megoldásába. Jelenleg az Altcha (altcha.org) könyvtáron alapul."

