COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Üdvözli a Joomla 6.1!</h1><p>A Joomla 6.1 számos olyan fontos fejlesztést biztosít, amelyek egyszerűbbé, biztonságosabbá és rugalmasabbá teszik a weboldalát. Ez az összefoglaló röviden bemutatja a legfontosabb újdonságokat.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Újra elérhető a spamvédelem: Proof-of-Work CAPTCHA</h2><p>Nem igényel felhasználói fiókot vagy API-kulcsot, adatvédelmi szempontból kedvező és akadálymentes. Ez a CAPTCHA a háttérben old meg matematikai feladatokat, így a látogatók számára láthatatlan marad.</p><p>Bekapcsolásához lépjen a <em>Bővítmények</em> -&gt; <em>Beépülő modulok</em> menüpontba, keressen rá a <strong>captcha</strong> kifejezésre, engedélyezze a bővítményt, majd állítsa be alapértelmezettként a Globális konfigurációban.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"A CAPTCHA ellenőrzési és ellenőrzött állapotot mutat\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Az alapvető munkafolyamat grafikus ábrázolása\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">A teljes tartalomfolyamat áttekintése a vizuális munkafolyamat-szerkesztővel</h2><p>A tartalomkezelés mostantól egyszerűbb az új interaktív munkafolyamat-diagram segítségével, amely áttekinthetővé teszi a teljes publikálási folyamatot.</p><p>Engedélyezze a munkafolyamatokat a <em>Cikkezelő</em> -&gt; <em>Munkafolyamatok</em> menüpontban, majd kattintson a grafikon ikonra.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Három új médiamező-típus: hang, videó és dokumentum</h2><p>Egyedi mezők létrehozásakor mostantól nemcsak képek, hanem más médiatípusok is hozzáadhatók a tartalomhoz.</p><p>A médiaelemek HTML5 &lt;audio&gt;, &lt;video&gt; elemekként vagy dokumentumhivatkozásként (PDF-ek, táblázatok és más fájlok) jelennek meg.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"A három médiamező-típus: hang, videó és dokumentum\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Intelligensebb modulok verziókezeléssel és többnyelvű társításokkal</h2><p>A Joomla már régóta támogatja a cikkek verziókövetését. Ez a lehetőség mostantól a modulokra is kiterjed.<br>Ha többnyelvű webhelyet üzemeltet, a különböző nyelvű modulpéldányokat ugyanúgy összekapcsolhatja, ahogyan a cikkeket is.</p><h2>További említésre méltó fejlesztések</h2><ul class=\"mb-3\"><li>Az <strong>&lt;abbr&gt;</strong> elem támogatása a TinyMCE szerkesztőben, amely szemantikailag helyesebb jelölést és jobb akadálymentességet biztosít (tartalomszerkesztéskor keresse az új Rövidítés gombot a TinyMCE eszköztárán).</li><li>Fejlesztések a nyelvi felülírások kezelésében: állapotjelzők, a hiányzó felülírások gyors létrehozása és egyszerűbb szerkesztés.</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Újdonságok a Joomla 6.1-ben!"

