MOD_RELATED_ITEMS="Artikel - Berkaitan"
MOD_RELATED_ITEMS_LAYOUT_DEFAULT="Asal"
MOD_RELATED_XML_DESCRIPTION="Modul ini memaparkan Artikel lain yang berkaitan dengan yang sedang dilihat. Hubungan ini diwujudkan oleh Kata Kunci. <br>Semua kata kunci Artikel semasa dicari terhadap semua kata kunci semua Artikel lain yang diterbitkan. Sebagai contoh, anda mungkin mempunyai Artikel tentang &quot;Membiak Burung kakak tua&quot; dan satu lagi di &quot;Kakak Tua Hitam Menaik Tangan&quot;. Jika anda memasukkan kata kunci &quot;parrot&quot; dalam kedua-dua Artikel, maka Modul Item Berkaitan akan menyenaraikan &quot;Breeding Parrots&quot; Artikel apabila melihat &quot;Kakak Tua Hitam Mengangkat Tangan&quot; dan sebaliknya."

