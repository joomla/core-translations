JLIB_RULES_SETTING_NOTES="Jika anda menukar tetapan, ia akan digunakan pada ini dan semua kumpulan kanak-kanak, komponen dan kandungan. Ambil perhatian bahawa <em><strong>Ditolak</strong></em> akan menolak sebarang tetapan yang diwarisi dan juga tetapan dalam mana-mana kumpulan anak, komponen atau kandungan. Dalam kes konflik tetapan, <em><strong>Deny</strong></em> akan diutamakan. <em><strong>Tidak Ditetapkan</strong></em> bersamaan dengan <em><strong>Ditolak</strong>__PH30 komponen, tetapi boleh ditukar dalam child29/___PH3 kandungan."
JLIB_RULES_SETTING_NOTES_ITEM="Jika anda menukar tetapan, ia akan digunakan pada item ini. Ambil perhatian bahawa:<br><em><strong>Diwarisi</strong></em> bermakna bahawa kebenaran daripada konfigurasi global, kumpulan induk dan kategori akan digunakan.<br><em><strong>Ditolak</strong></em> bermakna tidak kira apa konfigurasi global, kumpulan induk atau tetapan kategori, kumpulan yang sedang diedit tidak boleh mengambil tindakan ini ke atas perkara ini item.<br><em><strong>Dibenarkan</strong></em> bermakna bahawa kumpulan yang sedang diedit akan dapat mengambil tindakan ini untuk item ini (tetapi jika ini bercanggah dengan konfigurasi global, tiada kumpulan induk atau kategori yang akan menjadi konflik; ia akan menunjukkan konflik induk atau kategori mengikut kategori <em><strong>Tidak Dibenarkan (Diwarisi)</strong></em> di bawah Tetapan Dikira)."
