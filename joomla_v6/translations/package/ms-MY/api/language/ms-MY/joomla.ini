JGLOBAL_FILTER_TYPE_DESC="<p>1. Senarai Terlarang membenarkan semua teg dan atribut kecuali yang disenaraikan.<br><strong>--</strong> Teg untuk Senarai Larangan Lalai termasuk: 'applet', 'body', 'bgsound', 'base', 'basefont', 'canvas', 'head', 'frame', 'embed', 'frame', 'head', 'frame' 'iframe', 'layer', 'layer', 'link', 'meta', 'name', 'object', 'script', 'style', 'title', 'xml'<br><strong>--</strong> Atribut untuk 'Default Forbidden List', 'Senarai Larangan', 'basebackground' termasuk:'basebackground' 'lowsrc', 'formaction'<br><strong>--</strong> Anda boleh melarang teg dan atribut tambahan dengan menambah pada medan Teg Penapis dan Atribut Penapis, memisahkan setiap teg atau nama atribut dengan koma.<br><strong>--</strong> Senarai Larangan Tersuai membolehkan anda mengatasi Senarai Larangan Lalai. Tambahkan teg dan atribut yang dilarang dalam medan Teg Penapis dan Atribut Penapis.</p><p>Senarai Dibenarkan hanya membenarkan teg yang disenaraikan dalam medan Teg Penapis dan Atribut Penapis.</p><p>Tiada teg HTML daripada kandungan HTML yang dialih keluar disimpan.</p><p>Sila ambil perhatian bahawa tetapan ini berfungsi tanpa mengira editor yang anda gunakan. <br>Walaupun anda menggunakan editor WYSIWYG, tetapan penapisan mungkin menanggalkan tag dan atribut tambahan sebelum menyimpan maklumat dalam pangkalan data.</p>"
