PLG_SYSTEM_WEBAUTHN="Sistem - Log Masuk Kunci Laluan (Tanpa Kata Laluan)"
PLG_SYSTEM_WEBAUTHN_DESCRIPTION="Mendayakan pengesahan tanpa kata laluan menggunakan kunci laluan. Sila ambil perhatian bahawa tab kunci laluan dalam penyunting profil pengguna dan butang log masuk kunci laluan hanya akan dipaparkan jika pengguna mengakses laman melalui HTTPS. Mendaftarkan kunci laluan dan menggunakannya untuk log masuk ke laman anda hanya akan berfungsi apabila laman anda menggunakan sijil yang sah, ditandatangani oleh Pihak Berkuasa Sijil yang dipercayai oleh pelayar pengguna."
