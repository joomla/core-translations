PLG_SYSTEM_WEBAUTHN="Sistem - Log Masuk (Tanpa Kata Laluan)."
PLG_SYSTEM_WEBAUTHN_DESCRIPTION="Mendayakan pengesahan tanpa kata laluan menggunakan kekunci laluan. Sila ambil perhatian bahawa tab kunci laluan dalam editor profil pengguna dan butang log masuk kunci laluan hanya akan dipaparkan jika pengguna mengakses tapak melalui HTTPS. Mendaftarkan kunci laluan dan menggunakannya untuk log masuk ke tapak anda hanya akan berfungsi apabila tapak anda menggunakan sijil yang sah, ditandatangani oleh Pihak Berkuasa Sijil yang dipercayai oleh penyemak imbas pengguna."

