COM_ACTIONLOGS_POSTINSTALL_BODY="<p>Dengan keluaran Joomla 3.9.0, anda kini boleh merekodkan semua tindakan pentadbiran yang dilakukan oleh pengguna anda dalam sambungan yang disokong. Kini mudah untuk melihat siapa yang melakukan apa dan bila mereka melakukannya.</p><p>Log boleh disemak dalam Joomla atau dieksport untuk kegunaan luaran.</p><p>Untuk maklumat lanjut mengenai ciri baharu ini, baca <a href='https://docs.joomla.org/Special:MyLanguage/J3.x:User_Action_Logs' target='_blank' rel='noopener noreferrer'>dokumentasi Log Tindakan Pengguna.</a></p>"
