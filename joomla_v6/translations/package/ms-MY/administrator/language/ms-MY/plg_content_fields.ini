PLG_CONTENT_FIELDS="Kandungan - Medan"
PLG_CONTENT_FIELDS_XML_DESCRIPTION="<p>Pemalam ini membolehkan anda memaparkan medan tersuai yang telah disisipkan dengan pemalam 'Butang - Medan' atau menggunakan Sintaks: {field #} terus ke dalam kawasan penyunting.</p><p><strong>Sintaks yang boleh digunakan:</strong></p><ul><li><code>{field 1}</code> akan memaparkan medan dengan ID 1</li><li><code>{field 1,foo}</code> akan memaparkan medan terpilih menggunakan tataletak alternatif 'foo'.</li><li><code>{fieldgroup 2}</code> akan memaparkan semua medan dalam kumpulan medan dengan ID 2.</li></ul>"
