PLG_CONTENT_PAGEBREAK_XML_DESCRIPTION="<p>Benarkan penciptaan artikel berpaginasi dengan jadual kandungan pilihan.</p><p>Sisipkan pemisah halaman melalui penggunaan butang pemisah halaman yang biasanya terdapat dalam bar alat penyunting WYSIWYG. Lokasi pemisah halaman dalam artikel akan dipaparkan dalam penyunting sebagai garisan mendatar ringkas.</p><p>Teks yang dipaparkan akan bergantung pada pilihan yang dipilih dan mungkin sama ada tajuk, teks alternatif (jika disediakan) atau nombor halaman.</p><p>Penggunaan HTML adalah:<br>&lt;hr class=&quot;system-pagebreak&quot; /&gt;<br>&lt;hr class=&quot;system-pagebreak&quot; title=&quot;Tajuk halaman&quot; /&gt; atau <br>&lt;hr class=&quot;system-pagebreak&quot; alt=&quot;Halaman pertama&quot; /&gt; atau <br>&lt;hr class=&quot;system-pagebreak&quot; title=&quot;Tajuk halaman&quot; alt=&quot;Halaman pertama&quot; /&gt; atau <br>&lt;hr class=&quot;system-pagebreak&quot; alt=&quot;Halaman pertama&quot; title=&quot;Tajuk halaman&quot; /&gt;</p>"
