PLG_MULTIFACTORAUTH_WEBAUTHN="Pengesahan Berbilang Faktor - Kunci Laluan"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_LOGIN_REQUEST="Permintaan pengesahan tidak sah."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_PK="Pendaftaran kunci laluan telah gagal. Respons kunci laluan yang diterima daripada penyemak imbas tidak sepadan dengan Kunci Awam yang dikeluarkan oleh pelayan. Ini bermakna seseorang cuba menggodam anda atau ada yang rosak."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_USER="Atas sebab keselamatan anda tidak dibenarkan mendaftarkan kunci laluan bagi pihak pengguna lain."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_NO_ATTESTED_DATA="Kesilapan telah berlaku tetapi tiada maklumat lanjut tentang ralat itu tersedia pada masa ini. Sila cuba semula mendaftarkan kunci laluan anda."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_NO_PK="Pelayan tidak mengeluarkan Kunci Awam untuk pendaftaran kunci laluan tetapi entah bagaimana menerima permintaan pendaftaran kunci laluan daripada penyemak imbas. Ini bermakna seseorang cuba menggodam anda atau ada yang rosak."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTAVAILABLE_BODY="Penyemak imbas anda tidak menyokong standard kunci laluan. Tidak semua penyemak imbas serasi dengan kunci laluan pada semua peranti."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTAVAILABLE_HEAD="Penyemak imbas anda tidak mempunyai sokongan untuk kunci laluan"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTHTTPS_BODY="Sila akses tapak melalui HTTPS untuk mendayakan Pengesahan Berbilang Faktor dengan kekunci laluan."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTHTTPS_HEAD="Kunci laluan hanya tersedia pada HTTPS"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NO_STORED_CREDENTIAL="Anda belum mengkonfigurasi kunci laluan lagi atau kunci laluan yang anda cuba gunakan tidak layak."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_CONFIGURED="Anda telah mengkonfigurasi kunci laluan anda. Sila ambil perhatian bahawa anda hanya boleh mengubah suai tajuknya dari halaman ini."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_DISPLAYEDAS="Kunci laluan"
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_INSTRUCTIONS="Gunakan &ldquo;%s&rdquo; butang pada halaman ini untuk memulakan proses Pengesahan Web. Kemudian sila ikut arahan yang diberikan kepada anda oleh penyemak imbas anda untuk melengkapkan Pengesahan Web dengan kunci laluan pilihan anda."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_REGISTERKEY="Daftarkan kunci laluan anda"
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_SHORTINFO="Gunakan kekunci laluan penyemak imbas dengan sebarang kunci keselamatan perkakasan atau perisian."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_VALIDATEKEY="Sahkan dengan kunci laluan anda"
PLG_MULTIFACTORAUTH_WEBAUTHN_XML_DESCRIPTION="Gunakan kekunci laluan penyemak imbas sebagai kaedah Pengesahan Berbilang Faktor. Semua pelayar moden menyokongnya. Kebanyakan penyemak imbas menawarkan pengesahan khusus peranti yang dilindungi oleh kata laluan dan/atau biometrik (sensor cap jari, imbasan muka, &hellip;)."

