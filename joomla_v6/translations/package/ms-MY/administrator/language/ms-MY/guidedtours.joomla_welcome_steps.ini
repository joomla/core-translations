COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_MENUS_TITLE="Menu"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_MENUS_DESCRIPTION="<p>Menu menyediakan akses ke halaman pengurusan Pentadbir. Setiap bahagian mempunyai koleksi halaman untuk mengurus aspek tertentu Joomla, seperti Kandungan, Menu dan Pengguna.</p><p>Ikon anak tetingkap mempautkan ke papan pemuka individu untuk bahagian tersebut. Menu Sistem sendiri membawa ke papan pemuka.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_QUICKACCESS_TITLE="Panel Papan Pemuka"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_QUICKACCESS_DESCRIPTION="<p>Papan pemuka menyediakan akses pantas ke halaman yang kerap digunakan melalui ikonnya.</p><p>Setiap panel papan pemuka ialah modul Pentadbir yang boleh disesuaikan melalui ikon Tetapannya <span class=\"icon-cogs\" aria-hidden=\"true\"></span>.<br>Ini membolehkan anda mengkonfigurasi papan pemuka laman untuk memenuhi tujuan anda sendiri.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_NOTIFICATIONS_TITLE="Panel Pemberitahuan"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_NOTIFICATIONS_DESCRIPTION="<p>Panel Pemberitahuan menunjukkan apabila kemas kini tersedia untuk Joomla dan sambungan lain. Permintaan Privasi yang belum selesai juga dipaparkan di sini.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_TOPBAR_TITLE="Bar Atas"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_TOPBAR_DESCRIPTION="<p>Bar atas menunjukkan tajuk halaman yang dipaparkan supaya anda sentiasa tahu di mana anda berada. Item lain dalam bar atas adalah modul pilihan.</p><p>Biasanya versi Joomla semasa dan akses ke lawatan berpandu lanjut boleh ditemui di sini.</p><p>Item terakhir biasanya pautan ke bahagian hadapan Laman dan Menu Pengguna di mana anda boleh mengurus akaun anda dan log keluar.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_FINALWORDS_TITLE="Bantuan dan Maklumat"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_FINALWORDS_DESCRIPTION="<p>Banyak sumber untuk membantu anda boleh ditemui di sini bersama pautan tambahan ke lebih banyak sumber, dokumentasi, sokongan dan cara untuk terlibat dalam Joomla.</p>"
