COM_ADMIN_POSTINSTALL_MSG_BEHIND_LOAD_BALANCER_ACTION="Dayakan Tetapan Di Belakang Pengimbang Beban"
COM_ADMIN_POSTINSTALL_MSG_BEHIND_LOAD_BALANCER_DESCRIPTION="<p>Untuk laman Joomla yang dihoskan di belakang Pengimbang Beban dan Proksi Songsang, tetapan Konfigurasi Global baharu telah diperkenalkan dengan Joomla 3.9.26</p><p>Tetapan ini, apabila didayakan, akan membenarkan Pengimbang Beban/Proksi Songsang anda memberikan alamat IP sebenar pelawat anda. IP ini kemudiannya akan digunakan dalam Log Tindakan anda dan digunakan untuk menjejaki undian pada artikel (jika ciri-ciri ini didayakan).</p><p><strong>Hanya laman di belakang Pengimbang Beban/Proksi Songsang yang perlu mendayakan ciri ini.</strong></p>"
COM_ADMIN_POSTINSTALL_MSG_BEHIND_LOAD_BALANCER_TITLE="Tetapan Pelayan Baharu \"Di Belakang Pengimbang Beban\""
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_AUTOINDEX_DESCRIPTION="<p>Sebelum 3.9.22, fail htaccess.txt lalai mengandungi kod yang salah untuk melumpuhkan penyenaraian direktori. Pasukan keselamatan mengesyorkan untuk menggunakan perubahan yang diperlukan secara manual pada mana-mana fail .htaccess sedia ada, kerana fail ini tidak boleh dikemaskini secara automatik.</p><p>Kod lama:</p><pre>&lt;IfModule autoindex&gt;\n  IndexIgnore *\n&lt;/IfModule&gt;</pre><p>Kod baharu:</p><pre>&lt;IfModule mod_autoindex.c&gt;\n  IndexIgnore *\n&lt;/IfModule&gt;</pre>"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_AUTOINDEX_TITLE="Kemaskini .htaccess Mengenai Penyenaraian Direktori"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_BROTLI_DESCRIPTION="<p>Sebelum 5.1.0, htaccess.txt lalai tidak menyokong pemampatan Brotli. Ini boleh menyebabkan ralat pemampatan berganda apabila Joomla dipasang pada pelayan yang menggunakan pemampatan Brotli. Anda perlu menggunakan perubahan yang diperlukan secara manual pada mana-mana fail .htaccess sedia ada, kerana fail ini tidak boleh dikemaskini secara automatik.</p><p>Kod lama:</p><pre>RewriteRule \"\.css\.gz$\" \"-\" [T=text/css,E=no-gzip:1]<br>RewriteRule \"\.js\.gz$\" \"-\" [T=text/javascript,E=no-gzip:1]</pre><p>Kod baharu:</p><pre>RewriteRule \"\.css\.gz$\" \"-\" [T=text/css,E=no-gzip:1,E=no-brotli:1]<br>RewriteRule \"\.js\.gz$\" \"-\" [T=text/javascript,E=no-gzip:1,E=no-brotli:1]</pre>"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_BROTLI_TITLE="Kemaskini .htaccess Pemampatan Brotli"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_SETCE_DESCRIPTION="<p>Sebelum 4.2.9, fail htaccess.txt lalai mengandungi kod yang salah untuk menambah pengepala HTTP \"Content-Encoding\". Ini boleh menyebabkan ralat pengekodan berganda apabila Joomla dipasang dalam subdirektori dan kedua-dua direktori ini dan direktori induknya mengandungi fail .htaccess dengan kod ini. Anda perlu menggunakan perubahan yang diperlukan secara manual pada mana-mana fail .htaccess sedia ada, kerana fail ini tidak boleh dikemaskini secara automatik.</p><p>Kod lama:</p><pre>Header append Content-Encoding gzip</pre><p>Kod baharu:</p><pre>Header set Content-Encoding gzip</pre>"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_SETCE_TITLE="Kemaskini .htaccess Mengenai Penetapan Pengepala Content-Encoding"
