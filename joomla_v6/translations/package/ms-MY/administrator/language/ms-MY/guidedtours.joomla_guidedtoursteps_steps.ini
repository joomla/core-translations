COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_COUNTER_TITLE="Pilih nombor kaunter langkah"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_COUNTER_DESCRIPTION="Pilih nombor untuk menambah langkah. Nombor tersebut mewakili bilangan langkah yang dibuat untuk lawatan setakat ini."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_NEW_TITLE="Pilih butang 'Baru'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_NEW_DESCRIPTION="Pilih 'Baharu' untuk membuat langkah baharu."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TITLE_TITLE="Tambah tajuk untuk langkah itu"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TITLE_DESCRIPTION="Masukkan tajuk yang diperlukan untuk langkah tersebut. Ini biasanya tindakan yang mesti dilakukan oleh pengguna."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_DESCRIPTION_TITLE="Tambah penjelasan langkah"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_DESCRIPTION_DESCRIPTION="Kandungan harus memberi penjelasan kepada pengguna tentang langkah tersebut."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_STATUS_TITLE="Pilih status"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_STATUS_DESCRIPTION="Pilih status langkah yang diterbitkan."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_POSITION_TITLE="Pilih kedudukan"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_POSITION_DESCRIPTION="Ini ialah kedudukan pop timbul berbanding dengan elemen yang anda sasarkan pada halaman. 'Berpusat' digunakan apabila tiada sasaran khusus."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TARGET_TITLE="Masukkan elemen sasaran"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TARGET_DESCRIPTION="Ini ialah elemen pada halaman yang disasarkan oleh langkah ini. Ia menggunakan sintaks yang digunakan oleh CSS untuk menyasarkan elemen.<br>Sebagai contoh, <code>#jform_title</code> akan menyasarkan elemen dengan id 'jform_title'."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TYPE_TITLE="Pilih jenis"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TYPE_DESCRIPTION="Ini adalah jenis langkah yang anda ingin buat. 'Seterusnya' untuk membolehkan lawatan diteruskan tanpa interaksi, 'Ubah hala' untuk beralih ke halaman lain, 'Interaktif' untuk meminta input pengguna."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_SAVECLOSE_TITLE="Pilih 'Simpan dan Tutup'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_SAVECLOSE_DESCRIPTION="Simpan dan tutup langkah."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_CONGRATULATIONS_TITLE="Tahniah!"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_CONGRATULATIONS_DESCRIPTION="Anda telah membuat langkah untuk lawatan berpandu."

