PLG_QUICKICON_PHPVERSIONCHECK="Quick Icon - PHP Version Check"
PLG_QUICKICON_PHPVERSIONCHECK_SECURITY_ONLY="Versi PHP anda, %1$s, hanya menerima pembetulan keselamatan daripada projek PHP pada masa ini. Ini bermakna versi PHP anda tidak akan disokong lagi. Kami mengesyorkan merancang untuk menaik taraf kepada versi PHP yang lebih baharu sebelum ia mencapai penghujung sokongan pada %2$s. Joomla akan menjadi lebih pantas dan lebih selamat jika anda menaik taraf kepada versi PHP yang lebih baharu. Sila hubungi hos anda untuk mendapatkan arahan peningkatan." ; Key 1 is the server's current PHP version, key 2 is the date at which support will end for the current PHP version
PLG_QUICKICON_PHPVERSIONCHECK_UNSUPPORTED="Kami telah mengesan bahawa pelayan anda menggunakan PHP %1$s yang sudah lapuk dan tidak lagi menerima kemas kini keselamatan rasmi oleh pembangunnya. Joomla! Projek mengesyorkan menaik taraf tapak anda kepada PHP %2$s atau lebih baru yang akan menerima kemas kini keselamatan sekurang-kurangnya sehingga %3$s. <br><br>Sila minta hos anda menjadikan PHP %2$s atau versi yang lebih baru sebagai versi lalai untuk tapak anda. Jika hos anda sudah sedia PHP %2$s sila dayakan PHP %2$s pada direktori akar dan 'pentadbir' tapak anda – biasanya anda boleh melakukannya sendiri melalui alat dalam panel kawalan pengehosan anda, tetapi sebaiknya tanya hos anda jika anda tidak pasti." ; Key 1 is the server's current PHP version, key 2 is the recommended PHP version, and key 3 is the date at which support will end for the recommended PHP version
PLG_QUICKICON_PHPVERSIONCHECK_UNSUPPORTED_JOOMLA_OUTDATED="Kami telah mengesan bahawa pelayan anda menggunakan PHP %1$s yang sudah lapuk dan tidak lagi menerima kemas kini keselamatan rasmi oleh pembangunnya. Tambahan pula, kami tidak boleh mengesyorkan versi PHP yang lebih baharu kerana anda menggunakan Joomla yang sudah lapuk! versi. Kami mengesyorkan mengemas kini Joomla! dan kemudian mengikuti arahan peningkatan PHP selanjutnya." ; Key 1 is the server's current PHP version
PLG_QUICKICON_PHPVERSIONCHECK_XML_DESCRIPTION="Checks the support status of your installation's PHP version and raises a warning if not fully supported."

