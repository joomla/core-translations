PLG_QUICKICON_PHPVERSIONCHECK="Ikon Pantas - Semakan Versi PHP"
PLG_QUICKICON_PHPVERSIONCHECK_SECURITY_ONLY="Versi PHP anda, %1$s, hanya menerima pembaikan keselamatan daripada projek PHP pada masa ini. Ini bermakna versi PHP anda tidak lama lagi tidak akan disokong. Kami mengesyorkan agar anda merancang untuk menaik taraf ke versi PHP yang lebih baharu sebelum ia mencapai tamat sokongan pada %2$s. Joomla akan lebih pantas dan lebih selamat jika anda menaik taraf ke versi PHP yang lebih baharu. Sila hubungi hos anda untuk arahan naik taraf."
PLG_QUICKICON_PHPVERSIONCHECK_UNSUPPORTED="Kami telah mengesan bahawa pelayan anda menggunakan PHP %1$s yang sudah usang dan tidak lagi menerima kemas kini keselamatan rasmi daripada pembangunnya. Projek Joomla! mengesyorkan agar anda menaik taraf laman anda ke PHP %2$s atau lebih baharu yang akan menerima kemas kini keselamatan sekurang-kurangnya sehingga %3$s. <br><br>Sila minta hos anda untuk menjadikan PHP %2$s atau versi yang lebih baharu sebagai versi lalai untuk laman anda. Jika hos anda sudah bersedia untuk PHP %2$s, sila dayakan PHP %2$s pada direktori akar dan 'administrator' laman anda – lazimnya anda boleh melakukan ini sendiri melalui alat dalam panel kawalan pengehosan anda, tetapi lebih baik bertanya kepada hos anda jika anda tidak pasti."
PLG_QUICKICON_PHPVERSIONCHECK_UNSUPPORTED_JOOMLA_OUTDATED="Kami telah mengesan bahawa pelayan anda menggunakan PHP %1$s yang sudah usang dan tidak lagi menerima kemas kini keselamatan rasmi daripada pembangunnya. Tambahan pula, kami tidak dapat mengesyorkan versi PHP yang lebih baharu kerana anda menggunakan versi Joomla! yang sudah lapuk. Kami mengesyorkan agar anda mengemas kini Joomla! dan kemudian mengikut arahan naik taraf PHP seterusnya."
PLG_QUICKICON_PHPVERSIONCHECK_XML_DESCRIPTION="Menyemak status sokongan versi PHP pemasangan anda dan memberi amaran jika ia tidak disokong sepenuhnya."
