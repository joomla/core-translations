PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_FULLTEXT=""
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_INTROIMAGE_ALT="Galaksi Andromeda yang Menakjubkan"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_INTROTEXT="<p>Ini adalah catatan blog contoh.</p><p>Jika anda log masuk ke laman ini (pautan Log Masuk Pentadbir berada di bahagian paling bawah halaman ini), anda boleh menyuntingnya dan semua artikel sedia ada yang lain. Anda juga boleh mencipta artikel baharu dan membuat perubahan lain pada laman ini.</p><p>Apabila anda menambah dan mengubah suai artikel, anda akan melihat bagaimana laman anda berubah dan juga bagaimana anda boleh menyesuaikannya dalam pelbagai cara.</p><p>Teruskan, anda tidak boleh merosakkannya.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_TITLE="Selamat datang ke blog anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_FIELD_0="Uurnip greens yarrow ricebean endive cauliflower sea lettuce kohlrabi amaranth water spinach avocado daikon napa cabbage asparagus winter purslane kale."
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_FULLTEXT="<p>Pada halaman penuh, anda akan melihat kedua-dua kandungan pengenalan dan selebihnya artikel. Anda boleh menukar tetapan untuk menyembunyikan pengenalan jika anda mahu.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_INTROTEXT="<p>Halaman utama anda ditetapkan untuk memaparkan empat artikel terkini dari kategori blog dalam satu lajur. Kemudian terdapat pautan ke dua artikel paling lama seterusnya. Anda boleh menukar nombor tersebut dengan menyunting tetapan pilihan kandungan dalam tab blog dalam pentadbir laman anda. Terdapat pautan ke pentadbir laman anda jika anda telah log masuk.</p><p>Jika anda mahu catatan blog anda dipecahkan kepada dua bahagian, pengenalan dan kemudian halaman berasingan penuh, gunakan butang Baca Lagi untuk memasukkan pemisah.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_TITLE="Mengenai halaman utama anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_FULLTEXT=""
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_FULLTEXTIMAGE_ALT="Nebula Ketam"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_INTROTEXT="<p>Laman anda mempunyai beberapa modul yang biasa digunakan yang sudah dikonfigurasikan. Ini termasuk:</p><ul><li>Imej (jenis: Tersuai), yang memegang imej di bawah menu. Ini adalah modul Tersuai yang boleh anda sunting untuk menukar imej.</li><li>Tag Popular (jenis: Tag - Popular), yang akan muncul jika anda menggunakan pengetagan pada artikel anda. Masukkan tag dalam medan Tag semasa menyunting.</li><li>Catatan Lama (jenis: Artikel), yang menyenaraikan artikel mengikut kategori.</li><li>Sindikasi (jenis: Suapan Sindikasi), yang membolehkan pembaca anda membaca catatan anda dalam pembaca berita.</li><li>Borang Log Masuk (jenis: Log Masuk), yang membolehkan pengguna anda mengakses kawasan terhad laman web.</li></ul><p>Setiap modul ini mempunyai banyak pilihan yang boleh anda eksperimen dalam Pengurus Modul dalam pentadbir laman anda. Apabila anda log masuk, anda juga boleh memilih ikon sunting di bahagian atas kanan yang akan membawa anda ke skrin sunting untuk modul tersebut. Sentiasa pastikan anda menyimpan dan menutup mana-mana modul yang anda sunting.</p><p>Joomla! juga menyertakan banyak modul lain yang boleh anda masukkan dalam laman anda. Semasa anda membangunkan laman, anda mungkin mahu menambah lebih banyak modul yang boleh anda temui di <a href=\"https://extensions.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Direktori Sambungan Joomla.</a></p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_TITLE="Modul Anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_5_FULLTEXT=""
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_5_INTROTEXT="<p>Templat mengawal rupa dan rasa laman web anda.</p><p>Blog ini dipasang dengan templat Cassiopeia.</p><p>Anda boleh menyunting pilihan dengan memilih pautan Bekerja pada Laman Anda, Tetapan Templat dalam menu yang kelihatan apabila anda log masuk.</p><p>Contohnya, anda boleh menukar warna latar belakang laman, warna sorotan, tajuk laman, perihalan laman dan fon tajuk yang digunakan.</p><p>Lebih banyak pilihan tersedia dalam pentadbir laman. Anda juga boleh memasang templat baharu menggunakan pengurus sambungan.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_5_TITLE="Templat Anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_FULLTEXT="<p>Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua. At vero eos et accusam et justo duo dolores et ea rebum. Stet clita kasd gubergren, no sea takimata sanctus est</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_INTROTEXT="<p><strong>Jutaan Laman Web dibina dengan Joomla!</strong></p><p>Ketahui lebih lanjut tentang persembahan blog yang cantik.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_TITLE="Jutaan"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_FULLTEXT="<p>Uurnip greens yarrow ricebean rutabaga endive cauliflower sea lettuce kohlrabi amaranth water spinach avocado daikon napa cabbage asparagus winter purslane kale. Celery potato scallion desert raisin horseradish spinach carrot soko. Lotus root water spinach fennel kombu maize bamboo shoot green bean swiss chard seakale pumpkin onion chickpea gram corn pea. Brussels sprout coriander water chestnut gourd swiss chard wakame kohlrabi beetroot carrot watercress. Corn amaranth salsify bunya nuts nori azuki bean chickweed potato bell pepper artichoke.</p> "
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_INTROTEXT="<p><strong>Kami sayang Joomla sehingga ke bulan dan kembali!</strong></p><p>Terima kasih kepada semua sukarelawan yang telah menyumbang!</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_TITLE="Kasih Sayang"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_FULLTEXT="<p>Cupcake ipsum dolor. Sit amet cotton candy ice cream sesame snaps cake marshmallow powder. Ice cream chocolate cake marshmallow halvah bonbon. Dragée carrot cake danish candy muffin brownie. Candy sugar plum ice cream chupa chups macaroon tiramisu soufflé oat cake. Topping cheesecake lollipop gummi bears icing sweet roll donut liquorice. Pie jelly-o candy donut oat cake cotton candy.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_INTROTEXT="<p><strong>Kami dengan bangganya mempersembahkan Joomla Versi 5!</strong></p><p>Ketahui lebih lanjut tentang aliran kerja dalam Joomla.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_TITLE="Joomla"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_9_FIELD_0="Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua."
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_9_FULLTEXT=""
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_9_INTROTEXT="<p>Aliran kerja menguruskan peringkat yang perlu dilalui oleh artikel anda sehingga ia diterbitkan.</p><p>Komponen untuk menguruskan aliran kerja tidak didayakan secara lalai.</p><p>Untuk melihat aliran kerja yang telah kami sediakan dengan data contoh, anda perlu mendayakan fungsi ini terlebih dahulu.</p><ol><li>Akses kawasan pentadbiran</li><li>Dari 'Kandungan' > 'Artikel' > 'Pilihan' > tab 'Integrasi' tetapkan 'Dayakan aliran kerja' kepada 'Ya'</li><li>Simpan perubahan</li></ol><p>Sekarang apabila anda mengakses 'Kandungan' semula, anda akan melihat bahagian 'Aliran Kerja'.</p><p>Apabila anda menyunting artikel, anda juga akan melihat peralihan baharu untuk artikel berkaitan dengan aliran kerja.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_9_TITLE="Aliran Kerja"
