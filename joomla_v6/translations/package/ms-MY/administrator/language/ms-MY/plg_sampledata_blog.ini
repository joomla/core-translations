PLG_SAMPLEDATA_BLOG_OVERVIEW_DESC="Data contoh yang akan menyediakan laman blog dengan artikel, tag, medan tersuai dan aliran kerja.<br>Jika laman ini berbilang bahasa, data akan ditag kepada bahasa pentadbir yang aktif."
PLG_SAMPLEDATA_BLOG_OVERVIEW_TITLE="Data Contoh Blog"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_0_FULLTEXT=""
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_0_INTROTEXT="<p>Ini memberitahu anda sedikit tentang blog ini dan orang yang menulisnya.</p><p>Apabila anda log masuk, anda boleh menyunting halaman ini dengan memilih ikon sunting.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_0_TITLE="Tentang"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_1_FULLTEXT=""
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_1_INTROTEXT="<p>Berikut adalah beberapa petua asas untuk bekerja pada laman anda.</p><ul><li>Joomla! mempunyai 'bahagian hadapan' yang anda lihat sekarang dan 'pentadbir' atau 'bahagian belakang' di mana anda melakukan kerja yang lebih lanjut untuk mencipta laman anda seperti menyediakan menu dan menentukan modul yang akan dipaparkan. Anda perlu log masuk ke pentadbir secara berasingan menggunakan nama pengguna dan kata laluan yang sama yang anda gunakan untuk log masuk ke bahagian laman ini.</li><li>Salah satu perkara pertama yang mungkin anda mahu lakukan ialah menukar tajuk laman dan baris tag serta menambah logo. Untuk melakukan ini, pilih pautan Tetapan Templat dalam menu yang kelihatan jika anda log masuk. Untuk menukar perihalan laman, tajuk pelayar, e-mel lalai dan item lain, pilih Tetapan Laman. Pilihan konfigurasi yang lebih lanjut tersedia dalam pentadbir.</li><li>Untuk menukar sepenuhnya rupa laman anda, anda mungkin mahu memasang templat baharu. Pergi ke Sistem, pilih Pasang - Sambungan dari senarai dan pemasang sambungan akan dibuka. Terdapat banyak templat percuma dan komersial yang tersedia untuk Joomla.</li><li>Seperti yang telah anda lihat, anda boleh mengawal siapa yang dapat melihat bahagian yang berbeza pada laman anda. Apabila anda bekerja dengan modul dan artikel, menetapkan tahap Akses kepada Berdaftar bermakna hanya pengguna yang telah log masuk boleh melihatnya.</li><li>Apabila anda mencipta artikel baharu atau jenis kandungan lain, anda juga boleh menyimpannya sebagai Diterbitkan atau Tidak Diterbitkan. Jika ia Tidak Diterbitkan, pelawat laman tidak akan dapat melihatnya tetapi anda boleh.</li><li>Anda boleh belajar lebih lanjut tentang bekerja dengan Joomla dari <a href=\"https://docs.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">laman dokumentasi Joomla</a> dan mendapatkan bantuan daripada pengguna lain di <a href=\"https://forum.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">forum Joomla</a>. Dalam pentadbir terdapat butang bantuan pada setiap halaman yang menyediakan maklumat terperinci tentang fungsi pada halaman tersebut.</li></ul>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_1_TITLE="Bekerja pada Laman Anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_10_FULLTEXT=""
