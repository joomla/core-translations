PLG_SAMPLEDATA_BLOG="Data Sampel untuk Cassiopeia (Blog)"
PLG_SAMPLEDATA_BLOG_OVERVIEW_DESC="Data sampel yang akan menyediakan tapak blog dengan artikel, teg, medan tersuai dan aliran kerja.<br>Jika tapak tersebut berbilang bahasa, data akan ditandakan kepada bahasa hujung belakang yang aktif."
PLG_SAMPLEDATA_BLOG_OVERVIEW_TITLE="Data Contoh Blog"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_0_INTROTEXT="<p>Ini memberitahu anda sedikit tentang blog ini dan orang yang menulisnya.</p><p>Apabila anda log masuk, anda akan dapat mengedit halaman ini dengan memilih ikon edit.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_0_TITLE="Tentang"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_1_INTROTEXT="<p>Berikut ialah beberapa petua asas untuk bekerja di tapak anda.</p><ul><li>Joomla! mempunyai 'hujung hadapan' yang anda lihat sekarang dan 'pentadbir' atau 'hujung belakang' yang merupakan tempat anda melakukan kerja yang lebih maju untuk mencipta tapak anda seperti menyediakan menu dan memutuskan modul yang hendak ditunjukkan. Anda perlu log masuk ke pentadbir secara berasingan menggunakan nama pengguna dan kata laluan yang sama yang anda gunakan untuk log masuk ke bahagian tapak ini.</li><li>Salah satu perkara pertama yang anda mungkin mahu lakukan ialah menukar tajuk tapak dan baris teg dan menambah logo. Untuk melakukan ini, pilih pautan Tetapan Templat dalam menu yang kelihatan jika anda log masuk. Untuk menukar penerangan tapak anda, tajuk penyemak imbas, e-mel lalai dan item lain, pilih Tetapan Tapak. Pilihan konfigurasi lanjutan tersedia dalam pentadbir.</li><li>Untuk menukar sepenuhnya rupa tapak anda, anda mungkin mahu memasang templat baharu. Pergi ke Sistem, pilih Pasang - Sambungan daripada senarai dan pemasang sambungan akan dibuka. Terdapat banyak templat percuma dan komersial tersedia untuk Joomla.</li><li>Seperti yang telah anda lihat, anda boleh mengawal siapa yang boleh melihat bahagian tapak anda yang berbeza. Apabila anda bekerja dengan modul dan artikel, menetapkan tahap Akses kepada Berdaftar bermakna hanya pengguna yang log masuk boleh melihatnya.</li><li>Apabila anda mencipta artikel baharu atau jenis kandungan lain, anda juga boleh menyimpannya sebagai Diterbitkan atau Tidak Diterbitkan. Jika ianya Pelawat tapak yang tidak diterbitkan tidak akan dapat melihatnya tetapi anda akan dapat melihatnya.</li><li>Anda boleh mengetahui lebih lanjut tentang bekerja dengan Joomla daripada <a href=\"https://docs.joomla.org/\" target=\__PH31_>blank noreferrer\">tapak dokumentasi Joomla</a> dan dapatkan bantuan daripada pengguna lain di <a href=\"https://forum.joomla.org/\" target=\"_blank\" rel=\__opPH4__3__noopPH4 noreferrer\">Forum Joomla</a>. Dalam pentadbir terdapat butang bantuan pada setiap halaman yang memberikan maklumat terperinci tentang fungsi pada halaman tersebut.</li></ul>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_1_TITLE="Bekerja di Tapak Anda"
