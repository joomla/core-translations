PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_INTROIMAGE_ALT="Galaksi Andromeda yang menakjubkan"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_INTROTEXT="<p>Ini adalah contoh posting blog.</p><p>Jika anda log masuk ke tapak (pautan Log Masuk Pentadbir berada di bahagian paling bawah halaman ini) anda akan dapat mengeditnya dan semua artikel sedia ada yang lain. Anda juga akan dapat mencipta artikel baharu dan membuat perubahan lain pada tapak tersebut.</p><p>Sambil anda menambah dan mengubah suai artikel, anda akan melihat cara tapak anda berubah dan juga cara anda boleh menyesuaikannya dalam pelbagai cara.</p><p>Teruskan itu__p>1__ teruskan/PH13__ teruskan itu/>4__."
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_2_TITLE="Selamat datang ke blog anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_FIELD_0="Uurnip greens yarrow ricebean endive cauliflower sea lettuce kohlrabi amaranth bayam air alpukat daikon napa kubis asparagus winter purslane kale."
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_FULLTEXT="<p>Pada halaman penuh anda akan melihat kedua-dua kandungan pengenalan dan artikel yang lain. Anda boleh menukar tetapan untuk menyembunyikan pengenalan jika anda mahu.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_INTROTEXT="<p>Halaman utama anda ditetapkan untuk memaparkan empat artikel terbaharu daripada kategori blog dalam lajur. Kemudian terdapat pautan ke dua artikel tertua seterusnya. Anda boleh menukar nombor tersebut dengan mengedit tetapan pilihan kandungan dalam tab blog dalam pentadbir tapak anda. Terdapat pautan kepada pentadbir tapak anda jika anda log masuk.</p><p>Jika anda mahu catatan blog anda dipecahkan kepada dua bahagian, pengenalan dan kemudian halaman berasingan panjang penuh, gunakan rentang Baca Lagi untuk memasukkan rehat.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_3_TITLE="Mengenai halaman utama anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_FULLTEXTIMAGE_ALT="Nebula Ketam"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_INTROTEXT="<p>Tapak anda mempunyai beberapa modul yang biasa digunakan telah diprakonfigurasikan. Ini termasuk:</p><ul><li>Imej (jenis: Tersuai), yang menyimpan imej di bawah menu. Ini ialah modul Tersuai yang boleh anda edit untuk menukar imej.</li><li>Teg Popular (jenis: Teg - Popular), yang akan muncul jika anda menggunakan pengetegan pada artikel anda. Masukkan teg dalam medan Teg semasa mengedit.</li><li>Siaran Lama (jenis: Artikel), yang menyenaraikan artikel mengikut kategori.</li><li>Sindikat (jenis: Suapan Pensindiketan), yang membenarkan pembaca siaran anda membaca berita pembaca.</li><li>Borang Log Masuk (jenis: Log Masuk), yang membolehkan pengguna anda mengakses kawasan larangan tapak web.</li></ul><p>Setiap modul ini mempunyai banyak pilihan dalam Pengurus Pentadbiran anda. Apabila anda log masuk, anda juga boleh memilih ikon edit di sudut kanan atas yang akan membawa anda ke skrin edit untuk modul tersebut. Sentiasa pastikan anda menyimpan dan menutup mana-mana modul yang anda edit.</p><p>Joomla! juga termasuk banyak modul lain yang boleh anda sertakan dalam tapak anda. Semasa anda membangunkan tapak anda, anda mungkin ingin menambah lebih banyak modul yang anda boleh temui di <a href=\"https://extensions.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Joomla Direktori.</a></p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_4_TITLE="Modul Anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_5_INTROTEXT="<p>Templat mengawal rupa dan rasa tapak web anda.</p><p>Blog ini dipasang dengan templat Cassiopeia.</p><p>Anda boleh mengedit pilihan dengan memilih pautan Bekerja di Tapak Anda, Tetapan Templat dalam menu yang anda log masuk. dalam.</p><p>Sebagai contoh anda boleh menukar warna latar belakang tapak, warna sorotan, tajuk tapak, penerangan tapak dan fon tajuk yang digunakan.</p><p>Lebih banyak pilihan tersedia dalam pentadbir tapak. Anda juga boleh memasang templat baharu menggunakan pengurus sambungan.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_5_TITLE="Templat Anda"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_FULLTEXT="<p>Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua. Pada vero eos et accusam et justo duo dolores et ea rebum. Stet clita kasd gubergren, tiada sea takimata sanctus est</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_INTROTEXT="<p><strong>Jutaan Tapak Web dibina di Joomla!</strong></p><p>Ketahui lebih lanjut tentang pembentangan blog yang cantik.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_6_TITLE="berjuta-juta"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_FULLTEXT="<p>Uurnip greens yarrow ricebean rutabaga endive cauliflower sea lettuce kohlrabi amaranth bayam air alpukat daikon napa kubis asparagus musim sejuk purslane kale. Saderi kentang daun bawang gurun kismis lobak pedas bayam soko. Air akar teratai bayam adas kombu jagung rebung kacang hijau swiss chard seakale labu bawang cicah gram kacang jagung. Pucuk Brussels air ketumbar labu berangan swiss chard wakame kohlrabi bit lobak merah selada air. Amaranth jagung kacang bunya masin nori azuki kacang chickweed kentang articok lada benggala.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_INTROTEXT="<p><strong>Kami suka Joomla to the moon and back!</strong></p><p>Terima kasih kepada semua sukarelawan yang telah menyumbang!</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_7_TITLE="Cinta"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_FULLTEXT="<p>Cupcake ipsum dolor. Duduk amet cotton candy aiskrim bijan snap kek serbuk marshmallow. Aiskrim kek coklat marshmallow halvah bonbon. Dragée carrot cake danish candy muffin brownie. Candy sugar plum aiskrim chupa chups macaroon tiramisu soufflé oat cake. Topping kek keju lollipop gummi beruang manis gulung donat liquorice. Pai jeli-o gula-gula donat oat kek gula-gula kapas.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_INTROTEXT="<p><strong>Kami dengan bangganya mempersembahkan Joomla Versi 6!</strong></p><p>Ketahui lebih lanjut tentang aliran kerja dalam Joomla.</p>"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_8_TITLE="Joomla"
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_9_FIELD_0="Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua."
PLG_SAMPLEDATA_BLOG_SAMPLEDATA_CONTENT_ARTICLE_9_INTROTEXT="<p>Aliran kerja mengurus peringkat artikel anda mesti lalui sehingga ia diterbitkan.</p><p>Komponen untuk mengurus aliran kerja tidak didayakan secara lalai.</p><p>Untuk melihat aliran kerja yang telah kami sediakan terlebih dahulu memerlukan data sampel ini, anda perlu mendayakan data sampel ini terlebih dahulu. kefungsian.</p><ol><li>Akses kawasan pentadbiran</li><li>Daripada 'Kandungan' > 'Artikel' > 'Pilihan' tab 'Tetapkan aliran' > 'Pilihan' > 'Ya'</li><li>Simpan perubahan</li></ol><p>Sekarang apabila anda mengakses 'Kandungan' sekali lagi, anda akan melihat bahagian 'Aliran Kerja'.</PH3054 anda akan mengedit artikel.</PH3PH54 lihat juga peralihan baharu untuk artikel yang berkaitan dengan aliran kerja.</p>"
