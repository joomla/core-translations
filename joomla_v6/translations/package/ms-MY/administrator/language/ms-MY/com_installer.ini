COM_INSTALLER_MSG_WARNINGS_FILEUPLOADISDISABLEDDESC="Muat naik fail diperlukan untuk memuat naik sambungan dengan pemasang."
COM_INSTALLER_MSG_WARNINGS_FILEUPLOADSDISABLED="Muat naik fail dilumpuhkan."
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTSET="Folder sementara Joomla tidak ditetapkan."
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTSETDESC="Folder ini adalah tempat Joomla menyalin sambungan, mengekstrak sambungan dan fail kemudiannya disalin ke dalam direktori yang betul. Jika lokasi ini tidak ditetapkan dalam configuration.php ($tmp_path) maka anda tidak akan dapat memuat naik sambungan. Cipta folder untuk membolehkan Joomla menulis ke folder untuk menyelesaikan isu tersebut."
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTWRITEABLE="Folder sementara Joomla tidak boleh ditulis atau tidak wujud."
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTWRITEABLEDESC="Ini boleh menyebabkan masalah apabila cuba memuat naik sambungan ke Joomla. Jika anda menghadapi masalah memuat naik sambungan, pastikan folder yang ditakrifkan dalam configuration.php anda wujud atau semak '%s' dan tetapkannya supaya boleh ditulis dan lihat jika ini membetulkan isu tersebut."
COM_INSTALLER_MSG_WARNINGS_LOWMEMORYDESC="Had memori PHP anda ditetapkan di bawah 16MB yang mungkin menyebabkan beberapa isu semasa memasang sambungan besar. Sila tetapkan had memori anda kepada sekurang-kurangnya 32MB."
COM_INSTALLER_MSG_WARNINGS_LOWMEMORYWARN="Had memori PHP yang rendah."
COM_INSTALLER_MSG_WARNINGS_MEDMEMORYDESC="Had memori PHP anda ditetapkan di bawah 24MB yang mungkin menyebabkan beberapa isu semasa memasang sambungan besar. Sila tetapkan had memori anda kepada sekurang-kurangnya 32MB."
COM_INSTALLER_MSG_WARNINGS_MEDMEMORYWARN="Had memori PHP yang berpotensi rendah."
COM_INSTALLER_MSG_WARNINGS_NONE="Tiada amaran dikesan."
COM_INSTALLER_MSG_WARNINGS_NOTCOMPLETE="<h1>Amaran: Kemas Kini Tidak Selesai!</h1><p>Kemas kini hanya sebahagiannya selesai. Sila lakukan kemas kini kedua untuk melengkapkan proses.</p>"
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTSET="Folder sementara PHP tidak ditetapkan."
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTSETDESC="Folder ini ialah folder yang PHP gunakan untuk menyimpan fail yang dimuat naik sebelum Joomla boleh mengakses fail ini. Walaupun folder tidak ditetapkan tidak selalu menjadi masalah, jika anda menghadapi masalah dengan fail manifes tidak dikesan atau fail yang dimuat naik tidak dikesan, tetapan <code>upload_tmp_dir</code> dalam fail php.ini anda mungkin membetulkan isu tersebut."
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTWRITEABLE="Folder sementara PHP tidak boleh ditulis."
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTWRITEABLEDESC="Folder ini yang ditentukan oleh <code>upload_tmp_dir</code> dalam php.ini anda tidak boleh ditulis oleh Joomla! contoh, yang mungkin menyebabkan masalah apabila cuba memuat naik sambungan ke Joomla. Jika anda menghadapi masalah memuat naik sambungan, semak '%s' dan tetapkannya supaya boleh ditulis dan lihat sama ada ini membetulkan isu tersebut."
COM_INSTALLER_MSG_WARNINGS_SMALLPOSTSIZE="Saiz POST maksimum PHP kecil."
COM_INSTALLER_MSG_WARNINGS_SMALLPOSTSIZEDESC="Ini ialah jumlah maksimum data yang boleh dihantar melalui POST ke pelayan. Ini termasuk penyerahan borang untuk artikel, media (imej, video) dan sambungan. Nilai ini kurang daripada 16MB yang mungkin memberi kesan pada memuat naik sambungan yang besar. Ini ditetapkan dalam php.ini di bawah post_max_size."
COM_INSTALLER_MSG_WARNINGS_SMALLUPLOADSIZE="Saiz muat naik fail PHP maksimum terlalu kecil."
COM_INSTALLER_MSG_WARNINGS_SMALLUPLOADSIZEDESC="Saiz fail maksimum untuk muat naik ditetapkan kepada kurang daripada 16MB yang mungkin memberi kesan kepada memuat naik sambungan yang besar. Ini ditetapkan dalam php.ini dalam kedua-dua tetapan upload_max_filesize dan post_max_size tetapan PHP anda (terletak dalam php.ini dan/atau fail .htaccess). Nilai post_max_size mestilah lebih besar daripada nilai upload_max_filesize."
COM_INSTALLER_MSG_WARNINGS_UPDATE_NOTICE="Sebelum mengemas kini pastikan kemas kini itu serasi dengan Joomla anda! pemasangan. <br>Anda amat dinasihatkan untuk membuat <strong>sandaran</strong> fail dan pangkalan data tapak anda sebelum anda mula mengemas kini."
COM_INSTALLER_MSG_WARNINGS_UPLOADBIGGERTHANPOST="Saiz Muat Naik PHP lebih besar daripada saiz POST."
COM_INSTALLER_MSG_WARNINGS_UPLOADBIGGERTHANPOSTDESC="Nilai upload_max_filesize dalam fail php.ini adalah lebih besar daripada pembolehubah post_max_size. Pembolehubah post_max_size akan diutamakan dan menyekat permintaan yang lebih besar daripadanya. Ini biasanya salah konfigurasi pelayan apabila cuba meningkatkan saiz muat naik. Sila tingkatkan nilai post_max_size menjadi lebih besar daripada nilai upload_max_filesize."
COM_INSTALLER_MSG_WARNINGS_UPLOADFILETOOBIG="Fail yang dipilih tidak boleh dimuat naik kerana ia lebih besar daripada saiz muat naik maksimum."
