PLG_SYSTEM_WEBAUTHN_LOGIN_DESC="Log masuk tanpa kata laluan menggunakan standard kunci laluan penyemak imbas dalam penyemak imbas yang serasi. Anda perlu telah menyediakan pengesahan kunci laluan dalam profil pengguna anda."
