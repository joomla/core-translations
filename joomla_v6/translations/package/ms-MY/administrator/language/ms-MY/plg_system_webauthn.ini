PLG_SYSTEM_WEBAUTHN="Sistem - Log Masuk Kunci Laluan (Tanpa Kata Laluan)"
PLG_SYSTEM_WEBAUTHN_CANNOT_ADD_FOR_A_USER="Anda tidak boleh menambah atau membuang kunci laluan bagi pihak pengguna. Pengguna mesti log masuk, dan menyediakan peranti mereka sendiri."
PLG_SYSTEM_WEBAUTHN_DESCRIPTION="Mendayakan pengesahan tanpa kata laluan menggunakan kunci laluan. Sila ambil perhatian bahawa tab kunci laluan dalam penyunting profil pengguna dan butang log masuk kunci laluan hanya akan dipaparkan jika pengguna mengakses laman melalui HTTPS. Mendaftarkan kunci laluan dan menggunakannya untuk log masuk ke laman anda hanya akan berfungsi apabila laman anda menggunakan sijil yang sah, ditandatangani oleh Pihak Berkuasa Sijil yang dipercayai oleh pelayar pengguna."
PLG_SYSTEM_WEBAUTHN_ERR_AJAX_INVALIDACTION="Tindakan ajax tidak sah"
PLG_SYSTEM_WEBAUTHN_ERR_CANNOT_FIND_USERNAME="Tidak dapat mencari medan nama pengguna dalam modul log masuk. Maaf, pengesahan tanpa kata laluan tidak akan berfungsi pada laman ini melainkan anda menggunakan modul log masuk yang berbeza."
PLG_SYSTEM_WEBAUTHN_ERR_CANT_STORE_FOR_GUEST="Tidak mungkin menyimpan kelayakan untuk pengguna Tetamu!"
PLG_SYSTEM_WEBAUTHN_ERR_CORRUPT_STORED_CREDENTIAL="Kelayakan yang disimpan rosak untuk akaun pengguna anda. Log masuk menggunakan kaedah lain, kemudian buang dan tambah semula kunci laluan anda."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_LOGIN_REQUEST="Permintaan log masuk tanpa kata laluan tidak sah. Sesuatu rosak atau ini adalah percubaan untuk menggodam laman."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_PK="Pendaftaran kunci laluan telah gagal. Respons kunci laluan yang diterima daripada pelayar tidak sepadan dengan Kunci Awam yang dikeluarkan oleh pelayan. Ini bermaksud seseorang cuba menggodam anda atau sesuatu rosak."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_USER="Atas sebab keselamatan, anda tidak dibenarkan mendaftarkan kunci laluan bagi pihak pengguna lain."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_NO_ATTESTED_DATA="Sesuatu telah berlaku tetapi tiada maklumat lanjut tentang ralat tersedia pada masa ini. Sila cuba semula mendaftarkan kunci laluan anda."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_NO_PK="Pelayan tidak mengeluarkan Kunci Awam untuk pendaftaran kunci laluan tetapi entah bagaimana menerima permintaan pendaftaran kunci laluan daripada pelayar. Ini bermaksud seseorang cuba menggodam anda atau sesuatu rosak."
PLG_SYSTEM_WEBAUTHN_ERR_CREDENTIAL_ID_ALREADY_IN_USE="Tidak dapat menyimpan kelayakan. Kelayakan ini sudah digunakan oleh pengguna lain."
PLG_SYSTEM_WEBAUTHN_ERR_EMPTY_USERNAME="Anda perlu memasukkan nama pengguna anda (tetapi BUKAN kata laluan anda) sebelum memilih butang log masuk kunci laluan."
PLG_SYSTEM_WEBAUTHN_ERR_INVALID_USERNAME="Nama pengguna yang dinyatakan tidak sepadan dengan akaun pengguna yang telah mendayakan log masuk tanpa kata laluan pada laman ini."
PLG_SYSTEM_WEBAUTHN_ERR_LABEL_NOT_SAVED="Tidak dapat menyimpan label baharu"
PLG_SYSTEM_WEBAUTHN_ERR_NOT_DELETED="Tidak dapat membuang kunci laluan"
PLG_SYSTEM_WEBAUTHN_ERR_NOUSER="Tiada akaun pengguna ditemui"
PLG_SYSTEM_WEBAUTHN_ERR_NO_BROWSER_SUPPORT="Maaf, pelayar anda tidak menyokong piawaian kunci laluan untuk log masuk tanpa kata laluan atau laman anda tidak disampaikan melalui HTTPS dengan sijil yang sah, ditandatangani oleh Pihak Berkuasa Sijil yang dipercayai oleh pelayar anda. Anda perlu log masuk ke laman ini menggunakan nama pengguna dan kata laluan anda."
PLG_SYSTEM_WEBAUTHN_ERR_NO_STORED_CREDENTIAL="Tidak dapat mencari kelayakan yang disimpan untuk kunci laluan anda."
PLG_SYSTEM_WEBAUTHN_ERR_USER_REMOVED="Pengguna untuk kunci laluan ini nampaknya sudah tidak wujud di laman ini."
PLG_SYSTEM_WEBAUTHN_ERR_XHR_INITCREATE="Tidak dapat mendapatkan maklumat pendaftaran kunci laluan daripada laman anda."
PLG_SYSTEM_WEBAUTHN_FIELD_ATTESTATION_SUPPORT_DESC="Hanya benarkan kunci laluan dengan tandatangan kriptografi yang boleh disahkan untuk digunakan bagi log masuk kunci laluan. Sangat disyorkan untuk persekitaran keselamatan tinggi. Memerlukan direktori sementara sistem boleh ditulis oleh PHP, dan sambungan OpenSSL. Mungkin menghalang beberapa kunci laluan yang lebih murah dan tidak diperakui daripada berfungsi langsung. Melumpuhkannya juga menghalang Joomla daripada mengenal pasti jenama dan model kunci laluan yang anda gunakan (tiada ikon akan dipaparkan di sebelah Nama kunci laluan)."
PLG_SYSTEM_WEBAUTHN_FIELD_ATTESTATION_SUPPORT_LABEL="Sokongan Pengesahan"
PLG_SYSTEM_WEBAUTHN_FIELD_DESC="Membolehkan anda mengurus kaedah log masuk tanpa kata laluan menggunakan kunci laluan. Anda memerlukan pelayar yang disokong dan kunci laluan (cth. Google Chrome atau Firefox dengan kunci keselamatan diperakui FIDO2).<br><br><strong>MacOS/iOS/watchOS:</strong> Touch/Face ID.<br><strong>Windows:</strong> Hello (Cap Jari / Pengecaman Wajah / PIN).<br><strong>Android:</strong> Kunci skrin biometrik.<br><br>Anda boleh mendapatkan butiran lanjut dalam <a href=\"https://docs.joomla.org/Special:MyLanguage/WebAuthn_Passwordless_Login\" target=\"_blank\" rel=\"noopener noreferrer\">dokumentasi Log Masuk Tanpa Kata Laluan Kunci Laluan</a>."
