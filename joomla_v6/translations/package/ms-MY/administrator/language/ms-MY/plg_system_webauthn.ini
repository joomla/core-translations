PLG_SYSTEM_WEBAUTHN="Sistem - Log Masuk (Tanpa Kata Laluan)."
PLG_SYSTEM_WEBAUTHN_CANNOT_ADD_FOR_A_USER="Anda tidak boleh menambah atau mengalih keluar kunci laluan bagi pihak pengguna. Pengguna mesti log masuk dan menyediakan peranti mereka sendiri."
PLG_SYSTEM_WEBAUTHN_DESCRIPTION="Mendayakan pengesahan tanpa kata laluan menggunakan kekunci laluan. Sila ambil perhatian bahawa tab kunci laluan dalam editor profil pengguna dan butang log masuk kunci laluan hanya akan dipaparkan jika pengguna mengakses tapak melalui HTTPS. Mendaftarkan kunci laluan dan menggunakannya untuk log masuk ke tapak anda hanya akan berfungsi apabila tapak anda menggunakan sijil yang sah, ditandatangani oleh Pihak Berkuasa Sijil yang dipercayai oleh penyemak imbas pengguna."
PLG_SYSTEM_WEBAUTHN_ERR_AJAX_INVALIDACTION="Tindakan ajax tidak sah"
PLG_SYSTEM_WEBAUTHN_ERR_CANNOT_FIND_USERNAME="Cannot find the username field in the login module. Sorry, Passwordless authentication will not work on this site unless you use a different login module."
PLG_SYSTEM_WEBAUTHN_ERR_CANT_STORE_FOR_GUEST="Cannot possibly store credentials for Guest user!"
PLG_SYSTEM_WEBAUTHN_ERR_CORRUPT_STORED_CREDENTIAL="Bukti kelayakan yang disimpan rosak untuk akaun pengguna anda. Log masuk menggunakan kaedah lain, kemudian alih keluar dan tambah semula kunci laluan anda."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_LOGIN_REQUEST="Invalid passwordless login request. Something is broken or this is an attempt to hack the site."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_PK="Pendaftaran kunci laluan telah gagal. Respons kunci laluan yang diterima daripada penyemak imbas tidak sepadan dengan Kunci Awam yang dikeluarkan oleh pelayan. Ini bermakna seseorang cuba menggodam anda atau ada yang rosak."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_INVALID_USER="Atas sebab keselamatan anda tidak dibenarkan mendaftarkan kunci laluan bagi pihak pengguna lain."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_NO_ATTESTED_DATA="Kesilapan telah berlaku tetapi tiada maklumat lanjut tentang ralat itu tersedia pada masa ini. Sila cuba semula mendaftarkan kunci laluan anda."
PLG_SYSTEM_WEBAUTHN_ERR_CREATE_NO_PK="Pelayan tidak mengeluarkan Kunci Awam untuk pendaftaran kunci laluan tetapi entah bagaimana menerima permintaan pendaftaran kunci laluan daripada penyemak imbas. Ini bermakna seseorang cuba menggodam anda atau ada yang rosak."
PLG_SYSTEM_WEBAUTHN_ERR_CREDENTIAL_ID_ALREADY_IN_USE="Cannot save credentials. These credentials are already being used by a different user."
PLG_SYSTEM_WEBAUTHN_ERR_EMPTY_USERNAME="Anda perlu memasukkan nama pengguna anda (tetapi BUKAN kata laluan anda) sebelum memilih butang log masuk kunci laluan."
PLG_SYSTEM_WEBAUTHN_ERR_INVALID_USERNAME="The specified username does not correspond to a user account that has enabled passwordless login on this site."
PLG_SYSTEM_WEBAUTHN_ERR_LABEL_NOT_SAVED="Could not save the new label"
PLG_SYSTEM_WEBAUTHN_ERR_NOT_DELETED="Tidak dapat mengalih keluar kunci laluan"
PLG_SYSTEM_WEBAUTHN_ERR_NOUSER="Tiada akaun pengguna ditemui"
PLG_SYSTEM_WEBAUTHN_ERR_NO_BROWSER_SUPPORT="Maaf, penyemak imbas anda tidak menyokong piawaian kunci laluan untuk log masuk tanpa kata laluan atau tapak anda tidak disampaikan melalui HTTPS dengan sijil yang sah, ditandatangani oleh Pihak Berkuasa Sijil yang dipercayai oleh penyemak imbas anda. Anda perlu log masuk ke laman web ini menggunakan nama pengguna dan kata laluan anda."
PLG_SYSTEM_WEBAUTHN_ERR_NO_STORED_CREDENTIAL="Tidak dapat mencari bukti kelayakan yang disimpan untuk kunci laluan anda."
PLG_SYSTEM_WEBAUTHN_ERR_USER_REMOVED="Pengguna untuk kunci laluan ini nampaknya tidak lagi wujud di tapak ini."
PLG_SYSTEM_WEBAUTHN_ERR_XHR_INITCREATE="Tidak boleh mendapatkan maklumat pendaftaran kunci laluan daripada tapak anda."
PLG_SYSTEM_WEBAUTHN_FIELD_ATTESTATION_SUPPORT_DESC="Hanya benarkan kunci laluan dengan tandatangan kriptografi yang boleh disahkan untuk digunakan untuk log masuk kunci laluan. Sangat disyorkan untuk persekitaran keselamatan tinggi. Memerlukan direktori sementara sistem yang boleh ditulis oleh PHP, dan sambungan OpenSSL. Mungkin menghalang beberapa kekunci laluan yang lebih murah dan tidak diperakui daripada berfungsi sama sekali. Melumpuhkannya juga menghalang Joomla daripada mengenal pasti pembuatan dan model kunci laluan yang anda gunakan (tiada ikon akan dipaparkan di sebelah Nama kunci laluan)."
PLG_SYSTEM_WEBAUTHN_FIELD_ATTESTATION_SUPPORT_LABEL="Sokongan Pengesahan"
PLG_SYSTEM_WEBAUTHN_FIELD_DESC="Membolehkan anda mengurus kaedah log masuk tanpa kata laluan menggunakan kekunci laluan. Anda memerlukan penyemak imbas dan kunci laluan yang disokong (cth. Google Chrome atau Firefox dengan kunci keselamatan yang diperakui FIDO2).<br><br><strong>MacOS/iOS/watchOS:</strong> Touch/Face ID.<br>>br><br>>Windows__strong:</strong> Touch/Face ID.<br>>Windows__strong:PH1>Windows__strong: (Cap Jari / Pengecaman Muka / PIN).<br><strong>Android:</strong> Kunci skrin biometrik.<br><br>Anda boleh mendapatkan butiran lanjut dalam <a href=\"https://docs.joomla.org/Special:MyLanguage/WebAuthn_Passwordless_Login\" target=\"_blank\" rel=\"noopener noreferrer\">Passwordless_keyword.PH31__Passwordskey"
