COM_GUIDEDTOURS_TOUR_WHATSNEW_5_4_DESCRIPTION="<h1 class=\"fw-medium\">Selamat Datang ke Joomla 5.4!</h1><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3 mb-md-0\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/5_4/automated-updates.jpg\" alt=\"Paparkan pemberitahuan papan pemuka bahagian belakang di mana anda boleh melihat ikon kemas kini automatik baharu untuk mendayakan kemas kini automatik\" width=\"774\" height=\"281\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Kemas Kini Automatik telah tiba!</h2><p>Joomla! 5.4 kini menyokong kemas kini automatik untuk keselamatan dan prestasi yang lebih baik.</p><p><strong>Kekal selamat dan terjamin!</strong></p></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_5_4_TITLE="Apa yang Baharu dalam Joomla 5.4!"
