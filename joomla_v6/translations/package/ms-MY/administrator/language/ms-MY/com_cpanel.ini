COM_CPANEL_MSG_ADDNOSNIFF_BODY="<p>Joomla kini dikeluarkan dengan keselamatan tambahan yang diperkukuhkan di dalam fail lalai htaccess.txt dan web.config.txt. Pengukuhan ini menyahdaya ciri yang dipanggil penghidu jenis MIME dalam pengimbas web. Penghiduan membawa kepada vektor serangan tertentu, di mana skrip dalam format fail yang biasa tidak berbahaya (cth imej) akan dilaksanakan, menjurus kepada kerentanan Penskripan-Tapak-Silang.</p><p>Pasukan keselamatan mengesyorkan untuk menerapkan perubahan yang diperlukan secara manual ke fail .htaccess atau web.config sedia ada, disebabkan fail berkenaan tidak boleh dikemas kini secara automatik.</p><p><strong>Perubahan bagi .htaccess</strong><br>Tambah baris berikut sebelum \"## Mod_rewrite in use.\":</p><pre>&lt;IfModule mod_headers.c&gt;\nHeader always set X-Content-Type-Options \"nosniff\"\n&lt;/IfModule&gt;</pre><p><strong>Perubahan bagi web.config</strong><br>Tambah baris berikut selepas \"&lt;/rewrite&gt;\":</p><pre>&lt;httpProtocol&gt;\n  &lt;customHeaders&gt;\n    &lt;add name=\"X-Content-Type-Options\" value=\"nosniff\" /&gt;\n  &lt;/customHeaders&gt;\n&lt;/httpProtocol&gt;</pre>" ; Translators: Don't touch the code part in the message, Starting with ## Mod_rewrite &hellip;
COM_CPANEL_MSG_ADDNOSNIFF_TITLE="Kemas Kini Keselamatan .htaccess & web.config"
COM_CPANEL_MSG_HTACCESSSVG_BODY="<p>Sejak 3.9.21 Joomla dihantar dengan peraturan keselamatan tambahan dalam htaccess.txt lalai. Peraturan ini akan melindungi pengguna fail svg daripada kemungkinan kelemahan Cross-Site-Scripting (XSS).<br>Pasukan keselamatan mengesyorkan untuk menggunakan perubahan yang diperlukan secara manual pada mana-mana fail .htaccess sedia ada, kerana fail ini tidak boleh dikemas kini secara automatik.< /p><p><strong>Perubahan untuk .htaccess</strong></p><pre>&lt;FilesMatch \"\.svg$\"&gt;\n &lt;IfModule mod_headers.c&gt;\n Header always set Content-Security-Policy \"script-src 'none'\"\n &lt;/IfModule&gt;\n&lt;/FilesMatch&gt;</pre><p>Pada masa ini kami tidak mengetahui kaedah untuk mengkonfigurasi ini secara bersyarat pada IIS pelayan web, sila hubungi pembekal pengehosan anda untuk mendapatkan bantuan lanjut.</p>"
COM_CPANEL_MSG_HTACCESSSVG_TITLE="Perlindungan XSS tambahan untuk penggunaan fail SVG"
COM_CPANEL_MSG_LANGUAGEACCESS340_BODY="Sejak Joomla! 3.4.0 anda mungkin menghadapi masalah dengan pemalam System - Language Filter di tapak web anda. Untuk membetulkannya, sila buka <a href=\"index.php?option=com_languages&view=languages\">Pengurus Bahasa</a> dan simpan setiap bahasa kandungan secara manual untuk memastikan tahap Akses disimpan."
COM_CPANEL_MSG_LANGUAGEACCESS340_TITLE="Anda mungkin menghadapi masalah dengan tetapan berbilang bahasa anda"
COM_CPANEL_MSG_ROBOTS_BODY="Perubahan kepada fail robots.txt lalai telah dibuat dalam Joomla! 3.3 untuk membenarkan Google mengakses templat dan fail media secara lalai untuk meningkatkan SEO. Perubahan ini tidak digunakan secara automatik pada peningkatan dan pengguna disyorkan untuk menyemak perubahan dalam fail robots.txt.dist dan melaksanakan perubahan ini dalam fail robots.txt mereka sendiri."
COM_CPANEL_MSG_ROBOTS_TITLE="Kemas kini robots.txt"
COM_CPANEL_MSG_STATS_COLLECTION_BODY="<p>Sejak Joomla! 3.5 pemalam statistik akan menyerahkan data tanpa nama kepada Projek Joomla. Ini hanya akan menyerahkan versi Joomla, versi PHP, enjin dan versi pangkalan data serta sistem pengendalian pelayan.</p><p>Data ini dikumpul untuk memastikan versi Joomla yang akan datang boleh memanfaatkan pangkalan data terkini dan ciri PHP tanpa menjejaskan bilangan pengguna yang ketara. Keperluan untuk ini menjadi jelas apabila sekurang-kurangnya PHP 5.3.10 diperlukan apabila Joomla! 3.3 melaksanakan kata laluan Bcrypt yang lebih selamat.</p><p>Demi kepentingan ketelusan penuh dan untuk membantu pembangun <a href=\"https://developer.joomla.org/about/stats.html\" target= \"_blank\" rel=\"noopener noreferrer\">data ini tersedia secara umum.</a> API dan graf akan menunjukkan versi Joomla, versi PHP dan enjin pangkalan data sedang digunakan.</p><p>Jika anda tidak mahu memberikan Projek Joomla dengan maklumat ini anda boleh melumpuhkan pemalam yang dipanggil Sistem - Statistik Joomla.</p>"
COM_CPANEL_MSG_STATS_COLLECTION_TITLE="Pengumpulan Statistik dalam Joomla"
COM_CPANEL_MSG_TEXTFILTER3919_BODY="<p>Sebagai sebahagian daripada semakan pasukan keselamatan kami, kami telah membuat beberapa perubahan pada tetapan lalai untuk penapis teks global dalam pemasangan Joomla baharu. Tetapan lalai untuk kumpulan 'Awam', 'Tetamu' dan 'Berdaftar' kini ialah 'Tiada HTML'. Memandangkan perubahan ini hanya digunakan pada pemasangan baharu, kami amat mengesyorkan agar anda menyemak perubahan ini dan mengemas kini tapak anda daripada: Sistem &rarr; Konfigurasi Global &rarr; Penapis Teks</p>"
COM_CPANEL_MSG_TEXTFILTER3919_TITLE="Cadangan Penapis Teks yang Dikemas kini"
