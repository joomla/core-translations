COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_DESCRIPTION="<div class=\"row align-item-center pt-3\"><div class=\"col-12\"><h2 class=\"mb-3\">Lagi Kemas kini</h2><p>Artikel yang ditampilkan kini berkongsi paparan Pengurus Artikel.</p></div></div><div class=\"row aligner pt-4\"><div class=\"col-12\"><h3>Jika anda terlepas</h3><p>Joomla! 6 menyokong kemas kini automatik dengan Rangka Kerja Kemas Kini (TUF) untuk keselamatan dan prestasi yang lebih baik.<br>Cari tetapan kemas kini automatik dalam <em>Joomla! Kemas kini</em> bahagian konfigurasi.</p></div></div><div class=\"row align-item-center pt-4\"__PH51v_PH52 class=\"col-12\"><h3>Penambahan dan Pembetulan Lain</h3><ul class=\"mb-3\"><nombor pendaftaran PH64__e-mel pendaftaran_PH64__li__PH65 href=\"https://github.com/joomla/joomla-cms/pull/45802\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45802</a></li><li>Tambah kelas tersuai pada lungsur kelas dalam dialog imej dalam TinyMCE <a href=\"https://github.com/joomla/joomla-cms/pull/45676\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45676</a></li><li>Tambahkan kemungkinan untuk mengeluarkan sekumpulan teg <a href=\"https://github.com/joomla/joomla/joomla/joomla sasaran=\"_kosong\" rel=\"noopener noreferrer\">PR#40613</a></li><li>Dan banyak lagi penambahbaikan...</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_TITLE="Ciri-ciri lain"
