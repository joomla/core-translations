COM_GUIDEDTOURS_TOUR_WHATSNEW_5_2_DESCRIPTION="<h1 class=\"fw-medium\">Selamat Datang ke Joomla 5.2!</h1><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3 mb-md-0\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/5_2/enhancedtourheader.png\" alt=\"Langkah pertama lawatan selamat datang, menunjukkan rupa pengepala baharu\" width=\"640\" height=\"384\"></div><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Kemas Kini Lawatan Berpandu</h2><h3>Lawatan Mula Auto</h3><p>Ciri ini membolehkan anda mencipta Lawatan Berpandu mula auto anda sendiri. Lawatan kontekstual boleh ditolak untuk satu atau semua pengguna. Lawatan boleh dimulakan semula dari menu Lawatan Berpandu.</p><h3>Penambahbaikan</h3><ul class=\"mb-3\"><li>Untuk kejelasan, <em>Pembilang Langkah</em> diletakkan dahulu dalam pengepala lawatan.</li><li>Tetingkap modal mengubah saiz secara automatik untuk menampung kandungan dan imej yang lebih besar.</li></ul></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Kemas Kini Teras</h2><h3>Modul 'Artikel' semua-dalam-satu baharu</h3><p>Gunakan satu modul untuk memaparkan artikel terkini, paling banyak dibaca, tertentu atau diarkibkan, dari kategori pilihan - dengan penapis, tag dan banyak lagi...</p><p>Dari <span class=\"fw-medium\">Kandungan -&gt; Modul Laman</span>, cipta modul baharu jenis 'Artikel'.</p><h3>Susun Atur Templat Mel</h3><p>Bawa lebih jauh dengan mencipta susun atur unik sepenuhnya (termasuk logo) yang boleh digunakan untuk satu atau semua templat mel.</p><p>Dari <span class=\"fw-medium\">Konfigurasi Global -&gt; Templat Mel</span>, susun atur boleh ditakrifkan dalam HTML.</p><h3>Penambahbaikan dan Pembetulan Lain</h3><ul class=\"mb-3\"><li>Subborang Bersarang - Membenarkan penyangsaran Subborang dalam Medan Tersuai Subborang.</li><li>Jumlah Kiraan - Menunjukkan kiraan dan jumlah item senarai dalam konsol.</li></ul></div><div class=\"col-md-6 col-lg-5\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/5_2/mailtemplate.png\" alt=\"Contoh templat mel, termasuk logo pengepala dan pengaki\" width=\"640\" height=\"370\" loading=\"lazy\"></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_5_2_TITLE="Apa yang Baharu dalam Joomla 5.2!"
