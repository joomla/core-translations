PLG_MULTIFACTORAUTH_FIXED_LBL_SETUP_PREMESSAGE="<p>Masukkan Kod Tetap di bawah. Kod Tetap ini perlu dimasukkan selepas log masuk sebelum anda boleh menggunakan laman ini.</p>"
