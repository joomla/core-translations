PLG_USER_TOKEN="Pengguna - Token API Joomla"
PLG_USER_TOKEN_ALLOWEDUSERGROUPS_DESC="Kumpulan Pengguna Joomla mana yang dibenarkan menggunakan Token Joomla untuk mengesahkan ke aplikasi API Joomla. Juga mengawal kumpulan pengguna yang melihat antara muka pengurusan Joomla Token dalam profil pengguna mereka. Lalai: Kumpulan Pengguna Super terbina dalam Joomla (ID Kumpulan Pengguna 8)."
PLG_USER_TOKEN_ALLOWEDUSERGROUPS_LABEL="Kumpulan Pengguna yang Dibenarkan"
PLG_USER_TOKEN_XML_DESCRIPTION="Membenarkan pengurusan token keselamatan yang digunakan untuk mengesahkan ke aplikasi API Joomla (akses jauh ke tapak anda). Token ini adalah benar-benar peribadi. Anda boleh melihat token anda sendiri tetapi anda hanya boleh melumpuhkan atau menetapkan semula token pengguna lain."

