PLG_SYSTEM_HTTPHEADERS="System - HTTP Headers"
PLG_SYSTEM_HTTPHEADERS_ADDITIONAL_HEADER="Paksa HTTP Headers"
PLG_SYSTEM_HTTPHEADERS_ADDITIONAL_HEADER_KEY="HTTP Header"
PLG_SYSTEM_HTTPHEADERS_ADDITIONAL_HEADER_VALUE="Nilai HTTP Header"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP' target='_blank' rel='noopener noreferrer'>Content Security Policy (CSP)</a>"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_CLIENT="Klien"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_FRAME_ANCESTORS_SELF_ENABLED="frame-ancestors 'self'"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_FRAME_ANCESTORS_SELF_ENABLED_DESC="Dayakan perlindungan klik jacking CSP frame-ancestors dan hanya benarkan asal 'self'. Sila gunakan borang di bawah untuk membenarkan asal selain 'self'."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_NONCE_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTML/Global_attributes/nonce' target='_blank' rel='noopener noreferrer'>Nonce</a>"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_NONCE_ENABLED_DESC="Dayakan senarai putih untuk skrip sebaris tertentu menggunakan nonce kriptografi (nombor digunakan sekali) untuk semua skrip dan gaya menggunakan API Joomla. Menyatakan nonce menjadikan pelayar moden mengabaikan 'unsafe-inline' yang masih perlu ditetapkan untuk pelayar lama tanpa sokongan nonce."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_REPORT_ONLY_DESC="Gunakan pengepala 'Content-Security-Policy-Report-Only' sebagai ganti 'Content-Security-Policy'."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_REPORT_ONLY="Report-Only"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STRICT_DYNAMIC_ENABLED="strict-dynamic"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STRICT_DYNAMIC_ENABLED_DESC="Ungkapan sumber strict-dynamic menyatakan bahawa kepercayaan yang diberikan secara jelas kepada skrip yang terdapat dalam markup, dengan mengiringinya dengan nonce atau hash, akan disebarkan kepada semua skrip yang dimuat oleh skrip akar tersebut. Pada masa yang sama, sebarang ungkapan sumber yang dibenarkan seperti 'self' atau 'unsafe-inline' akan diabaikan."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_SCRIPT_HASHES_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/script-src' target='_blank' rel='noopener noreferrer'>Script hashes</a>"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_SCRIPT_HASHES_ENABLED_DESC="Dayakan senarai putih berasaskan hash pilihan untuk skrip sebaris menggunakan hash kriptografi untuk semua skrip yang menggunakan API Joomla. Menyatakan hash menjadikan pelayar moden mengabaikan 'unsafe-inline' yang masih perlu ditetapkan untuk pelayar lama tanpa sokongan hash."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STYLE_HASHES_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/style-src' target='_blank' rel='noopener noreferrer'>Style hashes</a>"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STYLE_HASHES_ENABLED_DESC="Dayakan senarai putih berasaskan hash pilihan untuk gaya sebaris menggunakan hash kriptografi untuk semua gaya yang menggunakan API Joomla. Menyatakan hash menjadikan pelayar moden mengabaikan 'unsafe-inline' yang masih perlu ditetapkan untuk pelayar lama tanpa sokongan hash."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_VALUES="Tambah Arahan"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_VALUES_DIRECTIVE="Arahan Polisi"
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_VALUES_VALUE="Nilai"
PLG_SYSTEM_HTTPHEADERS_COOP="Cross-Origin-Opener-Policy"
PLG_SYSTEM_HTTPHEADERS_HEADER_CLIENT="Klien"
PLG_SYSTEM_HTTPHEADERS_HEADER_CLIENT_BOTH="Kedua-dua"
PLG_SYSTEM_HTTPHEADERS_HSTS="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security' target='_blank' rel='noopener noreferrer'>HTTP Strict Transport Security (HSTS)</a>"
PLG_SYSTEM_HTTPHEADERS_HSTS_MAXAGE="max-age"
PLG_SYSTEM_HTTPHEADERS_HSTS_MAXAGE_DESC="Pilihan ini menetapkan masa untuk 'max-age', ia dinyatakan dalam saat. Nilai lalai ialah 31536000, yang bersamaan dengan satu tahun"
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD="<a href='https://hstspreload.org' target='_blank' rel='noopener noreferrer'>Preload</a>"
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_DESC="Pilihan ini mengaktifkan pilih masuk untuk kemasukan dalam senarai pramuat pelayar."
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_NOTE="Penting"
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_NOTE_DESC="HSTS bermakna domain anda tidak lagi boleh dipanggil tanpa HTTPS. Setelah ditambah ke senarai pramuat, ini tidak mudah untuk dibatalkan. Domain boleh dibuang, tetapi mengambil masa berbulan-bulan untuk pengguna membuat perubahan dengan kemas kini pelayar.<br><strong>Pilihan ini sangat penting untuk mencegah 'serangan man-in-the-middle', jadi ia harus diaktifkan dalam apa jua keadaan, tetapi hanya jika anda pasti bahawa HTTPS disokong untuk domain dan semua subdomain dalam jangka panjang! Nilai untuk 'max-age' mesti ditetapkan kepada 63072000 (2 tahun) untuk rakaman.</strong>"
PLG_SYSTEM_HTTPHEADERS_HSTS_SUBDOMAINS="Juga untuk subdomain"
PLG_SYSTEM_HTTPHEADERS_HSTS_SUBDOMAINS_DESC="HSTS juga perlu didayakan <strong>untuk subdomain</strong> lazimnya subdomain 'www' diambil kira semasa mencipta sijil SSL. Jika subdomain lain digunakan, sila ambil perhatian bahawa ia juga disediakan dengan sijil SSL yang sah."
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_ACTION="Dayakan pengepala keselamatan lalai"
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_BODY="<p>Joomla! dilengkapi dengan set alat terbina dalam yang membantu anda mengendalikan pengepala keselamatan HTTP. Pengepala ini membantu pelayar anda contohnya melindungi laman web anda daripada serangan <a href='https://en.wikipedia.org/wiki/Cross-site_scripting' target='_blank' rel='noopener noreferrer'>XSS</a> dan <a href='https://en.wikipedia.org/wiki/Clickjacking' target='_blank' rel='noopener noreferrer'>Clickjacking</a>.</p><p>Anda boleh mendapatkan butiran lanjut dalam <a href='https://docs.joomla.org/Special:MyLanguage/J4.x:Http_Header_Management' target='_blank' rel='noopener noreferrer'>Tutorial Pengurusan Pengepala HTTP dalam Dokumentasi Joomla!</a></p>"
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_TITLE="Pengepala Keselamatan HTTP"
PLG_SYSTEM_HTTPHEADERS_REFERRERPOLICY="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Referrer-Policy' target='_blank' rel='noopener noreferrer'>Referrer-Policy</a>"
PLG_SYSTEM_HTTPHEADERS_XFRAMEOPTIONS="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Frame-Options' target='_blank' rel='noopener noreferrer'>X-Frame-Options</a>"
