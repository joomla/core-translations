PLG_SYSTEM_HTTPHEADERS_HEADER_CLIENT="Pilih pelanggan untuk sepanduk ini."
PLG_SYSTEM_HTTPHEADERS_HEADER_CLIENT_BOTH="Both"
PLG_SYSTEM_HTTPHEADERS_HSTS="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security' target='_blank' rel='noopener noreferrer'>HTTP Keselamatan Pengangkutan Ketat (HSTS)</a>" ; Please only change the URL
PLG_SYSTEM_HTTPHEADERS_HSTS_MAXAGE="umur maks" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_HSTS_MAXAGE_DESC="Pilihan ini menetapkan masa untuk 'umur maksimum', ia dinyatakan dalam beberapa saat. Nilai lalai ialah 31536000, yang sepadan dengan satu tahun" ; Please do not translate 'max-age'
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD="<a href='https://hstspreload.org' target='_blank' rel='noopener noreferrer'>Preload</a>" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_DESC="Pilihan ini mengaktifkan ikut serta untuk dimasukkan dalam apa yang dipanggil senarai pramuat penyemak imbas."
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_NOTE="penting"
PLG_SYSTEM_HTTPHEADERS_HSTS_PRELOAD_NOTE_DESC="HSTS bermakna domain anda tidak lagi boleh dipanggil tanpa HTTPS. Setelah ditambahkan pada senarai pramuat, ini tidak mudah untuk dibuat asal. Domain boleh dialih keluar, tetapi pengguna mengambil masa berbulan-bulan untuk membuat perubahan dengan kemas kini penyemak imbas.<br><strong>Pilihan ini sangat penting untuk mengelakkan 'serangan manusia-dalam-tengah', jadi ia harus diaktifkan dalam apa jua keadaan, tetapi hanya jika anda pasti HTTPS disokong untuk domain dan semua subdomain dalam jangka masa panjang! Nilai untuk 'umur maks' mesti ditetapkan kepada 63072000 (2 tahun) untuk rakaman.</strong>" ; Please do not translate 'max-age'
PLG_SYSTEM_HTTPHEADERS_HSTS_SUBDOMAINS="Juga untuk subdomain"
PLG_SYSTEM_HTTPHEADERS_HSTS_SUBDOMAINS_DESC="HSTS juga harus didayakan <strong>untuk subdomain</strong> biasanya subdomain 'www' diambil kira semasa membuat sijil SSL. Jika subdomain selanjutnya digunakan, sila ambil perhatian bahawa ia juga disediakan dengan sijil SSL yang sah."
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_ACTION="Dayakan pengepala keselamatan lalai"
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_BODY="<p>Joomla! datang dengan set alat terbina dalam yang membantu anda mengendalikan pengepala keselamatan http. Pengepala ini membantu penyemak imbas anda sebagai contoh untuk melindungi tapak web anda daripada <a href='https://en.wikipedia.org/wiki/Cross-site_scripting' target='_blank' rel='noopener noreferrer'>XSS</a> dan <a href='https://en.wikipedia.org'op reference/target='https://en.wikipedia.org'op noreferrer'>Clickjacking</a> serangan.</p><p>Anda boleh mendapatkan butiran lanjut dalam <a href='https://docs.joomla.org/Special:MyLanguage/J4.x:Http_blankader' rel='noopener noreferrer'>Tutorial Pengurusan Pengepala HTTP dalam Joomla! Dokumentasi.</a></p>"
PLG_SYSTEM_HTTPHEADERS_POSTINSTALL_INTRODUCTION_TITLE="Pengepala Keselamatan HTTP"
