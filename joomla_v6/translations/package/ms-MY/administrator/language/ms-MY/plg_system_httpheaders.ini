PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP' target='_blank' rel='noopener noreferrer'>Dasar Keselamatan Kandungan (CSP)</a>" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_CLIENT="Pilih pelanggan untuk sepanduk ini."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_FRAME_ANCESTORS_SELF_ENABLED="bingkai-nenek moyang 'diri'" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_FRAME_ANCESTORS_SELF_ENABLED_DESC="Dayakan kerangka perlindungan clickjacking CSP dan hanya benarkan 'diri' asal. Sila gunakan borang di bawah untuk membenarkan asal usul selain 'diri'."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_NONCE_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTML/Global_attributes/nonce' target='_blank' rel='noopener noreferrer'>Nonce</a>" ; Please only change the URL
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_NONCE_ENABLED_DESC="Dayakan senarai putih untuk skrip sebaris tertentu menggunakan nonce kriptografi (nombor digunakan sekali) untuk semua skrip dan gaya menggunakan API Joomla. Menentukan nonce menjadikan penyemak imbas moden mengabaikan 'unsafe-inline' yang masih harus ditetapkan untuk penyemak imbas lama tanpa sokongan nonce."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_REPORT_ONLY_DESC="Gunakan pengepala 'Content-Security-Policy-Report-Only' dan bukannya 'Content-Security-Policy'." ; Do not translate 'Content-Security-Policy' & 'Content-Security-Policy-Report-Only'
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_REPORT_ONLY="Laporan-Sahaja" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STRICT_DYNAMIC_ENABLED="tegas-dinamik" ; Do not translate
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STRICT_DYNAMIC_ENABLED_DESC="Ungkapan sumber dinamik yang ketat menyatakan bahawa kepercayaan yang diberikan secara eksplisit kepada skrip yang terdapat dalam penanda, dengan mengiringinya dengan nonce atau cincang, hendaklah disebarkan kepada semua skrip yang dimuatkan oleh skrip akar tersebut. Pada masa yang sama, sebarang ungkapan yang dibenarkan atau sumber seperti 'diri' atau 'sebaris tidak selamat' akan diabaikan." ; Do not translate 'strict-dynamic', 'self' and 'unsafe-inline'
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_SCRIPT_HASHES_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/script-src' target='_blank' rel='noopener noreferrer'>Skrip cincang</a>" ; Please only change the URL
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_SCRIPT_HASHES_ENABLED_DESC="Dayakan skrip sebaris senarai putih berasaskan cincang pilihan menggunakan cincang kriptografi untuk semua skrip menggunakan API Joomla. Menentukan cincangan menjadikan penyemak imbas moden mengabaikan 'unsafe-inline' yang masih harus ditetapkan untuk penyemak imbas lama tanpa sokongan cincang."
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STYLE_HASHES_ENABLED="<a href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/style-src' target='_blank' rel='noopener noreferrer'>Style hashes</a>" ; Please only change the URL
PLG_SYSTEM_HTTPHEADERS_CONTENTSECURITYPOLICY_STYLE_HASHES_ENABLED_DESC="Dayakan gaya sebaris senarai putih berasaskan cincang pilihan menggunakan cincang kriptografi untuk semua gaya menggunakan API Joomla. Menentukan cincangan menjadikan penyemak imbas moden mengabaikan 'unsafe-inline' yang masih harus ditetapkan untuk penyemak imbas lama tanpa sokongan cincang."
