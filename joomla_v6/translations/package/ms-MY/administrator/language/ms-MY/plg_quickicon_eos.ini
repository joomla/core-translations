PLG_QUICKICON_EOS_MESSAGE_INFO_02="<p>Bilakah masa yang sesuai untuk naik taraf ke Joomla 6? Setelah sambungan yang diperlukan oleh laman anda serasi. Ketahui <a href=\"%2$s\" target=\"_blank\" rel=\"noopener noreferrer\">cara menggunakan Penyemak Pra-Kemas Kini</a>.</p>"
