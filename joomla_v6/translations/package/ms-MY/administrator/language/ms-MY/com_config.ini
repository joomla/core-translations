JLIB_RULES_SETTING_NOTES_COM_CONFIG="Jika anda menukar tetapan, ia akan digunakan pada ini dan semua kumpulan kanak-kanak, komponen dan kandungan. Ambil perhatian bahawa:<br><em><strong>Diwarisi</strong></em> bermakna kebenaran daripada kumpulan induk akan digunakan.<br><em><strong>Ditolak</strong></em > bermakna tidak kira apa tetapan kumpulan induk, kumpulan yang sedang diedit tidak boleh mengambil tindakan ini.<br><em><strong>Dibenarkan</strong></em> bermakna kumpulan yang sedang diedit akan dapat untuk mengambil tindakan ini (tetapi jika ini bercanggah dengan kumpulan induk, ia tidak akan memberi kesan; konflik akan ditunjukkan oleh <em><strong>Tidak Dibenarkan (Dikunci)</strong></em> di bawah Tetapan Dikira) .<br><em><strong>Tidak Ditetapkan</strong></em> hanya digunakan untuk kumpulan Awam dalam konfigurasi global. Kumpulan Awam ialah induk kepada semua kumpulan lain. Jika kebenaran tidak ditetapkan, ia dianggap sebagai menafikan tetapi boleh ditukar untuk kumpulan kanak-kanak, komponen, kategori dan item." ; Alternate language strings for the rules form field

