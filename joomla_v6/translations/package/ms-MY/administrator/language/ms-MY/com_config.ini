COM_CONFIG_FIELD_DEFAULT_EDITOR_DESC="Editor ini akan digunakan untuk mengedit kandungan dan kawasan teks kaya yang lain dalam sambungan pihak ketiga melainkan pengguna telah memilih yang lain dalam profil pengguna mereka. Ini juga akan menjadi satu-satunya editor yang tersedia dan digunakan untuk pengguna yang belum log masuk (kumpulan pengguna Tetamu)."
