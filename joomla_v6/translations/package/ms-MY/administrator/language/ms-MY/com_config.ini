COM_CONFIG_TEXT_FILTERS_DESC="Tetapan penapis teks ini akan digunakan pada semua medan editor teks dalam kumpulan yang dipilih.<br>Pilihan penapisan ini memberikan lebih kawalan ke atas HTML yang diserahkan oleh pembekal kandungan anda. Anda boleh bersikap tegas atau liberal seperti yang anda perlukan untuk memenuhi keperluan tapak anda. Penapisan adalah ikut serta dan tetapan lalai memberikan perlindungan yang baik terhadap penanda yang biasanya dikaitkan dengan serangan tapak web."
