COM_CONFIG_FIELD_DEBUG_SYSTEM_DESC="Gunakannya hanya untuk menyelesaikan masalah, sebaik-baiknya pada salinan <em>peribadi</em> tapak anda. Maklumat yang lebih teknikal yang dipaparkan dalam mod ini boleh menjadi risiko keselamatan jika dibiarkan didayakan pada tapak langsung. Ingat untuk menerbitkan pemalam "_QQ_"Sistem - Nyahpepijat"_QQ_" untuk mendapatkan maklumat terperinci pada setiap halaman yang dimuatkan."
