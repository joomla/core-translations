JLIB_RULES_SETTING_NOTES_COM_CONFIG="Jika anda menukar tetapan, ia akan digunakan pada kumpulan ini dan semua kumpulan anak, komponen dan kandungan. Perhatikan bahawa:<br><em><strong>Diwarisi</strong></em> bermaksud kebenaran daripada kumpulan induk akan digunakan.<br><em><strong>Dinafikan</strong></em> bermaksud tidak kira apa tetapan kumpulan induk, kumpulan yang disunting tidak boleh mengambil tindakan ini.<br><em><strong>Dibenarkan</strong></em> bermaksud kumpulan yang disunting akan dapat mengambil tindakan ini (tetapi jika ini bercanggah dengan kumpulan induk ia tidak akan memberi kesan; percanggahan akan ditunjukkan oleh <em><strong>Tidak Dibenarkan (Dikunci)</strong></em> di bawah Tetapan Dikira).<br><em><strong>Tidak Ditetapkan</strong></em> hanya digunakan untuk kumpulan Awam dalam konfigurasi global. Kumpulan Awam ialah induk semua kumpulan lain. Jika kebenaran tidak ditetapkan, ia dianggap sebagai nafi tetapi boleh ditukar untuk kumpulan anak, komponen, kategori dan item."
