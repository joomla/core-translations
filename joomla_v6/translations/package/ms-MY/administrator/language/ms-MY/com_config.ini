COM_CONFIG_FIELD_DEFAULT_CAPTCHA_DESC="Joomla dan sambungan pihak ketiga boleh menggunakan <a href=\"https://en.wikipedia.org/wiki/CAPTCHA\" target=\"_blank\" rel=\"noopener noreferrer\">CAPTCHA</a> untuk mencegah penyalahgunaan (spam) pada borang awam. Setiap sambungan boleh memilih untuk menggunakan CAPTCHA yang berbeza, jika lebih dari satu tersedia. Jika tiada pilihan dibuat, ini akan digunakan secara lalai. Anda boleh mendayakan kaedah CAPTCHA tambahan dalam Sistem, Urus, Pemalam."
