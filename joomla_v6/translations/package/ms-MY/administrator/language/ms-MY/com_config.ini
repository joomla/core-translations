COM_CONFIG_TEXT_FILTERS_DESC="Tetapan penapis teks ini akan digunakan pada semua medan penyunting teks dalam kumpulan yang dipilih.<br>Pilihan penapisan ini memberi lebih kawalan ke atas HTML yang dihantar oleh penyedia kandungan anda. Anda boleh seketat atau selonggar yang diperlukan untuk memenuhi keperluan laman anda. Penapisan adalah opt-in dan tetapan lalai menyediakan perlindungan yang baik terhadap markup yang biasa dikaitkan dengan serangan laman web."
