COM_CONFIG_FIELD_SERVER_TIMEZONE_DESC="Digunakan secara lalai untuk memaparkan tarikh dan masa (Joomla menyimpannya secara dalaman sebagai UTC). Ini mungkin berbeza daripada zon waktu pelayan anda. Pengguna boleh mengatasi zon waktu pilihan mereka dalam profil pengguna mereka."
