COM_CONFIG_FIELD_DEBUG_LANG_DESC="Memaparkan <strong><code>??</code></strong> di sekeliling pemalar rentetan bahasa apabila rentetan itu tidak terdapat dalam fail bahasa yang sedang dimuatkan atau <strong><code>**</code></strong > sekitar nilai rentetan apabila rentetan hadir. Jika tiada satu pun daripada perkara di atas dipaparkan, ini mungkin bermakna teks dikodkan keras dan memerlukan rentetan bahasa."
