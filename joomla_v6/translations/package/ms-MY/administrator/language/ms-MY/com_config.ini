COM_CONFIG_FIELD_DEBUG_SYSTEM_DESC="Gunakan hanya untuk penyelesaian masalah, idealnya pada salinan <em>peribadi</em> laman anda. Semakin banyak maklumat teknikal yang dipaparkan dalam mod ini boleh menjadi risiko keselamatan jika dibiarkan aktif pada laman langsung. Ingat untuk menerbitkan pemalam \"Sistem - Nyahpepijat\" untuk mendapat maklumat terperinci pada setiap halaman yang dimuatkan."
