COM_CONFIG_FIELD_SEF_REWRITE_NOTE="Apache dan Litespeed: Namakan semula <code>htaccess.txt</code> kepada <code>.htaccess</code><br>IIS: Namakan semula <code>web.config.txt</code> kepada <code>web.config</code><br>NginX: anda mesti <a href=\"https://docs.joomla.org/Nginx\" target=\"_blank\" rel=\"noopener noreferrer\">mengkonfigurasi pelayan anda</a>.<br>Pelayan lain atau jika tidak pasti: sila hubungi syarikat pengehosan anda."
