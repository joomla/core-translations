COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_NEW_TITLE="Pilih butang 'Baru'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_NEW_DESCRIPTION="Pilih 'Baharu' untuk membuat lawatan baharu."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_TITLE_TITLE="Tambah tajuk untuk lawatan itu"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_TITLE_DESCRIPTION="Masukkan tajuk yang diperlukan untuk lawatan."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONTENT_TITLE="Tambah kandungan"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONTENT_DESCRIPTION="Masukkan kandungan yang menerangkan lawatan."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_COMPONENT_TITLE="Pilih komponen"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_COMPONENT_DESCRIPTION="Pilih sambungan yang anda mahu tunjukkan lawatan anda sebagai keutamaan dalam senarai lawatan yang mungkin dijalankan. Sebagai contoh, Jika anda membuat lawatan untuk sambungan 'Pengguna', kemudian pilih 'Pengguna'. Pilih 'Semua' untuk lawatan dipaparkan pada setiap halaman."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_URL_TITLE="Tambahkan URL"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_URL_DESCRIPTION="Tambahkan URL relatif halaman tempat lawatan mesti bermula. Sebagai contoh, masukkan <em>administrator/index.php?option=com_users&view=users</em> untuk memulakan lawatan dalam halaman Pengguna."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_AUTOSTART_TITLE="Togol 'Auto Mula'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_AUTOSTART_DESCRIPTION="<p>Menetapkan 'Auto Mula' kepada 'Ya' memulakan lawatan secara automatik sebaik sahaja syarat yang berkaitan dipenuhi.</p><p>Jika berbilang lawatan ditetapkan untuk dimulakan secara automatik di bawah syarat yang sama, hanya lawatan pertama dalam senarai akan bermula sehingga ia sama ada dibatalkan, selesai atau dilangkau.>__"

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_SAVECLOSE_TITLE="Pilih 'Simpan dan Tutup'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_SAVECLOSE_DESCRIPTION="Simpan dan tutup lawatan."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONGRATULATIONS_TITLE="Tahniah!"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONGRATULATIONS_DESCRIPTION="Anda telah membuat lawatan berpandu. Anda kini perlu membuat langkah untuk lawatan."

