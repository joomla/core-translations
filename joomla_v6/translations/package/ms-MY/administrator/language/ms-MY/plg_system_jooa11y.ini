PLG_SYSTEM_JOOA11Y_QA_BAD_ITALICS="Tag tebal dan italik mempunyai makna semantik, dan <strong>tidak</strong> boleh digunakan untuk menyerlahkan keseluruhan perenggan. Teks tebal harus digunakan untuk memberikan <strong>penekanan</strong> kuat pada perkataan atau frasa. Italik harus digunakan untuk menyerlahkan nama khas (contohnya tajuk buku dan artikel), perkataan asing, petikan. Petikan panjang harus diformatkan sebagai petikan blok."
