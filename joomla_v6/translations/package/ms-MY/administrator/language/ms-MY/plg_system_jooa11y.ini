PLG_SYSTEM_JOOA11Y_QA_FAKE_HEADING_INFO="Barisan teks tebal mungkin kelihatan seperti tajuk, tetapi seseorang yang menggunakan pembaca skrin tidak dapat mengetahui bahawa ia penting atau melompat ke kandungannya. Teks tebal tidak boleh menggantikan tajuk semantik (Tajuk 2 hingga Tajuk 6)."
PLG_SYSTEM_JOOA11Y_QA_PAGE_LANGUAGE_MESSAGE="Bahasa halaman tidak dinyatakan! Sila <a href=\"https://www.w3.org/International/questions/qa-html-language-declarations\" target=\"_blank\" rel=\"noopener noreferrer\">nyatakan bahasa pada tag HTML.</a>"
PLG_SYSTEM_JOOA11Y_QA_PDF_COUNT="PDF dianggap kandungan web dan mesti dijadikan boleh dicapai juga. PDF sering mengandungi isu untuk orang yang menggunakan pembaca skrin (tag struktur hilang atau label medan borang hilang) dan orang yang mempunyai penglihatan rendah (teks tidak mengalir semula apabila dibesarkan). <ul><li>Jika ini borang, pertimbangkan untuk menggunakan borang HTML yang boleh dicapai sebagai alternatif.</li><li>Jika ini dokumen, pertimbangkan untuk menukarnya kepada halaman web.</li></ul><br>Jika tidak, sila semak <strong>%(pdfCount)</strong> <a href=\"https://www.adobe.com/accessibility/products/acrobat/using-acrobat-pro-accessibility-checker.html\" target=\"_blank\" rel=\"noopener noreferrer\">PDF untuk kebolehcapaian dalam Acrobat DC.</a>"
PLG_SYSTEM_JOOA11Y_QA_SHOULD_BE_LIST="Adakah anda cuba membuat senarai? Item senarai yang mungkin ditemui: <strong>%(firstPrefix)</strong>"
PLG_SYSTEM_JOOA11Y_QA_SHOULD_BE_LIST_TIP="Pastikan untuk menggunakan senarai semantik dengan menggunakan butang pemformatan peluru atau nombor. Apabila menggunakan senarai semantik, teknologi bantuan dapat menyampaikan maklumat seperti jumlah item dan kedudukan relatif setiap item dalam senarai. Ketahui lebih lanjut tentang <a href=\"https://www.w3.org/WAI/tutorials/page-structure/content/#lists\" target=\"_blank\" rel=\"noopener noreferrer\">senarai semantik.</a>"
PLG_SYSTEM_JOOA11Y_QA_UPPERCASE_WARNING="Teks semua huruf besar ditemui. Sesetengah pembaca skrin mungkin mentafsir teks semua huruf besar sebagai akronim dan akan membaca setiap huruf secara individu. Selain itu, sesetengah orang mendapati semua huruf besar lebih sukar dibaca dan ia mungkin memberikan gambaran SEDANG MENJERIT."
