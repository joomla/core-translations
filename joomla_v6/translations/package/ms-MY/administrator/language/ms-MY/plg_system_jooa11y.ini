PLG_SYSTEM_JOOA11Y_NEW_TAB_WARNING="Pautan buka dalam tab atau tetingkap baharu tanpa amaran. Melakukan ini boleh mengelirukan, terutamanya bagi orang yang sukar melihat kandungan visual. Kedua, ia bukan sentiasa amalan yang baik untuk mengawal pengalaman seseorang atau membuat keputusan untuk mereka. Nyatakan bahawa pautan membuka tetingkap baharu dalam teks pautan."
