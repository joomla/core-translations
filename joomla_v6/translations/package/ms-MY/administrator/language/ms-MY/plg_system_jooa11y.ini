PLG_SYSTEM_JOOA11Y="Sistem - Penyemak Kebolehcapaian Joomla"
PLG_SYSTEM_JOOA11Y_FIELD_CHECK_ROOT="Kawasan Sasaran untuk Disemak"
PLG_SYSTEM_JOOA11Y_FIELD_CHECK_ROOT_DESC="Masukkan pemilih tunggal untuk menyasarkan kawasan tertentu laman web anda. Tetapan lalai ialah penanda <strong>main</strong>. Alternatif kepada penanda ialah kelas, elemen atau peranan ARIA (cth. #main-content, .main, [role='main']). Masukkan <strong>body</strong> untuk menyemak keseluruhan halaman."
PLG_SYSTEM_JOOA11Y_FIELD_CHECKS="Matikan Semakan"
PLG_SYSTEM_JOOA11Y_FIELD_CHECKS_DESC="Matikan semakan tertentu mengikut nama kunci. Ketahui cara untuk <a href=\"https://sa11y.netlify.app/plugins/joomla/#turn-off-checks\" target=\"_blank\" rel=\"noopener noreferrer\">Matikan Semakan</a>."
PLG_SYSTEM_JOOA11Y_FIELD_CONTAINER_IGNORE="Abaikan Kawasan"
PLG_SYSTEM_JOOA11Y_FIELD_CONTAINER_IGNORE_DESC="Abaikan kawasan tertentu dalam Bekas Kandungan. Gunakan koma untuk memisahkan kelas atau elemen (cth. #ignore, .ignore)."
PLG_SYSTEM_JOOA11Y_FIELD_EXTRA_PROPS="Sifat Tambahan"
PLG_SYSTEM_JOOA11Y_FIELD_EXTRA_PROPS_DESC="Hantar sifat tambahan untuk penyesuaian. Ketahui cara untuk menambah <a href=\"https://sa11y.netlify.app/plugins/joomla/#extra-properties\" target=\"_blank\" rel=\"noopener noreferrer\">Sifat Tambahan</a>."
PLG_SYSTEM_JOOA11Y_FIELD_READABILITY_ROOT="Kawasan Sasaran Kebolehbacaan"
PLG_SYSTEM_JOOA11Y_FIELD_READABILITY_ROOT_DESC="Penanda pada halaman yang akan disemak untuk kebolehbacaan. Tetapan lalai ialah penanda <strong>main</strong>."
PLG_SYSTEM_JOOA11Y_FIELD_SHOW_ALWAYS="Tunjukkan Sentiasa"
PLG_SYSTEM_JOOA11Y_FIELD_SHOW_ALWAYS_DESC="Muatkan penyemak kebolehcapaian pada semua halaman. Ini berguna semasa membangunkan laman web, tetapi tidak sepatutnya dibiarkan aktif apabila laman web sudah dalam talian."
PLG_SYSTEM_JOOA11Y_KEY="Kunci"
PLG_SYSTEM_JOOA11Y_VALUE="Nilai"
PLG_SYSTEM_JOOA11Y_XML_DESCRIPTION="Penyemak Kebolehcapaian Joomla menyerlahkan secara visual isu kebolehcapaian dan kebolehgunaan yang biasa. Ditujukan kepada pengarang kandungan, pemalam ini mengenal pasti ralat atau amaran dan memberi panduan tentang cara membetulkannya. Sila ambil perhatian bahawa pemalam ini tidak menawarkan analisis menyeluruh laman web anda, dan juga tidak memastikan kebolehcapaian laman web anda secara automatik. Penting untuk memilih templat yang sedia boleh dicapai untuk memastikan laman anda memenuhi piawaian kebolehcapaian."
