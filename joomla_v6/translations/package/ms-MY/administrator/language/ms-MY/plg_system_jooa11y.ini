PLG_SYSTEM_JOOA11Y_COMPLEX_WORDS="Perkataan kompleks:"
PLG_SYSTEM_JOOA11Y_CONTAINER_LABEL="Penyemak Kebolehcapaian"
PLG_SYSTEM_JOOA11Y_CONTRAST="Kontras"
PLG_SYSTEM_JOOA11Y_CONTRAST_ERROR_INPUT_MESSAGE="Teks dalam input ini tidak mempunyai kontras yang mencukupi dengan latar belakang. Nisbah kontras sepatutnya sekurang-kurangnya 4.5:1 untuk teks biasa dan 3:1 untuk teks besar."
PLG_SYSTEM_JOOA11Y_CONTRAST_ERROR_INPUT_MESSAGE_INFO="Nisbah kontras ialah <strong>%(cratio)</strong>."
PLG_SYSTEM_JOOA11Y_CONTRAST_ERROR_MESSAGE="Teks ini tidak mempunyai kontras yang mencukupi dengan latar belakang. Nisbah kontras sepatutnya sekurang-kurangnya 4.5:1 untuk teks biasa dan 3:1 untuk teks besar."
PLG_SYSTEM_JOOA11Y_CONTRAST_ERROR_MESSAGE_INFO="Nisbah kontras ialah <strong>%(cratio)</strong> untuk teks berikut: <strong>%(nodetext)</strong>"
PLG_SYSTEM_JOOA11Y_CONTRAST_WARNING_MESSAGE="Kontras teks ini tidak diketahui dan perlu disemak secara manual. Pastikan teks dan latar belakang mempunyai warna yang berkontras kuat. Nisbah kontras sepatutnya sekurang-kurangnya 4.5:1 untuk teks biasa dan 3:1 untuk teks besar."
PLG_SYSTEM_JOOA11Y_CONTRAST_WARNING_MESSAGE_INFO="Sila semak kontras teks berikut:<br><strong>%(nodetext)</strong>"
PLG_SYSTEM_JOOA11Y_DARK_MODE="Mod Gelap"
PLG_SYSTEM_JOOA11Y_DIFFICULT_READABILITY="Sukar"
PLG_SYSTEM_JOOA11Y_EMBED_AUDIO="Sila pastikan untuk menyediakan <strong>transkrip untuk semua podcast.</strong> Menyediakan transkrip untuk kandungan audio ialah keperluan mandatori Tahap A. Transkrip membantu orang yang pekak atau kurang pendengaran, tetapi boleh memberi manfaat kepada semua orang. Pertimbangkan untuk meletakkan transkrip di bawah atau dalam panel akordion."
PLG_SYSTEM_JOOA11Y_EMBED_GENERAL_WARNING="Tidak dapat menyemak kandungan terbenam. Sila pastikan imej mempunyai teks alt, video mempunyai sari kata, teks mempunyai kontras yang mencukupi, dan komponen interaktif boleh <a href=\"https://webaim.org/techniques/keyboard/\" target=\"_blank\" rel=\"noopener noreferrer\">dicapai melalui papan kekunci.</a>"
PLG_SYSTEM_JOOA11Y_EMBED_MISSING_TITLE="Kandungan terbenam memerlukan nama yang boleh dicapai yang menerangkan kandungannya. Sila berikan atribut <span class=\"jooa11y-kbd\">title</span> atau <span class=\"jooa11y-kbd\">aria-label</span> yang unik pada elemen <span class=\"jooa11y-kbd\">iframe</span>. Ketahui lebih lanjut tentang <a href=\"https://dequeuniversity.com/tips/provide-iframe-titles\" target=\"_blank\" rel=\"noopener noreferrer\">iFrame.</a>"
PLG_SYSTEM_JOOA11Y_EMBED_VIDEO="Sila pastikan <strong>semua video mempunyai sari kata.</strong> Menyediakan sari kata untuk semua kandungan audio dan video ialah keperluan mandatori Tahap A. Sari kata membantu orang yang pekak atau kurang pendengaran."
PLG_SYSTEM_JOOA11Y_ERROR="Ralat"
PLG_SYSTEM_JOOA11Y_FAIRLY_DIFFICULT_READABILITY="Agak sukar"
PLG_SYSTEM_JOOA11Y_FIELD_ADDITIONAL_CHECKS="Semakan Tambahan Sentiasa Aktif"
PLG_SYSTEM_JOOA11Y_FIELD_ADDITIONAL_CHECKS_DESC="Mendayakan pilihan ini akan menyembunyikan suis togol untuk Label Borang, Kontras, Pautan (Lanjutan) dalam panel Tetapan secara visual."
PLG_SYSTEM_JOOA11Y_FIELD_COLOUR_FILTER="Penapis Warna"
PLG_SYSTEM_JOOA11Y_FIELD_COLOUR_FILTER_DESC="Tunjukkan togol Penapis Warna dalam panel Tetapan. Penapis warna membantu mengenal pasti gabungan warna yang mungkin sukar dibezakan oleh sesetengah orang."
PLG_SYSTEM_JOOA11Y_FIELD_CONTRAST="Kontras"
PLG_SYSTEM_JOOA11Y_FIELD_CONTRAST_DESC="Tunjukkan togol Kontras dalam panel Tetapan. Semak isu kontras WCAG 2.0 Tahap AA antara teks hadapan dan elemen latar belakang."
PLG_SYSTEM_JOOA11Y_FIELD_FORM_LABELS="Label Borang"
PLG_SYSTEM_JOOA11Y_FIELD_FORM_LABELS_DESC="Tunjukkan togol Label Borang dalam panel Tetapan. Semak input borang yang tiada label sepadan. Tidak semestinya isu pengarang kandungan, dan biasanya bukan isu apabila menggunakan pemalam borang yang bereputasi dan boleh dicapai."
PLG_SYSTEM_JOOA11Y_FIELD_LINKS_ADVANCED="Pautan (Lanjutan)"
PLG_SYSTEM_JOOA11Y_FIELD_LINKS_ADVANCED_DESC="Tunjukkan togol Pautan (Lanjutan) dalam panel Tetapan. Semak isu tambahan seperti: pautan yang buka dalam tab baharu tanpa amaran, mempunyai nama sama tetapi tujuan berbeza, atau menghala ke PDF dan fail lain tanpa amaran."
PLG_SYSTEM_JOOA11Y_FIELD_WEB_COMPONENTS="Komponen Web untuk Disemak"
PLG_SYSTEM_JOOA11Y_FIELD_WEB_COMPONENTS_DESC="Sediakan senarai semua komponen web atau bekas yang diketahui dengan shadow DOM terbuka."
PLG_SYSTEM_JOOA11Y_FILE_TYPE_WARNING="Pautan menghala ke PDF atau fail boleh dimuat turun (cth. MP3, Zip, Word Doc) tanpa amaran. Nyatakan jenis fail dalam teks pautan. Jika ia fail besar, pertimbangkan untuk memasukkan saiz fail."
PLG_SYSTEM_JOOA11Y_FILE_TYPE_WARNING_TIP="<strong>Contoh:</strong> Laporan Eksekutif (PDF, 3MB)"
PLG_SYSTEM_JOOA11Y_FORM_LABELS="Label borang"
PLG_SYSTEM_JOOA11Y_GOOD="Baik"
PLG_SYSTEM_JOOA11Y_GOOD_READABILITY="Baik"
PLG_SYSTEM_JOOA11Y_HEADING_EMPTY="Tajuk kosong ditemui! Untuk membetulkan, padamkan baris ini atau tukar formatnya daripada <strong>Tajuk %(level)</strong> kepada <strong>Normal</strong> atau <strong>Perenggan</strong>."
PLG_SYSTEM_JOOA11Y_HEADING_EMPTY_WITH_IMAGE="Tajuk tiada teks, tetapi mengandungi imej. Jika ini bukan tajuk, tukar formatnya daripada <strong>Tajuk %(level)</strong> kepada <strong>Normal</strong> atau <strong>Perenggan</strong>. Jika tidak, sila tambah teks alt pada imej jika ia bukan hiasan."
PLG_SYSTEM_JOOA11Y_HEADING_FIRST="Tajuk pertama pada halaman biasanya harus Tajuk 1 atau Tajuk 2. Tajuk 1 sepatutnya permulaan bahagian kandungan utama, dan merupakan tajuk utama yang menerangkan tujuan keseluruhan halaman. Ketahui lebih lanjut tentang <a href=\"https://www.w3.org/WAI/tutorials/page-structure/headings/\" target=\"_blank\" rel=\"noopener noreferrer\">Struktur Tajuk.</a>"
PLG_SYSTEM_JOOA11Y_HEADING_LONG="Tajuk terlalu panjang! Tajuk harus digunakan untuk menyusun kandungan dan menyampaikan struktur. Ia harus ringkas, bermaklumat, dan unik. Sila kekalkan tajuk kurang daripada 160 aksara (tidak lebih daripada satu ayat)."
PLG_SYSTEM_JOOA11Y_HEADING_LONG_INFO="Bilangan Aksara: <strong>%(headingLength)</strong>."
PLG_SYSTEM_JOOA11Y_HEADING_MISSING_ONE="Tajuk 1 tiada. Tajuk 1 sepatutnya permulaan kawasan kandungan utama, dan merupakan tajuk utama yang menerangkan tujuan keseluruhan halaman. Ketahui lebih lanjut tentang <a href=\"https://www.w3.org/WAI/tutorials/page-structure/headings/\" target=\"_blank\" rel=\"noopener noreferrer\">Struktur Tajuk.</a>"
PLG_SYSTEM_JOOA11Y_HEADING_NON_CONSECUTIVE_LEVEL="Tahap tajuk tidak berturutan digunakan. Tajuk tidak boleh melangkau tahap, atau bertukar daripada <strong>Tajuk %(prevLevel)</strong> kepada <strong>Tajuk %(level)</strong>."
PLG_SYSTEM_JOOA11Y_HIDE_OUTLINE="Sembunyikan Garis Besar"
PLG_SYSTEM_JOOA11Y_HIDE_SETTINGS="Sembunyikan Tetapan"
PLG_SYSTEM_JOOA11Y_HYPERLINK_ALT_LENGTH_MESSAGE="Penerangan teks alt pada imej berpaut <strong>terlalu panjang</strong>. Teks alt pada imej berpaut harus menerangkan ke mana pautan membawa anda, bukan penerangan literal imej. <strong>Pertimbangkan untuk menggunakan tajuk halaman yang dipautkan sebagai teks alt.</strong>"
PLG_SYSTEM_JOOA11Y_HYPERLINK_ALT_LENGTH_MESSAGE_INFO="Teks alt ialah <strong>%(altLength)</strong> aksara: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DECORATIVE="Imej ditandakan sebagai <strong>hiasan</strong> dan akan diabaikan oleh teknologi bantuan."
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DECORATIVE_INFO="Walaupun <strong>kapsyen</strong> telah disediakan, imej juga harus mempunyai teks alt dalam kebanyakan kes. <ul><li>Teks alt harus memberikan penerangan ringkas tentang apa yang ada dalam imej.</li><li>Kapsyen biasanya harus memberikan konteks untuk mengaitkan imej dengan kandungan sekeliling, atau memberi perhatian kepada maklumat tertentu.</li></ul> Ketahui lebih lanjut: <a href=\"https://thoughtbot.com/blog/alt-vs-figcaption#the-figcaption-element\" target=\"_blank\" rel=\"noopener noreferrer\">alt berbanding figcaption.</a>"
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DUPLICATE_ALT="Jangan gunakan perkataan yang sama untuk kedua-dua teks alt dan kapsyen. Pembaca skrin akan mengumumkan maklumat tersebut dua kali."
PLG_SYSTEM_JOOA11Y_LABELS_ARIA_LABEL_INPUT_MESSAGE="Input mempunyai nama yang boleh dicapai, walau bagaimanapun sila pastikan terdapat label yang boleh dilihat juga."
PLG_SYSTEM_JOOA11Y_LABELS_ARIA_LABEL_INPUT_MESSAGE_INFO="Nama yang boleh dicapai untuk input ini ialah: <strong>%(ariaLabel)</strong>"
PLG_SYSTEM_JOOA11Y_LABELS_INPUT_RESET_MESSAGE="Butang tetap semula <strong>tidak</strong> sepatutnya digunakan melainkan benar-benar diperlukan kerana ia mudah diaktifkan secara tidak sengaja."
PLG_SYSTEM_JOOA11Y_LABELS_INPUT_RESET_MESSAGE_TIP="<strong>Petua!</strong> Ketahui mengapa <a href=\"https://www.nngroup.com/articles/reset-and-cancel-buttons/\" target=\"_blank\" rel=\"noopener noreferrer\">butang Tetap Semula dan Batal menimbulkan isu kebolehgunaan.</a>"
PLG_SYSTEM_JOOA11Y_LABELS_MISSING_IMAGE_INPUT_MESSAGE="Butang imej tiada teks alt. Sila tambah teks alt untuk memberikan nama yang boleh dicapai. Contohnya: <em>Cari</em> atau <em>Hantar</em>."
PLG_SYSTEM_JOOA11Y_LABELS_MISSING_LABEL_MESSAGE="Tiada label yang dikaitkan dengan input ini. Sila tambah <span class=\"jooa11y-kbd\">id</span> pada input ini, dan tambah atribut <span class=\"jooa11y-kbd\">for</span> yang sepadan pada label."
PLG_SYSTEM_JOOA11Y_LABELS_NO_FOR_ATTRIBUTE_MESSAGE="Tiada label yang dikaitkan dengan input ini. Tambah atribut <span class=\"jooa11y-kbd\">for</span> pada label yang sepadan dengan <span class=\"jooa11y-kbd\">id</span> input ini."
PLG_SYSTEM_JOOA11Y_LABELS_NO_FOR_ATTRIBUTE_MESSAGE_INFO="ID untuk input ini ialah: <strong>id=&#34;%(t)&#34;</strong>"
PLG_SYSTEM_JOOA11Y_LANG_CODE="ms"
PLG_SYSTEM_JOOA11Y_LINK_ALT_HAS_BAD_WORD_MESSAGE="Sambungan fail dalam teks alt ditemui. Jika imej menyampaikan cerita, suasana atau maklumat penting - pastikan untuk menerangkan imej tersebut."
PLG_SYSTEM_JOOA11Y_LINK_ALT_HAS_BAD_WORD_MESSAGE_INFO="Buang: <strong>%(error)</strong>.<br>Teks alt untuk imej ini ialah: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_ALT_HAS_SUS_WORD_MESSAGE="Teknologi bantuan sudah menunjukkan bahawa ini ialah imej, jadi &quot;<strong>%(error)</strong>&quot; atau &quot;%(error) of&quot; mungkin berlebihan."
PLG_SYSTEM_JOOA11Y_LINK_ALT_HAS_SUS_WORD_MESSAGE_INFO="Teks alt untuk imej ini ialah: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_ALT_PLACEHOLDER_MESSAGE="Teks alt pemegang tempat atau tidak bermakna ditemui. Gantikan teks alt berikut dengan sesuatu yang lebih bermakna: <strong>%(altText)</strong>."
PLG_SYSTEM_JOOA11Y_LINK_ALT_TOO_LONG_MESSAGE="Penerangan teks alt <strong>terlalu panjang</strong>. Teks alt harus ringkas, namun bermakna seperti <em>tweet</em> (sekitar 100 aksara). Jika ini ialah imej kompleks atau graf, pertimbangkan untuk meletakkan penerangan panjang imej dalam teks di bawah atau komponen akordion."
PLG_SYSTEM_JOOA11Y_LINK_ALT_TOO_LONG_MESSAGE_INFO="Teks alt ialah <strong>%(altLength)</strong> aksara: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_ANCHOR_LINK_AND_ALT_MESSAGE="Pautan imej mengandungi <strong>kedua-dua teks alt dan teks pautan sekeliling.</strong> Jika imej ini hiasan dan digunakan sebagai pautan berfungsi ke halaman lain, pertimbangkan untuk menandakan imej sebagai hiasan - teks pautan sekeliling sudah mencukupi."
PLG_SYSTEM_JOOA11Y_LINK_ANCHOR_LINK_AND_ALT_MESSAGE_INFO="Teks alt: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_BEST_PRACTICES="Pertimbangkan untuk menggantikan teks pautan: <strong>%(error)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_BEST_PRACTICES_DETAILS="<ul><li>&quot;Klik di sini&quot; meletakkan fokus pada mekanik tetikus, sedangkan ramai orang tidak menggunakan tetikus atau mungkin melihat laman web ini di peranti mudah alih. Pertimbangkan untuk menggunakan kata kerja berbeza yang berkaitan dengan tugas.</li><li>Elakkan menggunakan simbol HTML sebagai seruan bertindak melainkan ia disembunyikan daripada teknologi bantuan.</li></ul>"
PLG_SYSTEM_JOOA11Y_LINK_DECORATIVE_MESSAGE="Imej ditandakan sebagai <strong>hiasan</strong> dan akan diabaikan oleh teknologi bantuan. Jika imej menyampaikan cerita, suasana atau maklumat penting - pastikan untuk menambah teks alt."
PLG_SYSTEM_JOOA11Y_LINK_EMPTY="Buang pautan kosong tanpa sebarang teks."
PLG_SYSTEM_JOOA11Y_LINK_EMPTY_LINK_NO_LABEL="Pautan tidak mempunyai teks yang boleh dibaca oleh pembaca skrin dan teknologi bantuan lain. Untuk membetulkan:<ul><li>Tambah beberapa teks ringkas yang menerangkan ke mana pautan membawa anda.</li><li>Jika ia <a href=\"https://a11y-101.com/development/icons-and-links\" target=\"_blank\" rel=\"noopener noreferrer\">pautan ikon atau SVG</a> ia mungkin tiada label deskriptif.</li><li>Jika anda rasa pautan ini ralat disebabkan pepijat salin/tampal, pertimbangkan untuk memadamnya.</li></ul>"
PLG_SYSTEM_JOOA11Y_LINK_HYPERLINKED_IMAGE_ARIA_HIDDEN="Pautan di sekeliling imej mempunyai <span class=\"jooa11y-kbd\">aria-hidden=&quot;true&quot;</span> tetapi masih boleh difokuskan melalui papan kekunci. Jika anda berniat menyembunyikan pautan berlebihan atau pendua, tambah <span class=\"jooa11y-kbd\">tabindex=&quot;-1&quot;</span> juga."
PLG_SYSTEM_JOOA11Y_LINK_IDENTICAL_NAME="Pautan mempunyai teks yang sama dengan pautan lain, walaupun ia menghala ke halaman berbeza. Berbilang pautan dengan teks yang sama boleh mengelirukan orang yang menggunakan pembaca skrin."
PLG_SYSTEM_JOOA11Y_LINK_IDENTICAL_NAME_TIP="Pertimbangkan untuk menjadikan pautan berikut lebih deskriptif untuk membantu membezakannya daripada pautan lain: <strong>%(linkText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_BAD_ALT_MESSAGE="Sambungan fail dalam teks alt ditemui. Pastikan teks alt menerangkan destinasi pautan, bukan penerangan literal imej. Buang: <strong>%(error)</strong>."
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_BAD_ALT_MESSAGE_INFO="Teks alt untuk imej ini ialah: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_LINK_ALT_TEXT_MESSAGE="Pautan imej mengandungi teks alt, walau bagaimanapun sila pastikan teks alt menerangkan halaman destinasi. <strong>Pertimbangkan untuk menggunakan tajuk halaman yang dipautkan sebagai teks alt.</strong> Adakah teks alt menerangkan ke mana pautan membawa anda?"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_LINK_ALT_TEXT_MESSAGE_INFO="Teks alt: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_LINK_NULL_ALT_NO_TEXT_MESSAGE="Imej dalam pautan ditandakan sebagai hiasan dan tiada teks pautan. Sila tambah teks alt pada imej yang menerangkan destinasi pautan."
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_PLACEHOLDER_ALT_MESSAGE="Teks alt pemegang tempat atau tidak bermakna dalam imej berpaut ditemui. Pastikan teks alt menerangkan destinasi pautan, bukan penerangan literal imej. Gantikan teks alt berikut: <strong>%(altText)</strong>."
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_SUS_ALT_MESSAGE="Teknologi bantuan sudah menunjukkan bahawa ini ialah imej, jadi &quot;<strong>%(error)</strong>&quot; atau &quot;%(error) of&quot; mungkin berlebihan. Pastikan teks alt menerangkan destinasi pautan, bukan penerangan literal imej."
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_SUS_ALT_MESSAGE_INFO="Teks alt untuk imej ini ialah: <strong>%(altText)</strong>."
PLG_SYSTEM_JOOA11Y_LINK_LABEL="Label deskriptif untuk pautan ini ialah: <strong>%(linkText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_LINK_HAS_ALT_MESSAGE="Imej ditandakan sebagai hiasan, walau bagaimanapun pautan menggunakan teks sekeliling sebagai label deskriptif."
PLG_SYSTEM_JOOA11Y_LINK_PASS_ALT="Teks alt untuk imej ini ialah: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_STOPWORD="Teks pautan mungkin tidak cukup deskriptif di luar konteks: <strong>%(error)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_STOPWORD_TIP="<strong>Petua!</strong> Teks pautan harus sentiasa jelas, unik, dan bermakna. Elakkan perkataan biasa seperti \"klik di sini\"; atau \"ketahui lebih lanjut\"."
PLG_SYSTEM_JOOA11Y_LINK_URL="URL yang lebih panjang dan kurang jelas digunakan sebagai teks pautan mungkin sukar didengari dengan teknologi bantuan. Dalam kebanyakan kes, adalah lebih baik menggunakan teks yang boleh dibaca manusia berbanding URL. URL pendek (seperti laman utama) tidak mengapa."
PLG_SYSTEM_JOOA11Y_LINK_URL_TIP="<strong>Petua!</strong> Teks pautan harus sentiasa jelas, unik, dan bermakna supaya ia boleh difahami di luar konteks."
PLG_SYSTEM_JOOA11Y_LINKS_ADVANCED="Pautan (Lanjutan)"
PLG_SYSTEM_JOOA11Y_MAIN_TOGGLE_LABEL="Semak Kebolehcapaian"
PLG_SYSTEM_JOOA11Y_MISSING_ALT_LINK_BUT_HAS_TEXT_MESSAGE="Imej digunakan sebagai pautan dengan teks sekeliling, walau bagaimanapun atribut alt harus ditandakan sebagai hiasan."
PLG_SYSTEM_JOOA11Y_MISSING_ALT_LINK_MESSAGE="Imej digunakan sebagai pautan tetapi tiada teks alt! Sila pastikan teks alt menerangkan ke mana pautan membawa anda."
