PLG_SYSTEM_JOOA11Y="Sistem - Penyemak Kebolehcapaian Joomla"
PLG_SYSTEM_JOOA11Y_FIELD_CHECK_ROOT="Kawasan Sasaran untuk Diperiksa"
PLG_SYSTEM_JOOA11Y_FIELD_CHECK_ROOT_DESC="Masukkan pemilih tunggal untuk menyasarkan kawasan tertentu tapak web anda. Tetapan lalai ialah tanda tempat <strong>main</strong>. Alternatif kepada tanda tempat ialah kelas, elemen atau peranan ARIA (cth. #main-content, .main, [role='main']). Masukkan <strong>body</strong> untuk menyemak keseluruhan halaman."
PLG_SYSTEM_JOOA11Y_FIELD_CHECKS="Matikan Cek"
PLG_SYSTEM_JOOA11Y_FIELD_CHECKS_DESC="Matikan semakan tertentu mengikut nama kunci. Ketahui cara untuk <a href=\"https://sa11y.netlify.app/plugins/joomla/#turn-off-checks\" target=\"_blank\" rel=\"noopener noreferrer\">Turn Off Checks__PH9."
PLG_SYSTEM_JOOA11Y_FIELD_CONTAINER_IGNORE="Abaikan Kawasan"
PLG_SYSTEM_JOOA11Y_FIELD_CONTAINER_IGNORE_DESC="Abaikan kawasan tertentu dalam Bekas Kandungan. Gunakan koma untuk memisahkan kelas atau elemen (cth #ignore, .ignore)."
PLG_SYSTEM_JOOA11Y_FIELD_EXTRA_PROPS="Harta Tambahan"
PLG_SYSTEM_JOOA11Y_FIELD_EXTRA_PROPS_DESC="Lulus hartanah tambahan untuk disesuaikan. Ketahui cara untuk menambah <a href=\"https://sa11y.netlify.app/plugins/joomla/#extra-properties\" target=\"_blank\" rel=\"noopener noreferrer\">Extra Properties>/Properties>"
PLG_SYSTEM_JOOA11Y_FIELD_READABILITY_ROOT="Kawasan Sasaran Kebolehbacaan"
PLG_SYSTEM_JOOA11Y_FIELD_READABILITY_ROOT_DESC="Tanda tempat pada halaman yang akan disemak untuk kebolehbacaan. Tetapan lalai ialah tanda tempat <strong>main</strong>."
PLG_SYSTEM_JOOA11Y_FIELD_SHOW_ALWAYS="Tunjukkan Sentiasa"
PLG_SYSTEM_JOOA11Y_FIELD_SHOW_ALWAYS_DESC="Muatkan penyemak kebolehaksesan pada semua halaman. Ini berguna semasa membangunkan tapak web, tetapi tidak boleh dibiarkan apabila tapak web disiarkan."
PLG_SYSTEM_JOOA11Y_KEY="kunci"
PLG_SYSTEM_JOOA11Y_VALUE="Nilai"
PLG_SYSTEM_JOOA11Y_XML_DESCRIPTION="Pemeriksa Kebolehcapaian Joomla secara visual menyerlahkan isu kebolehcapaian dan kebolehgunaan biasa. Ditujukan kepada pengarang kandungan, pemalam mengenal pasti ralat atau amaran dan memberikan panduan tentang cara membetulkannya. Sila ambil perhatian bahawa pemalam ini tidak menawarkan analisis menyeluruh tapak web anda, dan ia juga tidak memastikan kebolehcapaian tapak web anda secara automatik. Adalah penting untuk memilih templat yang sememangnya boleh diakses untuk memastikan tapak anda memenuhi piawaian kebolehaksesan."

