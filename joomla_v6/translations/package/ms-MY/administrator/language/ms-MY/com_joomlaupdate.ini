COM_JOOMLAUPDATE_CONFIG_AUTOMATED_UPDATES_DESC="Kemas kini automatik hanya tersedia untuk tapak yang boleh diakses secara umum di Internet. Jika tapak anda berada di belakang tembok api atau tidak boleh diakses secara umum, seperti persekitaran ujian setempat, anda perlu mengemas kini secara manual.<br><br><strong>Sila ambil perhatian:</strong> yang membolehkan Kemas Kini Automatik akan mendaftarkan tapak anda di perkhidmatan masing-masing yang disediakan oleh Joomla! project.<br>Pendaftaran membenarkan projek Joomla mengakses maklumat tentang tapak dan persekitaran pelayan anda, khususnya Url Tapak, versi PHP, jenis dan versi Pangkalan Data, versi CMS dan jenis dan versi OS Pelayan.<br>Maklumat ini hanya digunakan untuk menambah baik perkhidmatan."
