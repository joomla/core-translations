COM_JOOMLAUPDATE_ERRORMODAL_BODY_FORBIDDEN="<p>Joomla tidak boleh berkomunikasi dengan fail <code>administrator/components/com_joomlaupdate/extract.php</code> yang melaksanakan kemas kini. Ini biasanya berlaku kerana salah satu daripada sebab berikut:</p><ul><li>Fail konfigurasi pelayan dalam akar tapak anda, seperti <code>.htaccess</code> atau <config.php__code> atau <kod web> ke fail ini.</li><li>Konfigurasi pelayan anda menghalang akses kepada fail ini.</li><li>Pemilikan dan kebenaran fail ini tidak membenarkan pelayan anda mengakses fail ini.</li>__PH30 anda berada di belakang tapak atau baki CD_PH29____PH31 konfigurasinya tidak membenarkan akses kepada fail ini atau menyekat penghantaran arahan kepadanya.</li><li>Walaupun fail itu boleh diakses, menghantar arahan kepadanya disekat oleh perlindungan pelayan anda seperti mod_security2.</li></PH4>/ulPH4__0 pasti anda tidak pasti hos anda.</p>"
COM_JOOMLAUPDATE_ERRORMODAL_BODY_INVALIDLOGIN="<p>Kemas Kini Joomla tidak boleh berkomunikasi dengan betul dengan <code>administrator/components/com_joomlaupdate/extract.php</code> yang melaksanakan kemas kini. Ini biasanya berlaku kerana salah satu daripada sebab berikut:</p><ul><li>Fail <code>administrator/components/com_joomlaupdate/update.php</code>, yang mengandungi arahan untuk menggunakan kemas kini e.g tidak boleh dibuat kerana masalah keizinan.</li><li>Fail yang dinyatakan di atas tidak boleh dibaca oleh skrip <code>extract.php</code> kerana masalah kebenaran.</li><Your sedang merosakkan rangkaian dengan pelayar yang rosak atau__Anda sedang rosak PH27 setiap permintaan untuk <code>extract.php</code> atas sebab keselamatan</li></ul><p>Sila cuba gunakan penyemak imbas lain, tanpa sebarang sambungan penyemak imbas dipasang, sebaik-baiknya pada komputer lain yang disambungkan ke Internet. Jika ralat berterusan, anda mungkin mahu menghubungi hos anda.</p>"
