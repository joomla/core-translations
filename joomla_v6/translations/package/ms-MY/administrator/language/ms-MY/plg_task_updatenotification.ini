PLG_TASK_UPDATENOTIFICATION="Tugas - Pemberitahuan Kemas Kini Joomla!"
PLG_TASK_UPDATENOTIFICATION_EMAIL_DESC="Senarai alamat e-mel yang dipisahkan koma yang akan menerima e-mel pemberitahuan kemas kini. Alamat dalam senarai MESTI milik pengguna sedia ada laman anda yang mempunyai keistimewaan Pengguna Super. Jika tiada satu pun e-mel yang disenaraikan milik Pengguna Super, atau jika dibiarkan kosong, semua Pengguna Super laman ini akan menerima e-mel pemberitahuan kemas kini."
PLG_TASK_UPDATENOTIFICATION_EMAIL_LBL="E-mel Pengguna Super"
PLG_TASK_UPDATENOTIFICATION_SEND_TITLE="Pemberitahuan Kemas Kini Joomla!"
PLG_TASK_UPDATENOTIFICATION_SEND_DESC="Tugas ini menyemak secara berkala ketersediaan versi Joomla! baharu. Apabila ditemui, ia akan menghantar e-mel kepada anda, mengingatkan anda untuk mengemaskini. Anda boleh menyesuaikan e-mel di <a href=\"index.php?option=com_mails&view=templates&filter[extension]=plg_task_updatenotification\">Sistem &rarr; Templat Mel.</a>"
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_DESC="Pilih bahasa untuk e-mel pemberitahuan kemas kini. Tetapkan ke Auto untuk menghantarnya dalam bahasa laman pada ketika itu."
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_LBL="Bahasa E-mel"
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_NONE="Auto"
PLG_TASK_UPDATENOTIFICATION_EMAIL_BODY="E-mel ini BUKAN dihantar oleh projek Joomla!. Ia dihantar secara automatik oleh laman anda sendiri,\n{SITENAME} - {URL} \n\n================================================================================\nMAKLUMAT KEMAS KINI\n================================================================================\n\nLaman anda telah menemui bahawa terdapat versi Joomla! yang dikemaskini tersedia.\n\nVersi Joomla! yang dipasang sekarang: {CURVERSION}\nVersi Joomla! yang tersedia untuk dipasang: {NEWVERSION}\n\nE-mel ini dihantar kepada anda oleh laman anda untuk mengingatkan anda tentang perkara ini.\nProjek Joomla! tidak akan menghubungi anda secara langsung tentang kemas kini Joomla! yang tersedia di laman anda.\n\n================================================================================\nARAHAN KEMAS KINI\n================================================================================\n\nUntuk memasang kemas kini pada {SITENAME} sila pilih pautan berikut. (Jika URL bukan pautan, salin & tampal ke pelayar anda).\n\nPautan kemas kini: {LINK}\n\nBerita Keluaran boleh didapati di sini: {RELEASENEWS}\n\n================================================================================\nMENGAPA SAYA MENERIMA E-MEL INI?\n================================================================================\n\nE-mel ini telah dihantar secara automatik oleh pemalam yang disediakan oleh Joomla!, perisian yang menjalankan laman anda.\nPemalam ini mencari versi Joomla! yang dikemaskini dan menghantar pemberitahuan e-mel kepada pentadbirnya.\nAnda akan menerima beberapa e-mel yang serupa dari laman anda sehingga anda sama ada mengemaskini perisian atau melumpuhkan e-mel ini.\n\nUntuk melumpuhkan e-mel ini, sila nyahterbitkan pemalam 'Tugas - Pemberitahuan Kemas Kini Joomla!' dalam Pengurus Pemalam di laman anda.\n\nJika anda tidak memahami apa itu Joomla! dan apa yang perlu anda lakukan, sila jangan hubungi projek Joomla!.\nMereka TIDAK menghantar e-mel ini kepada anda dan mereka tidak dapat membantu anda. Sebaliknya, sila hubungi orang yang membina atau mengurus laman anda.\n\nJika anda adalah orang yang membina atau mengurus laman web anda, sila ambil perhatian bahawa pemalam ini mungkin telah diaktifkan secara automatik apabila anda memasang atau mengemaskini Joomla! di laman anda.\n\n================================================================================\nSIAPA YANG MENGHANTAR E-MEL INI KEPADA SAYA?\n================================================================================\n\nE-mel ini dihantar kepada anda oleh laman anda sendiri, {SITENAME}"
PLG_TASK_UPDATENOTIFICATION_EMAIL_SUBJECT="Kemas Kini Joomla! tersedia untuk {SITENAME} – {URL}"
PLG_TASK_UPDATENOTIFICATION_MAIL_MAIL_DESC="Dihantar kepada pentadbir laman apabila pemalam tugas &quot;Pemberitahuan Kemas Kini Joomla!&quot; mengesan kemas kini."
