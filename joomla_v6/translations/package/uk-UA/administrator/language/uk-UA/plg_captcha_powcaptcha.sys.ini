PLG_CAPTCHA_POWCAPTCHA="CAPTCHA. Proof of Work"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Цей плагін CAPTCHA пропонує браузеру користувача математичне завдання, яке браузер може вирішити автоматично. Його мета — не довести, що користувач є людиною, а підтвердити, що він готовий витратити необхідний час на вирішення завдання. Наразі працює на основі бібліотеки Altcha (altcha.org)."

