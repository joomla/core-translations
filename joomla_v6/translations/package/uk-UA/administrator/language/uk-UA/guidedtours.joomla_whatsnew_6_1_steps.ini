COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_STEP_0_DESCRIPTION="<h3>Повні примітки до випуску Joomla 6.1</h3><p><a title=\"Повні примітки до випуску\" href=\"https://www.joomla.org/announcements.html\" target=\"_blank\" rel=\"noopener noreferrer\">Переглянути повні примітки до випуску на joomla.org</a></p><hr><h3>Допомога та інформація</h3><p>Тут ви знайдете багато корисних ресурсів, а також додаткові посилання на інші ресурси, документацію, підтримку та інформацію про те, як долучитися до розвитку Joomla.</p>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_STEP_0_TITLE="Додаткова інформація та допомога"

