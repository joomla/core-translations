COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Ласкаво просимо до Joomla 6.1!</h1><p>Joomla 6.1 представляє ключові покращення, які роблять створення сайтів простішим, безпечнішим та гнучкішим. Цей тур дає вам основну інформацію одним поглядом.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Захист від спаму ПОВЕРНУВСЯ з Proof-of-Work CAPTCHA</h2><p>Без необхідності створення акаунта чи використання API, з повагою до приватності та доступністю — цей captcha непомітно вирішує математичні головоломки у фоновому режимі, невидимий для відвідувачів.</p><p>Щоб увімкнути, перейдіть до <em>Розширення</em> → <em>Плагіни</em>, знайдіть <strong>captcha</strong>, увімкніть і встановіть як типовий у Глобальних налаштуваннях.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Captcha показує стани verifying і verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Графічне представлення базового робочого процесу\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Конвеєр контенту на одному екрані з Візуальним редактором робочих процесів</h2><p>Керуйте робочим процесом контенту легше завдяки новій інтерактивній діаграмі, яка дозволяє бачити весь процес публікації.</p><p>Увімкніть Робочі процеси в <em>Менеджері матеріалів</em> → <em>Робочі процеси</em> і шукайте кнопку графіка.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Три нові опції медіа-полів: Аудіо, Відео та Документи</h2><p>Під час створення користувацьких полів для контенту ви тепер можете дозволити авторам контенту додавати будь-який тип медіа, а не лише зображення.</p><p>Медіафайли відображаються як HTML5 <code>&lt;audio&gt;</code>, <code>&lt;video&gt;</code> або посилання на документи (PDF, таблиці...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"Три опції медіа-полів: аудіо, відео та документ\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Розумніші модулі з версійністю та багатосторінковими зв’язками</h2><p>Joomla вже давно має історію версій для матеріалів. Ця можливість тепер поширена й на модулі.<br>Якщо ви ведете багатомовний сайт, тепер можете пов’язувати екземпляри модулів між різними мовами — так само, як пов’язуєте матеріали.</p><h2>Інші варті уваги покращення</h2><ul class=\"mb-3\"><li>Підтримка тегу <strong>&lt;abbr&gt;</strong> (абревіатура) у візуальному редакторі TinyMCE — семантично правильно та покращує доступність (шукайте нову кнопку Abbreviation на панелі інструментів TinyMCE під час редагування контенту).</li><li>Покращення UX статусу мовних перевизначень та швидкого створення відсутніх перевизначень (індикатор статусу, легке редагування перевизначень).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Що нового в Joomla 6.1!"

