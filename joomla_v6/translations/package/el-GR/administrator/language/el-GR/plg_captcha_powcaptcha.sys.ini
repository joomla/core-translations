PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Απόδειξη εργασίας"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Αυτό το πρόσθετο CAPTCHA παρουσιάζει στον περιηγητή του χρήστη ένα μαθηματικό πρόβλημα, το οποίο ο περιηγητής μπορεί να λύσει αυτόματα. Σκοπός του δεν είναι να αποδείξει ότι ο χρήστης είναι άνθρωπος, αλλά να αποδείξει ότι ο χρήστης είναι πρόθυμος να αφιερώσει τον απαραίτητο χρόνο για να λύσει το πρόβλημα. Βασίζεται επί του παρόντος στη βιβλιοθήκη Altcha (altcha.org)."

