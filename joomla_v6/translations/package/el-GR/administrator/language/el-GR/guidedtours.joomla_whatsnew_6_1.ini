COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Καλώς ορίσατε στο Joomla 6.1!</h1><p>Το Joomla 6.1 εισάγει βασικές βελτιώσεις που κάνουν τη δημιουργία ιστοσελίδων ευκολότερη, ασφαλέστερη και πιο ευέλικτη. Αυτή η περιήγηση σας δίνει τα βασικά στοιχεία με μια ματιά</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Η προστασία από Spam ΕΠΕΣΤΡΕΨΕ με το Proof-of-Work CAPTCHA</h2><p>Χωρίς να απαιτείται λογαριασμός ή API, φιλικό προς την ιδιωτικότητα και προσβάσιμο, αυτό το captcha λύνει αθόρυβα μαθηματικούς γρίφους στο παρασκήνιο, αόρατο για τους επισκέπτες.</p><p>Για να το ενεργοποιήσετε, μεταβείτε στο <em>Επεκτάσεις</em> -&gt; <em>Πρόσθετα</em>, αναζητήστε για <strong>captcha</strong>, ενεργοποιήστε το και ορίστε το ως προεπιλογή στις Γενικές Ρυθμίσεις.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Η Ροή Περιεχομένου με μια ματιά με τον Οπτικό επεξεργαστή ροής εργασιών</h2><p>Διαχειριστείτε τη ροή εργασιών του περιεχομένου σας πιο εύκολα με το νέο διαδραστικό διάγραμμα ροής εργασιών που σας επιτρέπει να βλέπετε ολόκληρη τη διαδικασία δημοσίευσης.</p><p>Ενεργοποιήστε τις Ροές Εργασιών στο <em>Διαχείριση Άρθρων</em> -&gt; <em>Ροές Εργασιών</em> και αναζητήστε το κουμπί του γραφήματος.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Τρεις Νέες Επιλογές Προσαρμοσμένων Πεδίων Πολυμέσων: Ήχος, Βίντεο &amp; Έγγραφα</h2><p>Όταν δημιουργείτε Προσαρμοσμένα Πεδία για το περιεχόμενό σας, μπορείτε πλέον να επιτρέπετε στους δημιουργούς περιεχομένου να συμπεριλαμβάνουν οποιονδήποτε τύπο πολυμέσου, όχι μόνο εικόνες.</p><p>Τα πολυμέσα αποδίδονται ως HTML5 &lt;audio&gt;, &lt;video&gt;, ή σύνδεσμοι εγγράφων (PDF, υπολογιστικά φύλλα...)</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Εξυπνότερα Ένθετα με διαχείριση εκδόσεων και πολυγλωσσικές συσχετίσεις</h2><p>Το Joomla διαθέτει εδώ και καιρό ιστορικό εκδόσεων για τα άρθρα. Αυτή η ίδια δυνατότητα επεκτείνεται τώρα και στα ένθετα.<br>Αν διαχειρίζεστε μια πολυγλωσσική ιστοσελίδα, μπορείτε πλέον να συσχετίζετε αντίγραφα ενθέτων μεταξύ διαφορετικών γλωσσών, με τον ίδιο τρόπο που συσχετίζετε άρθρα μεταξύ γλωσσών.</p><h2>Άλλες Βελτιώσεις που Αξίζει να Σημειωθούν</h2><ul class=\"mb-3\"><li>Υποστήριξη συντομογραφιών <strong>&lt;abbr&gt;</strong> στον εμπλουτισμένο επεξεργαστή κειμένου TinyMCE, σημασιολογικά ορθή, βελτιώνοντας την προσβασιμότητα (αναζητήστε το νέο κουμπί συντομογραφίας στη γραμμή εργαλείων του TinyMCE κατά την επεξεργασία περιεχομένου).</li><li>Κατάσταση αναπροσδιορισμών της γλώσσας &amp; βελτιώσεις στο UX για γρήγορη δημιουργία αναπροσδιορισμών που λείπουν (ένδειξη κατάστασης, εύκολη επεξεργασία αναπροσδιορισμών).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Τι νέο υπάρχει στο Joomla 6.1!"

