PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Preuve de travail"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Ce plugin CAPTCHA présente une tâche mathématique au navigateur de l'utilisateur que le navigateur peut résoudre automatiquement. Ce n'est pas censé prouver que l'utilisateur est humain, mais pour prouver que l'utilisateur est prêt à investir le temps nécessaire pour résoudre la tâche. Actuellement basé sur la bibliothèque Altcha (altcha.org)."

