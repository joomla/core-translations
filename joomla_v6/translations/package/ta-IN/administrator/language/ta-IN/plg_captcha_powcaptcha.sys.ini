PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Proof of Work (வேலைக்கான ஆதாரம்)"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="இந்த CAPTCHA சொருகி (plugin), பயனாளரின் உலாவியிடம் ஒரு கணிதச் சிக்கலை முன்வைக்கிறது; அந்தச் சிக்கலை உலாவியாலேயே தானாகத் தீர்க்க இயலும். பயனாளர் மனிதர்தான் என்பதை நிரூபிப்பது இதன் நோக்கமன்று; மாறாக, அந்தச் சிக்கலைத் தீர்ப்பதற்குத் தேவையான நேரத்தைச் செலவிடப் பயனாளர் தயாராக இருக்கிறார் என்பதை நிரூபிப்பதே இதன் நோக்கமாகும். தற்போது இது Altcha (altcha.org) மென்பொருளகத்தை அடிப்படையாகக் கொண்டு செயல்படுகிறது."

