PLG_CAPTCHA_POWCAPTCHA_EXPIRATION_1MIN="1 நிமிடம்"
PLG_CAPTCHA_POWCAPTCHA_EXPIRATION_5MIN="5 நிமிடங்கள்"
PLG_CAPTCHA_POWCAPTCHA_EXPIRATION_10MIN="10 நிமிடங்கள்"
PLG_CAPTCHA_POWCAPTCHA_EXPIRATION_1HOUR="1 மணிநேரம்"
PLG_CAPTCHA_POWCAPTCHA_MAXNUMBER_DESC="தீர்க்கப்பட வேண்டிய பணியில் பயன்படுத்தப்படும் அதிகபட்ச எண்ணை இது வரையறுக்கிறது. இந்த எண் எவ்வளவு அதிகமாக இருக்கிறதோ, அந்தப் பணியைத் தீர்ப்பது அவ்வளவு கடினமாக இருக்கும்."
