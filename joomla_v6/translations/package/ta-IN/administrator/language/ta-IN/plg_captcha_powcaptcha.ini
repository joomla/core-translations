PLG_CAPTCHA_POWCAPTCHA_DIFFICULTY_DESC="CAPTCHA எவ்வளவு கடினமாகிறதோ, அதைத் தீர்க்க அவ்வளவு அதிக கணினி நேரம் தேவைப்படும்."
PLG_CAPTCHA_POWCAPTCHA_DIFFICULTY_LABEL="கடினத்துவம்"
PLG_CAPTCHA_POWCAPTCHA_DIFFICULTY_CUSTOM="தனிப்பயன்"
PLG_CAPTCHA_POWCAPTCHA_DIFFICULTY_EASY="எளிதானது"
