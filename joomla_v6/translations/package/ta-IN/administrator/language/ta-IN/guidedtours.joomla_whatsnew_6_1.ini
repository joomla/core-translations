COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Joomla! 6.1 தங்களை வரவேற்கிறது!</h1><p>Joomla 6.1, இணையதள உருவாக்கத்தை எளிதாகவும், பாதுகாப்பாகவும், மேலும் நெகிழ்வுத்தன்மையுடனும் ஆக்கும் முக்கிய மேம்பாடுகளை அறிமுகப்படுத்துகிறது. இந்த வழிகாட்டி தங்களுக்கு அத்தியாவசியமானவற்றை ஒரே பார்வையில் வழங்குகிறது.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Spam பாதுகாப்பு, Proof-of-Work CAPTCHA-வுடன் மீண்டும் வந்துவிட்டது.</h2><p>சேவைக்கணக்கோ அல்லது API-யோ தேவையில்லாத, தனியுரிமைக்கு உகந்த மற்றும் எளிதில் அணுகக்கூடிய இந்த Captcha, பார்வையாளர்களுக்குத் தெரியாத வகையில் பின்னணியில் கணிதப் புதிர்களை அமைதியாகத் தீர்க்கிறது.</p><p>இதனைச் செயல்படுத்த, <em>நீட்சிகள்</em> -&gt; <em>சொருகிகள்</em> பகுதிக்குச் சென்று, <strong>captcha</strong> எனத் தேடி, அதனை இயலுமைப்படுத்தி, அகிலத்தள உள்ளமைவு-இல் இயல்புநிலையாக (default) அமைக்கவும்.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Captcha 'உறுதிப்படுத்தப்படுகிறது' மற்றும் 'உறுதிப்படுத்தப்பட்டது' எனக் காட்டுகிறது.\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"அடிப்படைப் பணித்தொடரின் வரைபட விளக்கம்\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">காட்சிப் பணித்தொடர் தொகுப்பி (Visual Workflow Editor) உடன் உள்ளடக்கப் பணிக்குழாயின் (Content Pipeline) ஒரு கண்ணோட்டம்</h2><p>முழு வெளியீட்டுச் செயல்முறையையும் காண உதவும், புதிய ஊடாடும் பணித்தொடர் வரைபடத்தின் மூலம் தங்கள் உள்ளடக்கப் பணித்தொடரை இன்னும் எளிதாக நிர்வகியுங்கள்.</p><p><em>கட்டுரை</em> -&gt; <em>பணித்தொடர்கள்</em> என்பதில் பணித்தொடர்களை இயலுமைப்படுத்தி, வரைபடம் பொத்தானை எதிர் நோக்கவும</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">மூன்று புதிய ஊடகத் தனிப்பயன் புல விருப்புகள்: கேட்பொலி, காணொளி &amp; ஆவணங்கள்</h2><p>தங்கள் உள்ளடக்கத்திற்கான தனிப்பயன் புலங்களை உருவாக்கும்போது, உள்ளடக்கத்தை உருவாக்குபவர்கள் படங்கள் மட்டுமல்லாமல், எந்த வகையான ஊடகங்களையும் சேர்க்கும் வசதியை தற்போது தாங்கள் வழங்கலாம்.</p><p>ஊடகங்கள் HTML5 &lt;audio&gt;, &lt;video&gt;, அல்லது ஆவண இணைப்புகளாக (PDF, spreadsheets...) வழங்கப்படுகின்றன.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"மூன்று ஊடகப் புல விருப்புகள: கேட்பொலி, காணொளி மற்றும் ஆவணம்\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">பதிப்பு மேலாண்மை மற்றும் பன்மொழி பிணைப்புகளுடன் கூடிய சாமர்த்திய கூறகங்கள்</h2><p>Joomla-வில் கட்டுரைகளுக்கான பதிப்பு வரலாறு நீண்ட காலமாக இருந்து வருகிறது. இதே திறன் தற்போது கூறகங்களுக்கும் விரிவுபடுத்தப்பட்டுள்ளது.<br>தாங்கள் ஒரு பன்மொழி இணையதளத்தை நடத்தி வருகிறீர்கள் என்றால், கட்டுரைகளை வெவ்வேறு மொழிகளுடன் பிணைப்பது (associate) போலவே, தற்போது கூறக குறிப்பீடகளையும் (module instances) வெவ்வேறு மொழிகளுடன் பிணைக்க முடியும்.</p><h2>குறிப்பிடத்தக்க பிற மேம்பாடுகள்</h2><ul class=\"mb-3\"><li>TinyMCE செழுமை உரைத் தொகுப்பியில் சுருக்கக்குறியீடு <strong>&lt;abbr&gt;</strong> ஆதரவு, சரியான பொருளுடன் அணுகல்தன்மையை மேம்படுத்துகிறது (உள்ளடக்கத்தைத் திருத்தும்போது TinyMCE கருவிப்பட்டையில் உள்ள புதிய சுருக்கக்குறியீடு பொத்தானைத் தேடவும்).</li><li>மொழி மீறல் நிலை &amp; விடுபட்ட மீறல்களை விரைவாக உருவாக்கும் வசதி சார்ந்த பயனாளர் அனுபவ மேம்பாடுகள் (நிலை காட்டி, மீறல்களை எளிதாகத் தொகுக்கும் வசதி).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Joomla! 6.1 இல் என்ன புதியது!"

