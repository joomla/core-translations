COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Joomla 6.1’e hoş geldiniz!</h1><p>Joomla 6.1, site oluşturmayı daha kolay, daha güvenli ve daha esnek hâle getiren önemli iyileştirmeler sunuyor. Bu tur, temel yenilikleri tek bakışta görmenizi sağlar.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">İspat-ı Çalışma CAPTCHA ile Spam Koruması GERİ DÖNDÜ</h2><p>Hesap veya API gerektirmez, gizlilik dostu ve erişilebilirdir; bu captcha, ziyaretçilere görünmeden arka planda matematik bulmacalarını sessizce çözer.</p><p>Etkinleştirmek için <em>Uzantılar</em> -&gt; <em>Eklentiler</em> bölümüne gidin, <strong>captcha</strong> ifadesini aratın, eklentiyi etkinleştirin ve Genel Yapılandırma’da varsayılan olarak ayarlayın.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Captcha doğrulanıyor ve doğrulandı durumlarını gösteriyor\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Temel iş akışının grafiksel gösterimi\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Görsel İş Akışı Düzenleyicisi ile İçerik Sürecine Tek Bakışta Hâkim Olun</h2><p>Tüm yayımlama sürecini görmenizi sağlayan yeni etkileşimli iş akışı diyagramı ile içerik iş akışınızı daha kolay yönetin.</p><p><em>Makale Yöneticisi</em> -&gt; <em>İş Akışları</em> bölümünde İş Akışlarını etkinleştirin ve grafik düğmesini arayın.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Üç Yeni Ortam Özel Alan Seçeneği: Ses, Video ve Belgeler</h2><p>İçeriğiniz için Özel Alanlar oluştururken artık içerik üreticilerinin yalnızca görselleri değil, her tür ortamı eklemesine izin verebilirsiniz.</p><p>Bu ortamlar HTML5 <audio>, <video> veya belge bağlantıları (PDF, hesap tabloları...) olarak işlenir.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"Üç ortam alanı seçeneği: ses, video ve belge\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Sürümleme ve Çok Dilli İlişkilendirmeler ile Daha Akıllı Modüller</h2><p>Joomla’da uzun süredir makaleler için sürüm geçmişi bulunuyordu. Artık bu yetenek modüller için de geçerli.<br>Çok dilli bir web sitesi işletiyorsanız, artık farklı dillerdeki modül örneklerini de, makaleleri farklı diller arasında ilişkilendirdiğiniz şekilde ilişkilendirebilirsiniz.</p><h2>Dikkate Değer Diğer İyileştirmeler</h2><ul class=\"mb-3\"><li>TinyMCE zengin metin düzenleyicisinde <strong>&lt;abbr&gt;</strong> kısaltma desteği; anlamsal olarak doğrudur ve erişilebilirliği geliştirir (içerik düzenlerken TinyMCE araç çubuğundaki yeni Kısaltma düğmesine bakın).</li><li>Dil geçersiz kılma durumu ve eksik geçersiz kılmaları hızlı oluşturma kullanıcı deneyimi iyileştirmeleri (durum göstergesi, geçersiz kılmaları kolayca düzenleme).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Joomla 6.1’de Neler Yeni!"

