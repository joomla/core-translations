COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Bienvenue dans Joomla 6.1 !</h1><p>Joomla 6.1 apporte des améliorations majeures qui rendent la création de sites plus simple, plus sûre et plus flexible. Cette présentation vous donne un aperçu des points essentiels.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">La protection anti-spam est de retour avec le CAPTCHA Proof-of-Work.</h2><p>Aucun compte ni API requis, respectueux de la vie privée et accessible, ce captcha résout discrètement des problèmes mathématiques en arrière-plan, à l'insu des visiteurs.</p><p>Pour l'activer, accédez à <em>Extensions</em> -&gt; <em>Plugins</em>, recherchez <strong>captcha</strong>, activez et définissez-le comme valeur par défaut dans la configuration générale de Joomla.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"Le captcha indique 'en cours de vérification' et 'vérifié'\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Représentation graphique du déroulement général du processus\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Aperçu du flux de contenu avec l'éditeur du flux de travail</h2><p>Gérez plus facilement votre flux de travail de contenu grâce au nouveau diagramme interactif qui vous permet de visualiser l'ensemble du processus de publication.</p><p>Activer les flux de travail dans <em>Gestionnaire d'articles</em> -&gt; <em>Flux de travail</em> et cherchez le bouton « Graphique ».</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Trois nouvelles options de champs personnalisés pour les médias : Audio, Video &amp; Documents</h2><p>Lorsque vous créez des champs personnalisés pour votre contenu, vous pouvez désormais permettre aux créateurs de contenu d'inclure tout type de média, et pas seulement des images.</p><p>Les médias s'affichent sous forme de balises HTML5 &lt;audio&gt;, &lt;video&gt; ou de liens vers des documents (PDF, feuilles de calcul...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"Les trois types de fichiers : audio, vidéo et document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Des modules plus intelligents avec gestion des versions et associations multilingues</h2><p>Joomla propose depuis longtemps un historique des versions pour les articles. Cette fonctionnalité est désormais étendue aux modules.<br>Si vous gérez un site web multilingue, vous pouvez désormais associer des instances de modules entre différentes langues, de la même manière que vous pouvez associer des articles entre différentes langues.</p><h2>Autres améliorations dignes d'intérêt</h2><ul class=\"mb-3\"><li>Prise en charge des abréviations <strong>&lt;abbr&gt;</strong> dans l'éditeur de contenu TinyMCE : une fonctionnalité sémantiquement correcte qui améliore l'accessibilité (recherchez le nouveau bouton « Abréviation » dans la barre d'outils de TinyMCE lorsque vous modifiez du contenu).</li><li>Statut des substitutions de langue &amp; améliorations de l'expérience utilisateur pour la création rapide de substitutions manquantes (indicateur de statut, modification facile des substitutions).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Les nouveautés de Joomla 6.1 !"

