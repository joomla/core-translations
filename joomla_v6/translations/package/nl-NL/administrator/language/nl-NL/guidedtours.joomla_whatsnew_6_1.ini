COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Welkom bij Joomla 6.1!</h1><p>Joomla 6.1 Introduceert belangrijke verbeteringen die het bouwen van websites makkelijker, veiliger en flexibeler maken. Deze rondleiding geeft je de belangrijkste zaken in één oogopslag.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Spam bescherming is terug met Proof-of-Work CAPTCHA</h2><p>Geen account of API verplicht. Privacy-vriendelijk en toegankelijk lost deze captcha op de achtergrond rekenkundige puzzles op, onzichtbaar voor bezoekers.</p><p>Ga, om te activeren, naar <em>Extensies</em> -&gt; <em>Plugins</em>, zoek naar <strong>captcha</strong>, activeer en stel in als standaard bij de Algemene instellingen.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Content Pipeline in één oogopslag met de Visuele Workflow Editor</h2><p>Beheer je content workflow makkelijker met het nieuwe interactieve workflow diagram dat je toestaat het hele publicatieproces te zien.</p><p>Activeer Workflows in <em>Artikelbeheer</em> -&gt; <em>Workflows</em> en kijk naar de Grafiek knop.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Drie nieuwe Eigen velden opties: Audio, Video &amp; Documenten</h2><p>Als je Eigen velden aanmaakt voor je Inhoud, kun je nu redacteuren elk type medium laten opnemen, niet alleen afbeeldingen.</p><p>De media renderen als HTML5 &lt;audio&gt;, &lt;video&gt;, of document links (PDF, spreadsheets...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Slimmere modules met Versiebeheer en Meertalige koppelingen</h2><p>Joomla had al lang versiebeheer voor artikelen. Dezelfde mogelijkheid is nu uitgebreid met modules.<br>Als je een meertalige website hebt kun je nu module instanties koppelen over verschillende talen, net zoals je artikelen kunt koppelen over verschillende talen.</p><h2>Andere vermeldingswaardige verbeteringen</h2><ul class=\"mb-3\"><li>Afkorting <strong>&lt;abbr&gt;</strong> odersteuning in de TinyMCE rich text editor, semantisch correct en het verbeteren van de toegankelijkheid (kijk voor de nieuwe afkorting knop in de TinyMCE toolbar bij het bewerken van content).</li><li>Taal override status &amp; snel-aanmaken van ontbrekende overrides UX verbeteringen (status indicator, bewerk overrides makkelijk).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Wat is er nieuw in Joomla 6.1!"

