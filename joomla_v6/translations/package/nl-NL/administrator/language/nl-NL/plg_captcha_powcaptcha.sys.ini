PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Bewijs van werk"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Deze CAPTCHA plugin presenteert een wiskundige taak aan de browser van de gebruiker die de browser automatisch kan oplossen. Het is niet de bedoeling om te bewijzen dat de gebruiker menselijk is, maar om te bewijzen dat de gebruiker bereid is de nodige tijd te investeren om de taak op te lossen. Momenteel gebaseerd op de Altcha (altcha.org) bibliotheek."

