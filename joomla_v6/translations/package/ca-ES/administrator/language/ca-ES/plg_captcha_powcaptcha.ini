PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Prova de Treball"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Aquest complement CAPTCHA presenta una tasca matemàtica al navegador de l'usuari que el navegador pot resoldre automàticament. No se suposa que demostri que l'usuari és humà, sinó que està disposat a invertir el temps necessari per resoldre la tasca. Actualment es basa en la biblioteca Altcha (altcha.org)."

