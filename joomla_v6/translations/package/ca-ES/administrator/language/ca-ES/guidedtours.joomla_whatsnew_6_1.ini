COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Benvingut a Joomla 6.1!</h1><p>Joomla 6.1 introdueix millores clau que fan que la creació de llocs web sigui més fàcil, segura i flexible. Aquest recorregut us ofereix els elements essencials d'un cop d'ull.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Torna la protecció contra el correu brossa amb el CAPTCHA de prova de treball</h2><p>No cal cap compte ni API, és respectuós amb la privadesa i accessible, i resol trencaclosques matemàtics silenciosament en segon pla, invisible per als visitants.</p><p>Per habilitar-lo, aneu a <em>Extensions</em> -&gt; <em>Complements</em>, cerqueu <strong>captcha</strong>, activeu-lo i configureu-lo per defecte a la Configuració global.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"El captcha indica que s'està verificant i que s'ha verificat\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Representació gràfica del flux de treball bàsic\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Visió general del flux de treball de contingut amb l'editor visual de flux de treball</h2><p>Gestioneu el flux de treball de contingut més fàcilment amb el nou diagrama de flux de treball interactiu que us permet veure tot el procés de publicació.</p><p>Activeu els fluxos de treball a <em>Gestor d'articles</em> -&gt; <em>Fluxos de treball</em> i busqueu el botó del gràfic.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Tres opcions de camp personalitzat per a nous mitjans: àudio, vídeo i Documents</h2><p>Quan creeu camps personalitzats per al vostre contingut, ara podeu permetre que els creadors de contingut incloguin qualsevol tipus de contingut multimèdia, no només imatges.</p><p>Els continguts multimèdia es renderitzen com a HTML5 <àudio>, <vídeo> o enllaços de documents (PDF, fulls de càlcul...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"Les tres opcions de camp multimèdia: àudio, vídeo i document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Mòduls més intel·ligents amb Control de versions i associacions multilingües</h2><p>Joomla té un historial de versions per als articles des de fa temps. Aquesta mateixa capacitat ara s'ha ampliat als mòduls.<br>Si teniu un lloc web multilingüe, ara podeu associar instàncies de mòduls entre diferents idiomes, de la mateixa manera que podeu associar articles entre idiomes.</p><h2>Altres millores a destacar</h2><ul class=\"mb-3\"><li>Compatibilitat amb abreviatures <strong>&lt;abbr&gt;</strong> a l'editor de text enriquit de TinyMCE, semànticament correcta i millora de l'accessibilitat (busqueu el nou botó Abreviatures a la barra d'eines de TinyMCE quan editeu contingut).</li><li>Millores d'experiència d'usuari en l'estat de substitució d'idiomes i la creació ràpida de substitucions perdudes (indicador d'estat, edició fàcil de les substitucions).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Novetats de Joomla 6.1!"

