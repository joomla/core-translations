COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Tervetuloa Joomla 6.1! julkaisujärjestelmään</h1><p>Joomla 6.1 tuo tärkeitä parannuksia, jotka tekevät sivuston rakentamisesta helpompaa, turvallisempaa ja joustavampaa. Tämä esittely tarjoaa olennaiset asiat yhdellä silmäyksellä.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Spam-suojaus on TAAS käytössä laskentatehtävän sisältävän CAPTCHA:n myötä.</h2><p>Ei vaadi tiliä tai API-rajapintaa, on yksityisyyysystävällinen ja saavutettava – tämä captcha ratkaisee matemaattisia tehtäviä hiljaisesti taustalla, kävijöille näkymättömästi.</p><p>Ota käyttöön siirtymällä <em>Laajennukset</em> -&gt; <em>Liitännäiset</em>, etsi sanalla <strong>captcha</strong>, ota käyttöön ja aseta oletukseksi Sivuston asetuksissa.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Sisältöputki yhdellä silmäyksellä visuaalisen jukaisunkulkueditorin avulla</h2><p>Hallitse sisältöprosessiasi helpommin uudella interaktiivisella prosessikaaviolla, jonka avulla näet koko julkaisuprosessin yhdellä silmäyksellä..</p><p>Ota Työnkulut käyttöön <em>Artikkelien hallinta</em> -&gt; <em>Työnkulut</em> ja etsi kaaviot -painiketta.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Kolme uutta mukautettua mediakenttä vaihtoehtoa: Ääni, Video &amp; Dokumentit</h2><p>Kun luot omia kenttiä (Custom Fields) sisällöllesi, voit nyt antaa sisällöntuottajien lisätä minkä tahansa tyyppistä mediaa, et vain kuvia.</p><p>Mediat renderöityvät HTML5-muodossa &lt;audio&gt;, &lt;video&gt;, tai dokumenttilinkkeinä (PDF, taulukkolaskenta...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Paremmat moduulit versioinnilla ja monikielisyydellä</h2><p>Joomla-artikkeleilla on pitkään ollut versiohistoria. Sama ominaisuus on nyt laajennettu moduuleihin.<br>Jos ylläpidät monikielistä sivustoa, voit nyt yhdistää moduuleita eri kielten välillä samaan tapaan kuin voit yhdistää artikkeleita kielten välillä.</p><h2>Muita huomionarvoisia parannuksia</h2><ul class=\"mb-3\"><li>Semanttisesti oikeaoppinen ja saavutettavuutta edistävä tuki lyhenteille <strong>&lt;abbr&gt;</strong> TinyMCE rich text -editorissa (Etsi uusi Lyhenne-painike TinyMCE-työkaluriviltä, kun muokkaat sisältöä).</li><li>Kielen ylikirjoitusten tila &amp; puuttuvien kielen ylikirjoitusten pikaluonti ja käyttäjäkokemuksen parannukset (tila-indikaattori, ylikirjoitusten helppo muokkaus).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Mitä uutta Joomla-versiossa 6.1!"

