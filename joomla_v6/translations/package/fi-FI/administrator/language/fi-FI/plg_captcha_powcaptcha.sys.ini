PLG_CAPTCHA_POWCAPTCHA="CAPTCHA - Laskennallinen tehtävä"
PLG_CAPTCHA_POWCAPTCHA_XML_DESCRIPTION="Tämä CAPTCHA-plugin esittelee käyttäjän selaimelle matemaattisen ongelman, jonka selain voi ratkaista automaattisesti. Tarkoitus ei ole todistaa käyttäjän olevan ihminen, mutta selvittää onko käyttäjä valmis investoimaan tarvittavan ajan tehtävän ratkaisemiseksi. Perustuu tällä hetkellä Altcha (altcha.org) -kirjastoon."

