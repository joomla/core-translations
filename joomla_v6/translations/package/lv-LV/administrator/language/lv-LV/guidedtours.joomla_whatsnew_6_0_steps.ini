COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_DESCRIPTION="<div class=\"row align-items-center pt-3\"><div class=\"col-12\"><h2 class=\"mb-3\">Vairāk atjauninājumu</h2><p>Piedāvātie raksti tagad koplieto rakstu pārvaldnieka skatu.</p></div></div><div class=\"row align-items-center pt-4\"><div class=\"col-12\"><h3>Ja jūs to palaidāt garām</h3><p>Joomla! 6 atbalsta automatizētos atjauninājumus ar The Update Framework (TUF) labākai drošībai un veiktspējai.<br>Automatizēto atjauninājumu iestatījumus atrodiet <em>Joomla! Update</em> konfigurācijas sadaļā.</p></div></div><div class=\"row align-items-center pt-4\"><div class=\"col-12\"><h3>Citi uzlabojumi un labojumi</h3><ul class=\"mb-3\"><li>Paziņojuma e-pasts par administratora reģistrācijas apstiprināšanu <a href=\"https://github.com/joomla/joomla-cms/pull/45802\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45802</a></li><li>Pielāgotu klašu pievienošana klašu nolaižamajam sarakstam attēla dialogā TinyMCE <a href=\"https://github.com/joomla/joomla-cms/pull/45676\" target=\"_blank\" rel=\"noopener noreferrer\">PR#45676</a></li><li>Iespējas pievienošana grupveida birkas noņemšanai <a href=\"https://github.com/joomla/joomla-cms/pull/40613\" target=\"_blank\" rel=\"noopener noreferrer\">PR#40613</a></li><li>Un daudz, daudz uzlabojumu zem pārsega...</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_0_TITLE="Citas iespējas"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_1_DESCRIPTION="<h3>Joomla 6.0 laidiena informācija</h3><p><a title=\"Laidiena informācija\" href=\"https://6.joomla.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Skatīt laidiena informāciju vietnē 6.joomla.org</a></p><hr><h3>Palīdzība un informācija</h3><p>Šeit var atrast daudzus resursus, kas var jums palīdzēt, kopā ar papildu saitēm uz vairāk resursiem, dokumentāciju, atbalstu un informāciju par to, kā iesaistīties Joomla.</p>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_0_STEP_1_TITLE="Vairāk informācijas un palīdzības"

