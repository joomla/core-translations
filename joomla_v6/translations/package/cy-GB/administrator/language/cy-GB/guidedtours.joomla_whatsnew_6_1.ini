COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_DESCRIPTION="<h1 class=\"fw-medium\">Croeso i Joomla 6.1</h1><p>Mae Joomla 6.1 yn cyflwyno gwelliannau allweddol sy'n gwneud adeiladu gwefan yn fwy diogel a mwy hyblyg. Mae'r daith hon yn rhoi cipolwg ar yr hanfodion.</p><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Mae Diogelwch rhag Spam yn ôl gyda CAPTCHA prawf o waith</h2><p>Dim angen cyfri na API, yn dda ar gyfer preifatrwydd ac yn hygyrch, mae'r captcha hwn yn datrys posau mathemategol tu ôl i'r llenni, o olwg ymwelwyr.</p><p>I'w alluogi ewch i </em> -&gt; <em>Ategion</em>, chwiliwch am <strong>captcha </strong>, galluogwch a gosodwch yn ddiofyn yn y Ffurfweddiad Eang.</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/captcha.jpg\" alt=\"The captcha states verifying and verified\" width=\"600\" height=\"250\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/workflows.jpg\" alt=\"Graphical representation of the basic workflow\" width=\"600\" height=\"350\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Golwg Sydyn ar y Biblinell Gynnwys gyda'r Golygydd Llif-gwaith Gweledol</h2><p>Rheoli eich llif-gwaith cynnwys yn haws gyda'r diagram llif-gwaith rhyngweithiol newydd sy'n caniatáu i chi weld y broses cyhoeddi cyflawn.</p><p>Galluogwch Llifoedd-gwaith yn y <em>Rheolwr Erthyglau</em> -&gt; <em>Llifoedd-gwaith</em> a chwilio am y botwm graff.</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\"> Tri Opsiwn Newydd ar gyfer Maes Personol Cyfrwng: Sain, Fideo a Dogfennau</h2><p>Pan yn creu Meysydd Personol ar gyfer eich cynnwys gallwch rŵan ganiatáu i grewyr cynnwys ddefnyddio unrhyw fath o gyfrwng nid delweddau yn unig.</p><p>Mae'r cyfyngau yn cael eu dangos fel HTML5&lt;audio&gt;, neu dolennau dogfen (PDF, taenlenni...).</p></div><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/6_1/media.jpg\" alt=\"The three media field options audio, video and document\" width=\"600\" height=\"350\"></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-12 mb-3\"><h2 class=\"mb-3\">Modiwlau Clyfrach gyda Fersiynnu a Chydgysylltiadau Amlieithog</h2><p>Mae gan Joomla hanes fersiynnau erthyglau ers peth amser. Mae'r gallu hwn rŵan wedi ei ymestyn i fodiwlau.<br>Os oes gennych wefan amlieithog gallwch rŵan gydgysylltu enghreifftiau o fodiwlau mewn ieithoedd gwahanol, yn yr un modd ac y gallwch gyda erthyglau.</p><h2>Gwelliannau eraill gwerth eu nodi</h2><ul class=\"mb-3\"><li>Cefnogaeth Talfyriadau <strong>&lt;abbr&gt;</strong> yn semantaidd gywir ac yn gwella hygyrchedd (chwiliwch am y botwm talfyriadau newydd ym mar offer y golygydd testun cyfoethog TinyMCE pan yn golygu cynnwys).</li><li>Statws amnewid iaith a gwelliannau rhyngwyneb defnyddiwr i greu amnewidiadau sy'n eisiau yn gyflym (dangosydd statws, golygu amnewidiadau yn hawdd).</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_6_1_TITLE="Be sy'n newydd yn Joomla 6.1!"

