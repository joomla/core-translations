COM_GUIDEDTOURS_TOUR_WHATSNEW_5_4_DESCRIPTION="<h1 class=\"fw-medium\">Bem-vindo ao Joomla 5.4!</h1><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3 mb-md-0\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/5_4/automated-updates.jpg\" alt=\"Exibir a notificação no painel administrativo onde poderá ver o novo ícone de atualizações automatizadas para as ativar.\" width=\"774\" height=\"281\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Chegaram as atualizações automatizadas!</h2><p>O Joomla! 5.4 agora suporta atualizações automatizadas para melhorar a segurança e o desempenho.</p><p><strong>Fique seguro e protegido!</strong></p></div></div>"
