PLG_USER_TOKEN="Bruker - Joomla API-token"
PLG_USER_TOKEN_COPY="Kopier"
PLG_USER_TOKEN_COPY_DESC="Kopier sikkerhetskoden til utklippstavle"
PLG_USER_TOKEN_COPY_FAIL="Kunne ikke kopiere sikkerhetskoden."
PLG_USER_TOKEN_COPY_SUCCESS="Sikkerhetskode ble kopiert."
PLG_USER_TOKEN_ENABLED_DESC="Sett til Nei for midlertidig å hindre tilgang til nettstedet ditt med dette tokenet."
PLG_USER_TOKEN_ENABLED_LABEL="Aktiv"
PLG_USER_TOKEN_GROUP_DESC="Behandle sikkerhetstokener som brukes for autentisering til Joomla API-applikasjonen (ekstern tilgang til nettstedet ditt). Hvis du er usikker på hva dette gjør, trenger du det sannsynligvis ikke og kan trygt ignorere disse innstillingene."
PLG_USER_TOKEN_GROUP_LABEL="Joomla API-token"
PLG_USER_TOKEN_NOTOKENFOROTHERPEOPLE_DESC="Du kan ikke se tokenet til andre brukere enn deg selv. Du kan fortsatt aktivere, deaktivere eller tilbakestille tokenet deres, f.eks. når det er mistanke om at tokenet har lekket til uautoriserte personer."
PLG_USER_TOKEN_RESET_DESC="Sett til Ja og lagre brukerprofilen din for å opprette et nytt token som erstatter det gamle."
PLG_USER_TOKEN_RESET_LABEL="Tilbakestill"
PLG_USER_TOKEN_SAVEME_DESC="Du har ikke et token ennå. Lagre brukerprofilen din for å generere et token. Kom tilbake til denne siden for å se og administrere tokenet ditt."
PLG_USER_TOKEN_SAVEMEFOROTHERPEOPLE_DESC="Denne brukeren har ikke et token ennå. Hvis du lagrer profilen deres, blir et nytt token generert, men du vil ikke kunne se det av sikkerhetsgrunner. Du vil fremdeles kunne aktivere, deaktivere eller tilbakestille tokenet deres."
PLG_USER_TOKEN_TOKEN_DESC="Dette er tokenet ditt. Bruk det i tredjepartsapplikasjoner som krever ekstern tilgang til nettstedet ditt gjennom Joomla API-programmet."
PLG_USER_TOKEN_TOKEN_LABEL="Token"
PLG_USER_TOKEN_XML_DESCRIPTION="Tillater administrasjon av sikkerhetstokener som brukes ved autentisering til Joomla API-applikasjonen (ekstern tilgang til nettstedet ditt). Disse tokenene er strengt personlige. Du kan se ditt eget token, men du kan bare deaktivere eller tilbakestille andre brukeres tokener."

