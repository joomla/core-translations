PLG_CONTENT_FIELDS="Innhold - Felter"
PLG_CONTENT_FIELDS_XML_DESCRIPTION="<p>Dette programtillegget lar deg vise et egendefinert felt som er satt inn med programtillegget 'Knapp - Felt', eller ved å bruke syntaksen {field #} direkte i redigeringsområdet.</p><p><strong>Mulig syntaks:</strong></p><ul><li><code>{field 1}</code> vil vise feltet med ID 1</li><li><code>{field 1,foo}</code> vil vise det valgte feltet med den alternative utformingen 'foo'.</li><li><code>{fieldgroup 2}</code> vil vise alle felt i feltgruppen med ID 2.</li></ul>"

