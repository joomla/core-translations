COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_TITLE="Velkommen til Joomla!"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_DESCRIPTION="<p>Denne omvisningen vil gi deg en rask oversikt over hvordan du kommer i gang med Joomla!</p><p>Du er i administrasjonsområdet i Joomla, også kjent som '<strong>Backend</strong>'.<br>Det er her du setter opp og administrerer hele Joomla-nettstedet ditt.</p><p><strong>Vil du lære mer?</strong></p><p>La oss starte omvisningen og bygge nettstedet ditt med kraften fra Joomla!</p>"

