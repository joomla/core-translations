COM_CPANEL_MSG_ADDNOSNIFF_BODY="<p>Joomla leveres nå med ytterligere sikkerhetsforsterkninger i standard htaccess.txt- og web.config.txt-filene. Disse forsterkingene deaktiverer den såkalte MIME-type sniffing-funksjonen i nettlesere. Snusingen fører til spesifikke angrepsvektorer, der skript i normalt ufarlige filformater (f.eks. bilder) vil bli utført, noe som fører til Cross-Site-Scripting sårbarheter.</p><p>Sikkerhetsteamet anbefaler å bruke de nødvendige endringene manuelt på eksisterende .htaccess- eller web.config-filer, siden disse filene ikke kan oppdateres automatisk.</p><p><strong>Endringer for .htaccess</strong><br>Legg til følgende linjer før \"## Mod_rewrite in use.\":</p><pre>&lt;IfModule mod_headers.c&gt;\nHeader always set X-Content-Type-Options \"nosniff\"\n&lt;/IfModule&gt;</pre><p><strong>Endringer for web.config</strong><br>Legg til følgende linjer rett etter \"&lt;/rewrite&gt;\":</p><pre>&lt;httpProtocol&gt;\n  &lt;customHeaders&gt;\n    &lt;add name=\"X-Content-Type-Options\" value=\"nosniff\" /&gt;\n  &lt;/customHeaders&gt;\n&lt;/httpProtocol&gt;</pre>" ; Translators: Don't touch the code part in the message, Starting with ## Mod_rewrite &hellip;
COM_CPANEL_MSG_ADDNOSNIFF_TITLE="Sikkerhetsoppdatering for .htaccess og web.config"
COM_CPANEL_MSG_HTACCESSSVG_BODY="<p>Siden 3.9.21 kommer Joomla med en ekstra sikkerhetsregel i standard htaccess.txt. Denne regelen vil beskytte brukere av svg-filer fra potensielle 'Cross-Site-Scripting (XSS)'-sårbarheter.<br>Sikkertsgruppen anbefaler at man manuelt gjør de nødvendige endringer i eksisterende .htaccess-fil, ettersom denne filen ikke kan oppdateres automatisk.</p><p><strong>Endringer for .htaccess</strong></p><pre>&lt;FilesMatch \"\.svg$\"&gt;\n  &lt;IfModule mod_headers.c&gt;\n    Header always set Content-Security-Policy \"script-src 'none'\"\n  &lt;/IfModule&gt;\n&lt;/FilesMatch&gt;</pre><p>For øyeblikket kjenner vi ikke til noen måte for å konfigurere dette på IIS-webservere, du bør derfor kontakte din leverandør av netthotell for hjelp med dette.</p>"
COM_CPANEL_MSG_HTACCESSSVG_TITLE="Ekstra XSS-beskyttelse for bruk av SVG-filer"
COM_CPANEL_MSG_LANGUAGEACCESS340_BODY="Fra Joomla! 3.4.0 kan du få problemer med programtillegget System - Språkfilter på nettstedet ditt. For å rette dem, åpne <a href=\"index.php?option=com_languages&view=languages\">Språkvedlikehold</a> og lagre hvert innholdsspråk manuelt for å sikre at et tilgangsnivå blir lagret."
COM_CPANEL_MSG_LANGUAGEACCESS340_TITLE="Det er mulige problemer med det flerspråklige oppsettet"
COM_CPANEL_MSG_ROBOTS_BODY="Det ble gjort en endring i standard 'robots.txt'-filen i Joomla! 3.3, for å gi Google tilgang til design- og mediafiler som standard, for å forbedre SEO. Denne endringen blir ikke automatisk lagt til ved oppdateringer, og brukere anbefales dermed å se på endringene i 'robots.txt.dist'-filen for så å implementere disse endring i sin egen 'robots.txt'-fil."
COM_CPANEL_MSG_ROBOTS_TITLE="robots.txt oppdatering"
COM_CPANEL_MSG_STATS_COLLECTION_BODY="<p>Siden Joomla! 3.5 vil et statistikkprogramtillegg sende inn anonyme data til Joomla-prosjektet. Dette vil bare sende inn Joomla-versjonen, PHP-versjonen, databasemotoren og -versjonen og serveroperativsystemet.</p><p>Disse dataene samles inn for å sikre at fremtidige versjoner av Joomla kan dra nytte av de nyeste database- og PHP-funksjonene uten å påvirke et betydelig antall brukere. Behovet for dette ble klart da minimum PHP 5.3.10 ble påkrevd når Joomla! 3.3 implementerte de sikrere Bcrypt-passordene.</p><p>Av hensyn til full åpenhet og for å hjelpe utviklere <a href=\"https://developer.joomla.org/about/stats.html\" target=\"_blank\" rel=\"noopener noreferrer\">er disse dataene offentlig tilgjengelige.</a> Et API og grafer vil vise Joomla-versjonen, PHP-versjonene og databasemotorene som er i bruk.</p><p>Hvis du ikke ønsker å gi Joomla-prosjektet denne informasjonen, kan du deaktivere programtillegget som heter System - Joomla Statistikk.</p>"
COM_CPANEL_MSG_STATS_COLLECTION_TITLE="Statistikkinnsamling i Joomla"
COM_CPANEL_MSG_TEXTFILTER3919_BODY="<p>Som en del av sikkerhetsteamets gjennomgang har vi gjort noen endringer i standardinnstillingene for de globale tekstfiltrene i en ny Joomla-installasjon. Standardinnstillingen for gruppene 'Offentlig', 'Gjest' og 'Registrert' er nå 'Ingen HTML'. Siden disse endringene bare brukes på nye installasjoner, anbefaler vi på det sterkeste at du går gjennom disse endringene og oppdaterer nettstedet ditt fra: System &rarr; Global konfigurasjon &rarr; Tekstfiltre</p>"
COM_CPANEL_MSG_TEXTFILTER3919_TITLE="Oppdaterte anbefalinger for tekstfiltre"
