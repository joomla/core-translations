COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_NEW_TITLE="Velg 'Ny'-knappen"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_NEW_DESCRIPTION="Velg 'Ny' for å opprette en ny omvisning."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_TITLE_TITLE="Legg til en tittel for omvisningen"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_TITLE_DESCRIPTION="Angi en påkrevd tittel for omvisningen."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONTENT_TITLE="Legg til innhold"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONTENT_DESCRIPTION="Angi innhold som beskriver omvisningen."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_COMPONENT_TITLE="Velg en komponent"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_COMPONENT_DESCRIPTION="Velg utvidelsen(e) der du vil vise omvisningen med prioritet i listen over mulige omvisninger som kan kjøres. Hvis du for eksempel oppretter en omvisning for utvidelsen 'Brukere', velger du 'Brukere'. Velg 'Alle' for at omvisningen skal vises på alle sider."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_URL_TITLE="Legg til en nettadresse"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_URL_DESCRIPTION="Legg til den relative nettadressen til siden der omvisningen skal starte. Skriv for eksempel inn <em>administrator/index.php?option=com_users&view=users</em> for å starte omvisningen på Brukere-siden."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_AUTOSTART_TITLE="Veksle 'Autostart'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_AUTOSTART_DESCRIPTION="<p>Hvis 'Autostart' settes til 'Ja', starter omvisningen automatisk så snart de relevante betingelsene er oppfylt.</p><p>Hvis flere omvisninger er satt til å starte automatisk under samme betingelser, starter bare den første omvisningen i listen, inntil den enten er avbrutt, fullført eller hoppet over.</p>"

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_SAVECLOSE_TITLE="Velg 'Lagre og lukk'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_SAVECLOSE_DESCRIPTION="Lagre og lukk omvisningen."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONGRATULATIONS_TITLE="Gratulerer!"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONGRATULATIONS_DESCRIPTION="Du har opprettet en omvisning. Du må nå opprette trinn for omvisningen."

