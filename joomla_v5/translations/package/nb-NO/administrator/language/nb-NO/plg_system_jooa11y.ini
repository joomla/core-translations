PLG_SYSTEM_JOOA11Y_CONTRAST="Kontrast"
PLG_SYSTEM_JOOA11Y_CONTRAST_ERROR_INPUT_MESSAGE="Teksten i dette innlegget har ikke nok kontrast med bakgrunnen. Kontrastforholdet bør være minst 4.5:1 for normal tekst og 3:1 for stor tekst."
PLG_SYSTEM_JOOA11Y_CONTRAST_ERROR_INPUT_MESSAGE_INFO="Kontrastforholdet er <strong>%(cratio)</strong>."
PLG_SYSTEM_JOOA11Y_CONTRAST_ERROR_MESSAGE="Denne teksten har ikke nok kontrast med bakgrunnen. Kontrastforholdet bør være minst 4.5:1 for normal tekst og 3:1 for stor tekst."
PLG_SYSTEM_JOOA11Y_CONTRAST_ERROR_MESSAGE_INFO="Kontrastforholdet er <strong>%(cratio)</strong> i følgende tekst: <strong>%(nodetext)</strong>"
PLG_SYSTEM_JOOA11Y_CONTRAST_WARNING_MESSAGE="Kontrasten mellom denne teksten er ukjent og må gjennomgås. Forsikre deg om at teksten og bakgrunnen har sterke kontrastfarger. Kontrastforholdet bør være minst 4.5:1 for normal tekst og 3:1 for stor tekst."
PLG_SYSTEM_JOOA11Y_CONTRAST_WARNING_MESSAGE_INFO="Se gjennom kontrasten av følgende tekst:<br><strong>%(nodetext)</strong>"
PLG_SYSTEM_JOOA11Y_DARK_MODE="Mørk modus"
PLG_SYSTEM_JOOA11Y_DIFFICULT_READABILITY="Vanskelig"
PLG_SYSTEM_JOOA11Y_EMBED_AUDIO="Vennligst forsikre deg om at en <strong>transkript for alle podcast.</strong> Gir transkripter til lydinnhold er et obligatorisk nivå A krav. Transkripter støtter personer som er D/døve eller har vanskelig for å høre, men som alle kan dra nytte av. Vurder å plassere transkripten under eller i et trekkspillpanel."
PLG_SYSTEM_JOOA11Y_EMBED_GENERAL_WARNING="Kan ikke kontrollere innebygd innhold. Kontroller at bildene har alt tekst, videoer har bildetekst, tekst har tilstrekkelig kontrast, og interaktive komponenter er <a href=\"https://webaim.org/techniques/keyboard/\" target=\"_blank\" rel=\"noopener noreferrer\">tastatur tilgjengelig.</a>"
PLG_SYSTEM_JOOA11Y_EMBED_MISSING_TITLE="Innebygd innhold krever et tilgjengelig navn som beskriver innholdet. Vennligst oppgi en unik <span class=\"jooa11y-kbd\">tittel</span> eller <span class=\"jooa11y-kbd\">aria-etikett</span> attributt på elementet <span class=\"jooa11y-kbd\">iframe</span>. Finn ut mer om <a href=\"https://dequeuniversity.com/tips/provide-iframe-titles\" target=\"_blank\" rel=\"noopener noreferrer\">iFrames.</a>"
PLG_SYSTEM_JOOA11Y_EMBED_VIDEO="Vennligst sjekk at <strong>alle videoer har lukket tekst.</strong> Tekster for alt lyd og videoinnhold er et obligatorisk for nivå A. Tekster hjelper personer som er D/døv eller er vanskelig for å høre."
PLG_SYSTEM_JOOA11Y_ERROR="Feil"
PLG_SYSTEM_JOOA11Y_FAIRLY_DIFFICULT_READABILITY="Ganske vanskelig"
PLG_SYSTEM_JOOA11Y_FIELD_ADDITIONAL_CHECKS="Tilleggssjekk alltid på"
PLG_SYSTEM_JOOA11Y_FIELD_ADDITIONAL_CHECKS_DESC="Aktivering av dette alternativet vil visuelt skjule valgknappene for skjema etiketter, kontrast, Lenker (Avansert) i Innstillingspanelet."
PLG_SYSTEM_JOOA11Y_FIELD_COLOUR_FILTER="Fargefilter"
PLG_SYSTEM_JOOA11Y_FIELD_COLOUR_FILTER_DESC="Vis av/på bryter for fargefilteret under innstillinger. Fargefiltre hjelper med å identifisere fargekombinasjoner som kan være vanskelige for folk å skille mellom."
PLG_SYSTEM_JOOA11Y_FIELD_CONTRAST="Kontrast"
PLG_SYSTEM_JOOA11Y_FIELD_CONTRAST_DESC="Vis av/på bryter for kontrast under innstillinger. Sjekk for WCAG 2.0-nivå AA-kontrastproblemer mellom forgrunnstekst og bakgrunnselementer."
PLG_SYSTEM_JOOA11Y_FIELD_FORM_LABELS="Skjemaetiketter"
PLG_SYSTEM_JOOA11Y_FIELD_FORM_LABELS_DESC="Vis knapp for å veksle skjeme-etiketter under innstillinger. Sjekk for skjemadata som mangler en tilhørende etikett. Ikke nødvendigvis en problemstilling for innholdsskribent, og vanligvis ikke en sak ved bruk av en anerkjente og tilgjengelige programtillegg for skjemaer."
PLG_SYSTEM_JOOA11Y_FIELD_LINKS_ADVANCED="Lenker (avansert)"
PLG_SYSTEM_JOOA11Y_FIELD_LINKS_ADVANCED_DESC="Vis knapp for å veksle av/på lenker (avansert) under innstillinger. Sjekk for ytterligere problemer som for eksempel: linker som åpner i en ny fane uten advarsel, identiske navn med forskjellig formål, eller peker på en PDF og andre filer uten advarsel."
PLG_SYSTEM_JOOA11Y_FIELD_WEB_COMPONENTS="Webkomponenter som må sjekkes"
PLG_SYSTEM_JOOA11Y_FIELD_WEB_COMPONENTS_DESC="Oppgi en liste over alle kjente webkomponenter eller -containere med en åpen skygge DOM."
PLG_SYSTEM_JOOA11Y_FILE_TYPE_WARNING="Lenke peker til en PDF eller nedlastbar fil (f.eks. MP3, Zip, Word Doc) uten advarsel. Angi filtypen i lenketeksten. Hvis den er en stor fil, vurder å inkludere filstørrelsen."
PLG_SYSTEM_JOOA11Y_FILE_TYPE_WARNING_TIP="<strong>Eksempel:</strong> Hovedrapport (PDF, 3MB)"
PLG_SYSTEM_JOOA11Y_FORM_LABELS="Skjema-etiketter"
PLG_SYSTEM_JOOA11Y_GOOD="God"
PLG_SYSTEM_JOOA11Y_GOOD_READABILITY="God"
PLG_SYSTEM_JOOA11Y_HEADING_EMPTY="Tom overskrift funnet! For å fikse, slett denne linjen eller endre formatet fra <strong>Overskrift%(level)</strong> til <strong>Normal</strong> eller <strong>avsnitt</strong>."
PLG_SYSTEM_JOOA11Y_HEADING_EMPTY_WITH_IMAGE="Overskrift har ingen tekst, men inneholder et bilde. Hvis dette ikke er en overskrift, endre formatet fra <strong>Overskrift %(level)</strong> til <strong>Normal</strong> eller <strong>avsnitt</strong>. Ellers, legg til alt tekst til bildet hvis det ikke er dekorativt."
PLG_SYSTEM_JOOA11Y_HEADING_FIRST="Den første overskriften på en side bør vanligvis være en overskrift 1 eller overskrift 2. Overskrift 1 skal være starten på hovedinnholdet, og er hovedtittelen som beskriver formålet med siden. Lær mer om <a href=\"https://www.w3.org/WAI/tutorials/page-structure/headings/\" target=\"_blank\" rel=\"noopener noreferrer\">overskrifter.</a>"
PLG_SYSTEM_JOOA11Y_HEADING_LONG="Overskrift er lang! Overskrifter bør brukes til å organisere innhold og formidle struktur. De bør være korte, informative, og unike. Vennligst hold overskriftene mindre enn 160 tegn (ikke mer enn en setning)."
PLG_SYSTEM_JOOA11Y_HEADING_LONG_INFO="Antall tegn: <strong>%(headingLength)</strong>."
PLG_SYSTEM_JOOA11Y_HEADING_MISSING_ONE="Manglende overskrift 1. Overskrift 1 skal være starten på hovedinnholdsområdet, og er hovedtittelen som beskriver formålet med siden. Lær mer om <a href=\"https://www.w3.org/WAI/tutorials/page-structure/headings/\" target=\"_blank\" rel=\"noopener noreferrer\">overskrifter.</a>"
PLG_SYSTEM_JOOA11Y_HEADING_NON_CONSECUTIVE_LEVEL="Ikke-påfølgende overskriftsnivå er brukt. Overskrifter bør aldri hoppe over nivåer, eller gå fra <strong>Overskrift%(prevLevel)</strong> til <strong>Overskrift %(level)</strong>."
PLG_SYSTEM_JOOA11Y_HIDE_OUTLINE="Skjul disposisjon"
PLG_SYSTEM_JOOA11Y_HIDE_SETTINGS="Skjul innstillinger"
PLG_SYSTEM_JOOA11Y_HYPERLINK_ALT_LENGTH_MESSAGE="Alternativ tekstbeskrivelse på et lenket bilde er <strong>for lang</strong>. Alternativ-teksten for lenkede bilder skal beskrive hvor lenken tar deg, ikke en beskrivelse av bildet. <strong>Vurder å bruke tittelen på siden den lenker til som alternativ-tekst.</strong>"
PLG_SYSTEM_JOOA11Y_HYPERLINK_ALT_LENGTH_MESSAGE_INFO="Alternativ-teksten er fra <strong>%(altLength)</strong> tegn: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DECORATIVE="Bildet er merket som <strong>dekorativ</strong> og vil bli ignorert av hjelpeteknologi."
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DECORATIVE_INFO="Selv om en <strong>bildetekst</strong> finnes så bør bilder også ha en alternativ-tekst i de fleste tilfeller. <ul><li>Alternativ-teksten bør gi en konsis beskrivelse av hva som er i bildet.</li><li>Bildeteksten skal vanligvis gi en kontekst relatert til bildets omgivelser eller oppmerksomhet til spesifikke deler av informasjon.</li></ul> Lær mer:<a href=\"https://thoughtbot.com/blog/alt-vs-figcaption#the-figcaption-element\" target=\"_blank\" rel=\"noopener noreferrer\">alt versus figcaption.</a>"
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DUPLICATE_ALT="Ikke bruk de samme ordene for både alternativ-tekst og bildeteksten. Skjerm lesere vil annonsere informasjonen to ganger."
PLG_SYSTEM_JOOA11Y_LABELS_ARIA_LABEL_INPUT_MESSAGE="Inndata har et tilgjengelig navn, men til tross for det, vennligst forsikre deg om at det også er en synlig etikett."
PLG_SYSTEM_JOOA11Y_LABELS_ARIA_LABEL_INPUT_MESSAGE_INFO="Det tilgjengelige navnet for inndata: <strong>%(ariaLabel)</strong>"
PLG_SYSTEM_JOOA11Y_LABELS_INPUT_RESET_MESSAGE="Tilbakestillingsknapper bør <strong>ikke</strong> brukes med mindre det er spesifikt nødvendig fordi de er lette å aktivere ved en feiltakelse."
PLG_SYSTEM_JOOA11Y_LABELS_INPUT_RESET_MESSAGE_TIP="<strong>Tips!</strong> Learn why <a href=\"https://www.nngroup.com/articles/reset-and-cancel-buttons/\" target=\"_blank\" rel=\"noopener noreferrer\">Tilbakestilling og Avbryt-knapper skaper problemer med brukervennlighet.</a>"
PLG_SYSTEM_JOOA11Y_LABELS_MISSING_IMAGE_INPUT_MESSAGE="Bildeknapp mangler ALT tekst. Legg til ALT-tekst for å gi et tilgjengelig navn. For eksempel: <em>Søk</em> eller <em>Send inn</em>."
PLG_SYSTEM_JOOA11Y_LABELS_MISSING_LABEL_MESSAGE="Det er ingen etikett knyttet til disse inndata. Legg til en <span class=\"jooa11y-kbd\">id</span> i disse inndataene og legg til en matchende <span class=\"jooa11y-kbd\">for</span> attributt til etiketten."
PLG_SYSTEM_JOOA11Y_LABELS_NO_FOR_ATTRIBUTE_MESSAGE="Det er ingen etikett knyttet til denne inndata. Legg til et <span class=\"jooa11y-kbd\">for</span> attributt til etiketten som samsvarer med <span class=\"jooa11y-kbd\">id</span> av denne inndata."
PLG_SYSTEM_JOOA11Y_LABELS_NO_FOR_ATTRIBUTE_MESSAGE_INFO="IDen for denne inndata: <strong>id=&#34;%(t)&#34;</strong>"
PLG_SYSTEM_JOOA11Y_LANG_CODE="en"
PLG_SYSTEM_JOOA11Y_LINK_ALT_HAS_BAD_WORD_MESSAGE="Filutvidelse funnet i alternativ-tekstfeltet. Hvis bildet formidler en historie, humør eller viktig informasjon - sørg for å beskrive bildet."
PLG_SYSTEM_JOOA11Y_LINK_ALT_HAS_BAD_WORD_MESSAGE_INFO="Fjern: <strong>%(error)</strong>.<br>Alternativ-teksten for dette bildet er: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_ALT_HAS_SUS_WORD_MESSAGE="Hjelpeteknologier tyder allerede på at dette er et bilde så &quot;<strong>%(error)</strong>&quot; eller &quot;%(error) av&quot; kan være overflødige."
PLG_SYSTEM_JOOA11Y_LINK_ALT_HAS_SUS_WORD_MESSAGE_INFO="Alternativ-tekst for dette bildet er: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_ALT_PLACEHOLDER_MESSAGE="Ikke-beskrivende eller plassholder alternativ-tekst funnet. Erstatt følgende alternativ-tekst med noe mer meningsfylt: <strong>%(altText)</strong>."
PLG_SYSTEM_JOOA11Y_LINK_ALT_TOO_LONG_MESSAGE="Alternativ tekst beskrivelse er <strong>for lang</strong>. Alternativ-tekst skal være konkret, men likevel meningsfullt som en <em>tweet</em> (rundt 100 tegn). Hvis dette er et komplekst bilde eller en graf, vurder å legge den lange beskrivelsen av bildet i teksten nedenfor."
PLG_SYSTEM_JOOA11Y_LINK_ALT_TOO_LONG_MESSAGE_INFO="Alternativ-teksten er fra <strong>%(altLength)</strong> tegn: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_ANCHOR_LINK_AND_ALT_MESSAGE="Bildelenken inneholder både <strong>alternativ-tekst og omkringliggende lenketekst.</strong> Hvis dette bildet er dekorativt og brukes som en funksjonell lenke til en annen side, vurder å fjerne merking av bildet som dekorativ - den omliggende lenketeksten skal være tilstrekkelig."
PLG_SYSTEM_JOOA11Y_LINK_ANCHOR_LINK_AND_ALT_MESSAGE_INFO="Alt tekst: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_BEST_PRACTICES="Vurder å erstatte lenketeksten: <strong>%(error)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_BEST_PRACTICES_DETAILS="<ul><li>&quot;Klikk her&quot; setter fokus på musebevegelser når mange personer ikke bruker en mus eller ser dette nettstedet på en mobil enhet. Vurder bruk av et annet verb som er knyttet til oppgaven.</li><li>Unngå å bruke HTML-symboler som påkaller handlinger med mindre de er skjult.</li></ul>"
PLG_SYSTEM_JOOA11Y_LINK_DECORATIVE_MESSAGE="Bildet er merket som <strong>dekorativ</strong> og vil bli ignorert av hjelpeteknologi. Dersom bildet uttrykker en historie, humør eller viktig informasjon - sørg for å legge til en alt tekst."
PLG_SYSTEM_JOOA11Y_LINK_EMPTY="Fjern tomme lenker uten tekst."
PLG_SYSTEM_JOOA11Y_LINK_EMPTY_LINK_NO_LABEL="Lenke har ikke gjenkjennelig tekst som er synlig for lesere og annen hjelpe teknologi. For å fikse dette:<ul><li>Legg til litt tekst som beskriver hvor lenken tar deg.</li><li>Dersom det er en <a href=\"https://a11y-101.com/development/icons-and-links\" target=\"_blank\" rel=\"noopener noreferrer\">ikonlenke eller SVG</a> mangler den sannsynligvis en beskrivende etikett.</li><li>Dersom du tror denne lenken er feil på grunn av en kopi/lim inn feil, så bør du vurdere å slette den</li></ul>"
PLG_SYSTEM_JOOA11Y_LINK_HYPERLINKED_IMAGE_ARIA_HIDDEN="Link rundt bildet har <span class=\"jooa11y-kbd\">aria-hidden=&quot;sann&quot;</span>, men er fremdeles mulig å fokusere ved bruk av tastatur. Hvis du vil skjule en redundant eller duplisert link, legg til <span class=\"jooa11y-kbd\">tabindex=&quot;-1&quot;</span> også."
PLG_SYSTEM_JOOA11Y_LINK_IDENTICAL_NAME="Lenken har identisk tekst som en annen lenke, men peker til en annen side. Flere lenker med samme tekst kan forårsake forvirring for personer som bruker skjermlesere."
PLG_SYSTEM_JOOA11Y_LINK_IDENTICAL_NAME_TIP="Vurder å lage følgende lenke mer beskrivende for å skille den fra andre lenker: <strong>%(linkText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_BAD_ALT_MESSAGE="Filtype funnet som del av alt tekst. Kontroller at alt teksten beskriver lenkens mål, ikke en literal beskrivelse av bildet. Fjern: <strong>%(error)</strong>."
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_BAD_ALT_MESSAGE_INFO="Alternativ-tekst for dette bildet er: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_LINK_ALT_TEXT_MESSAGE="Bildelenken inneholder alt-tekst, men sørg for at alt- teksten beskriver målsiden. <strong>Vurder å bruke tittelen på siden den lenker til som en Alt-tekst.</strong>Beskriver 'alt'-teksten hvor lenken tar deg?"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_LINK_ALT_TEXT_MESSAGE_INFO="Alt tekst: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_LINK_NULL_ALT_NO_TEXT_MESSAGE="Bildet innenfor lenken er merket som dekorativt, og det er ingen lenketeksten. Legg til 'alt tekst' i bildet som beskriver målsiden for lenken."
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_PLACEHOLDER_ALT_MESSAGE="Ikke-beskrivende eller plassholder alternativ-tekst funnet i lenket bilde. Pass på at alternativ-teksten beskriver målet for lenken, ikke en beskrivelse av bildet. Erstatt følgende alternativ-tekst: <strong>%(altText)</strong>."
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_SUS_ALT_MESSAGE="Hjelpeteknologier indikerer allerede at det er et bilde, så &quot;<strong>%(error)</strong>&quot; eller &quot;%(error) av&quot; kan være overflødig. Forsikre at alternativ-tekst beskriver målet for lenken, ikke en beskrivelse av bildet."
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_SUS_ALT_MESSAGE_INFO="Alternativ-tekst for dette bildet er: <strong>%(altText)</strong>."
PLG_SYSTEM_JOOA11Y_LINK_LABEL="Beskrivende etikett for denne lenken er: <strong>%(linkText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_LINK_HAS_ALT_MESSAGE="Bildet er merket som dekorativ, selv om lenken bruker omliggende tekst som en beskrivende etikett."
PLG_SYSTEM_JOOA11Y_LINK_PASS_ALT="Alternativ-tekst for dette bildet er: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_STOPWORD="Lenketeksten kan være for lite beskrivende ut av kontekst: <strong>%(error)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_STOPWORD_TIP="<strong>Tips!</strong> Lenketekst bør alltid være klar, unik og meningsfull. Unngå fellesord slik som \"klikk her\"; eller \"lær mer\"."
PLG_SYSTEM_JOOA11Y_LINK_URL="Lengre, mindre opplyste nettadresser som brukes som lenketekst, kan være vanskelig å lytte til med hjelpeteknologi. I de fleste tilfeller er det bedre å bruke menneskelig lesbar tekst i stedet for nettadresse. Korte nettadresser (som for eksempel et nettsteds hjemmeside) er greit."
PLG_SYSTEM_JOOA11Y_LINK_URL_TIP="<strong>Tips!</strong> Lenketekst bør alltid være klar, unik og meningsfull slik at den kan forstås ut av kontekst."
PLG_SYSTEM_JOOA11Y_LINKS_ADVANCED="Lenker (avansert)"
PLG_SYSTEM_JOOA11Y_MAIN_TOGGLE_LABEL="Sjekk tilgjengelighet"
PLG_SYSTEM_JOOA11Y_MISSING_ALT_LINK_BUT_HAS_TEXT_MESSAGE="Bildet brukes som en lenke med omkringliggende tekst, selv om alternativ-attributten bør være merket som dekorativt."
PLG_SYSTEM_JOOA11Y_MISSING_ALT_LINK_MESSAGE="Bildet brukes som en lenke men mangler ALT tekst! Kontroller at ALT teksten beskriver hvor lenken bringer deg."
PLG_SYSTEM_JOOA11Y_MISSING_ALT_MESSAGE="Manglende ALT tekst! Hvis bildet formidler en historie, humør eller viktig informasjon - sørg for å beskrive bildet."
PLG_SYSTEM_JOOA11Y_NEW_TAB_WARNING="Lenke åpnes i et nytt vindu uten advarsel. Dette kan være forvirrende, spesielt for personer som har problemer med å oppfatte visuelt innhold. For det andre er det ikke alltid en god praksis å kontrollere noens erfaring eller treffe beslutninger for dem. Viser at lenken åpner i et nytt vindu i lenketeksten."
PLG_SYSTEM_JOOA11Y_NEW_TAB_WARNING_TIP="<strong>Tips!</strong> Lær beste praksis: <a href=\"https://www.nngroup.com/articles/new-browser-windows-and-tabs/\" target=\"_blank\" rel=\"noopener noreferrer\">åpner lenker i nye nettleservinduer og -faner.</a>"
