PLG_SYSTEM_JOOA11Y_TABLES_EMPTY_HEADING="Tom tabell topptekst funnet! Tabelloverskrifter bør <em>aldri</em> være tomme. Det er viktig å angi rad og/eller kolonneoverskrifter for å formidle forholdet mellom dem. Denne informasjonen gir kontekst til personer som bruker hjelpeteknologi. Vennligst husk at tabeller bare bør brukes til tabelldata."
PLG_SYSTEM_JOOA11Y_TABLES_EMPTY_HEADING_INFO="Lær mer om <a href=\"https://www.w3.org/WAI/tutorials/tables/\" target=\"_blank\" rel=\"noopener noreferrer\">tilgjengelige tabeller.</a>"
PLG_SYSTEM_JOOA11Y_TABLES_MISSING_HEADINGS="Manglende tabelloverskrift! Tilgjengelige tabeller krever HTML-markering som indikerer toppceller og dataceller som definerer koblingen mellom dem. Denne informasjonen gir kontekst til personer som bruker hjelpeteknologi. Tabeller bør bare brukes for tabelldata."
PLG_SYSTEM_JOOA11Y_TABLES_MISSING_HEADINGS_INFO="Lær mer om <a href=\"https://www.w3.org/WAI/tutorials/tables/\" target=\"_blank\" rel=\"noopener noreferrer\">tilgjengelige tabeller.</a>"
PLG_SYSTEM_JOOA11Y_TABLES_SEMANTIC_HEADING="Semantiske overskrifter som overskrift 2 eller overskrift 3 bør bare brukes som overskrifter for seksjoner med innhold; <strong>ikke</strong> i HTML-tabeller. Angi tabelloverskrifter ved hjelp av elementet <strong>th</strong> i stedet."
PLG_SYSTEM_JOOA11Y_TABLES_SEMANTIC_HEADING_INFO="Lær mer om <a href=\"https://www.w3.org/WAI/tutorials/tables/\" target=\"_blank\" rel=\"noopener noreferrer\">tilgjengelige tabeller.</a>"
