PLG_SYSTEM_JOOA11Y="System - Joomla tilgjengelighetskontroll"
PLG_SYSTEM_JOOA11Y_FIELD_CHECK_ROOT="Målområde som skal kontrolleres"
PLG_SYSTEM_JOOA11Y_FIELD_CHECK_ROOT_DESC="Angi én enkelt velger som mål for et bestemt område av nettstedet ditt. Standardinnstillingen er landemerket <strong>main</strong>. Alternativer til landemerker er klasser, elementer eller ARIA-roller (f.eks. #main-content, .main, [role='main']). Skriv inn <strong>body</strong> for å sjekke hele siden."
PLG_SYSTEM_JOOA11Y_FIELD_CHECKS="Slå av kontroller"
PLG_SYSTEM_JOOA11Y_FIELD_CHECKS_DESC="Slå av bestemte kontroller med nøkkelnavn. Lær hvordan <a href=\"https://sa11y.netlify.app/plugins/joomla/#turn-off-checks\" target=\"_blank\" rel=\"noopener noreferrer\">slå av kontroller</a>."
PLG_SYSTEM_JOOA11Y_FIELD_CONTAINER_IGNORE="Ignorer områder"
PLG_SYSTEM_JOOA11Y_FIELD_CONTAINER_IGNORE_DESC="Ignorer bestemte områder i innholdsbeholderen. Bruk komma for å skille klasser eller elementer (for eksempel #ignore, .ignore)."
PLG_SYSTEM_JOOA11Y_FIELD_EXTRA_PROPS="Ekstra egenskaper"
PLG_SYSTEM_JOOA11Y_FIELD_EXTRA_PROPS_DESC="Send inn tilleggsegenskaper for å tilpasse. Lær hvordan du legger til <a href=\"https://sa11y.netlify.app/plugins/joomla/#extra-properties\" target=\"_blank\" rel=\"noopener noreferrer\">ekstra egenskaper</a>."
PLG_SYSTEM_JOOA11Y_FIELD_READABILITY_ROOT="Målområde for lesbarhet"
PLG_SYSTEM_JOOA11Y_FIELD_READABILITY_ROOT_DESC="Landemerket på siden som vil bli sjekket for lesbarhet. Standardinnstillingen er landemerket <strong>main</strong>."
PLG_SYSTEM_JOOA11Y_FIELD_SHOW_ALWAYS="Vis alltid"
PLG_SYSTEM_JOOA11Y_FIELD_SHOW_ALWAYS_DESC="Last inn tilgjengelighetskontrollen på alle sider. Dette er nyttig når du utvikler nettstedet, men bør ikke stå på når nettstedet er publisert."
PLG_SYSTEM_JOOA11Y_KEY="Nøkkel"
PLG_SYSTEM_JOOA11Y_VALUE="Verdi"
PLG_SYSTEM_JOOA11Y_XML_DESCRIPTION="Joomlas tilgjengelighetskontroll fremhever visuelt vanlige problemer med tilgjengelighet og brukervennlighet. Programtillegget er rettet mot innholdsforfattere, identifiserer feil og advarsler, og gir veiledning om hvordan de kan rettes. Vær oppmerksom på at dette programtillegget ikke gir en uttømmende analyse av nettstedet ditt, og at det heller ikke automatisk sikrer nettstedets tilgjengelighet. Det er viktig å velge en mal som i utgangspunktet er tilgjengelig, for å sikre at nettstedet oppfyller tilgjengelighetsstandardene."

