PLG_SYSTEM_JOOA11Y_PANEL_STATUS_WARNINGS="Tilgjengelighet Advarsler: %(warningCount)."
PLG_SYSTEM_JOOA11Y_QA_BAD_ITALICS="Uthevet og kursive emneord har semantisk betydning, og bør <strong>ikke</strong> brukes til å synliggjøre hele avsnittet. Uthevet tekst bør brukes for å gi sterkere <strong>vekt</strong> på et ord eller frase. Kursiv bør brukes til å fremheve riktige navn (f.eks. bok og artikkeltitler), utenlandske ord, sitater. Lange sitater bør formateres som et blokksitat."
PLG_SYSTEM_JOOA11Y_QA_BAD_LINK="Ugyldig lenke funnet. Lenken synes å peke til et utviklingsmiljø. Denne lenken peker til: <strong>%(el)</strong>"
PLG_SYSTEM_JOOA11Y_QA_BLOCKQUOTE_MESSAGE="Er dette en overskrift? <strong>%(bqHeadingText)</strong>"
PLG_SYSTEM_JOOA11Y_QA_BLOCKQUOTE_MESSAGE_TIP="Blokksitater bør kun brukes for sitat. Hvisdet var intensjonen at dette skal være en overskrift, endre dette blokksitatet til en semantisk overskrift (f.eks. overskrift 2 eller overskrift 3)."
PLG_SYSTEM_JOOA11Y_QA_DUPLICATE_ID="Fant <strong>duplisert ID</strong>. Dupliserte ID-feil er kjent for å forårsake problemer for hjelpeteknologier når de forsøker å kommunisere med innholdet."
PLG_SYSTEM_JOOA11Y_QA_DUPLICATE_ID_TIP="Vennligst fjern eller endre følgende ID: <strong>%(id)</strong>"
PLG_SYSTEM_JOOA11Y_QA_FAKE_HEADING="Er dette en overskrift? <strong>%(boldtext)</strong>"
PLG_SYSTEM_JOOA11Y_QA_FAKE_HEADING_INFO="En uthevet tekstlinje kan se ut som en overskrift, men noen som bruker en skjermleser kan ikke se at den er viktig eller går videre til dens innhold. Uthevet tekst bør aldri erstatte semantiske overskrifter (Overskrift 2 til overskrift 6)."
PLG_SYSTEM_JOOA11Y_QA_PAGE_LANGUAGE_MESSAGE="Sidens språk er ikke deklarert! Vennligst <a href=\"https://www.w3.org/International/questions/qa-html-language-declarations\" target=\"_blank\" rel=\"noopener noreferrer\">erklærer språk på HTML-taggen.</a>"
PLG_SYSTEM_JOOA11Y_QA_PDF_COUNT="PDFer betraktes som webinnhold og må også gjøres tilgjengelig. PDFer inneholder ofte problemer for personer som benytter skjermlesere (manglende strukturelle tagger eller manglende skjema etiketter) og personer med dårlig syn (tekst vises ikke på nytt ved forstørrelse). <ul><li>Hvis dette er et skjema, må du vurdere å bruke et tilgjengelig HTML-skjema som et alternativ.</li><li>Hvis dette er et dokument, vurder å konvertere det til en nettside.</li></ul><br>Ellers vennligst sjekk <strong>%(pdfCount)</strong> <a href=\"https://www.adobe.com/accessibility/products/acrobat/using-acrobat-pro-accessibility-checker.html\" target=\"_blank\" rel=\"noopener noreferrer\">PDF(s) for tilgjengelighet i Acrobat DC.</a>"
PLG_SYSTEM_JOOA11Y_QA_SHOULD_BE_LIST="Prøver du å opprette en liste? Mulig liste funnet: <strong>%(firstPrefix)</strong>"
PLG_SYSTEM_JOOA11Y_QA_SHOULD_BE_LIST_TIP="Sørg for å bruke semantiske lister ved å bruke knappene for punktliste eller nummererte lister i stedet. Ved bruk av en semantisk liste vil hjelpemiddelteknologi formidle informasjon som det totale antallet elementer og den relative posisjonen til hvert element på listen. Lær mer om <a href=\"https://www.w3.org/WAI/tutorials/page-structure/content/#lists\" target=\"_blank\" rel=\"noopener noreferrer\">semantiske lister.</a>"
PLG_SYSTEM_JOOA11Y_QA_UPPERCASE_WARNING="Fant store bokstaver. Noen skjermlesere kan tolke all store bokstaver som et akronym og vil lese hver bokstav individuelt. I tillegg er det noen som synes store bokstaver er mer vanskelig å lese, og det kan endre utseendet til SKRIKING."
