PLG_MULTIFACTORAUTH_FIXED="Flerfaktorautentisering - Fast kode"
PLG_MULTIFACTORAUTH_FIXED_ERR_EMPTYCODE="Den faste koden din kan ikke være tom."
PLG_MULTIFACTORAUTH_FIXED_LBL_DEFAULTTITLE="Fast kode"
PLG_MULTIFACTORAUTH_FIXED_LBL_DISPLAYEDAS="Fast kode"
PLG_MULTIFACTORAUTH_FIXED_LBL_LABEL="Fast kode"
PLG_MULTIFACTORAUTH_FIXED_LBL_PLACEHOLDER="Fyll inn din faste kode"
PLG_MULTIFACTORAUTH_FIXED_LBL_POSTMESSAGE="<p class=\"alert alert-info\">Meldingene som vises over og under kodeområdet kan tilpasses ved å overstyre språkstrengene <code>PLG_MULTIFACTORAUTH_FIXED_LBL_PREMESSAGE</code> og <code>PLG_MULTIFACTORAUTH_FIXED_LBL_POSTMESSAGE</code>.</p>"
PLG_MULTIFACTORAUTH_FIXED_LBL_PREMESSAGE="<p>Dette er et demonstrasjonsprogramtillegg for flerfaktorautentisering i Joomla. Du må skrive inn den faste koden du konfigurerte da du aktiverte flerfaktorautentisering for denne brukeren. Det fungerer i praksis som et andre passord.</p>"
PLG_MULTIFACTORAUTH_FIXED_LBL_SETUP_POSTMESSAGE="<p class=\"alert alert-info\">Meldingene som vises over og under oppsettsområdet kan tilpasses ved å overstyre språkstrengene <code>PLG_MULTIFACTORAUTH_FIXED_LBL_SETUP_PREMESSAGE</code> og <code>PLG_MULTIFACTORAUTH_FIXED_LBL_SETUP_POSTMESSAGE</code></p>"
PLG_MULTIFACTORAUTH_FIXED_LBL_SETUP_PREMESSAGE="<p>Skriv inn en fast kode nedenfor. Denne faste koden må oppgis etter innlogging før du kan bruke nettstedet.</p>"
PLG_MULTIFACTORAUTH_FIXED_LBL_SHORTINFO="Velg din egen forhåndsdefinerte kode. <strong>Kun for demonstrasjonsformål</strong>."
PLG_MULTIFACTORAUTH_FIXED_XML_DESCRIPTION="Et demonstrasjonsprogramtillegg for flerfaktorautentisering som bruker en fast kode (et &ldquo;andre passord&rdquo;). <strong>Ikke bruk dette på nettsteder i produksjon, det er ikke sikkert.</strong> Dette programtillegget er bare ment som et eksempel for utviklere som er interessert i å lage sine egne programtillegg."

