PLG_QUICKICON_EOS="Hurtigknapp - Joomla 5 Varsel om slutt på brukerstøtte"
PLG_QUICKICON_EOS_MESSAGE_ERROR_SUPPORT_ENDED="<p>Brukerstøtte er ikke lengre tilgjengelig for din versjon av Joomla 5. <a href=\"%2$s\" target=\"_blank\" rel=\"noopener noreferrer\">Oppgrader til Joomla 6</a> så snart som mulig.</p>"
PLG_QUICKICON_EOS_MESSAGE_INFO_01="<p>Joomla 6 er tilgjengelig! Finn ut alt Joomla 6 har å tilby. Sjekk landingssiden for <a href=\"%2$s\" target=\"_blank\" rel=\"noopener noreferrer\">Joomla 6 funksjoner</a> og forbedringer.</p>"
PLG_QUICKICON_EOS_MESSAGE_INFO_02="<p>Når er tidspunktet inne for å oppgradere til Joomla 6? Med en gang utvidelsene for ditt nettsted er kampatible. Lær <a href=\"%2$s\" target=\"_blank\" rel=\"noopener noreferrer\"> hvordan du skal bruke program for å forhåndssjekke oppgradering</a>.</p>"
PLG_QUICKICON_EOS_MESSAGE_WARNING_SECURITY_ONLY="<p>Joomla 5 er nå i sikkerhetsmodus. Brukerstøtte avsluttes %1$s. Start <a href=\"%2$s\" target=\"_blank\" rel=\"noopener noreferrer\">-planlegging for å oppgradere</a> til Joomla 6 i dag.</p>"
PLG_QUICKICON_EOS_MESSAGE_WARNING_SUPPORT_ENDING="<p>Støtte for Joomla 5 slutter %1$s <a href=\"%2$s\" target=\"_blank\" rel=\"noopener noreferrer\">Oppgrader til Joomla 6</a> så snart som mulig.</p>"
PLG_QUICKICON_EOS_SNOOZE_BUTTON="Utsett denne meldingen for alle brukere"
PLG_QUICKICON_EOS_XML_DESCRIPTION="Sjekker om brukerstøtte er avsluttet for Joomla 5 og varsler deg om dette, når du går til kontrollpanelet."

