COM_GUIDEDTOURS_TOUR_WHATSNEW_5_2_DESCRIPTION="<h1 class=\"fw-medium\">Velkommen til Joomla 5.2!</h1><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3 mb-md-0\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/5_2/enhancedtourheader.png\" alt=\"The first step of the welcome tour, showing the new header look\" width=\"640\" height=\"384\"></div><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Guided Tours Updates</h2><h3>Auto-start guidede turer</h3><p>Denne funksjonen tillater deg å opprette din egen auto-start guidede tur. Den kontekstuelle guiden kan velges bort for en eller alle brukere. Guidede turer kan bli startet på nytt fra Guidede tur menyen.</p><h3>Forbedringer</h3><ul class=\"mb-3\"><li>For å klargjøre <em>trinn tellerenCounter</em> ble plassert først i toppteksten til den guidede turen.</li><li>Modal vinduet endrer størrelser automatisk tilpasset innhold og bilder.</li></ul></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Oppdateringer</h2><h3>Den nye alt-i-en 'Artikkel' modul</h3><p>Bruk en modul for å vise siste, mest leste, spesifikke eller arkiverte artikler, velg fra kategorier med filtre, emneord og mer...</p><p>Fra <span class=\"fw-medium\">Innhold-&gt; Nettstedsmoduler</span>, opprett en ny module av type 'Artikler'.</p><h3>E-post mal utseende</h3><p>Ta det et steg videre ved å opprette en helt unik utseende (inkludert logo) som kan brukes på en eller alle e-post maler.</p><p>Fra <span class=\"fw-medium\">Global konfigurasjon-&gt; E-post maler</span>, utseende kan defineres i HTML.</p><h3>Andre forbedringer og korreksjoner</h3><ul class=\"mb-3\"><li>Nøstede underskjema - Tillater nøstede underliggende skjema inni et skjema tilpasset felt.</li><li>Total telling - Viser telling og total antall element i en liste i kontrollpanelet.</li></ul></div><div class=\"col-md-6 col-lg-5\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/5_2/mailtemplate.png\" alt=\"Mail template example, including a header logo and a footer\" width=\"640\" height=\"370\" loading=\"lazy\"></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_5_2_TITLE="Hva er nytt i Joomla 5.2!"

