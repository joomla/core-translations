PLG_SEF_DOMAIN_DESCRIPTION="Dersom nettstedet kan nås gjennom mer enn ett domene, skriv inn det foretrukne domenet her (noen ganger kalt kanonisk domene). <br><strong>Merk:</strong> https://example.com og https://www.example.com er forskjellige domener."
PLG_SEF_DOMAIN_LABEL="Domene"
PLG_SEF_ENFORCESUFFIX_DESCRIPTION="Når dette er aktivert og \"Legg til suffiks til URL\" også er aktivert, vil nettadresser uten suffiks bli omdirigert til den riktige. Fra versjon 6.0 og fremover vil dette være standard oppførsel og ikke lenger et valg."
PLG_SEF_ENFORCESUFFIX_LABEL="Tving en endelse ved å omdirigere"
PLG_SEF_INDEXPHP_DESCRIPTION="Dette alternativet aktiverer en strengere håndtering av 'index.php' i nettadresser når 'Bruk nettadresse-omskriving' er aktivert i den globale konfigurasjonen. Det vil fjerne 'index.php' dersom en nettadresse fortsatt inneholder den, og viderekobler innkommende forespørsler med 'index.php' til versjonen uten 'index.php'."
PLG_SEF_INDEXPHP_LABEL="Streng håndtering av index.php"
PLG_SEF_STRICTROUTING_DESCRIPTION="Forhindrer routeren fra å akspetere mange nettadresser som anses som duplikater, og vil automatisk omadressere til riktig nettadresse med en 301-omadressering."
PLG_SEF_STRICTROUTING_LABEL="Streng ruting"
PLG_SEF_TRAILINGSLASH_DESCRIPTION="Tving Joomla til kun å bruke nettadresser med eller uten avsluttende skråstrek. Når satt, vil dette tvinge riktig nettadresse med omadresseringer, og brukes bare når 'Legg til suffiks til nettadresse' er deaktivert."
PLG_SEF_TRAILINGSLASH_LABEL="Avsluttende skråstrek for nettadresser"
PLG_SEF_TRAILINGSLASH_OPTION_NONE="Ingen endring"
PLG_SEF_TRAILINGSLASH_OPTION_NO_SLASH="Bruk nettadresser uten avsluttende skråstrek"
PLG_SEF_TRAILINGSLASH_OPTION_SLASH="Bruk nettadresser med avsluttende skråstrek"
PLG_SEF_XML_DESCRIPTION="Gir støtte for SEF-lenker i artikler. Opererer direkte på HTML-koden og behøver ingen spesiell tagg."
PLG_SYSTEM_SEF="System - SEF"

