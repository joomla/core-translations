COM_PRIVACY_CONFIRM_REQUEST_FIELDSET_LABEL="E-mel telah dihantar ke alamat e-mel anda. Sila tampalkan token pengesahan daripada e-mel ke dalam medan di bawah untuk membuktikan bahawa anda adalah pemilik maklumat yang diminta."
COM_PRIVACY_CONFIRM_REQUEST_SUCCEEDED="Permintaan maklumat anda telah disahkan. Kami akan memproses permintaan anda secepat mungkin dan eksport akan dihantar ke e-mel anda."
COM_PRIVACY_CREATE_REQUEST_SUCCEEDED="Permintaan maklumat anda telah dibuat. Sebelum ia boleh diproses, anda mesti mengesahkan permintaan ini. E-mel telah dihantar ke alamat anda dengan arahan tambahan untuk melengkapkan pengesahan ini."
COM_PRIVACY_EMAIL_REQUEST_BODY_EXPORT_REQUEST="Seseorang telah membuat permintaan untuk mengeksport semua maklumat peribadi yang berkaitan dengan alamat e-mel ini di {URL}. Sebagai langkah keselamatan, anda mesti mengesahkan bahawa ini adalah permintaan yang sah untuk maklumat peribadi anda daripada tapak web ini.\n\nJika ini satu kesilapan, abaikan e-mel ini dan tiada apa-apa akan berlaku.\n\nUntuk mengesahkan permintaan ini, anda boleh menyelesaikan salah satu tugas berikut:\n\n1. Lawati URL berikut: {TOKENURL}\n\n2. Salin token anda daripada e-mel ini, lawati URL yang dirujuk dan tampalkan token anda ke dalam borang.\nURL: {FORMURL}\nToken: {TOKEN}\n\nSila ambil perhatian bahawa token ini hanya sah selama 24 jam dari masa e-mel ini dihantar."
COM_PRIVACY_EMAIL_REQUEST_BODY_REMOVE_REQUEST="Seseorang telah membuat permintaan untuk mengalih keluar semua maklumat peribadi yang berkaitan dengan alamat e-mel ini di {URL}. Sebagai langkah keselamatan, anda mesti mengesahkan bahawa ini adalah permintaan yang sah untuk maklumat peribadi anda dialih keluar daripada tapak web ini.\n\nJika ini satu kesilapan, abaikan e-mel ini dan tiada apa-apa akan berlaku.\n\nUntuk mengesahkan permintaan ini, anda boleh menyelesaikan salah satu tugas berikut:\n\n1. Lawati URL berikut: {TOKENURL}\n\n2. Salin token anda daripada e-mel ini, lawati URL yang dirujuk dan tampalkan token anda ke dalam borang.\nURL: {FORMURL}\nToken: {TOKEN}\n\nSila ambil perhatian bahawa token ini hanya sah selama 24 jam dari masa e-mel ini dihantar."
