COM_USERS_EMAIL_ACCOUNT_DETAILS="Butiran Akaun untuk {NAME} di {SITENAME}"
COM_USERS_EMAIL_ACTIVATED_BY_ADMIN_ACTIVATION_BODY="Helo {NAME},\n\nAkaun anda telah diaktifkan oleh pentadbir. Anda kini boleh log masuk di {SITEURL} menggunakan nama pengguna {USERNAME} dan kata laluan yang anda pilih semasa mendaftar."
COM_USERS_EMAIL_ACTIVATED_BY_ADMIN_ACTIVATION_SUBJECT="Akaun diaktifkan untuk {NAME} di {SITENAME}"
COM_USERS_EMAIL_ACTIVATE_WITH_ADMIN_ACTIVATION_BODY="Helo pentadbir,\n\nSeorang pengguna baharu telah mendaftar di {SITENAME}.\nPengguna telah mengesahkan alamat e-mel mereka dan meminta anda meluluskan akaun mereka.\nE-mel ini mempunyai butiran mereka:\n\n Nama : {NAME} \n e-mel: {EMAIL} \n Nama pengguna: {USERNAME} \n\nAnda boleh mengaktifkan pengguna dengan memilih pautan di bawah:\n{ACTIVATE}:\n{ACTIVATE}"
COM_USERS_EMAIL_ACTIVATE_WITH_ADMIN_ACTIVATION_SUBJECT="Kelulusan pendaftaran diperlukan untuk akaun {NAME} di {SITENAME}"
COM_USERS_EMAIL_PASSWORD_RESET_BODY="Helo,\n\nPermintaan telah dibuat untuk menetapkan semula kata laluan akaun {SITENAME} anda. Untuk menetapkan semula kata laluan anda, anda perlu menyerahkan kod pengesahan ini untuk mengesahkan bahawa permintaan itu adalah sah.\n\nKod pengesahan ialah {TOKEN}\n\nPilih URL di bawah dan teruskan menetapkan semula kata laluan anda.\n\n{LINK_TEXT} \n\nTerima kasih."
COM_USERS_EMAIL_PASSWORD_RESET_SUBJECT="Permintaan tetapan semula kata laluan {SITENAME} anda"
COM_USERS_EMAIL_REGISTERED_BODY="Helo {NAME},\n\nTerima kasih kerana mendaftar di {SITENAME}.\n\nAnda kini boleh log masuk ke {SITEURL} menggunakan nama pengguna dan kata laluan berikut:\n\nNama pengguna: {USERNAME}\nKata laluan: {PASSWORD_CLEAR}"
COM_USERS_EMAIL_REGISTERED_BODY_NOPW="Hello {NAME},\n\nTerima kasih kerana mendaftar di {SITENAME}.\n\nAnda kini boleh log masuk ke {SITEURL} menggunakan nama pengguna dan kata laluan yang anda daftarkan."
COM_USERS_EMAIL_REGISTERED_NOTIFICATION_TO_ADMIN_BODY="Helo pentadbir, \n\nSeorang pengguna baharu '{NAME}', nama pengguna '{USERNAME}', telah mendaftar di {SITEURL}."
COM_USERS_EMAIL_REGISTERED_WITH_ACTIVATION_BODY="Helo {NAME},\n\nTerima kasih kerana mendaftar di {SITENAME}. Akaun anda telah dibuat dan mesti diaktifkan sebelum anda boleh menggunakannya.\nUntuk mengaktifkan akaun pilih pautan berikut atau salin-tampalkannya dalam penyemak imbas anda:\n{ACTIVATE} \n\nSelepas pengaktifan anda boleh log masuk ke {SITEURL} menggunakan nama pengguna dan kata laluan berikut:\n\nNama pengguna: {USERNAME}\nKata Laluan: {PASSWORD_CLEAR}"
COM_USERS_EMAIL_REGISTERED_WITH_ACTIVATION_BODY_NOPW="Helo {NAME},\n\nTerima kasih kerana mendaftar di {SITENAME}. Akaun anda telah dibuat dan mesti diaktifkan sebelum anda boleh menggunakannya.\nUntuk mengaktifkan akaun pilih pautan berikut atau salin-tampalkannya dalam penyemak imbas anda:\n{ACTIVATE} \n\nSelepas pengaktifan anda boleh log masuk ke {SITEURL} menggunakan nama pengguna berikut dan kata laluan yang anda masukkan semasa pendaftaran:\n\nNama pengguna: {USERNAME}"
COM_USERS_EMAIL_REGISTERED_WITH_ADMIN_ACTIVATION_BODY="Helo {NAME},\n\nTerima kasih kerana mendaftar di {SITENAME}. Akaun anda telah dibuat dan mesti disahkan sebelum anda boleh menggunakannya.\n\nUntuk mengesahkan akaun pilih pautan berikut atau salin-tampalkannya dalam penyemak imbas anda:\n{ACTIVATE} \n\nSelepas pengesahan pentadbir akan dimaklumkan untuk mengaktifkan akaun anda. Anda akan menerima pengesahan apabila ia selesai.\n\nSetelah akaun itu telah diaktifkan, anda boleh log masuk ke {SITEURL} menggunakan nama pengguna dan kata laluan berikut:\n\nNama pengguna: {USERNAME}\nKata laluan: {PASSWORD_CLEAR}"
COM_USERS_EMAIL_REGISTERED_WITH_ADMIN_ACTIVATION_BODY_NOPW="Helo {NAME},\n\nTerima kasih kerana mendaftar di {SITENAME}. Akaun anda telah dibuat dan mesti disahkan sebelum anda boleh menggunakannya.\n\nUntuk mengesahkan akaun pilih pautan berikut atau salin-tampalkannya dalam penyemak imbas anda:\n{ACTIVATE} \n\nSelepas pengesahan pentadbir akan dimaklumkan untuk mengaktifkan akaun anda. Anda akan menerima pengesahan apabila ia selesai.\n\nSetelah akaun itu diaktifkan, anda boleh log masuk ke {SITEURL} menggunakan nama pengguna berikut dan kata laluan yang anda masukkan semasa pendaftaran:\n\nNama pengguna: {USERNAME}"
COM_USERS_EMAIL_USERNAME_REMINDER_BODY="Helo,\n\nPeringatan nama pengguna telah diminta untuk akaun {SITENAME} anda.\n\nNama pengguna anda: {USERNAME}\n\nUntuk log masuk ke akaun anda, pilih pautan di bawah.\n\n{LINK_TEXT} \n\nTerima kasih."
