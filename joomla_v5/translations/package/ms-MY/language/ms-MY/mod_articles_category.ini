MOD_ARTICLES_CATEGORY_FIELD_MODE_DESC="Sila pilih mod yang anda ingin gunakan. Jika Mod Normal dipilih, kemudian konfigurasikan modul dan ia akan memaparkan senarai statik Artikel pada item menu yang anda tetapkan modul itu. Jika Mod Dinamik dipilih, maka anda masih boleh mengkonfigurasi modul seperti biasa, namun kini pilihan Kategori tidak akan digunakan lagi. Sebaliknya, modul akan mengesan secara dinamik jika anda berada pada paparan Kategori dan akan memaparkan senarai artikel dalam Kategori tersebut. Apabila Mod Dinamik dipilih, sebaiknya biarkan modul ditetapkan untuk dipaparkan pada semua halaman, kerana ia akan memutuskan untuk memaparkan apa-apa secara dinamik."
