MOD_ARTICLES_CATEGORY_FIELD_MODE_DESC="Sila pilih mod yang anda ingin gunakan. Jika Mod Normal dipilih, maka konfigurasikan modul dan ia akan memaparkan senarai Artikel statik pada item menu yang anda tetapkan modul. Jika Mod Dinamik dipilih, maka anda masih boleh mengkonfigurasikan modul secara biasa, namun pilihan Kategori tidak lagi digunakan. Sebaliknya, modul akan mengesan secara dinamik jika anda berada dalam paparan Kategori dan akan memaparkan senarai artikel dalam Kategori tersebut. Apabila Mod Dinamik dipilih, adalah terbaik untuk menetapkan modul dipaparkan di semua halaman, kerana ia akan memutuskan untuk memaparkan apa sahaja secara dinamik."
