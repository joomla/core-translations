COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTSET="Folder sementara Joomla tidak ditetapkan."
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTSETDESC="Folder ini adalah tempat Joomla menyalin sambungan, mengekstrak sambungan dan fail kemudian disalin ke direktori yang betul. Jika lokasi ini tidak ditetapkan dalam configuration.php ($tmp_path) maka anda tidak akan dapat memuat naik sambungan. Cipta folder untuk membolehkan Joomla menulis ke folder untuk membetulkan masalah."
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTWRITEABLE="Folder sementara Joomla tidak boleh ditulis atau tidak wujud."
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTWRITEABLEDESC="Ini mungkin menyebabkan masalah semasa cuba memuat naik sambungan ke Joomla. Jika anda mengalami masalah memuat naik sambungan, pastikan folder yang ditakrifkan dalam configuration.php anda wujud atau semak '%s' dan tetapkannya sebagai boleh ditulis dan lihat jika ini membetulkan masalah."
COM_INSTALLER_MSG_WARNINGS_LOWMEMORYDESC="Had memori PHP anda ditetapkan di bawah 16MB yang mungkin menyebabkan masalah semasa memasang sambungan besar. Sila tetapkan had memori anda kepada sekurang-kurangnya 32MB."
COM_INSTALLER_MSG_WARNINGS_LOWMEMORYWARN="Had memori PHP rendah."
COM_INSTALLER_MSG_WARNINGS_MEDMEMORYDESC="Had memori PHP anda ditetapkan di bawah 24MB yang mungkin menyebabkan masalah semasa memasang sambungan besar. Sila tetapkan had memori anda kepada sekurang-kurangnya 32MB."
COM_INSTALLER_MSG_WARNINGS_MEDMEMORYWARN="Had memori PHP berpotensi rendah."
COM_INSTALLER_MSG_WARNINGS_NONE="Tiada amaran dikesan."
COM_INSTALLER_MSG_WARNINGS_NOTCOMPLETE="<h1>Amaran: Kemas Kini Tidak Lengkap!</h1><p>Kemas kini hanya separuh lengkap. Sila lakukan kemas kini kedua untuk melengkapkan proses.</p>"
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTSET="Folder sementara PHP tidak ditetapkan."
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTSETDESC="Folder ini adalah folder yang digunakan PHP untuk menyimpan fail yang dimuat naik sebelum Joomla boleh mengakses fail ini. Walaupun folder tidak ditetapkan bukan sentiasa masalah, jika anda mengalami masalah dengan fail manifes tidak dikesan atau fail yang dimuat naik tidak dikesan, menetapkan <code>upload_tmp_dir</code> dalam fail php.ini anda mungkin membetulkan masalah."
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTWRITEABLE="Folder sementara PHP tidak boleh ditulis."
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTWRITEABLEDESC="Folder ini yang ditentukan oleh <code>upload_tmp_dir</code> dalam php.ini anda tidak boleh ditulis oleh contoh Joomla!, yang mungkin menyebabkan masalah semasa cuba memuat naik sambungan ke Joomla. Jika anda mengalami masalah memuat naik sambungan, semak '%s' dan tetapkannya sebagai boleh ditulis dan lihat jika ini membetulkan masalah."
COM_INSTALLER_MSG_WARNINGS_SMALLPOSTSIZE="Saiz POST maksimum PHP kecil."
COM_INSTALLER_MSG_WARNINGS_SMALLPOSTSIZEDESC="Ini adalah jumlah maksimum data yang boleh dihantar melalui POST ke pelayan. Ini termasuk penghantaran borang untuk artikel, media (imej, video) dan sambungan. Nilai ini kurang daripada 16MB yang mungkin menjejaskan muat naik sambungan besar. Ini ditetapkan dalam php.ini di bawah post_max_size."
COM_INSTALLER_MSG_WARNINGS_SMALLUPLOADSIZE="Saiz muat naik fail PHP maksimum terlalu kecil."
COM_INSTALLER_MSG_WARNINGS_SMALLUPLOADSIZEDESC="Saiz fail maksimum untuk muat naik ditetapkan kurang daripada 16MB yang mungkin menjejaskan muat naik sambungan besar. Ini ditetapkan dalam php.ini dalam kedua-dua tetapan upload_max_filesize dan post_max_size tetapan PHP anda (terletak dalam php.ini dan/atau fail .htaccess). Nilai post_max_size mesti lebih besar daripada nilai upload_max_filesize."
COM_INSTALLER_MSG_WARNINGS_UPDATE_NOTICE="Sebelum mengemas kini pastikan kemas kini ini serasi dengan pemasangan Joomla! anda. <br>Anda amat dinasihatkan untuk membuat <strong>sandaran</strong> fail dan pangkalan data laman anda sebelum mula mengemas kini."
COM_INSTALLER_MSG_WARNINGS_UPLOADBIGGERTHANPOST="Saiz Muat Naik PHP lebih besar daripada saiz POST."
COM_INSTALLER_MSG_WARNINGS_UPLOADBIGGERTHANPOSTDESC="Nilai upload_max_filesize dalam fail php.ini lebih besar daripada pemboleh ubah post_max_size. Pemboleh ubah post_max_size akan diutamakan dan menyekat permintaan yang lebih besar daripadanya. Ini biasanya salah konfigurasi pelayan semasa cuba meningkatkan saiz muat naik. Sila tingkatkan nilai post_max_size supaya lebih besar daripada nilai upload_max_filesize."
COM_INSTALLER_MSG_WARNINGS_UPLOADFILETOOBIG="Fail yang dipilih tidak boleh dimuat naik kerana ia lebih besar daripada saiz muat naik maksimum."
