PLG_SYSTEM_JOOA11Y_EMBED_AUDIO="Sila pastikan anda menyediakan <strong>transkrip untuk semua podcast.</strong> Menyediakan transkrip untuk kandungan audio ialah keperluan Tahap A yang wajib. Transkrip menyokong orang yang D/pekak atau kurang pendengaran, tetapi boleh memberi manfaat kepada semua orang. Pertimbangkan untuk meletakkan transkrip di bawah atau dalam panel akordion."
PLG_SYSTEM_JOOA11Y_EMBED_GENERAL_WARNING="Tidak dapat menyemak kandungan terbenam. Sila pastikan bahawa imej mempunyai teks alt, video mempunyai kapsyen, teks mempunyai kontras yang mencukupi dan komponen interaktif adalah <a href=\"https://webaim.org/techniques/keyboard/\" target=\"_blank\" rel=\"noopener noreferrer\<_PH7"_QQ_"_PH7"_QQ_"a_PH7"_QQ_"_PH."
PLG_SYSTEM_JOOA11Y_EMBED_MISSING_TITLE="Kandungan terbenam memerlukan nama yang boleh diakses yang menerangkan kandungannya. Sila sediakan <span class=\"jooa11y-kbd\">title</span> atau <span class=\"jooa11y-kbd\">aria-label</span"_QQ_"PH10__/span2__ pada atribut class=\"jooa11y-kbd\">iframe</span> elemen. Ketahui lebih lanjut tentang <a href=\"https://dequeuniversity.com/tips/provide-iframe-titles\" target=\"_blank\" rel=\"noopener noreferrer\"__PH25"_QQ_"iFrames/a>iFrames/a>iFrames."
PLG_SYSTEM_JOOA11Y_EMBED_VIDEO="Sila pastikan <strong>semua video mempunyai kapsyen tertutup.</strong> Menyediakan kapsyen untuk semua kandungan audio dan video ialah keperluan Tahap A yang wajib. Kapsyen menyokong orang yang D/pekak atau kurang pendengaran."
