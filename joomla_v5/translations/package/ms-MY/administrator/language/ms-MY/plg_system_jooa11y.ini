PLG_SYSTEM_JOOA11Y_CONTRAST_WARNING_MESSAGE="Perbezaan teks ini tidak diketahui dan perlu disemak secara manual. Pastikan teks dan latar belakang mempunyai warna kontras yang kuat. Nisbah kontras hendaklah sekurang-kurangnya 4.5:1 untuk teks biasa dan 3:1 untuk teks besar."
