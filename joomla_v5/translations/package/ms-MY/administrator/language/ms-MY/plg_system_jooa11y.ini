PLG_SYSTEM_JOOA11Y_LINK_ALT_TOO_LONG_MESSAGE="Perihalan teks alternatif ialah <strong>terlalu panjang</strong>. Teks alt hendaklah ringkas, namun bermakna seperti <em>tweet</em> (kira-kira 100 aksara). Jika ini ialah imej atau graf yang kompleks, pertimbangkan untuk meletakkan perihalan panjang imej dalam teks di bawah atau komponen akordion."
