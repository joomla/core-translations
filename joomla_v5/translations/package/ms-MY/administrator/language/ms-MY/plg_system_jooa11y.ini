PLG_SYSTEM_JOOA11Y_LINK_ANCHOR_LINK_AND_ALT_MESSAGE="Pautan imej mengandungi <strong>kedua-dua teks alt dan teks pautan sekeliling.</strong> Jika imej ini adalah hiasan dan sedang digunakan sebagai pautan berfungsi ke halaman lain, pertimbangkan untuk menandakan imej sebagai hiasan - teks pautan di sekelilingnya sudah memadai."
