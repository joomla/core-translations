PLG_SYSTEM_JOOA11Y_HEADING_EMPTY="Tajuk kosong ditemui! Untuk membetulkan, padamkan baris ini atau tukar formatnya daripada <strong>Tajuk %(level)</strong> kepada <strong>Normal</strong> atau <strong>Paragraph</strong>."
PLG_SYSTEM_JOOA11Y_HEADING_EMPTY_WITH_IMAGE="Tajuk tidak mempunyai teks, tetapi mengandungi imej. Jika ini bukan tajuk, tukar formatnya daripada <strong>Tajuk %(level)</strong> kepada <strong>Normal</strong> atau <strong>Paragraph</strong>. Jika tidak, sila tambahkan teks alt pada imej jika ia bukan hiasan."
PLG_SYSTEM_JOOA11Y_HEADING_FIRST="Tajuk pertama pada halaman biasanya hendaklah Tajuk 1 atau Tajuk 2. Tajuk 1 hendaklah menjadi permulaan bahagian kandungan utama dan merupakan tajuk utama yang menerangkan tujuan keseluruhan halaman. Ketahui lebih lanjut tentang <a href=\"https://www.w3.org/WAI/tutorials/page-structure/headings/\" target=\"_blank\" rel=\"noopener noreferrer\">Struktur Tajuk.>/a>"
PLG_SYSTEM_JOOA11Y_HEADING_LONG="Tajuk panjang! Tajuk hendaklah digunakan untuk menyusun kandungan dan menyampaikan struktur. Mereka harus ringkas, bermaklumat, dan unik. Sila simpan tajuk kurang daripada 160 aksara (tidak lebih daripada satu ayat)."
PLG_SYSTEM_JOOA11Y_HEADING_LONG_INFO="Kiraan Aksara: <strong>%(headingLength)</strong>."
PLG_SYSTEM_JOOA11Y_HEADING_MISSING_ONE="Tajuk Hilang 1. Tajuk 1 hendaklah menjadi permulaan kawasan kandungan utama dan merupakan tajuk utama yang menerangkan tujuan keseluruhan halaman. Ketahui lebih lanjut tentang <a href=\"https://www.w3.org/WAI/tutorials/page-structure/headings/\" target=\"_blank\" rel=\"noopener noreferrer\">Struktur Tajuk.>/a>"
PLG_SYSTEM_JOOA11Y_HEADING_NON_CONSECUTIVE_LEVEL="Tahap tajuk tidak berturut-turut digunakan. Tajuk tidak boleh melangkau tahap, atau pergi dari <strong>Tajuk %(prevLevel)</strong> ke <strong>Tajuk %(level)</strong>."
PLG_SYSTEM_JOOA11Y_HIDE_OUTLINE="Sembunyikan Outline"
PLG_SYSTEM_JOOA11Y_HIDE_SETTINGS="Sembunyikan Tetapan"
PLG_SYSTEM_JOOA11Y_HYPERLINK_ALT_LENGTH_MESSAGE="Perihalan teks alt pada imej yang dipautkan ialah <strong>terlalu panjang</strong>. Teks alt pada imej terpaut harus menerangkan ke mana pautan membawa anda, bukan penerangan literal imej. <strong>Pertimbangkan untuk menggunakan tajuk halaman yang dipautkannya sebagai teks alt.</strong>"
PLG_SYSTEM_JOOA11Y_HYPERLINK_ALT_LENGTH_MESSAGE_INFO="Teks alt ialah <strong>%(altLength)</strong> aksara: <strong>%(altText)</strong>"
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DECORATIVE="Imej ditandakan sebagai <strong>decorative</strong> dan akan diabaikan oleh teknologi bantuan."
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DECORATIVE_INFO="Walaupun <strong>caption</strong> telah disediakan, imej itu juga harus mempunyai teks alt dalam kebanyakan kes. <ul><li>Teks alt harus memberikan penerangan ringkas tentang perkara yang terdapat dalam imej.</li><li>Kapsyen biasanya harus menyediakan konteks untuk mengaitkan imej kembali dengan kandungan sekeliling atau memberi perhatian kepada sekeping maklumat tertentu.</li__PH15:PH12__/li__PH15: <a href=\"https://thoughtbot.com/blog/alt-vs-figcaption#the-figcaption-element\" target=\"_blank\" rel=\"noopener noreferrer\">alttion"
PLG_SYSTEM_JOOA11Y_IMAGE_FIGURE_DUPLICATE_ALT="Jangan gunakan perkataan yang sama untuk kedua-dua teks alt dan kapsyen. Pembaca skrin akan mengumumkan maklumat dua kali."
PLG_SYSTEM_JOOA11Y_LABELS_ARIA_LABEL_INPUT_MESSAGE="Input mempunyai nama yang boleh diakses, walaupun sila pastikan terdapat label yang boleh dilihat juga."
PLG_SYSTEM_JOOA11Y_LABELS_ARIA_LABEL_INPUT_MESSAGE_INFO="Nama yang boleh diakses untuk input ini ialah: <strong>%(ariaLabel)</strong>"
PLG_SYSTEM_JOOA11Y_LABELS_INPUT_RESET_MESSAGE="Butang tetapan semula hendaklah <strong>bukan</strong> digunakan melainkan diperlukan secara khusus kerana ia mudah untuk diaktifkan secara tidak sengaja."
PLG_SYSTEM_JOOA11Y_LABELS_INPUT_RESET_MESSAGE_TIP="<strong>Tip!</strong> Ketahui sebab <a href=\"https://www.nngroup.com/articles/reset-and-cancel-buttons/\" target=\"_blank\" rel=\"noopener PH1__noreferrset0__noopener____ isu kebolehgunaan.</a>"
PLG_SYSTEM_JOOA11Y_LABELS_MISSING_IMAGE_INPUT_MESSAGE="Butang imej tiada teks alt. Sila tambah teks alt untuk memberikan nama yang boleh diakses. Contohnya: <em>Search</em> atau <em>Serah</em>."
PLG_SYSTEM_JOOA11Y_LABELS_MISSING_LABEL_MESSAGE="Tiada label yang dikaitkan dengan input ini. Sila tambahkan <span class=\"jooa11y-kbd\">id</span> pada input ini dan tambahkan <span class=\"jooa11y-kbd\">for</span pada atribut</span."
PLG_SYSTEM_JOOA11Y_LABELS_NO_FOR_ATTRIBUTE_MESSAGE="Tiada label yang dikaitkan dengan input ini. Tambahkan <span class=\"jooa11y-kbd\">for</span> atribut pada label yang sepadan dengan <span class=\"jooa11y-kbd\">id</span__PH ini."
