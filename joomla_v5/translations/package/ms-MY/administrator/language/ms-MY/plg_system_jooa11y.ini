PLG_SYSTEM_JOOA11Y_FIELD_ADDITIONAL_CHECKS_DESC="Mendayakan pilihan ini akan menyembunyikan suis togol secara visual untuk Label Borang, Kontras, Pautan (Lanjutan) dalam panel Tetapan."
PLG_SYSTEM_JOOA11Y_FIELD_COLOUR_FILTER="Penapis Warna"
PLG_SYSTEM_JOOA11Y_FIELD_COLOUR_FILTER_DESC="Tunjukkan togol Penapis Warna dalam panel Tetapan. Penapis warna membantu mengenal pasti kombinasi warna yang mungkin sukar untuk dibezakan oleh orang ramai."
PLG_SYSTEM_JOOA11Y_FIELD_CONTRAST="Berbeza"
PLG_SYSTEM_JOOA11Y_FIELD_CONTRAST_DESC="Tunjukkan togol Kontras dalam panel Tetapan. Semak isu kontras WCAG 2.0 Tahap AA antara teks latar depan dan elemen latar belakang."
PLG_SYSTEM_JOOA11Y_FIELD_FORM_LABELS="Label Borang"
PLG_SYSTEM_JOOA11Y_FIELD_FORM_LABELS_DESC="Tunjukkan Togol Label Borang dalam panel Tetapan. Semak input borang yang tiada label yang sepadan. Tidak semestinya isu pengarang kandungan, dan biasanya bukan isu apabila menggunakan pemalam borang boleh diakses yang bereputasi baik."
PLG_SYSTEM_JOOA11Y_FIELD_LINKS_ADVANCED="Pautan (Lanjutan)"
PLG_SYSTEM_JOOA11Y_FIELD_LINKS_ADVANCED_DESC="Togol Tunjukkan Pautan (Lanjutan) dalam panel Tetapan. Semak isu tambahan seperti: pautan yang dibuka dalam tab baharu tanpa amaran, mempunyai nama yang sama tetapi tujuan berbeza, atau menunjuk ke PDF dan fail lain tanpa amaran."
PLG_SYSTEM_JOOA11Y_FIELD_WEB_COMPONENTS="Komponen Web untuk Semak"
PLG_SYSTEM_JOOA11Y_FIELD_WEB_COMPONENTS_DESC="Sediakan senarai semua komponen atau bekas web yang diketahui dengan DOM bayangan terbuka."
PLG_SYSTEM_JOOA11Y_FILE_TYPE_WARNING="Pautan menunjuk ke PDF atau fail yang boleh dimuat turun (cth. MP3, Zip, Word Doc) tanpa amaran. Nyatakan jenis fail dalam teks pautan. Jika ia adalah fail besar, pertimbangkan untuk memasukkan saiz fail."
PLG_SYSTEM_JOOA11Y_FILE_TYPE_WARNING_TIP="<strong>Contoh:</strong> Laporan Eksekutif (PDF, 3MB)"
