PLG_SYSTEM_JOOA11Y_LINK_BEST_PRACTICES_DETAILS="<ul><li>&quot;Klik di sini&quot; tempat memfokuskan pada mekanik tetikus, apabila ramai orang tidak menggunakan tetikus atau mungkin melihat tapak web ini pada peranti mudah alih. Pertimbangkan untuk menggunakan kata kerja lain yang berkaitan dengan tugasan.</li><li>Elakkan menggunakan simbol HTML sebagai seruan tindakan melainkan ia disembunyikan kepada teknologi bantuan.</li></ul>"
PLG_SYSTEM_JOOA11Y_LINK_DECORATIVE_MESSAGE="Imej ditandakan sebagai <strong>decorative</strong> dan akan diabaikan oleh teknologi bantuan. Jika imej itu menyampaikan cerita, perasaan atau maklumat penting - pastikan anda menambah teks alt."
PLG_SYSTEM_JOOA11Y_LINK_EMPTY="Alih keluar pautan kosong tanpa sebarang teks."
PLG_SYSTEM_JOOA11Y_LINK_EMPTY_LINK_NO_LABEL="Pautan tidak mempunyai teks yang boleh dilihat yang boleh dilihat oleh pembaca skrin dan teknologi bantuan lain. Untuk membetulkan:<ul><li>Tambahkan beberapa teks ringkas yang menerangkan ke mana pautan membawa anda.</li><li>Jika ia adalah <a href=\"https://a11y-101.com/development/icons-and-links\" target=\"_kosong\" rel=\"noopener noreferrer\">icon link atau SVG</a> ia berkemungkinan tiada label deskriptif.</li><0__sekiranya anda menganggap bahawa pautan ini adalah pepijat/menyalahkan. ia.</li></ul>"
PLG_SYSTEM_JOOA11Y_LINK_HYPERLINKED_IMAGE_ARIA_HIDDEN="Pautan sekitar imej mempunyai <span class=\"jooa11y-kbd\">aria-hidden=&quot;true&quot;</span> tetapi masih boleh difokuskan papan kekunci. Jika anda bercadang untuk menyembunyikan pautan berlebihan atau pendua, tambahkan <span class=\"jooa11y-kbd\">tabindex=&quot;-1&quot;</span> juga."
PLG_SYSTEM_JOOA11Y_LINK_IDENTICAL_NAME="Pautan mempunyai teks yang sama dengan pautan lain, walaupun ia menunjuk ke halaman yang berbeza. Berbilang pautan dengan teks yang sama boleh menyebabkan kekeliruan bagi orang yang menggunakan pembaca skrin."
PLG_SYSTEM_JOOA11Y_LINK_IDENTICAL_NAME_TIP="Pertimbangkan untuk menjadikan pautan berikut lebih deskriptif untuk membantu membezakannya daripada pautan lain: <strong>%(linkText)</strong>"
PLG_SYSTEM_JOOA11Y_LINK_IMAGE_BAD_ALT_MESSAGE="Sambungan fail dalam teks alt ditemui. Pastikan teks alt menerangkan destinasi pautan, bukan penerangan literal imej. Alih keluar: <strong>%(ralat)</strong>."
