PLG_SYSTEM_JOOA11Y_LINK_IMAGE_PLACEHOLDER_ALT_MESSAGE="Teks alt bukan deskriptif atau pemegang tempat dalam imej terpaut ditemui. Pastikan teks alt menerangkan destinasi pautan, bukan penerangan literal imej. Gantikan teks alt berikut: <strong>%(altText)</strong>."
