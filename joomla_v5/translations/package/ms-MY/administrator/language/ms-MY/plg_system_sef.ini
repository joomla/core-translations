PLG_SEF_DOMAIN_DESCRIPTION="Jika laman anda boleh diakses melalui lebih daripada satu domain, masukkan domain pilihan (kadangkala dirujuk sebagai kanonik) di sini. <br><strong>Nota:</strong> https://example.com dan https://www.example.com adalah domain yang berbeza."
PLG_SEF_DOMAIN_LABEL="Domain Laman"
PLG_SEF_ENFORCESUFFIX_DESCRIPTION="Apabila didayakan dan \"Tambah Akhiran pada URL\" juga didayakan, URL tanpa akhiran akan dialihkan ke yang betul. Dari versi 6.0 dan seterusnya ini akan menjadi kelakuan piawai dan bukan lagi pilihan."
PLG_SEF_ENFORCESUFFIX_LABEL="Paksa akhiran melalui lencongan"
PLG_SEF_INDEXPHP_DESCRIPTION="Pilihan ini mendayakan pengendalian yang lebih ketat terhadap 'index.php' dalam URL apabila 'Gunakan Penulisan Semula URL' didayakan dalam Konfigurasi Global. Ia akan membuang 'index.php' jika URL masih mengandunginya dan mengalihkan permintaan masuk dengan 'index.php' ke versi tanpa 'index.php'."
PLG_SEF_INDEXPHP_LABEL="Pengendalian ketat index.php"
PLG_SEF_STRICTROUTING_DESCRIPTION="Menghalang penghala daripada menerima banyak URL yang dianggap pendua dan akan mengalihkan secara automatik ke URL yang betul dengan 301."
PLG_SEF_STRICTROUTING_LABEL="Penghalaan Ketat"
PLG_SEF_TRAILINGSLASH_DESCRIPTION="Paksa Joomla untuk hanya menggunakan URL dengan atau tanpa garis miring mengekori. Apabila ditetapkan, ini akan memaksa URL yang betul dengan lencongan dan hanya digunakan apabila 'Tambah akhiran pada URL' dilumpuhkan."
PLG_SEF_TRAILINGSLASH_LABEL="Garis miring mengekori untuk URL"
PLG_SEF_TRAILINGSLASH_OPTION_NONE="Tiada perubahan"
PLG_SEF_TRAILINGSLASH_OPTION_NO_SLASH="Paksa URL tanpa garis miring mengekori"
PLG_SEF_TRAILINGSLASH_OPTION_SLASH="Paksa URL dengan garis miring mengekori"
PLG_SEF_XML_DESCRIPTION="Menambah sokongan SEF pada pautan dalam dokumen. Ia beroperasi secara langsung pada HTML dan tidak memerlukan tag khas."
PLG_SYSTEM_SEF="Sistem - SEF"
