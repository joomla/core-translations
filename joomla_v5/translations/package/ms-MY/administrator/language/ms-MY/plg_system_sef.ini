PLG_SEF_DOMAIN_DESCRIPTION="Jika tapak anda boleh diakses melalui lebih daripada satu domain masukkan domain pilihan (kadangkala dirujuk sebagai kanonik) di sini. <br><strong>Nota:</strong> https://example.com dan https://www.example.com ialah domain yang berbeza."
PLG_SEF_DOMAIN_LABEL="Domain Tapak"
PLG_SEF_ENFORCESUFFIX_DESCRIPTION="Apabila didayakan dan \"Tambah Akhiran pada URL\" juga didayakan, URL tanpa akhiran akan diubah hala ke yang betul. Dari versi 6.0 dan seterusnya ini akan menjadi tingkah laku standard dan bukan pilihan lagi."
PLG_SEF_ENFORCESUFFIX_LABEL="Menguatkuasakan akhiran dengan ubah hala"
PLG_SEF_INDEXPHP_DESCRIPTION="Pilihan ini membolehkan pengendalian 'index.php' yang lebih ketat dalam URL apabila 'Gunakan Penulisan Semula URL' didayakan dalam Konfigurasi Global. Ia akan mengalih keluar 'index.php' jika URL masih mengandunginya dan mengubah hala permintaan masuk dengan 'index.php' kepada versi tanpa 'index.php'."
PLG_SEF_INDEXPHP_LABEL="Pengendalian ketat index.php"
PLG_SEF_STRICTROUTING_DESCRIPTION="Halang penghala daripada menerima banyak URL yang dianggap sebagai pendua dan akan mengubah hala secara automatik ke URL yang betul dengan 301."
PLG_SEF_STRICTROUTING_LABEL="Penghalaan Ketat"
PLG_SEF_TRAILINGSLASH_DESCRIPTION="Paksa Joomla untuk hanya menggunakan URL dengan atau tanpa garis miring. Apabila ditetapkan, ini akan memaksa URL yang betul dengan ubah hala dan hanya digunakan apabila 'Tambah akhiran pada URL' dilumpuhkan."
PLG_SEF_TRAILINGSLASH_LABEL="Tanda miring untuk URL"
PLG_SEF_TRAILINGSLASH_OPTION_NONE="Tiada perubahan"
PLG_SEF_TRAILINGSLASH_OPTION_NO_SLASH="Kuatkuasakan URL tanpa garis miring"
PLG_SEF_TRAILINGSLASH_OPTION_SLASH="Kuatkuasakan URL dengan garis miring mengekor"
PLG_SEF_XML_DESCRIPTION="Menambah sokongan SEF pada pautan dalam dokumen. Ia beroperasi secara langsung pada HTML dan tidak memerlukan tag khas."
PLG_SYSTEM_SEF="Sistem - SEF"

