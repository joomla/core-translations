PLG_MULTIFACTORAUTH_TOTP="Pengesahan Pelbagai Faktor - Kod Pengesahan"
PLG_MULTIFACTORAUTH_TOTP_CAPTIVE_PROMPT="Sila buka aplikasi pengesah atau pengurus kata laluan anda dan salin kod enam digit untuk laman ini ke dalam kotak teks di bawah, kemudian klik pada butang Sahkan. Jika kod ini telah diisi secara automatik untuk anda, cukup klik pada butang Sahkan."
PLG_MULTIFACTORAUTH_TOTP_ERR_VALIDATIONFAILED="Anda tidak memasukkan kod pengesahan yang sah. Sila semak persediaan aplikasi pengesah anda, dan pastikan masa dan zon masa pada peranti anda ditetapkan dengan betul."
PLG_MULTIFACTORAUTH_TOTP_LBL_LABEL="Masukkan kod pengesahan enam digit"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_INSTRUCTIONS="Sediakan kod pengesahan anda (juga dikenali sebagai \"kod pengesah\") menggunakan maklumat di bawah. Anda boleh menggunakan aplikasi pengesah (seperti Google Authenticator, Authy, LastPass Authenticator, dll), pengurus kata laluan kegemaran anda (1Password, BitWarden, Keeper, KeePassXC, Strongbox, dll) atau, dalam sesetengah kes, pelayar anda."
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_PLACEHOLDER="Kod Enam Digit"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_HEADING="Persediaan aplikasi pengesah"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_KEY="Masukkan kunci ini"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK="Klik pautan ini"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK_NOTE="<small>Hanya berfungsi pada pelayar yang disokong, cth. Safari.</small>"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK_TEXT="<a href=\"%s\">Sediakan kod pengesahan anda</a>"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_QR="Imbas atau klik kanan / ketuk lama kod QR ini"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_SUBHEAD="Gunakan <em>satu</em> daripada kaedah alternatif berikut untuk menyediakan kod pengesahan dalam aplikasi pengesah, pengurus kata laluan atau pelayar anda."
PLG_MULTIFACTORAUTH_TOTP_METHOD_TITLE="Kod pengesahan"
PLG_MULTIFACTORAUTH_TOTP_SHORTINFO="Gunakan kod 6 digit yang dijana oleh aplikasi setiap 30 saat."
PLG_MULTIFACTORAUTH_TOTP_XML_DESCRIPTION="Pengesahan Pelbagai Faktor untuk pengguna laman anda menggunakan kod pengesahan enam digit yang dijana oleh aplikasi pengesah (Google Authenticator, Authy, LastPass Authenticator, dll), pengurus kata laluan (1Password, BitWarden, Keeper, KeePassXC, Strongbox, dll) atau, dalam sesetengah kes, pelayar mereka."
