PLG_MULTIFACTORAUTH_TOTP="Pengesahan Berbilang Faktor - Kod Pengesahan"
PLG_MULTIFACTORAUTH_TOTP_CAPTIVE_PROMPT="Sila buka aplikasi pengesah atau pengurus kata laluan anda dan salin kod enam digit untuk tapak ini dalam kotak teks di bawah, kemudian klik pada butang Sahkan. Jika kod ini telah diisi secara automatik untuk anda cuma klik pada butang Sahkan."
PLG_MULTIFACTORAUTH_TOTP_ERR_VALIDATIONFAILED="Anda tidak memasukkan kod pengesahan yang sah. Sila semak persediaan apl pengesah anda dan pastikan zon masa dan masa pada peranti anda ditetapkan dengan betul."
PLG_MULTIFACTORAUTH_TOTP_LBL_LABEL="Masukkan enam digit kod pengesahan"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_INSTRUCTIONS="Sediakan kod pengesahan anda (juga dikenali sebagai \"kod pengesah\") menggunakan maklumat di bawah. Anda boleh menggunakan apl pengesah (seperti Google Authenticator, Authy, LastPass Authenticator, dll), pengurus kata laluan kegemaran anda (1Password, BitWarden, Keeper, KeePassXC, Strongbox, dll) atau, dalam beberapa kes, penyemak imbas anda."
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_PLACEHOLDER="Kod Enam Digit"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_HEADING="Persediaan apl pengesah"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_KEY="Masukkan kunci ini"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK="Klik pautan ini"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK_NOTE="<small>Hanya berfungsi pada penyemak imbas yang disokong, mis. Safari.</small>"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_LINK_TEXT="<a href=\"%s\">Sediakan kod pengesahan anda</a>"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_QR="Imbas atau klik kanan / ketik lama kod QR ini"
PLG_MULTIFACTORAUTH_TOTP_LBL_SETUP_TABLE_SUBHEAD="Gunakan <em>one</em> daripada kaedah alternatif berikut untuk menyediakan kod pengesahan dalam aplikasi pengesah anda, pengurus kata laluan atau penyemak imbas."
PLG_MULTIFACTORAUTH_TOTP_METHOD_TITLE="Kod pengesahan"
PLG_MULTIFACTORAUTH_TOTP_SHORTINFO="Gunakan kod 6 digit yang dijana oleh apl setiap 30 saat."
PLG_MULTIFACTORAUTH_TOTP_XML_DESCRIPTION="Pengesahan Berbilang Faktor untuk pengguna tapak anda menggunakan kod pengesahan enam digit yang dijana oleh apl pengesah (Google Authenticator, Authy, LastPass Authenticator, dll), pengurus kata laluan (1Password, BitWarden, Keeper, KeePassXC, Strongbox, dll) atau, dalam beberapa kes, penyemak imbas mereka."

