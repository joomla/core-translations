COM_ADMIN_POSTINSTALL_MSG_BEHIND_LOAD_BALANCER_ACTION="Dayakan Tetapan Pengimbang Muatan Belakang"
COM_ADMIN_POSTINSTALL_MSG_BEHIND_LOAD_BALANCER_DESCRIPTION="<p>Bagi tapak Joomla yang dihoskan di belakang Pengimbang Bebanan dan Proksi Terbalik, tetapan Konfigurasi Global telah diperkenalkan dengan Joomla 3.9.26</p><p>Tetapan ini, apabila didayakan, akan membolehkan Pengimbang Bebanan/Proksi Terbalik anda menyediakan alamat IP sebenar bagi pelawat anda. IP ini kemudiannya akan digunakan dalam Log Tindakan anda dan digunakan untuk menjejak undian bagi artikel (jika ciri ini didayakan).</p><p><strong>Hanya tapak di belakang Pengimbang Bebanan/Proksi Terbalik akan mendayakan ciri ini.</strong></p>"
COM_ADMIN_POSTINSTALL_MSG_BEHIND_LOAD_BALANCER_TITLE="Tetapan Pelayan Baharu \"Belakang Pengimbang Bebanan\""
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_AUTOINDEX_DESCRIPTION="<p>Sebelum 3.9.22 fail lalai htaccess.txt mengandungi kod yang bermasalah yang bertujuan untuk menyahdaya penyenaraian direktori. Pasukan keselamatan mengesyorkan untuk menerapkan perubahan yang perlu secara manual kepada sebarang fail .htaccess sedia ada, kerana fail ini tidak boleh dikemas kini secara automatik.</p><p>Kod lama:</p><pre>&lt;IfModule autoindex&gt;\n IndexIgnore *\n&lt;/IfModule&gt;</pre><p>Kod baharu:</p><pre>&lt;IfModule mod_autoindex.c&gt;\n IndexIgnore *\n&lt;/IfModule&gt;</pre>"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_AUTOINDEX_TITLE="Kemas kini .htaccess Berkenaan Penyenaraian Direktori"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_BROTLI_DESCRIPTION="<p>Sebelum 5.1.0 htaccess.txt lalai tidak menyokong pemampatan Brotli. Ini boleh mengakibatkan ralat pemampatan dua kali apabila Joomla dipasang pada pelayan yang menggunakan pemampatan Brotli. Anda hendaklah menggunakan perubahan yang diperlukan secara manual pada mana-mana fail .htaccess sedia ada, kerana fail ini tidak boleh dikemas kini secara automatik.</p><p>Kod lama:</p><pre>RewriteRule \"\.css\.gz$\> \"\.css\.gz$\" \"\.css\.gz$\" \"\__\.gz$\" [T=text/css,E=no-gzip:1]<br>RewriteRule \"\.js\.gz$\" \"-\" [T=text/javascript,E=no-gzip:1]<p_PH2__2__ baru kod:</p><pre>RewriteRule \"\.css\.gz$\" \"-\" [T=text/css,E=no-gzip:1,E=no-brotli:1]<write \"\.js\.gz$\" \"-\" [T=text/javascript,E=no-gzip:1,E=no-brotli:1]</pre>"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_BROTLI_TITLE="Kemas kini .htaccess Brotli Compression"
COM_ADMIN_POSTINSTALL_MSG_HTACCESS_SETCE_DESCRIPTION="<p>Versi Sebelum 4.2.9 htaccess.txt fail lalai mengandungi kod ralat untuk menambah \"Content-Encoding\" pengepala HTTP. Ini akan menghasilkan ralat dwi pengekodan apabila pemasangan Joomla dibuat pada sub-direktori dan juga kedua-dua direktori ini dan kesemua direktori utama yang mengandungi fail .htaccess dengan kod ini. Anda hendaklah membuat pengubahan secara manual kepada semua fail .htaccess sedia ada, dimana fail ini tidak dapat dikemaskini secara automatik.</p><p>Pengekodan lama:</p><pre>Header append Content-Encoding gzip</pre><p>Pengekodan baru:</p><pre>Header set Content-Encoding gzip</pre>"
