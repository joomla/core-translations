COM_ACTIONLOGS_POSTINSTALL_BODY="<p>Dengan keluaran Joomla 3.9.0 anda kini dapat mengelog semua tindakan pentadbiran yang dilakukan oleh pengguna anda dalam sambungan yang disokong. Kini ianya mudah untuk melihat siapa yang melakukan apa dan bilakah mereka melakukannya.</p><p>Log boleh dilihat dalam Joomla atau dieksport untuk kegunaan luaran.</p><p>Untuk maklumat lanjut tentang ciri baharu ini, baca <a href='https://docs.joomla.org/Special:MyLanguage/J3.x:User_Action_Logs' target='_blank' rel='noopener noreferrer'>dokumentasi Log Tindakan Pengguna.</a></p>"
