PLG_TASK_UPDATENOTIFICATION="Tugasan - Joomla! Kemas kini Pemberitahuan"
PLG_TASK_UPDATENOTIFICATION_EMAIL_DESC="Senarai alamat e-mel yang dipisahkan koma yang akan menerima e-mel pemberitahuan kemas kini. Alamat dalam senarai MESTI adalah milik pengguna sedia ada tapak anda yang mempunyai keistimewaan Pengguna Super. Jika tiada e-mel tersenarai milik Pengguna Super, atau jika ia dibiarkan kosong, semua Pengguna Super tapak ini akan menerima e-mel pemberitahuan kemas kini."
PLG_TASK_UPDATENOTIFICATION_EMAIL_LBL="E-mel Pengguna Super"
PLG_TASK_UPDATENOTIFICATION_SEND_TITLE="Joomla! Kemas kini Pemberitahuan"
PLG_TASK_UPDATENOTIFICATION_SEND_DESC="Tugas ini secara berkala menyemak ketersediaan Joomla baharu! versi. Apabila seseorang ditemui ia akan menghantar e-mel kepada anda, mengingatkan anda untuk mengemas kini. Anda boleh menyesuaikan e-mel di <a href=\"index.php?option=com_mails&view=templates&filter[extension]=plg_task_updatenotification\">System &rarr; Templat Mel.</a>"
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_DESC="Pilih bahasa untuk e-mel pemberitahuan kemas kini. Tetapkan kepada Auto untuk menghantarnya dalam bahasa tapak pada masa itu."
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_LBL="Bahasa E-mel"
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_NONE="Automatik"
PLG_TASK_UPDATENOTIFICATION_EMAIL_BODY="E-mel ini TIDAK dihantar oleh Joomla! projek. It is sent automatically by your own site,\n{SITENAME} - {URL} \n\n================================================================================\nUPDATE INFORMATION\n================================================================================\n\nYour site has discovered that there is an updated version of Joomla! tersedia.\n\nJoomla! versi sedang dipasang: {CURVERSION}\nJoomla! versi tersedia untuk pemasangan: {NEWVERSION}\n\nE-mel ini dihantar kepada anda oleh tapak anda untuk mengingatkan anda tentang fakta ini.\nThe Joomla! projek tidak akan menghubungi anda secara langsung mengenai kemas kini Joomla yang tersedia! on your site.\n\n================================================================================\nUPDATE INSTRUCTIONS\n================================================================================\n\nTo install the update on {SITENAME} please select the following link. (If the URL is not a link, copy & paste it to your browser).\n\nUpdate link: {LINK}\n\nRelease News can be found here: {RELEASENEWS}\n\n================================================================================\nWHY AM I RECEIVING THIS EMAIL?\n================================================================================\n\nThis email has been automatically sent by a plugin provided by Joomla!, the software which powers your site.\nThis plugin looks untuk versi terkini Joomla! dan menghantar pemberitahuan e-mel kepada pentadbirnya.\nAnda akan menerima beberapa e-mel yang serupa daripada tapak anda sehingga anda sama ada mengemas kini perisian atau melumpuhkan e-mel ini.\n\nUntuk melumpuhkan e-mel ini, sila nyahterbitkan 'Task - Joomla! Kemas kini pemalam Pemberitahuan dalam Pengurus Pemalam di tapak anda.\n\nJika anda tidak faham apa yang Joomla! adalah dan apa yang anda perlu lakukan jangan hubungi Joomla! projek.\nMereka TIDAK menghantar e-mel ini kepada anda dan mereka tidak dapat membantu anda. Sebaliknya, sila hubungi orang yang membina atau mengurus tapak anda.\n\nJika anda ialah orang yang membina atau mengurus tapak web anda, sila ambil perhatian bahawa pemalam ini mungkin telah diaktifkan secara automatik apabila anda memasang atau mengemas kini Joomla! on your site.\n\n================================================================================\nWHO SENT ME THIS EMAIL?\n================================================================================\n\nThis email is sent to you by your own site, {SITENAME}"
; You can use the following merge codes:
; {NEWVERSION}		New Joomla! version, e.g. 1.2.3
; {CURVERSION}		Currently installed Joomla! version, e.g. 1.2.0
; {SITENAME}		Site name, as set in Global Configuration.
; {URL}			URL of the site's frontend page.
; {LINK}		Update URL (link to com_joomlaupdate, will request login if the Super User isn't already logged in).
; {RELEASENEWS}		URL to the release news on joomla.org
; \n			Newline character. Use it to start a new line in the email.
PLG_TASK_UPDATENOTIFICATION_EMAIL_SUBJECT="Joomla! Kemas kini tersedia untuk {SITENAME} – {URL}"
