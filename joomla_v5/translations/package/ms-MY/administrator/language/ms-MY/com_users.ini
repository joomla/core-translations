COM_USERS_POSTINSTALL_MULTIFACTORAUTH_ACTION="Dayakan pemalam Pengesahan Berbilang Faktor baharu"
COM_USERS_POSTINSTALL_MULTIFACTORAUTH_BODY="<p>Joomla! datang dengan <a href=\"https://en.wikipedia.org/wiki/Multi-factor_authentication\" target=\"_blank\" rel=\"noopener noreferrer\">Multi-factor_authentication\" target=\"_blank\" rel=\"noopener noreferrer\">PH10__a__PH anda untuk membantu anda mendapatkan pengalaman log masuk PH10__a__PH anda pengguna.</p><p>Tidak seperti ciri Pengesahan Dua Faktor dalam versi Joomla sebelumnya, pengguna <em>tidak perlu lagi memasukkan Kod Keselamatan dengan nama pengguna dan kata laluan mereka</em>. Pengesahan Berbilang Faktor berlaku dalam langkah berasingan selepas log masuk ke tapak. Sehingga mereka melengkapkan pengesahan Pengesahan Berbilang Faktor mereka, pengguna tidak boleh menavigasi ke halaman lain atau menggunakan tapak tersebut. Ini menjadikan Pengesahan Berbilang Faktor <a href=\"https://en.wikipedia.org/wiki/Phishing\" target=\"_blank\" rel=\"noopener noreferrer\">phishing>/a>/a__resistant Ia juga membenarkan kaedah pengesahan interaktif seperti kunci laluan (termasuk penyepaduan dengan Windows Hello, Apple TouchID / FaceID dan Kunci Skrin Biometrik Android), atau menghantar kod pengesahan 6 digit melalui e-mel. Kedua-dua kaedah interaktif dan mudah ini kini tersedia sebagai pemalam yang dihantar dengan Joomla! sendiri.</p>"
