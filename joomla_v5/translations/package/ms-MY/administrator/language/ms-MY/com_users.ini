COM_USERS_POSTINSTALL_MULTIFACTORAUTH_ACTION="Dayakan pemalam Pengesahan Pelbagai Faktor baharu"
COM_USERS_POSTINSTALL_MULTIFACTORAUTH_BODY="<p>Joomla! hadir dengan pengalaman <a href=\"https://en.wikipedia.org/wiki/Multi-factor_authentication\" target=\"_blank\" rel=\"noopener noreferrer\">Pengesahan Pelbagai Faktor</a> yang ditambah baik secara drastik untuk membantu anda mengamankan log masuk pengguna anda.</p><p>Tidak seperti ciri Pengesahan Dua Faktor dalam versi Joomla sebelumnya, pengguna <em>tidak lagi perlu memasukkan Kod Keselamatan bersama nama pengguna dan kata laluan mereka</em>. Pengesahan Pelbagai Faktor berlaku dalam langkah berasingan selepas log masuk ke laman. Sehingga mereka melengkapkan pengesahan Pengesahan Pelbagai Faktor, pengguna tidak boleh menavigasi ke halaman lain atau menggunakan laman. Ini menjadikan Pengesahan Pelbagai Faktor <a href=\"https://en.wikipedia.org/wiki/Phishing\" target=\"_blank\" rel=\"noopener noreferrer\">tahan pancingan data</a>. Ia juga membenarkan kaedah pengesahan interaktif seperti kunci laluan (termasuk integrasi dengan Windows Hello, Apple TouchID / FaceID dan Kunci Skrin Biometrik Android), atau menghantar kod pengesahan 6 digit melalui e-mel. Kedua-dua kaedah interaktif dan mudah ini kini tersedia sebagai pemalam yang dihantar bersama Joomla! sendiri.</p>"
