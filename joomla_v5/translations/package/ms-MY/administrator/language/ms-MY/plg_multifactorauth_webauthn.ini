PLG_MULTIFACTORAUTH_WEBAUTHN="Pengesahan Pelbagai Faktor - Kunci Laluan"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_LOGIN_REQUEST="Permintaan pengesahan tidak sah."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_PK="Pendaftaran kunci laluan telah gagal. Respons kunci laluan yang diterima daripada pelayar tidak sepadan dengan Kunci Awam yang dikeluarkan oleh pelayan. Ini bermakna seseorang cuba menggodam anda atau sesuatu telah rosak."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_INVALID_USER="Atas sebab keselamatan anda tidak dibenarkan mendaftar kunci laluan bagi pihak pengguna lain."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_NO_ATTESTED_DATA="Sesuatu telah berlaku tetapi tiada maklumat lanjut tentang ralat tersedia pada masa ini. Sila cuba semula mendaftar kunci laluan anda."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_CREATE_NO_PK="Pelayan tidak mengeluarkan Kunci Awam untuk pendaftaran kunci laluan tetapi entah bagaimana menerima permintaan pendaftaran kunci laluan daripada pelayar. Ini bermakna seseorang cuba menggodam anda atau sesuatu telah rosak."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTAVAILABLE_BODY="Pelayar anda tidak menyokong standard kunci laluan. Tidak semua pelayar serasi dengan kunci laluan pada semua peranti pada ketika ini."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTAVAILABLE_HEAD="Pelayar anda tidak menyokong kunci laluan"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTHTTPS_BODY="Sila akses laman melalui HTTPS untuk mendayakan Pengesahan Pelbagai Faktor dengan kunci laluan."
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NOTHTTPS_HEAD="Kunci laluan hanya tersedia pada HTTPS"
PLG_MULTIFACTORAUTH_WEBAUTHN_ERR_NO_STORED_CREDENTIAL="Anda belum mengkonfigurasi kunci laluan lagi atau kunci laluan yang anda cuba gunakan tidak layak."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_CONFIGURED="Anda telah mengkonfigurasi kunci laluan anda. Sila ambil perhatian bahawa anda hanya boleh mengubah suai tajuknya dari halaman ini."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_DISPLAYEDAS="Kunci Laluan"
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_INSTRUCTIONS="Gunakan butang &ldquo;%s&rdquo; pada halaman ini untuk memulakan proses Pengesahan Web. Kemudian sila ikut arahan yang diberikan oleh pelayar anda untuk melengkapkan Pengesahan Web dengan kunci laluan pilihan anda."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_REGISTERKEY="Daftar kunci laluan anda"
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_SHORTINFO="Gunakan kunci laluan pelayar dengan mana-mana kunci keselamatan perkakasan atau perisian."
PLG_MULTIFACTORAUTH_WEBAUTHN_LBL_VALIDATEKEY="Sahkan dengan kunci laluan anda"
PLG_MULTIFACTORAUTH_WEBAUTHN_XML_DESCRIPTION="Gunakan kunci laluan pelayar sebagai kaedah Pengesahan Pelbagai Faktor. Semua pelayar moden menyokongnya. Kebanyakan pelayar menawarkan pengesahan khusus peranti yang dilindungi oleh kata laluan dan/atau biometrik (penderia cap jari, imbasan muka, &hellip;)."
