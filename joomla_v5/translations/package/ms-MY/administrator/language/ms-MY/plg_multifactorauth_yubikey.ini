PLG_MULTIFACTORAUTH_YUBIKEY="Pengesahan Berbilang Faktor - YubiKey"
PLG_MULTIFACTORAUTH_YUBIKEY_CAPTIVE_PROMPT="Sila klik dalam kotak teks di bawah. Kemudian masukkan YubiKey anda ke dalam port USB peranti anda dan sentuh cakera emas atau pad emasnya (bergantung pada model anda) untuk menjadikannya menghasilkan kod YubiKey. Jika anda menggunakan telefon atau tablet berkeupayaan NFC dengan YubiKey yang didayakan NFC, anda perlu mendekati YubiKey anda ke kawasan pembaca NFC telefon atau tablet anda."
PLG_MULTIFACTORAUTH_YUBIKEY_CODE_LABEL="Kod YubiKey"
PLG_MULTIFACTORAUTH_YUBIKEY_ERR_VALIDATIONFAILED="Anda tidak memasukkan kod rahsia YubiKey yang sah atau pelayan YubiCloud tidak dapat dihubungi pada masa ini."
PLG_MULTIFACTORAUTH_YUBIKEY_LBL_AFTERSETUP_INSTRUCTIONS="Anda telah pun menyediakan YubiKey anda (yang menjana kod bermula dengan <code>%s</code>). Anda hanya boleh menukar tajuknya dari halaman ini."
PLG_MULTIFACTORAUTH_YUBIKEY_LBL_SETUP_INSTRUCTIONS="Sila berikan kod yang dijana oleh <a href=\"https://www.yubico.com\" target=\"_blank\" rel=\"noopener noreferrer anda\">YubiKey</a> di bawah dan kemudian klik butang Sahkan atau sentuh. Dua belas aksara pertama, yang merupakan kod pengenalan unik untuk YubiKey anda, akan disimpan."
PLG_MULTIFACTORAUTH_YUBIKEY_LBL_SETUP_LABEL="Pengenalan YubiKey"
PLG_MULTIFACTORAUTH_YUBIKEY_LBL_SETUP_PLACEHOLDER="Masukkan kod YubiKey"
PLG_MULTIFACTORAUTH_YUBIKEY_METHOD_TITLE="YubiKey"
PLG_MULTIFACTORAUTH_YUBIKEY_SHORTINFO="Gunakan token perkakasan selamat YubiKey."
PLG_MULTIFACTORAUTH_YUBIKEY_XML_DESCRIPTION="Membenarkan pengguna di tapak anda menggunakan Pengesahan Berbilang Faktor menggunakan token perkakasan selamat YubiKey. Pengguna memerlukan YubiKey mereka sendiri yang tersedia daripada <a href=\"https://www.yubico.com\" target=\"_blank\" rel=\"noopener noreferrer\">www.yubico.com</a>. Untuk menggunakan Pengesahan Berbilang Faktor pengguna perlu mengedit profil pengguna mereka dan mendayakan Pengesahan Berbilang Faktor."

