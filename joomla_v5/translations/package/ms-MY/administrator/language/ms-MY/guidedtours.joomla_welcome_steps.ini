COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_MENUS_TITLE="Menu"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_MENUS_DESCRIPTION="<p>Menu menyediakan akses kepada halaman pengurusan Pentadbir. Setiap bahagian mempunyai koleksi halaman untuk mengurus aspek tertentu Joomla, seperti Kandungan, Menu dan Pengguna.</p><p>Ikon anak tetingkap dipautkan ke papan pemuka individu untuk bahagian tersebut. Menu Sistem itu sendiri menuju ke papan pemuka.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_QUICKACCESS_TITLE="Panel Papan Pemuka"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_QUICKACCESS_DESCRIPTION="<p>Papan pemuka menyediakan akses pantas ke halaman yang kerap digunakan melalui ikonnya.</p><p>Setiap panel papan pemuka ialah modul Pentadbir yang boleh disesuaikan melalui ikon Tetapannya <span class=\"icon-cogs\" aria-hidden=\"true\"></span>.<br>Ini membolehkan anda mengkonfigurasi papan pemuka tapak anda agar sesuai dengan tujuan anda sendiri.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_NOTIFICATIONS_TITLE="Panel Pemberitahuan"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_NOTIFICATIONS_DESCRIPTION="<p>Panel Pemberitahuan menunjukkan apabila kemas kini tersedia untuk Joomla dan sambungan lain. Permintaan Privasi Tertunggak juga ditunjukkan di sini.</p>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_TOPBAR_TITLE="Bar Atas"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_TOPBAR_DESCRIPTION="<p>Bar atas menunjukkan tajuk halaman yang dipaparkan supaya anda sentiasa tahu di mana anda berada. Item lain dalam bar atas ialah modul pilihan.</p><p>Biasanya versi Joomla semasa dan akses kepada lawatan berpandu selanjutnya boleh didapati di sini.</p><p>Item terakhir biasanya merupakan pautan ke bahagian hadapan Tapak dan Menu Pengguna/>ut.> anda boleh mengurus akaun dan logo> anda.>"

COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_FINALWORDS_TITLE="Bantuan dan Maklumat"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_STEP_FINALWORDS_DESCRIPTION="<p>Banyak sumber untuk membantu anda boleh didapati di sini bersama-sama dengan pautan tambahan kepada lebih banyak sumber, dokumentasi, sokongan dan cara untuk terlibat dalam Joomla.</p>"

