PLG_CONTENT_PAGEBREAK_XML_DESCRIPTION="<p>Benarkan penciptaan artikel bernombor dengan jadual kandungan pilihan.</p><p>Sisipkan pemisah halaman melalui penggunaan butang pemisah halaman yang biasanya terdapat dalam bar alat editor WYSIWYG. Lokasi pemisah halaman dalam artikel akan dipaparkan dalam editor sebagai garis mendatar ringkas.</p><p>Teks yang dipaparkan bergantung pada pilihan yang dipilih dan mungkin sama ada tajuk, teks ganti (jika disediakan) atau nombor halaman.</p><p>Penggunaan HTML ialah:<br>&lt;kelas jam=&quot;pemecah halaman sistem&quot; /&gt;<br>&lt;kelas jam=&quot;pemecah halaman sistem&quot; tajuk=&quot;Tajuk halaman&quot; /&gt; atau <br>&lt;kelas jam=&quot;pemecah halaman sistem&quot; alt=&quot;Halaman pertama&quot; /&gt; atau <br>&lt;hr class=&quot;system-pagebreak&quot; tajuk=&quot;Tajuk halaman&quot; alt=&quot;Halaman pertama&quot; /&gt; atau <br>&lt;kelas jam=&quot;pemecah halaman sistem&quot; alt=&quot;Halaman pertama&quot; tajuk=&quot;Tajuk halaman&quot; /&gt;</p>"

