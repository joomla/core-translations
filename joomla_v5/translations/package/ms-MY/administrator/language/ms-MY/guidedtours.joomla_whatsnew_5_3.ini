COM_GUIDEDTOURS_TOUR_WHATSNEW_5_3_DESCRIPTION="<h1 class=\"fw-medium\">Selamat Datang ke Joomla 5.3!</h1><div class=\"row align-items-center mb-4 pt-4 border-top border-1\"><div class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Kemas Kini Lawatan Berpandu</h2><p>Lawatan Berpandu kini mempunyai API tersendiri. <a href=\"https://manual.joomla.org/docs/next/web-services-api/\" target=\"_blank\" rel=\"noopener noreferrer\">Dokumentasi API Joomla</a></p><p>Nantikan peningkatan baharu yang lain akan datang tidak lama lagi!</p></div></div><div class=\"row align-items-center border-top border-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3 mb-md-0\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/5_3/filesdirectory.jpg\" alt=\"Langkah pertama lawatan selamat datang, menunjukkan folder fail media baharu\" width=\"521\" height=\"304\"></div><div class=\"col-md-6 col-lg-7 mb-3\"><h2 class=\"mb-3\">Kemas Kini Teras</h2><h3 class=\"mb-3\">Susun Fail di Lokasi Tersendiri</h3><p>Kini anda boleh melihat dan memilih dokumen yang disimpan/dimuat naik terus dari Pengurus Media. Cari maklumat lanjut di <a href=\"https://magazine.joomla.org/all-issues/december-2024/document-uploads-on-your-joomla-website\" target=\"_blank\" rel=\"noopener noreferrer\">Majalah Komuniti Joomla</a>.</p><h3 class=\"mb-3\">Lihat Sejarah Tugas Berjadual</h3><p>Anda kini mempunyai keupayaan untuk melihat maklumat pelaksanaan terus di bahagian belakang tanpa perlu mengakses fail log. Cari butang <strong>Sejarah Pelaksanaan</strong> yang terletak di halaman Tugas Berjadual.</p><h3>Peningkatan dan Pembaikan Lain</h3><ul class=\"mb-3\"><li>Perbandingan Pemalam Gantian Templat - menambah fungsi perbandingan kepada gantian pemalam</li><li>Carian Alias Tag Diperbaiki - kini bukannya menunjukkan nombor id tag dalam URL, nama tag ditunjukkan</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_5_3_TITLE="Apa yang Baharu dalam Joomla 5.3!"
