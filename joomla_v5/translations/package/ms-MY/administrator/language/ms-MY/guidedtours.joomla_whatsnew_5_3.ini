COM_GUIDEDTOURS_TOUR_WHATSNEW_5_3_DESCRIPTION="<h1 class=\"fw-medium\">Selamat datang ke Joomla 5.3!</h1><div class=\"row align-item-center mb-4 pt-4 sempadan atas sempadan-1\">_ class=\"col-md-6 col-lg-7\"><h2 class=\"mb-3\">Kemas Kini Lawatan Berpandu</h2><p>Lawatan Berpandu sendiri kini mempunyai API Berpandu sendiri. <a href=\"https://manual.joomla.org/docs/next/web-services-api/\" target=\"_blank\" rel=\"noopener noreferrer\">Joomla API Dokumentasi</a></p><p>Nantikan peningkatan baharu lain yang akan datang tidak lama lagi!</p></div></div>__PH42</p></div></div><PH41ms-baris-baris atas sempadan-1 pt-4\"><div class=\"col-md-6 col-lg-5 text-center text-md-start mb-3 mb-md-0\"><img class=\"PH51__img-2__img- src=\"media/com_guidedtours/images/5_3/filesdirectory.jpg\" alt=\"Langkah pertama lawatan alu-aluan, menunjukkan folder fail media baharu\" lebar=\"521\" ketinggian=\"304\"></div><kelas div=\"col-md-6 col-lg-7 mb-3\"><h2 class=\>mb-___e_3\ Kemas kini</h2><h3 class=\"mb-3\">Atur Fail di Lokasi Sendiri</h3><p>Kini anda boleh melihat dan memilih dokumen Pengurus Media anda yang disimpan/dimuat naik terus daripada Pengurus Media. Dapatkan maklumat lanjut dalam <a href=\"https://magazine.joomla.org/all-issues/december-2024/document-uploads-on-your-joomla-website\" target=\"_blank\" rel=\" noreferrer\">Majalah Komuniti Joomla</a>.</p><h3 class=\"mb-3\">Lihat Sejarah Tugasan Berjadual</h3>pH10>__PH10 anda sekarang mempunyai maklumat secara langsung di bahagian belakang tanpa perlu mengakses fail log. Cari butang <strong>Sejarah Pelaksanaan</strong> yang terdapat dalam halaman Tugasan Berjadual.</p><h3>Penambahan dan Pembetulan Lain</h3__PH1111__/h3__PH111 class=\"mb-3\"><li>Template Override Plugin Comparison - menambah kefungsian bandingkan pada pemalam overrides</li><li>Teg Nama Carian Nama Ditetapkan - kini teg Alias Lookup Ditetapkan - kini teg Nama Carian Ditetapkan ditunjukkan</li></ul></div></div>"
COM_GUIDEDTOURS_TOUR_WHATSNEW_5_3_TITLE="Apa yang Baharu dalam Joomla 5.3!"

