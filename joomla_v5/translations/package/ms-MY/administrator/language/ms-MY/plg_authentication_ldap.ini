PLG_LDAP_FIELD_SEARCHSTRING_DESC="Rentetan pertanyaan yang digunakan untuk mencari Pengguna tertentu. Kata kunci [carian] digantikan secara dinamik dengan log masuk yang disediakan oleh Pengguna. Contoh rentetan ialah: uid=[search]. Beberapa rentetan boleh digunakan dipisahkan dengan koma bertitik. Digunakan selepas pengikatan awal untuk semua kaedah."
PLG_LDAP_FIELD_SEARCHSTRING_LABEL="Carian String"
PLG_LDAP_FIELD_UID_DESC="Atribut LDAP yang mempunyai ID Log Masuk Pengguna. Untuk Active Directory ini ialah sAMAccountName."
