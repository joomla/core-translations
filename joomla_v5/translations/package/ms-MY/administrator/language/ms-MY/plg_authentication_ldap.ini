PLG_LDAP_FIELD_USERNAME_DESC="Nama Pengguna Sambung dan Kata Laluan Sambung mentakrifkan parameter sambungan untuk fasa carian DN. Dua pilihan tersedia: carian DN tanpa nama (Biarkan kedua-dua medan kosong) dan sambungan pentadbiran (Connect Username ialah nama pengguna akaun pentadbiran, contohnya Pentadbir). Hanya digunakan dalam kaedah Bind dan Search."
PLG_LDAP_FIELD_USERNAME_LABEL="Hubungi Kata Nama"
PLG_LDAP_FIELD_USERSDN_DESC="Kata kunci [nama pengguna] digantikan secara dinamik dengan log masuk yang disediakan Pengguna. Contoh rentetan ialah: uid=[nama pengguna], dc=my-domain, dc=com. Beberapa rentetan boleh digunakan, dipisahkan dengan koma bertitik. Hanya digunakan untuk kaedah Bind Directly as User."
PLG_LDAP_FIELD_USERSDN_LABEL="DN pengguna"
