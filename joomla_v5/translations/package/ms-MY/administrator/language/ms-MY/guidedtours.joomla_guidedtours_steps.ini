COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_NEW_TITLE="Pilih butang 'Baharu'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_NEW_DESCRIPTION="Pilih 'Baharu' untuk mencipta lawatan baharu."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_TITLE_TITLE="Tambah tajuk untuk lawatan"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_TITLE_DESCRIPTION="Masukkan tajuk yang diperlukan untuk lawatan."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONTENT_TITLE="Tambah kandungan"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONTENT_DESCRIPTION="Masukkan kandungan yang menerangkan lawatan."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_COMPONENT_TITLE="Pilih komponen"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_COMPONENT_DESCRIPTION="Pilih sambungan di mana anda ingin menunjukkan lawatan anda secara keutamaan dalam senarai lawatan yang boleh dijalankan. Contohnya, jika anda mencipta lawatan untuk sambungan 'Pengguna', maka pilih 'Pengguna'. Pilih 'Semua' untuk lawatan dipaparkan di setiap halaman."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_URL_TITLE="Tambah URL"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_URL_DESCRIPTION="Tambah URL relatif halaman di mana lawatan mesti bermula. Contohnya, masukkan <em>administrator/index.php?option=com_users&view=users</em> untuk memulakan lawatan di halaman Pengguna."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_AUTOSTART_TITLE="Togol 'Mula Auto'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_AUTOSTART_DESCRIPTION="<p>Menetapkan 'Mula Auto' kepada 'Ya' akan memulakan lawatan secara automatik sebaik sahaja syarat yang berkaitan dipenuhi.</p><p>Jika beberapa lawatan ditetapkan untuk mula auto di bawah syarat yang sama, hanya lawatan pertama dalam senarai akan bermula sehingga ia dibatalkan, diselesaikan atau dilangkau.</p>"

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_SAVECLOSE_TITLE="Pilih 'Simpan dan Tutup'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_SAVECLOSE_DESCRIPTION="Simpan dan tutup lawatan."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONGRATULATIONS_TITLE="Tahniah!"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURS_STEP_CONGRATULATIONS_DESCRIPTION="Anda telah mencipta lawatan berpandu. Kini anda perlu mencipta langkah-langkah untuk lawatan tersebut."
