COM_GUIDEDTOURS_TOUR_WHATSNEW_5_2_DESCRIPTION="<h1 class=\"fw-medium\">Selamat datang ke Joomla 5.2!</h1><div class=\"row align-item-center mb-4 pt-4 sempadan atas sempadan-1\">_ class=\"col-md-6 col-lg-5 text-center text-md-start mb-3 mb-md-0\"><img class=\"img-fluid\" src=\"media/com_guidedtours/images/5_2/enhancedtourheader.png\" alt=\"Langkah pertama lawatan alu-aluan, menunjukkan rupa pengepala baharu\" lebar=\"640\" ketinggian=\"384\"></div><kelas div=\"col-md-6 col-lg-7\"><h2 class=\"mb-3__ Toured\"_ Kemas kini</h2><h3>Automulakan Lawatan</h3><p>Ciri ini membolehkan anda membuat Lawatan Berpandu automula anda sendiri. Lawatan kontekstual boleh dikecualikan untuk satu atau semua pengguna. Lawatan boleh dimulakan semula daripada menu Lawatan Berpandu.</p><h3>Penambahan</h3><ul class=\"mb-3\">__PH54>kejelasan,PH54>Untuk PH<kejelasan Counter</em> diletakkan pertama dalam pengepala lawatan.</li><li>Tetingkap modal diubah saiz secara automatik untuk menampung kandungan yang lebih besar dan imej.</li></ul></div></div><div class=\"row align-item-center border-top border-1 pt-4\""_QQ_"_d=7_PH75___d col-lg-7 mb-3\"><h2 class=\"mb-3\">Kemas Kini Teras</h2><h3>Modul 'Artikel' semua-dalam-satu baharu__<PH90<PH90</h<PH98<PH88<se satu modul untuk memaparkan artikel terkini, paling banyak dibaca, khusus atau diarkibkan, daripada kategori terpilih - dengan penapis, teg dan banyak lagi...</p><p>Daripada <span class=\"fw-medium\">Kandungan -&Kandungan -& Modul Tapak</span>, buat modul baharu jenis 'Artikel'.</p><h3>Reka Letak Templat Mel</h3><p>yang boleh digunakan secara keseluruhan (dalam reka letak keseluruhannya) satu atau semua templat mel.</p><p>Daripada <span class=\"fw-medium\">Global Configuration -&gt; Templat Mel</span>, reka letak boleh ditakrifkan dalam HTML.</p><h3>Penambahan dan Pembetulan Lain</h3><ul class=\"mb-3\"><li>Sari Borang Bersarang - Membenarkan sarang Subborang di dalam Medan Tersuai Subbentuk.</li><li>Jumlah Bilangan - Menunjukkan bilangan senarai item dan jumlah bilangan konsol.</li></ul></div><div class=\"col-md-6 col-lg-5\"><div class=\"col-md-6 col-lg-5\">__PH14"_QQ_"img class=9<img src=\"media/com_guidedtours/images/5_2/mailtemplate.png\" alt=\"Contoh templat mel, termasuk logo pengepala dan pengaki\" lebar=\"640\"tinggi=\3"_QQ_"7__1"_QQ_"7__1"_QQ_"7__1"_QQ_"PH\3__5__PH\ loading=\"malas\"></div></div>"
