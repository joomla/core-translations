PLG_MULTIFACTORAUTH_YUBIKEY="Pengesahan Berbilang Faktor - YubiKey"
PLG_MULTIFACTORAUTH_YUBIKEY_XML_DESCRIPTION="Membenarkan pengguna di tapak anda menggunakan Pengesahan Berbilang Faktor menggunakan token perkakasan selamat YubiKey. Pengguna memerlukan YubiKey mereka sendiri yang tersedia daripada <a href=\"https://www.yubico.com\" target=\"_blank\" rel=\"noopener noreferrer\">www.yubico.com</a>. Untuk menggunakan Pengesahan Berbilang Faktor pengguna perlu mengedit profil pengguna mereka dan mendayakan Pengesahan Berbilang Faktor."

