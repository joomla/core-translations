COM_PRIVACY_EMAIL_ADMIN_REQUEST_BODY_EXPORT_REQUEST="Pentadbir untuk {URL} telah mencipta permintaan untuk mengeksport maklumat peribadi yang berkaitan dengan alamat e-mel ini. Sebagai langkah keselamatan, anda mesti mengesahkan bahawa ini adalah permintaan yang sah untuk maklumat peribadi anda daripada laman web ini.\n\nJika ini adalah kesilapan, abaikan e-mel ini dan tiada apa yang akan berlaku.\n\nUntuk mengesahkan permintaan ini, anda boleh melengkapkan salah satu tugas berikut:\n\n1. Layari URL berikut: {TOKENURL}\n\n2. Salin token anda dari e-mel ini, layari URL yang dirujuk, dan tampalkan token anda ke dalam borang.\nURL: {FORMURL}\nToken: {TOKEN}\n\nSila ambil perhatian bahawa token ini hanya sah selama 24 jam dari masa e-mel ini dihantar."
COM_PRIVACY_EMAIL_ADMIN_REQUEST_BODY_REMOVE_REQUEST="Pentadbir untuk {URL} telah mencipta permintaan untuk membuang semua maklumat peribadi yang berkaitan dengan alamat e-mel ini. Sebagai langkah keselamatan, anda mesti mengesahkan bahawa ini adalah permintaan yang sah untuk maklumat peribadi anda dibuang daripada laman web ini.\n\nJika ini adalah kesilapan, abaikan e-mel ini dan tiada apa yang akan berlaku.\n\nUntuk mengesahkan permintaan ini, anda boleh melengkapkan salah satu tugas berikut:\n\n1. Layari URL berikut: {TOKENURL}\n\n2. Salin token anda dari e-mel ini, layari URL yang dirujuk, dan tampalkan token anda ke dalam borang.\nURL: {FORMURL}\nToken: {TOKEN}\n\nSila ambil perhatian bahawa token ini hanya sah selama 24 jam dari masa e-mel ini dihantar."
