COM_PRIVACY_MSG_CAPABILITIES_INTRODUCTION="Maklumat pada skrin ini dikumpulkan daripada sambungan yang melaporkan keupayaan berkaitan privasi mereka kepada sistem ini. Ia bertujuan untuk membantu pemilik laman menyedari tentang keupayaan sambungan yang dipasang dan memberi maklumat untuk membantu pemilik mencipta dasar laman tempatan seperti dasar privasi. Oleh kerana skrin ini memerlukan sambungan untuk menyokong sistem pelaporannya, dan hanya memaparkan maklumat daripada sambungan yang didayakan, ini tidak patut dianggap sebagai senarai lengkap dan anda digalakkan untuk merujuk dokumentasi setiap sambungan untuk maklumat lanjut."
