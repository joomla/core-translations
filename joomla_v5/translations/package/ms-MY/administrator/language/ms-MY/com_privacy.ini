COM_PRIVACY_POSTINSTALL_BODY="<p>Dengan pengenalan GDPR untuk warganegara EU dan peraturan serupa di tempat lain di dunia, anda mungkin perlu meminta persetujuan sebelum menyimpan sebarang <strong>Maklumat Peribadi</strong> pengguna.</p><p>Joomla 3.9 memperkenalkan keupayaan baharu untuk membantu anda mencipta dasar privasi laman dan mengumpul persetujuan pengguna. Selain itu aliran kerja tersedia untuk membantu anda mengurus permintaan maklumat pengguna seperti permintaan untuk membuang data peribadi mereka daripada laman anda.</p><p>Untuk maklumat lanjut tentang ciri baharu ini baca <a href='https://docs.joomla.org/Special:MyLanguage/J3.x:Privacy' target='_blank' rel='noopener noreferrer'>dokumentasi Privasi</a>.</p>"
