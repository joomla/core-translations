COM_PRIVACY_CORE_CAPABILITY_COMMUNICATION_WITH_JOOMLA_ORG="Apabila sambungan rangkaian tersedia, pemasangan Joomla akan cuba berkomunikasi dengan pelayan joomla.org untuk pelbagai keupayaan, termasuk:<ul><li>Semakan kemas kini untuk aplikasi Joomla</li><li>Skrin bantuan untuk sambungan teras Joomla</li><li>Perkhidmatan Pasang dari Web (ikut serta)</li><li>Pelayan pengumpulan statistik (ikut serta)</li></ul>Seperti semua permintaan HTTP, alamat IP pelayan anda akan dihantar sebagai sebahagian daripada permintaan. Untuk maklumat tentang bagaimana Joomla memproses data di pelayannya, sila semak <a href=\"https://www.joomla.org/privacy-policy.html\" target=\"_blank\" rel=\"noopener noreferrer\">dasar privasi</a> kami."
COM_PRIVACY_CORE_CAPABILITY_LOGGING_IP_ADDRESS="Sistem pengelogan Joomla merekod alamat IP pelawat yang menyebabkan mesej ditulis ke fail lognya. Fail log ini digunakan untuk merekod pelbagai aktiviti di laman Joomla, termasuk maklumat berkaitan kemas kini teras, percubaan log masuk tidak sah, ralat yang tidak dikendalikan, dan maklumat pembangunan seperti penggunaan API yang ditamatkan. Format fail log ini boleh disesuaikan oleh mana-mana sambungan yang mengkonfigurasi pencatat, oleh itu anda digalakkan untuk memuat turun dan menyemak fail log untuk laman web anda yang boleh didapati di `%s`."
COM_PRIVACY_CORE_CAPABILITY_SESSION_IP_ADDRESS_AND_COOKIE="Semua permintaan ke laman web Joomla memulakan sesi yang menyimpan alamat IP dalam data sesi dan mencipta kuki sesi dalam pelayar pengguna. Alamat IP digunakan sebagai langkah keselamatan untuk membantu melindungi daripada potensi serangan rampasan sesi dan maklumat ini dipadamkan sebaik sahaja sesi tamat dan datanya dikosongkan. Nama kuki sesi berdasarkan hash yang dijana secara rawak dan oleh itu tidak mempunyai pengecam tetap. Kuki sesi dimusnahkan sebaik sahaja sesi tamat atau pengguna telah keluar dari pelayar mereka."
