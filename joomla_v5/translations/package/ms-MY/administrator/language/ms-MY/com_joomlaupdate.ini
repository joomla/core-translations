COM_JOOMLAUPDATE_UPDATE_FAILED_MAIL_BODY="This email IS NOT sent by the Joomla! project. It is sent automatically by your own site,\n{SITENAME} - {URL} \n\n================================================================================\nMAKLUMAT KEMAS KINI\n================================================================================\nLaman anda tidak dapat dikemas kini daripada {OLDVERSION} kepada {NEWVERSION}.\nSila semak fail log '/administrator/logs/joomla_update.php' untuk maklumat penyahpepijatan lanjut.\nE-mel ini dihantar kepada anda oleh laman anda.\nProjek Joomla! tidak akan menghubungi anda secara langsung.\n================================================================================\nKENAPA SAYA MENERIMA E-MEL INI?\n================================================================================\nE-mel ini telah dihantar secara automatik oleh Joomla!, perisian yang menguasai laman anda.\nAnda telah mendayakan kemas kini automatik di laman anda dan cuba memasang kemas kini tersebut mencetuskan mesej ini.\nJika anda tidak faham apa itu Joomla! dan apa yang perlu anda lakukan sila jangan hubungi projek Joomla!.\nMereka TIDAK menghantar e-mel ini kepada anda dan mereka tidak boleh membantu anda. Sebaliknya, sila hubungi orang yang membina atau mengurus laman anda.\n================================================================================\nSIAPA YANG MENGHANTAR E-MEL INI KEPADA SAYA?\n================================================================================\nE-mel ini dihantar kepada anda oleh laman anda sendiri, {SITENAME}"
