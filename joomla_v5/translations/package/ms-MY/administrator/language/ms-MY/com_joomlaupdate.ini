COM_JOOMLAUPDATE_CONFIG_AUTOMATED_UPDATES_DESC="Kemas kini automatik hanya tersedia untuk laman yang boleh diakses secara umum di internet. Jika laman anda berada di belakang tembok api atau tidak boleh diakses secara umum, seperti persekitaran ujian tempatan, anda perlu mengemas kini secara manual.<br><br><strong>Sila ambil perhatian:</strong> mendayakan Kemas Kini Automatik akan mendaftarkan laman anda pada perkhidmatan berkenaan yang disediakan oleh projek Joomla!.<br>Pendaftaran membenarkan projek Joomla mengakses maklumat tentang laman dan persekitaran pelayan anda, khususnya URL Laman, versi PHP, jenis dan versi Pangkalan Data, versi CMS dan jenis serta versi OS Pelayan.<br>Maklumat ini hanya digunakan untuk meningkatkan perkhidmatan."
