COM_JOOMLAUPDATE_ERRORMODAL_BODY_FORBIDDEN="<p>Joomla tidak dapat berkomunikasi dengan fail <code>administrator/components/com_joomlaupdate/extract.php</code> yang menjalankan kemas kini. Ini biasanya berlaku kerana salah satu sebab berikut:</p><ul><li>Fail konfigurasi pelayan di akar laman anda, seperti <code>.htaccess</code> atau <code>web.config</code>, menghalang akses kepada fail ini.</li><li>Konfigurasi pelayan anda menghalang akses kepada fail ini.</li><li>Pemilikan dan kebenaran fail ini tidak membenarkan pelayan anda mengakses fail ini.</li><li>Laman anda berada di belakang pengimbang beban atau CDN tetapi konfigurasinya tidak membenarkan akses kepada fail ini atau menyekat penghantaran arahan kepadanya.</li><li>Walaupun fail boleh diakses, penghantaran arahan kepadanya disekat oleh perlindungan pelayan anda seperti mod_security2.</li></ul><p>Jika anda tidak pasti sila hubungi hos anda.</p>"
COM_JOOMLAUPDATE_ERRORMODAL_BODY_INVALIDLOGIN="<p>Kemas Kini Joomla tidak dapat berkomunikasi dengan betul dengan <code>administrator/components/com_joomlaupdate/extract.php</code> yang menjalankan kemas kini. Ini biasanya berlaku kerana salah satu sebab berikut:</p><ul><li>Fail <code>administrator/components/com_joomlaupdate/update.php</code>, mengandungi arahan untuk menggunakan kemas kini, tidak dapat dicipta cth. kerana masalah kebenaran.</li><li>Fail yang disebut di atas tidak dapat dibaca oleh skrip <code>extract.php</code> kerana masalah kebenaran.</li><li>Pelayar, peralatan rangkaian atau pelayan anda merosakkan kata laluan yang kami hantar dengan setiap permintaan ke <code>extract.php</code> atas sebab keselamatan</li></ul><p>Sila cuba menggunakan pelayar lain, tanpa sebarang sambungan pelayar dipasang, idealnya pada komputer lain yang disambungkan ke Internet menggunakan pembekal lain. Jika ralat berterusan anda mungkin mahu menghubungi hos anda.</p>"
COM_JOOMLAUPDATE_ERRORMODAL_BODY_SERVERERROR="<p>Kemas Kini Joomla mengalami ralat pelayan semasa menggunakan kemas kini pada laman anda.</p><p>Laman anda mungkin tidak ditingkatkan sepenuhnya kepada versi Joomla baharu.</p>"
