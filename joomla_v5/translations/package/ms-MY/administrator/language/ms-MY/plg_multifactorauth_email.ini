PLG_MULTIFACTORAUTH_EMAIL="Pengesahan Pelbagai Faktor - Kod Pengesahan melalui E-mel"
PLG_MULTIFACTORAUTH_EMAIL_CONFIG_FORCE_ENABLE_DESC="Patutkah saya secara automatik menambah Kod Pengesahan melalui E-mel sebagai pilihan untuk <em>semua</em> pengguna? Berguna untuk menyediakan alternatif kepada pengguna yang kehilangan akses kepada pengesah utama mereka dan tidak menyimpan salinan kod sandaran dengan mengorbankan sedikit kawalan dan keselamatan."
