PLG_MULTIFACTORAUTH_EMAIL_CONFIG_TIMESTEP_60="Satu minit"
PLG_MULTIFACTORAUTH_EMAIL_CONFIG_TIMESTEP_DESC="Kod baharu dijana setiap minit ini. Sila ambil perhatian bahawa kod yang dijana adalah sah untuk sekurang-kurangnya masa ini dan paling banyak dua kali lebih banyak masa. Semakin tinggi tempoh ini, semakin besar kemungkinan kod itu dipaksa secara kasar, oleh itu tapak anda yang paling kurang selamat adalah. Tempoh 2 minit adalah pertukaran yang baik antara kebolehgunaan dan keselamatan."
