PLG_MULTIFACTORAUTH_EMAIL_CONFIG_TIMESTEP_DESC="Kod baharu dijana setiap sekian minit. Perlu diingat bahawa kod yang dijana adalah sah untuk sekurang-kurangnya tempoh ini dan paling lama dua kali ganda tempoh ini. Semakin tinggi tempoh ini semakin berkemungkinan kod itu dipecahkan secara paksa, oleh itu semakin kurang selamat laman anda. Tempoh 2 minit adalah pertukaran yang baik antara kebolehgunaan dan keselamatan."
