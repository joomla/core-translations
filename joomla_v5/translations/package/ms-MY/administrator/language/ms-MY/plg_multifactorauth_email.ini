PLG_MULTIFACTORAUTH_EMAIL_ERR_INVALID_CODE="Kod tidak sah atau telah tamat tempoh. Sila muat semula halaman untuk menghantar kod baharu kepada diri anda. Pastikan anda memasukkan kod dalam masa dua minit sejak anda meminta kod."
