PLG_MULTIFACTORAUTH_EMAIL="Pengesahan Berbilang Faktor - Kod Pengesahan melalui E-mel"
PLG_MULTIFACTORAUTH_EMAIL_CONFIG_FORCE_ENABLE_DESC="Perlukah saya menambah Kod Pengesahan melalui E-mel secara automatik sebagai pilihan untuk <em>semua</em> pengguna? Berguna untuk memberikan sandaran kepada pengguna yang telah kehilangan akses kepada pengesah utama mereka dan tidak menyimpan salinan kod sandaran dengan mengorbankan tahap kawalan dan keselamatan tertentu."
