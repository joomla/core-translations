PLG_USER_TOKEN="Pengguna - Token API Joomla"
PLG_USER_TOKEN_COPY="salin"
PLG_USER_TOKEN_COPY_DESC="Salin token ke papan keratan anda"
PLG_USER_TOKEN_COPY_FAIL="Gagal menyalin token."
PLG_USER_TOKEN_COPY_SUCCESS="Token disalin."
PLG_USER_TOKEN_ENABLED_DESC="Tetapkan kepada Tidak untuk menghalang akses ke tapak anda buat sementara waktu dengan token ini."
PLG_USER_TOKEN_ENABLED_LABEL="Aktif"
PLG_USER_TOKEN_GROUP_DESC="Uruskan token keselamatan yang digunakan untuk mengesahkan ke aplikasi API Joomla (akses jauh ke tapak anda). Jika anda tidak pasti apa yang dilakukan ini kemungkinan besar anda tidak memerlukannya dan boleh mengabaikan tetapan ini dengan selamat."
PLG_USER_TOKEN_GROUP_LABEL="Token API Joomla"
PLG_USER_TOKEN_NOTOKENFOROTHERPEOPLE_DESC="Anda tidak boleh melihat token untuk pengguna selain diri anda sendiri. Anda masih boleh mendayakan, melumpuhkan atau menetapkan semula token mereka contohnya apabila terdapat syak wasangka token mereka telah bocor kepada orang yang tidak dibenarkan."
PLG_USER_TOKEN_RESET_DESC="Tetapkan kepada Ya dan simpan profil pengguna anda untuk mencipta token baharu, menggantikan yang lama."
PLG_USER_TOKEN_RESET_LABEL="Set Semula"
PLG_USER_TOKEN_SAVEME_DESC="Anda belum mempunyai token. Sila simpan profil pengguna anda untuk menjana token. Kembali ke halaman ini untuk melihat dan mengurus token anda."
PLG_USER_TOKEN_SAVEMEFOROTHERPEOPLE_DESC="Pengguna ini belum mempunyai token lagi. Jika anda menyimpan profil mereka, token baharu akan dihasilkan tetapi anda tidak akan dapat melihatnya atas sebab keselamatan. Anda masih boleh mendayakan, melumpuhkan atau menetapkan semula token mereka."
PLG_USER_TOKEN_TOKEN_DESC="Ini adalah token anda. Gunakannya dalam aplikasi pihak ketiga yang memerlukan akses jauh ke tapak anda melalui aplikasi API Joomla."
PLG_USER_TOKEN_TOKEN_LABEL="Token"
PLG_USER_TOKEN_XML_DESCRIPTION="Membenarkan pengurusan token keselamatan yang digunakan untuk mengesahkan ke aplikasi API Joomla (akses jauh ke tapak anda). Token ini adalah benar-benar peribadi. Anda boleh melihat token anda sendiri tetapi anda hanya boleh melumpuhkan atau menetapkan semula token pengguna lain."

