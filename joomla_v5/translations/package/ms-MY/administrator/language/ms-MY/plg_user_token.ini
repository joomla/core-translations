PLG_USER_TOKEN_ENABLED_DESC="Tetapkan ke Tidak untuk menghalang akses ke laman anda dengan token ini buat sementara waktu."
PLG_USER_TOKEN_ENABLED_LABEL="Aktif"
PLG_USER_TOKEN_GROUP_DESC="Urus token keselamatan yang digunakan untuk pengesahan ke aplikasi API Joomla (akses jauh ke laman anda). Jika anda tidak pasti apa ini, anda mungkin tidak memerlukannya dan boleh mengabaikan tetapan ini dengan selamat."
PLG_USER_TOKEN_GROUP_LABEL="Token API Joomla"
PLG_USER_TOKEN_NOTOKENFOROTHERPEOPLE_DESC="Anda tidak dapat melihat token untuk pengguna selain diri anda sendiri. Anda masih boleh mendayakan, melumpuhkan atau mengeset semula token mereka cth apabila terdapat syak bahawa token mereka telah bocor kepada orang yang tidak dibenarkan."
PLG_USER_TOKEN_RESET_DESC="Tetapkan ke Ya dan simpan profil pengguna anda untuk mencipta token baharu, menggantikan yang lama."
PLG_USER_TOKEN_RESET_LABEL="Tetap Semula"
PLG_USER_TOKEN_SAVEME_DESC="Anda belum mempunyai token. Sila simpan profil pengguna anda untuk menjana token. Kembali ke halaman ini untuk melihat dan mengurus token anda."
PLG_USER_TOKEN_SAVEMEFOROTHERPEOPLE_DESC="Pengguna ini belum mempunyai token. Jika anda menyimpan profil mereka, token baharu akan dijana tetapi anda tidak akan dapat melihatnya atas sebab keselamatan. Anda masih boleh mendayakan, melumpuhkan atau mengeset semula token mereka."
PLG_USER_TOKEN_TOKEN_DESC="Ini ialah token anda. Gunakannya dalam aplikasi pihak ketiga yang memerlukan akses jauh ke laman anda melalui aplikasi API Joomla."
PLG_USER_TOKEN_TOKEN_LABEL="Token"
PLG_USER_TOKEN_XML_DESCRIPTION="Membenarkan pengurusan token keselamatan yang digunakan untuk pengesahan ke aplikasi API Joomla (akses jauh ke laman anda). Token ini adalah peribadi sepenuhnya. Anda boleh melihat token anda sendiri tetapi anda hanya boleh melumpuhkan atau mengeset semula token pengguna lain."
