COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_COUNTER_TITLE="Pilih nombor pembilang langkah"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_COUNTER_DESCRIPTION="Pilih nombor untuk menambah langkah. Nombor tersebut mewakili bilangan langkah yang dicipta untuk lawatan setakat ini."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_NEW_TITLE="Pilih butang 'Baharu'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_NEW_DESCRIPTION="Pilih 'Baharu' untuk mencipta langkah baharu."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TITLE_TITLE="Tambah tajuk untuk langkah"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TITLE_DESCRIPTION="Masukkan tajuk yang diperlukan untuk langkah. Ini biasanya tindakan yang perlu dilaksanakan oleh pengguna."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_DESCRIPTION_TITLE="Tambah penjelasan langkah"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_DESCRIPTION_DESCRIPTION="Kandungan harus memberi pengguna penjelasan tentang langkah tersebut."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_STATUS_TITLE="Pilih status"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_STATUS_DESCRIPTION="Pilih status penerbitan langkah."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_POSITION_TITLE="Pilih kedudukan"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_POSITION_DESCRIPTION="Ini adalah kedudukan tetingkap timbul berbanding elemen yang anda sasarkan pada halaman. 'Ditengahkan' digunakan apabila tiada sasaran tertentu."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TARGET_TITLE="Masukkan elemen sasaran"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TARGET_DESCRIPTION="Ini adalah elemen pada halaman yang disasarkan oleh langkah ini. Ia menggunakan sintaks yang digunakan oleh CSS untuk menyasarkan elemen.<br>Contohnya, <code>#jform_title</code> akan menyasarkan elemen dengan id 'jform_title'."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TYPE_TITLE="Pilih jenis"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_TYPE_DESCRIPTION="Ini adalah jenis langkah yang anda ingin cipta. 'Seterusnya' untuk membenarkan lawatan meneruskan tanpa interaksi, 'Pengalihan' untuk berpindah ke halaman lain, 'Interaktif' untuk meminta input pengguna."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_SAVECLOSE_TITLE="Pilih 'Simpan dan Tutup'"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_SAVECLOSE_DESCRIPTION="Simpan dan tutup langkah."

COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_CONGRATULATIONS_TITLE="Tahniah!"
COM_GUIDEDTOURS_TOUR_GUIDEDTOURSTEPS_STEP_CONGRATULATIONS_DESCRIPTION="Anda telah mencipta langkah untuk lawatan berpandu."
