COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_TITLE="Selamat Datang ke Joomla!"
COM_GUIDEDTOURS_TOUR_WELCOMETOJOOMLA_DESCRIPTION="<p>Lawatan ini akan memberi anda gambaran ringkas tentang cara bermula dengan Joomla!</p><p>Anda berada di kawasan Pentadbir Joomla, juga dikenali sebagai '<strong>Bahagian Belakang</strong>'.<br>Di sinilah anda menyediakan dan mengurus keseluruhan Laman Joomla anda.</p><p><strong>Ingin ketahui lebih lanjut?</strong></p><p>Mari mulakan lawatan dan bina laman anda dengan kuasa Joomla!</p>"
