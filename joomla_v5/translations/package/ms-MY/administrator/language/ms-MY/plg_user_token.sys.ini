PLG_USER_TOKEN="Pengguna - Token API Joomla"
PLG_USER_TOKEN_ALLOWEDUSERGROUPS_DESC="Kumpulan Pengguna Joomla mana yang dibenarkan menggunakan Token Joomla untuk pengesahan ke aplikasi API Joomla. Jika anda tidak tahu tentang perkara ini, sila tinggalkan seperti sedia ada."
PLG_USER_TOKEN_ALLOWEDUSERGROUPS_LABEL="Kumpulan Pengguna Dibenarkan"
